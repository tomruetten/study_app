      {
        id: 'kf8', name: 'Vacuum Vessel and Cryostat', icon: '🫙', color: '#06b6d4', examWeight: 10,
        slideDeck: 'Folien_Kernfusion/MW1112 - Lecture 08 - Vacuum Vessel and Cryostat.pdf',
        quiz: [
  { id: 'qz_kf_l08_01', category: 'L8 — Vacuum Vessel and Cryostat', question: 'The ITER vacuum vessel is best described as…', options: ['a single-wall aluminum chamber that only supports the magnets', 'a thermal shield placed between the cryostat and the magnets', 'a hermetically sealed double-wall steel container that houses the plasma and forms the first safety containment barrier', 'a superconducting structure that generates the poloidal field'], correct: 2, explanation: 'The vacuum vessel is a hermetically sealed steel container housing the fusion reactions; it provides the high-vacuum environment for the plasma and acts as the primary (first) confinement barrier for radioactivity. (Lecture 08, Folie 8)' },
  { id: 'qz_kf_l08_02', category: 'L8 — Vacuum Vessel and Cryostat', question: 'Which of the following is NOT one of the main functions of the ITER vacuum vessel listed in the lecture?', options: ['Breeding tritium directly within its double walls', 'Acting as the primary confinement barrier for radioactivity', 'Providing a high-vacuum environment for the plasma', 'Providing mechanical support for in-vessel components such as blanket and divertor'], correct: 0, explanation: 'Tritium breeding is a function of the blanket modules, not of the vacuum vessel structure itself; the vessel provides vacuum, shielding/stability, containment, and mechanical support. (Lecture 08, Folie 8)' },
  { id: 'qz_kf_l08_03', category: 'L8 — Vacuum Vessel and Cryostat', question: 'How is the vacuum vessel cooled during operation?', options: ['By liquid helium flowing through the outer shell only', 'By gaseous nitrogen circulated through the ports', 'By radiative cooling to the cryostat', 'By cooling water circulating through the double stainless-steel walls'], correct: 3, explanation: 'The vessel has double stainless-steel walls, and cooling water circulating between them removes the heat generated during operation. (Lecture 08, Folie 8)' },
  { id: 'qz_kf_l08_04', category: 'L8 — Vacuum Vessel and Cryostat', question: 'The 44 openings ("ports") in the ITER vacuum vessel primarily serve to…', options: ['reduce the overall weight of the vessel', 'provide access for remote handling, diagnostics, heating, and vacuum systems', 'allow the plasma to expand beyond the first wall', 'act as the main structural support for the poloidal field coils'], correct: 1, explanation: 'The 44 ports provide access for remote handling operations, diagnostics, heating systems, and vacuum pumping/systems. (Lecture 08, Folie 9)' },
  { id: 'qz_kf_l08_05', category: 'L8 — Vacuum Vessel and Cryostat', question: 'In a tokamak, why is a larger vacuum chamber (vessel) volume advantageous?', options: ['It reduces the amount of shielding material needed', 'It makes it easier to confine the plasma and reach the high-energy regime needed for significant fusion power', 'It eliminates the need for a cryostat', 'It reduces the number of required vacuum pumps'], correct: 1, explanation: 'The lecture states that the larger the vacuum chamber volume, the easier it is to confine the plasma and achieve the high-energy regime required to produce significant fusion power. (Lecture 08, Folie 9)' },
  { id: 'qz_kf_l08_06', category: 'L8 — Vacuum Vessel and Cryostat', question: 'What is the relationship between the ITER plasma volume and the interior vacuum vessel volume?', options: ['The plasma volume is fixed at 16,000 m³, matching the cryostat', 'The plasma volume exceeds the vessel volume by design', 'The plasma volume equals the cryostat volume', 'The plasma volume (840 m³) is about ten times larger than that of any operating tokamak today, while the vessel interior is 1,400 m³'], correct: 3, explanation: 'The ITER vacuum vessel has an interior volume of 1,400 m³, of which the central plasma volume is 840 m³ — ten times larger than the plasma volume of the largest operating tokamak today. (Lecture 08, Folie 10)' },
  { id: 'qz_kf_l08_07', category: 'L8 — Vacuum Vessel and Cryostat', question: 'The ITER vacuum vessel outer dimensions and mass are approximately…', options: ['19.4 m across, 11.4 m high, and about 5,200 tonnes', '10 m diameter, 5 m height, 500 tonnes', '30 m across, 30 m high, and about 3,550 tonnes', '28 m across, 29 m high, and about 1,250 tonnes'], correct: 0, explanation: 'The lecture gives the ITER vacuum vessel outer diameter as 19.4 m, height 11.4 m, and mass approximately 5,200 tonnes (the 30 m and 3,550-tonne figures instead describe the cryostat). (Lecture 08, Folie 10)' },
  { id: 'qz_kf_l08_08', category: 'L8 — Vacuum Vessel and Cryostat', question: 'The in-wall shielding blocks located between the double walls of the ITER vacuum vessel mainly serve to…', options: ['generate the toroidal magnetic field', 'breed tritium for the fuel cycle', 'shield components outside the vessel (e.g. magnets) from neutron radiation and reduce toroidal field ripple', 'cool the divertor via forced convection'], correct: 2, explanation: 'About 9,000 modular in-wall shielding blocks made of borated, ferromagnetic stainless steel fill half the inter-wall space; they shield outside components like the magnets from neutrons and reduce toroidal field ripple. (Lecture 08, Folie 11)' },
  { id: 'qz_kf_l08_09', category: 'L8 — Vacuum Vessel and Cryostat', question: 'Approximately how many nearly identical sectors make up the ITER vacuum vessel?', options: ['4', '28', '18', '9'], correct: 3, explanation: 'The ITER vacuum vessel is made of 9 nearly identical sectors, each consisting of inner/outer shells, ribs, and shield structures joined by field welds. (Lecture 08, Folie 12)' },
  { id: 'qz_kf_l08_10', category: 'L8 — Vacuum Vessel and Cryostat', question: 'Each ITER vacuum vessel sector is composed of which structural elements?', options: ['Only a single monolithic shell with no internal reinforcement', 'A superconducting coil embedded directly in the wall', 'Inner and outer shells, ribs, shield structures, splice plates, and mechanical structures supporting in-vessel components and vessel weight', 'A ceramic liner surrounding a copper shell'], correct: 2, explanation: 'Each of the 9 sectors consists of inner and outer shells, ribs, shield structures, splice plates for field joints, and mechanical structures supporting in-vessel components and the vessel weight. (Lecture 08, Folie 12)' },
  { id: 'qz_kf_l08_11', category: 'L8 — Vacuum Vessel and Cryostat', question: 'How are the ITER vacuum vessel ports distributed across the machine\'s height?', options: ['All 44 ports are located exclusively at the equatorial level', '18 ports at upper level, 14 regular + 3 NB ports at equatorial level, 9 ports + 18 local penetrations at lower level', '9 ports at upper level and 44 at lower level only', '23 penetrations at upper level and none elsewhere'], correct: 1, explanation: 'The vessel has 18 ports at the upper level, 14 regular plus 3 neutral-beam (NB) ports at the equatorial level, and 9 ports plus 18 local penetrations at the lower level. (Lecture 08, Folie 12)' },
  { id: 'qz_kf_l08_12', category: 'L8 — Vacuum Vessel and Cryostat', question: 'Which material is used for the main vessel body and the double-wall port components of the ITER vacuum vessel?', options: ['SS 316L(N)-IG', 'SS 304B7', 'Inconel 718', 'SS 430'], correct: 0, explanation: 'SS 316L(N)-IG is the main material for the vessel body and double-wall port components, chosen for high mechanical strength, corrosion resistance, good fabrication properties, and relatively low cost. (Lecture 08, Folie 14)' },
  { id: 'qz_kf_l08_13', category: 'L8 — Vacuum Vessel and Cryostat', question: 'High-strength bolts in the ITER vacuum vessel are made of which material?', options: ['Inconel 718', 'SS 430', 'SS 304', 'SS 316L(N)-IG'], correct: 0, explanation: 'The lecture lists Inconel 718 as the material selected for the high-strength bolts, chosen among other criteria for its high mechanical strength at operating conditions. (Lecture 08, Folie 14)' },
  { id: 'qz_kf_l08_14', category: 'L8 — Vacuum Vessel and Cryostat', question: 'The primary reasons given for the material selections used throughout the ITER vacuum vessel include all of the following EXCEPT…', options: ['high mechanical strength at operating temperatures', 'maximum electrical conductivity to carry plasma current', 'excellent fabrication characteristics and relatively low cost', 'favorable water chemistry / corrosion resistance'], correct: 1, explanation: 'The stated selection criteria are mechanical strength, corrosion resistance, fabricability, and low cost — electrical conductivity for carrying plasma current is not a criterion mentioned for vessel materials. (Lecture 08, Folie 14)' },
  { id: 'qz_kf_l08_15', category: 'L8 — Vacuum Vessel and Cryostat', question: 'Why must cobalt content be kept very low (e.g. below 500 ppm) in the vacuum vessel steels?', options: ['Cobalt reduces weldability significantly', 'Cobalt increases magnetic permeability, disturbing the confining field', 'Cobalt has a large neutron reaction cross section, leading to high activation (gamma rays)', 'Cobalt lowers the corrosion resistance of the steel'], correct: 2, explanation: 'Cobalt has a large neutron capture cross section, so even small amounts lead to strong activation and gamma emission after neutron irradiation, so it is tightly limited. (Lecture 08, Folie 15)' },
  { id: 'qz_kf_l08_16', category: 'L8 — Vacuum Vessel and Cryostat', question: 'Why is SS 316L(N)-IG preferred over other austenitic steels for the main ITER vessel structure, besides corrosion resistance?', options: ['It has the lowest possible cost of any candidate steel', 'It can be used without any welding', 'It is non-metallic and therefore immune to neutron activation', 'It has high minimum tensile properties and good toughness, giving a high allowable stress Sm, and low magnetic permeability (<1.01) that does not disturb the steady-state magnetic field'], correct: 3, explanation: 'SS 316L(N)-IG combines high tensile strength/toughness (high allowable stress Sm) with very low magnetic permeability (<1.01), so it does not perturb the machine\'s steady-state magnetic field. (Lecture 08, Folie 15)' },
  { id: 'qz_kf_l08_17', category: 'L8 — Vacuum Vessel and Cryostat', question: 'SS 304 is used as the main structural material for which vacuum vessel components?', options: ['The primary double-wall shell of the main vessel body', 'The superconducting magnet casings', 'The un-cooled single-wall port components', 'The cryopump cryopanels'], correct: 2, explanation: 'SS 304 is used for the un-cooled single-wall port components due to availability, cost, and good tensile/toughness properties, though it has lower corrosion resistance than 316L(N)-IG. (Lecture 08, Folie 16)' },
  { id: 'qz_kf_l08_18', category: 'L8 — Vacuum Vessel and Cryostat', question: 'Why are welds in SS 304 more susceptible to intergranular corrosion compared to SS 316L(N)-IG welds?', options: ['SS 304 contains more boron than 316L(N)-IG', 'SS 304 cannot be welded to 316L(N)-IG at all', 'SS 304 is ferromagnetic and therefore reacts with the plasma', 'SS 304 has a higher carbon content (< 0.08 wt.%), which affects weld corrosion behavior in corrosive environments'], correct: 3, explanation: 'Due to its higher carbon content compared to the low-carbon 316L(N)-IG grade, SS 304 welds are more prone to intergranular corrosion when exposed to corrosive environments. (Lecture 08, Folie 16)' },
  { id: 'qz_kf_l08_19', category: 'L8 — Vacuum Vessel and Cryostat', question: 'Which welding method is preferred wherever possible for joining ITER vacuum vessel parts, with TIG and narrow-gap TIG used for the remaining joints and field joints?', options: ['Laser welding', 'Electron beam welding', 'Friction stir welding', 'Resistance spot welding'], correct: 1, explanation: 'Electron beam welding is used wherever possible for joining vessel parts, while TIG and narrow-gap TIG welding are used for other parts and the field joints between sectors. (Lecture 08, Folie 16)' },
  { id: 'qz_kf_l08_20', category: 'L8 — Vacuum Vessel and Cryostat', question: 'The shield blocks filling the space between the double walls of the vessel are made of austenitic stainless steel containing approximately…', options: ['1-2 weight % boron', '10-15 weight % boron', '50 weight % boron', 'no boron at all, only pure iron'], correct: 0, explanation: 'The shield blocks are made of austenitic stainless steel containing about 1-2 weight % boron, which improves neutron shielding (steel types 304B4 and 304B7). (Lecture 08, Folie 17)' },
  { id: 'qz_kf_l08_21', category: 'L8 — Vacuum Vessel and Cryostat', question: 'A known drawback of the boron-containing shielding steels (304B4/304B7) mentioned in the lecture is…', options: ['excessive electrical conductivity', 'low ductility (minimum total elongation of 6%) and low fracture toughness, requiring special design attention', 'inability to withstand any neutron flux', 'excessive magnetic permeability disturbing the plasma'], correct: 1, explanation: 'The boron-doped shielding steel has low ductility (minimum ~6% total elongation) and low fracture toughness, so special care is required in the design and fabrication of these blocks. (Lecture 08, Folie 17)' },
  { id: 'qz_kf_l08_22', category: 'L8 — Vacuum Vessel and Cryostat', question: 'To achieve and maintain ultra-high vacuum (UHV) compatibility, the ITER vacuum vessel manufacturing process requires…', options: ['delivery in UHV-compatible clean conditions, careful control/removal of manufacturing liquids and lubricants, and a specified fine surface finish (e.g. 6.3 µm) to minimize outgassing', 'leaving a thin oil film on all internal surfaces to prevent corrosion', 'painting the interior surfaces with a ceramic coating', 'operating the vessel permanently above room temperature'], correct: 0, explanation: 'UHV compatibility requires clean delivery conditions, careful control of liquids/lubricants used during manufacturing so they can be fully removed, and a specified surface finish (e.g. 6.3 µm) on UHV-exposed surfaces to minimize outgassing. (Lecture 08, Folie 17)' },
  { id: 'qz_kf_l08_23', category: 'L8 — Vacuum Vessel and Cryostat', question: 'Why is a LOW emissivity (<0.3) desirable on the outboard (cryostat-facing) side of the vacuum vessel?', options: ['To increase conductive heat transfer to the thermal shield', 'To increase absorption of neutron radiation', 'To reduce the heat transferred by radiation from the vessel to the thermal shield', 'To improve the vessel\'s magnetic shielding'], correct: 2, explanation: 'A low emissivity (<0.3) on the cryostat-facing side minimizes radiative heat transfer from the warm vessel to the cold thermal shield, reducing the cryogenic heat load. (Lecture 08, Folie 18)' },
  { id: 'qz_kf_l08_24', category: 'L8 — Vacuum Vessel and Cryostat', question: 'Why is a HIGHER emissivity desirable on the inboard (plasma-facing) side of the vacuum vessel?', options: ['To reduce heat losses to the divertor', 'To decrease the required cooling water flow rate during normal operation', 'To reduce neutron activation of the blanket', 'To increase heat transfer by radiation from the blanket modules to the vessel during a Loss of Coolant Event (LOCE)'], correct: 3, explanation: 'Higher emissivity on the inboard side promotes radiative heat transfer from the blanket modules to the vessel specifically during a Loss of Coolant Event, helping passively remove decay heat. (Lecture 08, Folie 18)' },
  { id: 'qz_kf_l08_25', category: 'L8 — Vacuum Vessel and Cryostat', question: 'The ferritic stainless steel SS 430 is used near the toroidal field (TF) coils in the outboard area primarily to…', options: ['increase the plasma current', 'serve as the cryopump cryopanel coating', 'act as the tritium breeding material', 'reduce toroidal field ripple (being ferromagnetic) while also providing neutron shielding'], correct: 3, explanation: 'SS 430 is ferromagnetic and is used near the TF coils to reduce toroidal field ripple, while also contributing to neutron shielding as part of the shielding plates. (Lecture 08, Folie 19)' },
  { id: 'qz_kf_l08_26', category: 'L8 — Vacuum Vessel and Cryostat', question: 'According to the lecture, reducing toroidal field ripple by a factor of 2 using ferromagnetic material is estimated to reduce the neutral beam (NB) particle energy loss fraction by roughly…', options: ['no measurable amount', 'a factor of 5', 'a factor of 100', 'a factor of 1.1'], correct: 1, explanation: 'A factor-of-2 reduction in toroidal ripple is estimated to reduce the NB particle energy loss fraction by about a factor of 5 for the reference scenario, illustrating the strong nonlinear benefit of ripple reduction. (Lecture 08, Folie 19)' },
  { id: 'qz_kf_l08_27', category: 'L8 — Vacuum Vessel and Cryostat', question: 'Why does reducing toroidal field ripple also reduce alpha-particle energy loss and heat loss to the first wall?', options: ['Because ripple-induced perturbations increase particle drift losses to the wall, so reducing ripple keeps more energetic particles confined', 'Because ripple has no effect on alpha particles, only on neutrals', 'Because ripple reduction increases the plasma density directly', 'Because ripple reduction eliminates Bremsstrahlung losses'], correct: 0, explanation: 'Toroidal field ripple perturbs particle orbits and increases losses of energetic particles (NB neutrals once ionized, and alpha particles) to the first wall; reducing ripple via ferromagnetic inserts mitigates these losses. (Lecture 08, Folie 19)' },
  { id: 'qz_kf_l08_28', category: 'L8 — Vacuum Vessel and Cryostat', question: 'How are the 9 sectors of the ITER vacuum vessel joined together after being lowered into the pit?', options: ['By bolting flanges with elastomer gaskets', 'By an adhesive ceramic bonding process', 'By welding 9 field joints located at the center of the lateral ports, using splice plates to compensate dimensional differences and assembly tolerances', 'They are not joined; each sector operates independently'], correct: 2, explanation: 'After positioning, the 9 field joints at the center of the lateral ports are welded using splice plates that compensate for dimensional differences between sectors and assembly tolerances. (Lecture 08, Folie 20)' },
  { id: 'qz_kf_l08_29', category: 'L8 — Vacuum Vessel and Cryostat', question: 'Why must the gap and mismatch between vacuum vessel sectors be measured and the splice plates machined to fit prior to welding?', options: ['Because manufacturing and assembly tolerances create dimensional differences between sectors that the splice plates must be custom-fitted to accommodate', 'Because the sectors are never actually welded together', 'Because splice plates are purely decorative', 'Because the sectors are identical to sub-millimeter precision and no fitting is needed'], correct: 0, explanation: 'Due to real-world manufacturing/assembly tolerances, the fit-up between adjacent sectors varies, so the gap and mismatch are measured and splice plates machined accordingly before field welding. (Lecture 08, Folie 21)' },
  { id: 'qz_kf_l08_30', category: 'L8 — Vacuum Vessel and Cryostat', question: 'The cryostat is best described as…', options: ['a small chamber housing only the cryopumps', 'a synonym for the vacuum vessel itself', 'the large vacuum chamber that entirely encloses the vacuum vessel and magnet systems', 'the cooling water loop of the first wall'], correct: 2, explanation: 'Along with the magnet systems, the ITER vacuum vessel is entirely enclosed in a large vacuum chamber called the cryostat. (Lecture 08, Folie 9)' },
  { id: 'qz_kf_l08_31', category: 'L8 — Vacuum Vessel and Cryostat', question: 'The primary purpose of the ITER cryostat vacuum is to…', options: ['breed tritium from lithium', 'directly cool the plasma-facing components', 'increase the pressure around the vacuum vessel to improve structural rigidity', 'stop convective heat transfer to the superconducting magnets and cold structures, and form the secondary confinement barrier for radioactivity'], correct: 3, explanation: 'The cryostat vacuum environment prevents convective heat transfer to the superconducting magnets/cold structures and forms the secondary (outer) confinement barrier for the radioactive inventory inside the vacuum vessel. (Lecture 08, Folie 36)' },
  { id: 'qz_kf_l08_32', category: 'L8 — Vacuum Vessel and Cryostat', question: 'Structurally, the ITER cryostat is described as…', options: ['a double-wall spherical shell', 'a single-wall cylindrical shell with a flat top and bottom', 'a segmented toroidal shell matching the vacuum vessel shape', 'a woven composite pressure vessel'], correct: 1, explanation: 'The ITER cryostat is a single-wall cylindrical shell with flat top and bottom sections (base, lower cylinder, upper cylinder, top lid). (Lecture 08, Folie 36)' },
  { id: 'qz_kf_l08_33', category: 'L8 — Vacuum Vessel and Cryostat', question: 'Why is the ITER cryostat installed and removed in several parts rather than as one piece?', options: ['Because a single piece would not fit through the tokamak building doors', 'Because its total weight (~3,550 t) exceeds the capacity of the main cranes (~1,500 t)', 'Because welding a single-piece cryostat is not technically possible', 'Because regulations require modular components for safety inspection'], correct: 1, explanation: 'The cryostat total weight of approximately 3,550 tonnes exceeds the ~1,500-tonne capacity of the main cranes, so it is designed to be installed/removed in several major sections (base, lower cylinder, upper cylinder, top lid). (Lecture 08, Folie 36)' },
  { id: 'qz_kf_l08_34', category: 'L8 — Vacuum Vessel and Cryostat', question: 'Which cryostat section is the single largest individual load of ITER Tokamak assembly?', options: ['The top lid (~1,000 t including truss structure)', 'The lower cylinder (~1,023 t)', 'The upper cylinder (~600 t)', 'The base section (~1,250 tonnes)'], correct: 3, explanation: 'The cryostat base section weighs approximately 1,250 tonnes and is stated to be the single largest load handled during ITER Tokamak assembly. (Lecture 08, Folie 36)' },
  { id: 'qz_kf_l08_35', category: 'L8 — Vacuum Vessel and Cryostat', question: 'The internal diameter of the ITER cryostat (28 m) was primarily determined by…', options: ['the size of the vacuum vessel sectors', 'the required volume for cryopumps', 'the size of the largest components inside it, the two largest poloidal field coils', 'regulatory limits on building footprint'], correct: 2, explanation: 'The cryostat\'s internal diameter of 28 metres is set by the size of the largest internal components, namely the two largest poloidal field coils. (Lecture 08, Folie 37)' },
  { id: 'qz_kf_l08_36', category: 'L8 — Vacuum Vessel and Cryostat', question: 'What is the function of the large bellows situated between the cryostat and the vacuum vessel?', options: ['To allow for thermal contraction and expansion of the structures during operation', 'To pump the vacuum vessel down to UHV levels', 'To filter neutron radiation between the two chambers', 'To provide electrical grounding between the vessel and cryostat'], correct: 0, explanation: 'Large bellows between the cryostat and vacuum vessel accommodate thermal contraction and expansion of the structures that occur during operation, preventing mechanical stress buildup. (Lecture 08, Folie 37)' },
  { id: 'qz_kf_l08_37', category: 'L8 — Vacuum Vessel and Cryostat', question: 'The cryostat structure must withstand a design vacuum pressure of about…', options: ['1 bar', '10⁻⁹ mbar', '10⁻⁴ Pa', '10³ mbar'], correct: 2, explanation: 'The lecture states the cryostat structure must withstand a vacuum pressure of 10⁻⁴ Pa, with a pump volume designed for 8,500 m³. (Lecture 08, Folie 37)' },
  { id: 'qz_kf_l08_38', category: 'L8 — Vacuum Vessel and Cryostat', question: 'Approximately how many penetrations does the ITER cryostat have for cooling systems, magnet feeders, auxiliary heating, diagnostics, and remote handling, in addition to its 23 maintenance-access penetrations?', options: ['Exactly 44, matching the vacuum vessel ports', 'Over 200', 'About 9', 'None; all such connections pass through the vacuum vessel ports only'], correct: 1, explanation: 'Beyond 23 penetrations for maintenance access, the cryostat has over 200 additional penetrations for cooling systems, magnet feeders, auxiliary heating, diagnostics, and remote handling of blanket/divertor components. (Lecture 08, Folie 37)' },
  { id: 'qz_kf_l08_39', category: 'L8 — Vacuum Vessel and Cryostat', question: 'The main construction material of the ITER cryostat, per the technical data table, is…', options: ['304L/304 stainless steel', 'Inconel 718', 'SS 430 ferritic steel', 'Borated 304B7 steel'], correct: 0, explanation: 'The cryostat technical data table lists 304L/304 stainless steel as the material of main construction. (Lecture 08, Folie 38)' },
  { id: 'qz_kf_l08_40', category: 'L8 — Vacuum Vessel and Cryostat', question: 'Approximately what is the total mass and interior free volume of the ITER cryostat according to the summary technical data table?', options: ['~350 tonnes and ~850 m³', '~16,000 tonnes and ~3,400 m³', '~5,200 tonnes and ~1,400 m³', '~3,500 tonnes total mass and ~8,500 m³ interior free volume'], correct: 3, explanation: 'The data table lists a total cryostat mass of approximately 3,500 tonnes and an interior free volume of approximately 8,500 m³ (with total interior volume near 16,000 m³). (Lecture 08, Folie 38)' },
  { id: 'qz_kf_l08_41', category: 'L8 — Vacuum Vessel and Cryostat', question: 'Inside the cryostat, high vacuum is necessary mainly in order to…', options: ['reach and maintain the cryogenic conditions needed by the superconducting magnets', 'directly confine the fusion plasma', 'store tritium safely', 'shield operators from neutron radiation'], correct: 0, explanation: 'High vacuum inside the cryostat (typically 10⁻⁷ to 10⁻⁸ mbar) is needed to reach and maintain cryogenic conditions by eliminating convective/conductive heat transfer to the cold magnet structures. (Lecture 08, Folie 48)' },
  { id: 'qz_kf_l08_42', category: 'L8 — Vacuum Vessel and Cryostat', question: 'What are the typical target vacuum pressure levels inside the cryostat versus inside the vacuum vessel (plasma chamber)?', options: ['Cryostat: 10³ mbar; Vacuum vessel: 10⁻³ mbar', 'Cryostat: 10⁻⁹ mbar; Vacuum vessel: 1 bar', 'Both are held at exactly 10⁻³ mbar', 'Cryostat: 10⁻⁷ to 10⁻⁸ mbar; Vacuum vessel: 10⁻⁹ mbar or better'], correct: 3, explanation: 'The cryostat operates at 10⁻⁷ to 10⁻⁸ mbar, while the vacuum vessel plasma chamber requires ultra-high vacuum (UHV) of 10⁻⁹ mbar or better. (Lecture 08, Folie 48)' },
  { id: 'qz_kf_l08_43', category: 'L8 — Vacuum Vessel and Cryostat', question: 'Achieving ultra-high vacuum (UHV) in the vacuum vessel requires which of the following practices?', options: ['Coating all surfaces with oil to trap residual gas', 'Using materials with a very low outgassing rate, special cleaning procedures, and baking the system (typically 160-200°C) to remove adsorbed water and trace gases', 'Operating at room temperature only, since baking is unnecessary for UHV', 'Filling the vessel with nitrogen gas to displace residual air'], correct: 1, explanation: 'UHV requires low-outgassing materials, careful cleaning, and system baking (typically 160-200°C) to drive off adsorbed water and other trace gases from internal surfaces. (Lecture 08, Folie 48)' },
  { id: 'qz_kf_l08_44', category: 'L8 — Vacuum Vessel and Cryostat', question: 'In the staged vacuum pumping process for large systems described in the lecture, what is the correct order of pump types used to progress from atmospheric pressure to UHV?', options: ['Cryopumps, then turbomolecular pumps, then roughing pumps', 'Turbomolecular pumps only, from atmosphere to UHV', 'Roughing pumps first (down to ~10⁻³ mbar), then turbomolecular pumps to reach high vacuum and UHV', 'Diffusion pumps first, then roughing pumps'], correct: 2, explanation: 'Roughing pumps are used first to relatively rapidly reach about 10⁻³ mbar, after which turbomolecular pumps take over to reach high vacuum and UHV levels. (Lecture 08, Folie 48)' },
  { id: 'qz_kf_l08_45', category: 'L8 — Vacuum Vessel and Cryostat', question: 'At UHV pressures (below about 10⁻⁹ mbar), why do turbomolecular pumps start to become inefficient, particularly for light gases like hydrogen and helium?', options: ['The rotor speed must decrease to prevent overheating', 'Turbomolecular pumps physically melt at these pressures', 'Light gases become chemically inert at UHV and cannot be pumped by any method', 'The mean free path becomes so long (tens of kilometres) that gas molecules mostly collide with chamber surfaces rather than each other, making surface-based pumping (cryopumping) more relevant than mechanical pumping'], correct: 3, explanation: 'In UHV, the mean free path can exceed 40 km, so gas molecules collide with the chamber walls far more often than with each other; this favors surface-capture methods like cryopumping over mechanical turbomolecular pumping, especially for light gases like H and He. (Lecture 08, Folie 53)' },
  { id: 'qz_kf_l08_46', category: 'L8 — Vacuum Vessel and Cryostat', question: 'Cryopumps achieve gas removal by which mechanism?', options: ['Freezing and capturing gas molecules on surfaces kept at liquid helium temperature', 'Ionizing gas molecules and accelerating them out through an exhaust port', 'Chemically reacting with gas molecules to form a solid precipitate', 'Mechanically compressing gas using rotating blades like a turbomolecular pump'], correct: 0, explanation: 'Cryopumps work by cryocondensation/cryosorption: gas molecules freeze and are captured on surfaces held at liquid-helium temperature, which is especially effective at the low pressures where mechanical pumps fail. (Lecture 08, Folie 53)' },
  { id: 'qz_kf_l08_47', category: 'L8 — Vacuum Vessel and Cryostat', question: 'Why are cryopumps particularly necessary for fusion devices with long plasma pulses?', options: ['They are the only pumps capable of removing tritium chemically', 'They generate the vacuum vessel\'s magnetic shielding', 'They are needed for clean discharges, continuously removing helium ash, unburnt fuel, and exhaust gases that accumulate during long pulses', 'They replace the need for roughing pumps entirely'], correct: 2, explanation: 'For fusion devices, cryopumps are necessary to maintain clean discharges by removing helium ash, unburnt fuel, and other exhaust gases, which is especially important as pulse length increases. (Lecture 08, Folie 53)' },
  { id: 'qz_kf_l08_48', category: 'L8 — Vacuum Vessel and Cryostat', question: 'How many torus cryopumps are positioned around the ITER vacuum vessel, and what is their purpose?', options: ['Two, to provide thermal insulation vacuum only', 'Six, to establish high vacuum before operation and evacuate helium ash, unburnt fuel, and exhaust gases during plasma shots', 'Twenty-eight, one per cryopanel', 'Six hundred, distributed across all vessel ports'], correct: 1, explanation: 'Six torus cryopumps are positioned around the vacuum vessel to establish the high vacuum prior to operation and to evacuate helium ash, unburnt fuel, and exhaust gases during plasma shots; two further cryopumps on the cryostat provide the thermal-insulation vacuum. (Lecture 08, Folie 54)' },
  { id: 'qz_kf_l08_49', category: 'L8 — Vacuum Vessel and Cryostat', question: 'The two additional cryopumps installed on the cryostat (beyond the six torus cryopumps) serve to…', options: ['breed tritium from the exhaust gas', 'provide the thermal insulation vacuum for the cryostat', 'cool the divertor plates directly', 'generate the poloidal magnetic field'], correct: 1, explanation: 'Beyond the six torus cryopumps that evacuate the vacuum vessel, two more cryopumps are installed on the cryostat specifically to provide its thermal insulation vacuum. (Lecture 08, Folie 54)' },
  { id: 'qz_kf_l08_50', category: 'L8 — Vacuum Vessel and Cryostat', question: 'Each ITER cryopump\'s cryopanels are cooled to about 4.5 K and coated with a fine porous carbon matrix. What is this carbon matrix derived from, and why is it used?', options: ['Activated diamond dust, chosen for thermal conductivity', 'Synthetic graphene sheets, chosen for high electrical conductivity', 'Ground coconut-shell charcoal, chosen for its very large equivalent surface area (about 5.5 km² per matrix) that maximizes gas capture', 'Powdered tungsten, chosen for its high melting point'], correct: 2, explanation: 'The cryopanels are coated with a fine, porous carbon matrix made from ground coconut-shell charcoal, giving an enormous equivalent surface area (about 5.5 km² per matrix, more than 500 soccer fields) to maximize gas adsorption capacity. (Lecture 08, Folie 55)' },
  { id: 'qz_kf_l08_51', category: 'L8 — Vacuum Vessel and Cryostat', question: 'The valve inside the ITER cryopumps is notable because it is…', options: ['the smallest precision valve ever manufactured', 'operated purely by magnetic actuation with no moving parts', 'made entirely of borated steel for neutron shielding', 'the world\'s largest all-metal high-vacuum valve ever made, with an 80 cm head and 0.1 mm sealing precision'], correct: 3, explanation: 'The ITER cryopump valve is the world\'s largest all-metal high-vacuum valve, with an 80 cm diameter, 80 kg head traveling a 40 cm stroke, and closing with 0.1 mm precision to achieve its all-metal seal. (Lecture 08, Folie 55)' },
  { id: 'qz_kf_l08_52', category: 'L8 — Vacuum Vessel and Cryostat', question: 'Why must the ITER vacuum vessel be fully welded rather than joined with bolted/gasketed flanges?', options: ['It is a nuclear safety requirement, ensuring the vessel maintains its role as a confinement barrier without leak paths', 'Welding is simply cheaper than bolting for large structures', 'Bolted flanges cannot support the vessel\'s weight', 'Welding allows the vessel to be disassembled more easily for maintenance'], correct: 0, explanation: 'The wrap-up slide states that the ITER vacuum vessel will be fully welded as a nuclear safety requirement, since welded joints avoid the leak paths and containment weaknesses of bolted/gasketed connections. (Lecture 08, Folie 57)' },
  { id: 'qz_kf_l08_53', category: 'L8 — Vacuum Vessel and Cryostat', question: 'Why are narrow-gap TIG welding robots specifically used to join the vacuum vessel sectors, rather than manual welding?', options: ['Because robots are required by law for all nuclear structures', 'Because manual welding cannot join stainless steel', 'Due to the tight spaces and tolerances between sectors, and to guarantee constant, repeatable weld quality', 'Because robotic welding is required to add boron to the weld seam'], correct: 2, explanation: 'Narrow-gap TIG welding robots are used because of the tight spaces and tolerances between vessel sectors and to ensure consistent, high-quality welds across all field joints. (Lecture 08, Folie 57)' },
  { id: 'qz_kf_l08_54', category: 'L8 — Vacuum Vessel and Cryostat', question: 'According to the wrap-up summary, modern vacuum vessels typically combine which categories of specialized materials?', options: ['Only aluminum alloys throughout, for weight reduction', 'Austenitic stainless steel (e.g. 316L(N)-IG) for the main structure, borated steel (e.g. 304B7) for shielding blocks, and high-strength alloys (e.g. Inconel 718) for the most heavily loaded connections', 'Pure copper for the whole structure to maximize thermal conductivity', 'Only ceramic composites, to avoid any neutron activation'], correct: 1, explanation: 'The summary confirms the three-tier material strategy: austenitic stainless steel for the main structure, borated steel for shielding blocks, and high-strength alloys like Inconel 718 for the most loaded connections. (Lecture 08, Folie 57)' },

      {
        id: 'kf9', name: 'Fuel Cycle and Breeding Blankets', icon: '🔋', color: '#a855f7', examWeight: 9,
        slideDeck: 'Folien_Kernfusion/MW1112 - Lecture 09 - Fuel Cycle and Breeding Blankets.pdf',
        quiz: [
  { id: 'qz_kf_l09_01', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'Tritium is best described as…', options: ['a radioactive isotope of hydrogen that beta-decays into helium-3', 'a stable isotope of hydrogen abundant in seawater', 'a radioactive isotope of lithium used in neutron multipliers', 'a stable isotope of helium used as reactor coolant'], correct: 0, explanation: 'Tritium (³H) is a radioactive hydrogen isotope with a half-life of 12.32 years that decays via beta emission into helium-3, releasing about 18.6 keV of energy. (Lecture 09, Folie 6)' },
  { id: 'qz_kf_l09_02', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'The half-life of tritium is approximately…', options: ['24.6 years', '12.3 years', '100 years', '5.7 years'], correct: 1, explanation: 'Tritium has a half-life of 12.32 ± 0.02 years, decaying at a rate of about 5.47%/year, which is why it cannot simply be stockpiled long-term and must be bred continuously in a fusion reactor. (Lecture 09, Folie 6)' },
  { id: 'qz_kf_l09_03', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'Natural (non-reactor-produced) tritium on Earth is mainly generated by…', options: ['geothermal decay processes in the Earth\'s crust', 'volcanic outgassing of hydrogen isotopes', 'cosmic ray spallation reactions in the upper atmosphere', 'spontaneous fission of uranium ore'], correct: 2, explanation: 'Cosmic ray neutrons interacting with atmospheric nitrogen and oxygen (e.g. ¹⁴N + n → ¹²C + ³H) produce tritium naturally, maintaining an atmospheric equilibrium inventory of roughly 3.5 kg. (Lecture 09, Folie 7)' },
  { id: 'qz_kf_l09_04', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'In commercial fission reactors, tritium can be produced deliberately from neutron capture on…', options: ['graphite moderator blocks', 'natural uranium-238', 'zirconium cladding alloys', 'lithium-6 targets (e.g. LiAlO2 or LiAl rods) or boron targets'], correct: 3, explanation: 'Neutron capture reactions such as ⁶Li + n → ⁴He + ³H (and similarly on ¹⁰B) are used in fission reactor "fuelled rods" or targets to produce tritium as a deliberate or by-product output. (Lecture 09, Folie 7)' },
  { id: 'qz_kf_l09_05', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'Heavy water reactors (HWR, e.g. CANDU) produce tritium mainly as…', options: ['a by-product formed in the heavy-water coolant/moderator', 'a decay product of the fuel cladding', 'a deliberate fuel additive injected before startup', 'a product of fast neutron reactions in the core structure'], correct: 0, explanation: 'In HWRs such as CANDU reactors, tritium is generated as a by-product in the deuterium-oxide coolant/moderator, at a rate on the order of 100 g/year per reactor (~230 g per GWe full-power year). (Lecture 09, Folie 7)' },
  { id: 'qz_kf_l09_06', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'The main reason the D-T reaction is preferred over D-D or D-³He for earth-based fusion is that…', options: ['it produces no neutrons, simplifying shielding design', 'it has a comparatively low ignition temperature and large cross section combined with high energy release', 'tritium is naturally abundant and needs no breeding', 'it requires the lowest confinement quality of all reactions'], correct: 1, explanation: 'D-T fusion is exothermic with a favorable cross section and reaches its reaction-rate peak at a relatively low temperature (~66 keV, ~730 million °C) compared to alternative fuel cycles, making it the most practical near-term choice despite tritium needing to be bred. (Lecture 09, Folie 9)' },
  { id: 'qz_kf_l09_07', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'Deuterium as a fusion fuel component is advantageous mainly because…', options: ['it has a higher fusion cross section than tritium', 'it can only be produced synthetically from lithium', 'it occurs naturally at about 154 ppm in ordinary hydrogen and requires no breeding', 'it decays into tritium spontaneously'], correct: 2, explanation: 'Deuterium is a stable isotope present naturally at ~154 ppm of hydrogen, making it essentially inexhaustible and extractable directly (e.g. from water), unlike tritium which must be bred. (Lecture 09, Folie 9)' },
  { id: 'qz_kf_l09_08', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'Compared to the D-T reaction, the D-³He reaction releases…', options: ['no net energy, since it is endothermic', 'energy only in the form of gamma rays', 'less energy per reaction (Q ≈ 4 MeV)', 'roughly similar energy per reaction (Q ≈ 18.35 MeV) but without producing a neutron'], correct: 3, explanation: 'D + ³He → ⁴He + p releases Q = 18.35 MeV, comparable to D-T\'s 17.59 MeV, but the reaction products are charged particles rather than a neutron, avoiding neutron activation issues — though it is much harder to achieve in practice. (Lecture 09, Folie 9)' },
  { id: 'qz_kf_l09_09', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'In the worked example of a 2000 MW(th) fusion power plant, the tritium consumption is estimated to be on the order of…', options: ['0.31 kg per day (~112 kg/year)', '31 kg per day (~11200 kg/year)', '3.1 kg per day (~1120 kg/year)', '0.031 kg per day (~11 kg/year)'], correct: 0, explanation: 'Dividing the fusion power by the energy released per D-T reaction gives a reaction frequency that, multiplied by tritium\'s mass, yields about 0.31 kg of tritium consumed per day, i.e. roughly 112 kg per full-power year — illustrating why continuous breeding is essential. (Lecture 09, Folie 10)' },
  { id: 'qz_kf_l09_10', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'Compared to a 1000 MW coal power plant burning several thousand tons of coal per day, a fusion plant\'s daily fuel consumption of deuterium and tritium is…', options: ['larger, due to the low energy density of fusion fuel', 'orders of magnitude smaller, only fractions of a kilogram per day', 'zero, since fusion fuel is not consumed', 'comparable, on the order of thousands of kilograms per day'], correct: 1, explanation: 'The slide compares ~0.31 kg/day tritium and ~0.20 kg/day deuterium consumption in a fusion plant to ~6×10⁶ kg/day of coal (plus ~14×10⁶ kg/day CO2) in a coal plant, highlighting the enormous energy density advantage of fusion fuel. (Lecture 09, Folie 10)' },
  { id: 'qz_kf_l09_11', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'A fusion plant fuel cycle is described as "closed" because…', options: ['tritium is never removed once it is bred', 'no fuel ever leaves the vacuum vessel', 'exhaust ashes are extracted, isotopes separated, and unburnt D and T are reinjected into the plasma', 'the plasma is fully consumed with no leftover exhaust'], correct: 2, explanation: 'In a closed fuel cycle, exhaust gases must be extracted from the vessel, the hydrogen isotopes separated, and the unburnt deuterium and tritium reinjected as new fuel — none of the valuable fuel is simply discarded. (Lecture 09, Folie 12)' },
  { id: 'qz_kf_l09_12', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'The primary purpose of tritium breeding in a fusion reactor is to…', options: ['shield the superconducting magnets from radiation only', 'moderate fast neutrons for the divertor', 'generate the toroidal magnetic field', 'convert fusion neutrons via lithium-enriched materials into new tritium fuel'], correct: 3, explanation: 'Since natural tritium supply is far too small for reactor operation, fusion neutrons are absorbed by lithium-enriched blanket materials surrounding the plasma to produce new tritium, closing the fuel cycle. (Lecture 09, Folie 12)' },
  { id: 'qz_kf_l09_13', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'Which of the following is NOT one of the four main functions of a breeding blanket described in the lecture?', options: ['Generating the plasma current via transformer action', 'Power extraction by converting neutron/gamma kinetic energy into heat', 'Providing radiation shielding and a physical boundary for the plasma', 'Tritium breeding, extraction, and control'], correct: 0, explanation: 'The blanket\'s four functions are tritium breeding, power extraction, acting as the physical boundary around the plasma, and radiation shielding of the vacuum vessel — inducing plasma current is instead the role of the central solenoid/transformer, not the blanket. (Lecture 09, Folie 14)' },
  { id: 'qz_kf_l09_14', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'In the blanket radial build, the first wall is typically made of…', options: ['molten FLiBe salt', 'ODS/RAFM steels (e.g. EUROFER97) or V-Cr-Ti alloys, water or helium cooled', 'tungsten armor tiles identical to the divertor', 'pure beryllium pebbles'], correct: 1, explanation: 'The first wall, which faces the highest heat, particle flux and neutron irradiation, is built from reduced-activation ferritic-martensitic (RAFM) steels like EUROFER97 or vanadium alloys, actively cooled by water or helium. (Lecture 09, Folie 15)' },
  { id: 'qz_kf_l09_15', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'The lithium-lead eutectic alloy commonly used as a liquid breeder is denoted Li15.8Pb and is enriched in ⁶Li to approximately…', options: ['15.8%', '40%', '90%', '70%'], correct: 2, explanation: 'The eutectic Li15.8Pb alloy (15.8 atomic % lithium) used in liquid breeder blankets is typically enriched to about 90% ⁶Li to maximize the tritium-breeding reaction rate. (Lecture 09, Folie 15)' },
  { id: 'qz_kf_l09_16', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'FLiBe, used as a molten-salt breeder/coolant, is chemically composed of…', options: ['lithium oxide and lead fluoride', 'lithium chloride and boron fluoride', 'lithium hydride and beryllium oxide', 'lithium fluoride and beryllium fluoride, (LiF)n·(BeF2)'], correct: 3, explanation: 'FLiBe is a molten salt mixture of lithium fluoride and beryllium fluoride, (LiF)n·(BeF2); a related variant, FLiNaBe, additionally includes sodium fluoride (LiF-BeF2-NaF). (Lecture 09, Folie 15)' },
  { id: 'qz_kf_l09_17', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'The two fundamental lithium neutron-capture reactions occurring in the blanket differ mainly in that…', options: ['the ⁶Li reaction is exothermic and works well with low-energy neutrons, while the ⁷Li reaction is endothermic, works with high-energy neutrons, and releases a secondary neutron', 'the ⁷Li reaction produces no tritium at all', 'both are endothermic and require fast neutrons only', 'the ⁶Li reaction only occurs in liquid metal breeders, never in ceramics'], correct: 0, explanation: '⁶Li + n → ⁴He + ³H releases +4.78 MeV and has a very high cross section at low neutron energies, whereas ⁷Li + n → ⁴He + ³H + n absorbs 2.47 MeV and works with high-energy neutrons while regenerating a neutron usable for further reactions. (Lecture 09, Folie 17)' },
  { id: 'qz_kf_l09_18', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'In natural lithium, the isotopic abundance is approximately…', options: ['99% ⁶Li and 1% ⁷Li', '7.5% ⁶Li and 92.5% ⁷Li', '50% ⁶Li and 50% ⁷Li', '92.5% ⁶Li and 7.5% ⁷Li'], correct: 1, explanation: 'Natural lithium is dominated by ⁷Li (92.5%) with only 7.5% ⁶Li, which is why breeder materials are deliberately enriched in ⁶Li to boost the exothermic low-energy breeding reaction. (Lecture 09, Folie 17)' },
  { id: 'qz_kf_l09_19', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'Among the three main 14 MeV neutron multiplier candidates (Li-7, Be-9, Pb), beryllium is characterized by…', options: ['a very low melting point around 235°C', 'the highest density of the three, causing activation to polonium', 'high availability and low cost, but strong reactivity with water/air and being a tritium getter that hinders recovery', 'being usable directly as a reactor coolant with virtually no drawbacks'], correct: 2, explanation: 'Beryllium has a low threshold for (n,2n) reactions and good moderating ability, but it reacts strongly with water and air, is toxic as dust, and strongly traps tritium making recovery difficult — distinguishing it from lead (low melting point, polonium activation) and Li-7 (used as coolant, high availability). (Lecture 09, Folie 20)' },
  { id: 'qz_kf_l09_20', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'Compared to beryllium, lead as a neutron multiplier has the notable drawback of…', options: ['reacting explosively with air at room temperature', 'a very high (n,2n) reaction threshold energy', 'being extremely scarce and expensive', 'a low melting point (~235°C) and activation leading to polonium formation'], correct: 3, explanation: 'Lead is attractive due to high availability, low cost, and usability as a coolant, but its relatively low melting point (~235°C) and tendency toward polonium activation are key engineering concerns, unlike beryllium\'s water-reactivity and toxicity issues. (Lecture 09, Folie 20)' },
  { id: 'qz_kf_l09_21', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'The Tritium Breeding Ratio (TBR) is defined as…', options: ['the ratio of tritium bred to tritium burnt (consumed) in the reactor', 'the fraction of neutrons absorbed by the first wall', 'the ratio of deuterium to tritium in the fuel mixture', 'the ratio of tritium consumed to tritium bred'], correct: 0, explanation: 'TBR is the amount of tritium bred divided by the amount of tritium consumed by fusion reactions; for a self-sufficient reactor this ratio must exceed 1 to compensate for losses, decay, and the need to fuel new plants. (Lecture 09, Folie 23)' },
  { id: 'qz_kf_l09_22', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'For a fusion reactor to be tritium self-sufficient, the design target for the TBR is typically…', options: ['at least 5.0 to allow for large safety margins', 'greater than 1, typically around 1.02-1.05', 'less than 1, since excess tritium is hazardous', 'exactly equal to 1.00'], correct: 1, explanation: 'The TBR must exceed 1 to account for losses, tritium decay, and the need to build up inventory for new plants, and is typically designed to be in the modest range of about 1.02-1.05. (Lecture 09, Folie 23)' },
  { id: 'qz_kf_l09_23', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'The Tritium Breeding Ratio is commonly calculated and validated using…', options: ['direct measurement of plasma density alone', 'thermodynamic tables of coolant properties', 'Monte Carlo neutron transport codes (e.g. MCNP), validated by experiments', 'simple analytic formulas only, without simulation'], correct: 2, explanation: 'Because TBR depends on complex 3D geometry, material composition, and neutron transport physics, it is calculated using Monte Carlo codes such as MCNP and cross-checked against experimental measurements. (Lecture 09, Folie 23)' },
  { id: 'qz_kf_l09_24', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'The "duplication time" in the context of the tritium fuel cycle refers to…', options: ['the time needed to double the plasma density', 'the time required to replace a blanket module', 'the time needed for tritium to decay to half its original amount', 'the time necessary to breed enough excess tritium to fuel the startup inventory of a new plant'], correct: 3, explanation: 'Since a new fusion plant needs an initial tritium inventory to start up, the "duplication time" is how long an existing breeding blanket takes to produce that surplus, which is an important factor in fleet expansion planning. (Lecture 09, Folie 24)' },
  { id: 'qz_kf_l09_25', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'In the HCPB (Helium Cooled Pebble Bed) blanket concept, the breeder and multiplier materials are…', options: ['ceramic breeder pebbles and beryllium(ides), cooled by helium gas', 'pure lithium metal cooled by liquid sodium', 'molten FLiBe salt cooled by water', 'liquid lithium-lead alloy circulated at high speed'], correct: 0, explanation: 'HCPB uses RAFM steel structure with solid ceramic breeder pebbles and beryllium/beryllide multiplier pebbles, cooled by helium gas, and is the main line of European R&D for solid breeder blankets. (Lecture 09, Folie 26)' },
  { id: 'qz_kf_l09_26', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'The DCLL (Dual Coolant Lithium Lead) concept is distinguished from HCLL/WCLL mainly in that…', options: ['it uses solid ceramic pebbles instead of liquid breeder', 'the lithium-lead itself also functions as a coolant, circulated with fast flow, in addition to a separate helium/structural coolant', 'it eliminates the need for a first wall', 'it uses no lithium at all, relying purely on beryllium'], correct: 1, explanation: 'In DCLL, the RAFM steel structure is cooled by helium while the lithium-lead breeder is circulated with fast flow and also serves as a coolant itself — a "dual coolant" arrangement, unlike WCLL/HCLL where the LL breeder only circulates slowly for tritium extraction. (Lecture 09, Folie 26)' },
  { id: 'qz_kf_l09_27', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'In solid (pebble bed) breeder blankets, the breeder material is…', options: ['dissolved in the coolant water directly', 'melted and continuously replenished during operation', 'packed as static pebble beds that do not circulate, and are always separately cooled', 'circulated at high speed through external heat exchangers'], correct: 2, explanation: 'Unlike liquid breeders, solid ceramic breeder pebbles are packed into static beds that do not circulate; heat removal is always achieved by a separate coolant (water at 290-325°C/15.5 MPa or helium at 300-520°C/8 MPa). (Lecture 09, Folie 27)' },
  { id: 'qz_kf_l09_28', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'The two ceramic breeder materials most extensively investigated in recent years are…', options: ['FLiBe and FLiNaBe', 'Li15.8Pb and pure lithium metal', 'Li2O and LiAlO2', 'Lithium Orthosilicate (Li4SiO4) and Lithium Metatitanate (Li2TiO3)'], correct: 3, explanation: 'Li4SiO4 (orthosilicate, pebble diameter ~0.2-0.6 mm) and Li2TiO3 (metatitanate, ~1.0 mm pebbles) have been the focus of extensive ceramic breeder R&D, as shown by KIT-manufactured pebble samples. (Lecture 09, Folie 28)' },
  { id: 'qz_kf_l09_29', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'The KALOS process for manufacturing ceramic breeder pebbles involves…', options: ['melt processing at 1350-1400°C, droplet generation by jet decay, and solidification via liquid nitrogen spray', 'sintering solid powders under high pressure without melting', 'chemical vapor deposition onto a rotating substrate', 'electrochemical deposition at room temperature'], correct: 0, explanation: 'KALOS produces Li4SiO4 + 10-35 mol% Li2TiO3 pebbles by melting the material at 1350-1400°C, generating droplets through jet decay, and rapidly solidifying them with liquid nitrogen spray, achieving 85-90% mass yield and a mean pebble size of ~650 µm. (Lecture 09, Folie 31)' },
  { id: 'qz_kf_l09_30', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'A short tritium residence time in a solid breeder ceramic is desirable mainly because it…', options: ['prevents lithium burn-up over time', 'reduces the build-up of large tritium inventory in the blanket and the initial tritium quantity needed to start the reactor', 'increases the neutron multiplication factor', 'makes the pebbles mechanically stronger'], correct: 1, explanation: 'Fast tritium release from the breeder material minimizes the amount of tritium trapped/stored inside the blanket at any time, reducing both safety inventory concerns and the startup tritium quantity required. (Lecture 09, Folie 32)' },
  { id: 'qz_kf_l09_31', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'Regarding compatibility with steel and hygroscopic behavior among ceramic breeders, the lecture notes that…', options: ['neither material is compatible with steel under any conditions', 'hygroscopic behavior is irrelevant to blanket material choice', 'Li2TiO3 has very good compatibility with steel and low hygroscopicity, both better than Li4SiO4', 'Li4SiO4 has better compatibility with steel and lower hygroscopicity than Li2TiO3'], correct: 2, explanation: 'Li2TiO3 shows very good compatibility with steel and favorable (low) hygroscopic behavior, whereas Li4SiO4 is poorer in both respects (though usable below 550°C) — hygroscopicity matters because it affects how much special handling/protective gas is needed. (Lecture 09, Folie 32)' },
  { id: 'qz_kf_l09_32', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'Tritium generated inside solid ceramic breeder pebbles reaches the purge gas stream via a sequence of transport steps that includes…', options: ['electrostatic migration through the RAFM steel structure', 'conversion to liquid tritium before extraction', 'direct nuclear transmutation into helium gas', 'intragranular diffusion, grain boundary diffusion, surface adsorption/desorption, pore diffusion, and purge flow convection'], correct: 3, explanation: 'Tritium produced within the ceramic grains must diffuse through the crystal lattice, migrate along grain boundaries, adsorb/desorb at pore surfaces, diffuse through interconnected porosity, and finally be swept away by purge gas convection (typically He + 0.1% H2). (Lecture 09, Folie 33)' },
  { id: 'qz_kf_l09_33', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'Liquid lithium as a self-cooled breeder has the notable engineering drawback of…', options: ['magnetohydrodynamic (MHD) pressure drop issues due to Hartmann flow in the magnetic field', 'being chemically inert and thus difficult to extract tritium from', 'an extremely high melting point above 1000°C', 'very low thermal conductivity, making cooling ineffective'], correct: 0, explanation: 'Because liquid lithium is electrically conducting and flows through the strong confinement magnetic field, it experiences MHD (Hartmann flow) effects causing large pressure drops and high wall friction — a major challenge distinct from lithium\'s otherwise favorable high thermal conductivity. (Lecture 09, Folie 37)' },
  { id: 'qz_kf_l09_34', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'Compared to liquid lithium metal, the molten salt FLiBe has…', options: ['no issues with tritium control, unlike liquid lithium', 'much lower thermal conductivity (~1 W/mK) and a much higher Prandtl number (~400)', 'an identical thermal conductivity but lower melting point', 'much higher thermal conductivity and lower Prandtl number'], correct: 1, explanation: 'FLiBe has poor thermal conductivity (~1 W/mK, versus 42-69 W/mK for lithium) and a very high Prandtl number (~400), plus a melting point above 630 K and high tritium partial pressure control issues, in contrast to lithium\'s good thermal conductivity but MHD/reactivity concerns. (Lecture 09, Folie 37)' },
  { id: 'qz_kf_l09_35', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'In "separately cooled" liquid breeder blankets, the liquid breeder is circulated at low speed mainly to…', options: ['prevent lithium burn-up entirely', 'reduce the neutron multiplication rate', 'facilitate tritium extraction, while a separate coolant (typically helium gas) handles heat removal', 'maximize heat removal efficiency'], correct: 2, explanation: 'In separately cooled concepts such as Li17Pb or liquid lithium with helium cooling in advanced ferritic steel, the breeder moves slowly primarily to allow efficient tritium extraction, since heat extraction duty is handled independently by the helium coolant. (Lecture 09, Folie 38)' },
  { id: 'qz_kf_l09_36', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'The dual coolant blanket concept improves thermal efficiency mainly by…', options: ['doubling the neutron multiplication compared to single coolant designs', 'eliminating the need for any coolant in the breeder region', 'using two identical coolants in parallel for redundancy', 'cooling the first wall/structures separately from the self-cooled liquid breeder, allowing the breeder to run hotter than the structural material'], correct: 3, explanation: 'In dual coolant designs, structures are kept at a lower, structurally safe temperature via separate cooling, while the self-cooled liquid breeder can reach a higher outlet temperature, improving the overall thermodynamic (energy conversion) efficiency of the plant. (Lecture 09, Folie 38)' },
  { id: 'qz_kf_l09_37', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'The Helium Cooled Lithium Lead (HCLL) concept, described as the main line of European liquid breeder R&D, uses…', options: ['Li15.8Pb eutectic circulated slowly for tritium recovery, while helium gas cools both structures and breeder', 'FLiBe molten salt as the sole coolant and breeder', 'water cooling of both the breeder and the first wall', 'pure liquid lithium self-cooled with no separate coolant'], correct: 0, explanation: 'HCLL uses the Li15.8Pb eutectic as the tritium breeder, circulated slowly to recover the bred tritium, while helium gas provides cooling for both the structural material and the liquid breeder itself. (Lecture 09, Folie 39)' },
  { id: 'qz_kf_l09_38', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'Remote handling of blanket modules is necessary mainly because…', options: ['the modules operate at cryogenic temperatures requiring robotic precision', 'activation from neutron irradiation makes the modules too radioactive for direct human access after operation', 'manual handling would contaminate the vacuum vessel with air', 'the modules are too small to be handled manually'], correct: 1, explanation: 'After operation, blanket modules (e.g. up to 4.6 tons and 1x1.5 m each) become activated by neutron irradiation, so they must be installed and removed using robotic arms, with installation precision demonstrated to within 0.5 mm for a 4-ton module. (Lecture 09, Folie 44)' },
  { id: 'qz_kf_l09_39', category: 'L9 — Fuel Cycle and Breeding Blankets', question: 'According to the lecture wrap-up, lithium ceramics and beryllium/lead serve complementary roles in a breeding blanket because…', options: ['both materials are used exclusively as coolants', 'lithium ceramics multiply neutrons while beryllium breeds tritium', 'lithium ceramics are good tritium breeding materials, while beryllium and lead are good neutron multipliers', 'both serve purely as structural materials'], correct: 2, explanation: 'The summary distinguishes the two functional roles clearly: lithium-bearing ceramics (e.g. Li4SiO4, Li2TiO3) provide the tritium-breeding reaction, while beryllium and lead multiply the neutron population to sustain adequate breeding rates. (Lecture 09, Folie 48)' }
