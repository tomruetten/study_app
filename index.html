      {
        id: 'p3',
        name: 'Human Brain',
        icon: '🔬',
        color: '#22c55e',
        examWeight: 16,

        guided: [
          { id: 'g_p3_1', badge: 'Neuron Basics', title: 'The 3 Parts of a Biological Neuron', body: 'Every biological neuron has 3 main components:\n\n• Soma (cell body): contains the nucleus; generates action potentials\n• Dendrites: receive signals from pre-synaptic neurons\n• Axon: conducts signals from soma to post-synaptic neurons\n\nThink: Receive (dendrites) → Process (soma) → Send (axon)', example: '🔑 This is a guaranteed exam question — draw it, label it, describe each part.' },
          { id: 'g_p3_2', badge: 'Action Potential', title: 'Phases of the Action Potential', body: 'The membrane potential changes in 4 phases:\n\n1. Resting potential — baseline\n2. Depolarisation — potential rises to the spike\n3. Hyperpolarisation/Repolarisation — falls below resting\n4. Refractory period — recovery\n\nKey property: all-or-none event — same shape regardless of stimulus strength.', example: '🔑 The exam shows a graph and asks you to label A, B, C, D. Know the order and names.' },
          { id: 'g_p3_3', badge: 'Brain Anatomy', title: 'The 4 Lobes of the Cerebrum', body: 'Four lobes, each with key functions:\n\n• Frontal lobe: motion planning, action control, short-term memory\n• Parietal lobe: body image, somatic sensation\n• Temporal lobe: hearing, emotion, learning, memory\n• Occipital lobe: vision\n\nMnemonic: "Front Plans, Parietal Feels, Temporal Hears, Occipital Sees"', example: '🔑 Also know: dorsal stream ("where/how") vs ventral stream ("what") — comes up every exam.' },
          { id: 'g_p3_4', badge: 'Visual Streams', title: 'Dorsal & Ventral Visual Streams', body: 'Two visual processing pathways from the occipital cortex:\n\n• Dorsal stream: "Where?" (spatial location) and "How?" (motor actions). Projects to parietal lobe.\n\n• Ventral stream: "What?" (object identity). Projects to temporal lobe.\n\nDiscovery: Hubel & Wiesel (1961) found simple cells (orientation/location sensitive) and complex cells in visual cortex.', example: '🔑 Dorsal = WHERE/HOW. Ventral = WHAT. Easy to confuse — make a flashcard now.' },
          { id: 'g_p3_5', badge: 'Cerebrum', title: 'Cerebrum: Gray vs White Matter', body: 'The cerebrum is the largest, uppermost part of the brain (sensory integration, voluntary motion, higher cognition).\n\n• Two hemispheres joined by the corpus callosum (Balken).\n• Cerebral cortex = gray matter (graue Substanz): folded outer layer, mainly cell bodies.\n• Inner white matter (weiße Substanz): nerve fibres connecting cortical regions.\n\nSurface features: Gyri (crests), Sulci (fissures), Lobes (divided by two major sulci).', example: '🔑 White matter = nerve fibres connecting cortical regions (1-point exam answer).' },
          { id: 'g_p3_6', badge: 'Brainstem', title: 'The Brainstem and its 4 Sections', body: 'The brainstem connects the cerebrum with the spinal cord. Four sections:\n\n1. Diencephalon — Epithalamus (melatonin/biological clock), Thalamus (relay of sensory/motor signals), Hypothalamus (autonomic functions, hormones), Subthalamus\n2. Midbrain (Mesencephalon) — eye movements, auditory & visual processing\n3. Pons — connects medulla/cortex with cerebellum\n4. Medulla Oblongata — connects brain to spinal cord', example: '🔑 4 sections: Diencephalon, Midbrain, Pons, Medulla Oblongata. Thalamus = relay station.' },
          { id: 'g_p3_7', badge: 'PNS', title: 'Peripheral & Autonomic Nervous System', body: 'Vertebrate NS = CNS (brain + spinal cord) + PNS (connects sensory organs/muscles/organs to CNS).\n\nThe autonomic (vegetative) NS handles homeostasis, largely unconsciously, via two antagonists:\n• Sympathetic: prepares the body for stress (↑ heart rate, ↑ blood flow, sweating).\n• Parasympathetic: sets the body to a resting state, ↑ digestion.', example: '🔑 Sympathetic = "fight or flight" (stress). Parasympathetic = "rest and digest".' },
          { id: 'g_p3_8', badge: 'Limbic', title: 'Deeper Brain Structures', body: 'Beyond the cortex:\n\n• Basal Ganglia: nuclei beneath the cortex; planning, selection, execution & learning of actions (motor system).\n• Hippocampus (sea-horse shaped): formation of episodic long-term memories.\n• Amygdala: analyses emotional/motivational significance of stimuli.\n\nThe hippocampus and amygdala belong to the limbic system, one of the oldest brain structures.', example: '🔑 Hippocampus = episodic long-term memory. Amygdala = emotional/motivational significance.' },
          { id: 'g_p3_9', badge: 'Neocortex', title: 'The Neocortex: 6 Layers & Microcircuit', body: 'The neocortex (centre of higher cognition) is organised in 6 layers (I Molecular → VI Multiform). Layer IV is the main recipient of sensory input from the thalamus; Layer V forms the main output pathways.\n\nIt is also organised in columns: the most basic building block is the minicolumn (80-100 neurons); cortical columns consist of many minicolumns.', example: '🔑 Minicolumn = 80-100 neurons. Layer IV = main sensory input from thalamus.' },
          { id: 'g_p3_10', badge: 'History', title: 'The Discovery of Neurons & First Models', body: 'Foundations of the neuron doctrine:\n• 1873: Camillo Golgi — silver-nitrate staining makes neurons visible.\n• 1889: Santiago Ramón y Cajal — improved staining, famous drawings.\n\nFirst neuron models:\n• 1943: McCulloch & Pitts — first computational neuron (threshold logic).\n• 1957: Rosenblatt — the Perceptron (learns to classify).\n• 1969: Minsky & Papert (book "Perceptrons") prove it only works for linearly separable data → AI winter; ended by backpropagation (Werbos).', example: '🔑 Golgi & Cajal = neuron doctrine. Minsky & Papert\'s Perceptrons book → AI winter (linear separability limit).' },
        ],

        flashcards: [
          { id: 'fc_p3_1',  front: 'Name the 3 main components of a biological neuron and their roles.',           back: 'Soma: cell body, nucleus, generates APs. Dendrites: receive signals. Axon: conducts signals to post-synaptic neurons.' },
          { id: 'fc_p3_2',  front: 'Name the 4 phases of the action potential in order.',                          back: '1. Resting potential. 2. Depolarisation (spike). 3. Repolarisation/Hyperpolarisation. 4. Refractory period.' },
          { id: 'fc_p3_3',  front: 'What is the "10% brain myth" — is it true?',                                   back: 'FALSE. Every part is used, but NOT all at once (different functions not needed simultaneously). If all fired together → epileptic state.' },
          { id: 'fc_p3_4',  front: 'Name the 4 lobes and one function each.',                                      back: 'Frontal: motion planning. Parietal: somatic sensation. Temporal: hearing/memory. Occipital: vision.' },
          { id: 'fc_p3_5',  front: 'Dorsal stream vs Ventral stream — what does each process?',                    back: 'Dorsal: WHERE? / HOW? (spatial location, motor actions). Ventral: WHAT? (object identity).' },
          { id: 'fc_p3_6',  front: 'What are the 2 subsystems of the vertebrate nervous system?',                  back: 'CNS: brain + spinal cord; central processing. PNS: connects sensory organs/muscles/organs to CNS.' },
          { id: 'fc_p3_7',  front: 'What are the 2 phases of the refractory period?',                              back: 'Absolute: firing impossible (Na⁺ channels blocked). Relative: firing possible but needs stronger activation.' },
          { id: 'fc_p3_8',  front: 'What is the resting membrane potential?',                                      back: 'Voltage between inside/outside of neuron at equilibrium between chemical gradient and voltage gradient.' },
          { id: 'fc_p3_9',  front: 'What does the myelin sheath do?',                                              back: 'Increases membrane resistance → increases conduction velocity of the axon.' },
          { id: 'fc_p3_10', front: 'Name the 4 sections of the brainstem.',                                        back: 'Diencephalon, Midbrain, Pons, Medulla Oblongata.' },
          { id: 'fc_p3_11', front: 'Function of hippocampus vs amygdala?',                                         back: 'Hippocampus: formation of episodic long-term memories. Amygdala: analyses motivational/emotional significance of stimuli.' },
          { id: 'fc_p3_12', front: 'What did Hubel & Wiesel discover in 1961?',                                    back: 'Simple cells and complex cells in the visual cortex. Simple cells respond to correctly oriented and correctly localised basic shapes (edges/lines).' },
          { id: 'fc_p3_13', front: 'What connects the two cerebral hemispheres?',                                  back: 'The corpus callosum (Balken).' },
          { id: 'fc_p3_14', front: 'Gray matter vs white matter in the cerebrum?',                                 back: 'Gray matter = cerebral cortex, folded outer layer, mainly cell bodies. White matter = inner nerve fibres connecting cortical regions.' },
          { id: 'fc_p3_15', front: 'Name the 3 anatomical surface features of the cerebral cortex.',                back: 'Gyri (crests of the folded surface), Sulci (fissures between gyri), Lobes (regions divided by two major sulci).' },
          { id: 'fc_p3_16', front: 'Name the 4 sections of the brainstem.',                                        back: 'Diencephalon, Midbrain (Mesencephalon), Pons, Medulla Oblongata.' },
          { id: 'fc_p3_17', front: 'Name the sub-structures of the diencephalon and one function each.',           back: 'Epithalamus (melatonin / biological clock), Thalamus (relay of sensory & motor signals), Hypothalamus (autonomic functions, hormones), Subthalamus.' },
          { id: 'fc_p3_18', front: 'Sympathetic vs parasympathetic nervous system?',                              back: 'Sympathetic: prepares body for stress (↑ heart rate, ↑ blood flow, sweating). Parasympathetic: resting state, ↑ digestion.' },
          { id: 'fc_p3_19', front: 'Function of the basal ganglia?',                                              back: 'Mainly motor: planning, selection, execution and learning of actions.' },
          { id: 'fc_p3_20', front: 'Name 3 myths about the human brain (with the truth).',                         back: '1) "Only 10% used" — all parts used, not all at once. 2) "No new neurons in adults" — some areas produce new neurons throughout life. 3) "Brain size ↔ intelligence" — elephants/whales have larger brains.' },
          { id: 'fc_p3_21', front: 'What is the encephalization quotient?',                                        back: 'The deviation of an animal\'s brain size from the base prediction for its body size; humans have the largest.' },
          { id: 'fc_p3_22', front: 'Map the nervous system onto the perception-cognition-action diagram.',          back: 'Perception = sensory organs; Cognition = brain; Action = spinal cord & muscles.' },
          { id: 'fc_p3_23', front: 'Name 2 distinctive features of the human brain vs other species.',             back: 'Any 2: spine-rich pyramidal dendritic trees; very low membrane capacity of cortical pyramidal neurons (better signal transmission); superior sequence-learning; highest encephalization quotient; highest neuronal density in the cortex.' },
          { id: 'fc_p3_24', front: 'How many layers does the neocortex have? Which is the main sensory input?',     back: 'Six layers (I Molecular → VI Multiform). Layer IV is the main recipient of sensory input from the thalamus.' },
          { id: 'fc_p3_25', front: 'What is a minicolumn?',                                                        back: 'The most basic cortical building block, consisting of 80-100 neurons. Cortical columns are made of many minicolumns.' },
          { id: 'fc_p3_26', front: 'Who discovered/visualised neurons and how?',                                   back: 'Golgi (1873, silver-nitrate staining) and Ramón y Cajal (1889, improved staining + drawings) → the neuron doctrine.' },
          { id: 'fc_p3_27', front: 'What is the cortical homunculus?',                                            back: 'A map (Penfield & Boldrey, 1937) showing how much cortical area the sensory/motor representation of each body part occupies.' },
        ],

        quiz: [
          { id: 'qz_p3_1', category: 'P3 — Brain', question: 'Which component of a neuron RECEIVES signals from other neurons?', options: ['Axon', 'Soma', 'Dendrites', 'Myelin sheath'], correct: 2, explanation: 'Dendrites receive incoming signals. Axon sends signals outward. Soma processes and generates action potentials.' },
          { id: 'qz_p3_2', category: 'P3 — Brain', question: 'What is an action potential?', options: ['A continuous graded signal', 'An all-or-none spike event', 'The resting state of a neuron', 'The chemical signal at a synapse'], correct: 1, explanation: 'All-or-none event — once threshold is crossed, the spike always has the same shape/amplitude.' },
          { id: 'qz_p3_3', category: 'P3 — Brain', question: 'Is "Only 10% of the brain is used" true?', options: ['Yes — most is unused reserve', 'Yes — only during sleep is more used', 'No — all parts are used, but not simultaneously', 'No — 30% is unused'], correct: 2, explanation: 'Every part is used, but not all at once. If all fired simultaneously, this would cause epilepsy.' },
          { id: 'qz_p3_4', category: 'P3 — Brain', question: 'Which visual stream answers "WHERE is the object?"', options: ['Ventral stream', 'Dorsal stream', 'Both equally', 'Neither — that is parietal only'], correct: 1, explanation: 'Dorsal = WHERE/HOW. Ventral = WHAT. Classic exam question.' },
          { id: 'qz_p3_5', category: 'P3 — Brain', question: 'During the ABSOLUTE refractory period, what happens?', options: ['Firing requires more current than usual', 'Firing is completely impossible', 'The neuron fires spontaneously', 'EF increases'], correct: 1, explanation: 'Absolute: Na⁺ channels are blocked → firing impossible. Relative: possible but needs stronger activation.' },
          { id: 'qz_p3_6', category: 'P3 — Brain', question: 'Which lobe primarily processes VISION?', options: ['Frontal', 'Parietal', 'Temporal', 'Occipital'], correct: 3, explanation: 'Occipital lobe = vision. Frontal = planning. Parietal = sensation. Temporal = hearing/memory.' },
          { id: 'qz_p3_7', category: 'P3 — Brain', question: 'What is the main purpose of the white matter in the cerebrum?', options: ['Generating action potentials', 'Cell bodies for higher cognition', 'Nerve fibres connecting cortical regions', 'Producing cerebrospinal fluid'], correct: 2, explanation: 'White matter = core of nerve fibres connecting cortical regions. Gray matter (cortex) holds the cell bodies.' },
          { id: 'qz_p3_8', category: 'P3 — Brain', question: 'Which brainstem sub-structure acts as the relay station for sensory and motor signals?', options: ['Epithalamus', 'Thalamus', 'Hypothalamus', 'Pons'], correct: 1, explanation: 'The thalamus relays and distributes sensory and motor signals to the cortex. Epithalamus → melatonin; hypothalamus → autonomic control.' },
          { id: 'qz_p3_9', category: 'P3 — Brain', question: 'Which structure forms episodic long-term memories?', options: ['Amygdala', 'Hippocampus', 'Basal ganglia', 'Thalamus'], correct: 1, explanation: 'Hippocampus = episodic long-term memory. Amygdala = emotional/motivational significance.' },
          { id: 'qz_p3_10', category: 'P3 — Brain', question: 'The sympathetic nervous system primarily...', options: ['Sets the body to a resting state', 'Increases digestive functions', 'Prepares the body for stress', 'Forms long-term memories'], correct: 2, explanation: 'Sympathetic = stress response (↑ heart rate, blood flow, sweating). Parasympathetic = rest & digest.' },
          { id: 'qz_p3_11', category: 'P3 — Brain', question: 'In the perception-cognition-action mapping, "action" corresponds to...', options: ['Sensory organs', 'The brain', 'Spinal cord and muscles', 'The thalamus'], correct: 2, explanation: 'Perception = sensory organs; Cognition = brain; Action = spinal cord & muscles.' },
          { id: 'qz_p3_12', category: 'P3 — Brain', question: 'How many neurons does a cortical minicolumn contain?', options: ['10-20', '80-100', '~1000', '~10,000'], correct: 1, explanation: 'A minicolumn — the most basic cortical building block — consists of 80-100 neurons.' },
          { id: 'qz_p3_13', category: 'P3 — Brain', question: 'Which statement about brain myths is TRUE?', options: ['Only 10% of the brain is ever used', 'Adults never produce new neurons', 'Brain size directly determines intelligence', 'All parts are used, but not all at once'], correct: 3, explanation: 'Every part is used, just not simultaneously (that would cause epilepsy). The other three are myths.' },

        guided: [
          { id: 'g_p4_1', badge: 'LIF Neuron', title: 'The LIF Model & Its ODE', body: 'The Leaky Integrate-and-Fire model:\n\nC·dv/dt = I(t) − v(t)/R\n\nC = membrane capacitance, R = membrane resistance, I(t) = input current.\n\nFires when v reaches threshold v_thresh, then resets to v_reset.\n\nTwo captured features: (1) Integration of input over time, (2) Leak/forgetting via −v/R term.', example: '🔑 You WILL solve this ODE. Solution for I=const, v(0)=0: v(t) = IR(1 − e^(−t/RC)). Time constant τ = RC.' },
          { id: 'g_p4_2', badge: 'Solving the ODE', title: 'Step-by-Step ODE Solution', body: 'Given: C·dv/dt = I − v/R, v(0)=0\n\nStep 1: Rearrange → dv/dt = I/C − v/(RC)\nStep 2: Steady state (dv/dt=0): v_∞ = I·R\nStep 3: General solution: v(t) = v_∞ + (v(0)−v_∞)·e^(−t/τ)\nStep 4: With v(0)=0: v(t) = I·R·(1 − e^(−t/RC))\nTime constant τ = RC', example: '🔑 Show every step! The exam awards partial marks for the working. τ = RC is always 1 point.' },
          { id: 'g_p4_3', badge: 'Encoding', title: 'Rate Coding vs Time-to-First-Spike', body: 'Two main encoding schemes:\n\n• Rate coding: information = average spike rate in a time window (e.g. muscle excitation). Advantage: robust against noise.\n\n• Time-to-first-spike: information = time of first spike after reference point. Advantage: very fast, few spikes needed.', example: '🔑 Both come up every exam — name + advantage for each.' },
          { id: 'g_p4_4', badge: 'Hebbian Learning', title: '"Neurons that fire together, wire together"', body: 'Hebbian Learning:\n• Weight change depends on pre- AND post-synaptic activity\n• Correlated neurons strengthen their connection\n• Unsupervised learning\n\nProblem — Saturation: Without limiting weight growth, positive feedback drives weights to infinity (diverges).\n\nOja\'s Rule: Hebb + normalisation → weights stay bounded, converge to first principal component.', example: '🔑 "Fire together, wire together" is the phrase they test. Saturation problem = unbounded growth without normalisation.' },
          { id: 'g_p4_5', badge: 'Electrophysiology', title: 'Resting Potential & the Nernst Equation', body: 'Charges in neurons are carried by ions (Na⁺, K⁺, Cl⁻). The membrane is a bilipid layer (a capacitor); ion channels (a resistance) are selective and gated (by ligand, voltage, or mechanical force).\n\nThe resting membrane potential is the equilibrium between the chemical (concentration) gradient and the opposing voltage gradient. It is dominated by K⁺ and approximated by the Nernst potential:\n\nE = (RT/nF)·ln([ion]ₒ/[ion]ᵢ) ≈ 58·log([ion]ₒ/[ion]ᵢ) mV  (≈ −75 mV for K⁺)', example: '🔑 Resting potential = balance of chemical & voltage gradients. Use the Goldman equation for ALL ion types.' },
          { id: 'g_p4_6', badge: 'Propagation', title: 'Action Potential Propagation & Synapses', body: 'Two propagation modes:\n• Electrotonic conductance: passive, fast, but DECAYS with distance.\n• Active regeneration: repeated depolarisation regenerates the spike; slow but lossless.\n\nMyelinated axons combine both: saltatory conduction — fast electrotonic transfer under myelin, regeneration at the nodes of Ranvier.\n\nSynapses: electrical (gap junctions, direct transfer) vs chemical (neurotransmitter, e.g. acetylcholine, across a cleft; can be excitatory or inhibitory; can change strength → learning).', example: '🔑 Saltatory conduction = fast jumps between nodes of Ranvier. Myelin increases membrane resistance.' },
          { id: 'g_p4_7', badge: 'Hodgkin-Huxley', title: 'The Hodgkin-Huxley Model', body: 'Derived from the squid giant axon (1952); a single-compartment, conductance-based model — the basis of modern neural modelling.\n\n• Membrane = capacitor C, ion currents (Na⁺, K⁺, leak) modelled by conductances, Nernst potentials by batteries.\n• Core equation: C·du/dt = −Σ Iₖ(t) + I(t)\n• Gating variables m, n, h (own ODEs) model the time-dependent opening/closing of channels.\n\nDrawback: high computational complexity → model reductions (Morris-Lecar, FitzHugh-Nagumo) are 2-D and analysable in the phase plane.', example: '🔑 HH = capacitor + 3 ion currents (Na, K, leak) + batteries + nonlinear resistors. Gating variables: m, n, h.' },
          { id: 'g_p4_8', badge: 'Hebb Family', title: 'The Family of Hebbian Rules', body: 'Three desirable properties: Saturation (bounded weights), Competition/Selectivity (weights don\'t all converge equally), Locality (only local variables).\n\n• Basic Hebb (dw/dt = v·u): only locality.\n• Covariance rule: subtract a threshold θ → introduces LTD when activity is low.\n• Oja\'s rule (dw/dt = vu − αv²w): adds saturation + competition → PCA (first principal component).\n• BCM theory: covariance with a sliding threshold → all three properties.\n• STDP: weight change depends on the precise timing difference between pre- and post-synaptic spikes (temporally asymmetric Hebbian learning).', example: '🔑 LTP = potentiation (strengthen), LTD = depression (weaken). Oja → PCA. STDP → spike-timing.' },
          { id: 'g_p4_9', badge: 'Neuromorphic', title: 'Neuromorphic Hardware & ANN→SNN', body: 'SNNs are computationally expensive → run them on neuromorphic hardware:\n• SpiNNaker (ARM cores, Human Brain Project), IBM TrueNorth, Intel Loihi.\n• Memristor: a "memory + resistor", resistance depends on past charge (4th basic circuit element, Chua 1971).\n• Energy: biological 10⁻¹¹ J, silicon 10⁻⁸ J, digital 10⁻³–10⁻⁷ J per spike.\n\nANN→SNN conversion: train a normal ANN, then replace the activation with a spiking neuron. Problem: ReLU has no upper limit but spiking rate does → use weight normalisation / clamped ReLU. Backpropagation remains the most powerful learning algorithm.', example: '🔑 SpikeProp problem: spike events are non-differentiable → approximate them. Convert ANN→SNN for near-lossless accuracy.' },
        ],

        flashcards: [
          { id: 'fc_p4_1',  front: 'Write the LIF neuron ODE.',                                                     back: 'C·dv/dt = I(t) − v(t)/R\nC=membrane capacitance, R=membrane resistance, I(t)=input current.' },
          { id: 'fc_p4_2',  front: 'Solve the LIF ODE for I=const, v(0)=0. State the time constant.',               back: 'v(t) = IR(1 − e^(−t/RC))\nTime constant τ = RC' },
          { id: 'fc_p4_3',  front: 'Name the 2 features of neural processing captured by the LIF model.',           back: '1. Integration of input current over time ("integrate").\n2. Leak/forgetting via −v/R ("leaky").' },
          { id: 'fc_p4_4',  front: 'Rate coding vs Time-to-first-spike — definition and advantage of each.',         back: 'Rate coding: info = average spike rate in window. Advantage: robust against noise.\nTime-to-first-spike: info = time of first spike. Advantage: very fast, few spikes.' },
          { id: 'fc_p4_5',  front: 'State the basic principle of Hebbian Learning.',                                  back: '"Neurons that fire together, wire together." Weight change depends on pre- AND post-synaptic activity. Correlated neurons strengthen their connection. Unsupervised.' },
          { id: 'fc_p4_6',  front: 'What is the saturation problem in Hebbian Learning?',                             back: 'Without limiting weight growth: positive feedback drives weights to infinity (diverges). Weights grow unboundedly because strengthened synapses → more activity → further strengthening.' },
          { id: 'fc_p4_7',  front: 'What does Oja\'s Rule add to Hebbian Learning?',                                 back: 'Built-in normalisation/saturation → prevents unbounded weight growth. Weight vector converges to first principal component; norm stays bounded (||w||→1).' },
          { id: 'fc_p4_8',  front: 'Name 3 Hebb-based learning rules.',                                              back: 'Any 3: Covariance rule, Correlation rule, BCM theory, Oja\'s Rule, STDP.' },
          { id: 'fc_p4_9',  front: 'Describe the Hodgkin-Huxley model.',                                             back: 'Biologically accurate model. Components: membrane capacitance as capacitor; ion currents (leak, K⁺, Na⁺); Nernst potential as batteries; nonlinear resistors for ion channel dynamics.' },
          { id: 'fc_p4_10', front: 'Analog vs Spiking neuron — name 2 differences.',                                 back: 'Analog: activation function, continuous values, no temporal dynamics, low bio plausibility.\nSpiking: dynamical system, digital spikes, temporal dynamics, high bio plausibility.' },
          { id: 'fc_p4_11', front: 'Name the 2 types of neuroplasticity.',                                           back: 'Functional: changes function/weights of neurons. Structural: creates/deletes synapses.' },
          { id: 'fc_p4_12', front: 'Name the 5 levels of modelling neuron dynamics (detailed → abstract).',          back: 'Detailed compartmental → Reduced compartmental → Single-compartment → Cascade model → Black-box model.' },
          { id: 'fc_p4_13', front: 'What carries charge in neurons, and what 2 roles does the membrane play?',     back: 'Ions (Na⁺, K⁺, Cl⁻). The bilipid membrane acts as a capacitor; the ion channels give it a resistance.' },
          { id: 'fc_p4_14', front: 'By what two properties are ion channels characterised?',                       back: 'Selectivity (only specific ions pass) and Regulation/gating (opened/closed by ligand, voltage, or mechanical force).' },
          { id: 'fc_p4_15', front: 'Define the resting membrane potential.',                                       back: 'The voltage at the equilibrium between the chemical (concentration) gradient and the opposing voltage gradient — dominated by K⁺, ≈ −75 mV.' },
          { id: 'fc_p4_16', front: 'Write the Nernst equation (simplified at T=293K).',                            back: 'E = (RT/nF)·ln([cation]ₒ/[cation]ᵢ) ≈ 58·log([cation]ₒ/[cation]ᵢ) mV (sign flips for anions).' },
          { id: 'fc_p4_17', front: 'Name the two modes of action-potential propagation.',                         back: 'Electrotonic conductance (passive, fast, decays with distance) and active regeneration (regenerates the spike, slow but lossless).' },
          { id: 'fc_p4_18', front: 'What is saltatory conduction?',                                               back: 'Fast electrotonic conduction under the myelin sheath with regeneration of the spike at the nodes of Ranvier. Myelin increases membrane resistance.' },
          { id: 'fc_p4_19', front: 'Electrical vs chemical synapses?',                                            back: 'Electrical: gap-junction channels, direct transfer. Chemical: neurotransmitter (e.g. acetylcholine) across a synaptic cleft; can be excitatory/inhibitory and change strength (learning).' },
          { id: 'fc_p4_20', front: 'What are glial cells? Name the two classes.',                                 back: 'Support cells (~10× more than neurons), no direct role in information processing. Microglia (immune/phagocytes) and Macroglia (form myelin, nourish neurons).' },
          { id: 'fc_p4_21', front: 'Describe the McCulloch-Pitts model.',                                         back: 'First computational neuron (1943). Digital threshold logic: any active inhibitory synapse → output 0; else if active excitatory synapses exceed a threshold → output 1.' },
          { id: 'fc_p4_22', front: 'Name the gating variables of the Hodgkin-Huxley model.',                       back: 'm, n, h — model the time-dependent conductances (opening/closing) of the ion channels via their own ODEs.' },
          { id: 'fc_p4_23', front: 'Name two reductions of the Hodgkin-Huxley model.',                            back: 'Morris-Lecar model and FitzHugh-Nagumo model (2-D, analysable in the phase plane).' },
          { id: 'fc_p4_24', front: 'What is the AdEx model?',                                                      back: 'Adaptive exponential integrate-and-fire: a 2-D phenomenological model combining HH-like realistic firing patterns with low computational cost.' },
          { id: 'fc_p4_25', front: 'Name the three desirable properties of Hebbian learning rules.',              back: 'Saturation (bounded weights), Competition/Selectivity (weights don\'t all converge equally), Locality (only local variables).' },
          { id: 'fc_p4_26', front: 'What does the covariance rule add over basic Hebb?',                          back: 'A threshold θ: when pre-synaptic activity is below θ, it introduces LTD (long-term depression).' },
          { id: 'fc_p4_27', front: 'What does Oja\'s rule converge to? What is the BCM idea?',                     back: 'Oja → first principal component (PCA). BCM = covariance learning with a SLIDING threshold that depends on the post-synaptic neuron\'s average activity (gives all 3 properties).' },
          { id: 'fc_p4_28', front: 'What is STDP?',                                                               back: 'Spike-Timing-Dependent Plasticity: a temporally asymmetric form of Hebbian learning; weight change depends on the precise difference of pre- and post-synaptic firing times.' },
          { id: 'fc_p4_29', front: 'LTP vs LTD?',                                                                  back: 'Long-Term Potentiation = lasting strengthening of a synapse. Long-Term Depression = lasting weakening of a synapse.' },
          { id: 'fc_p4_30', front: 'Name three pieces of neuromorphic hardware.',                                 back: 'SpiNNaker (HBP), IBM TrueNorth, Intel Loihi (also Neurogrid, BrainScaleS, etc.).' },
          { id: 'fc_p4_31', front: 'What is a memristor?',                                                        back: '"Memory + resistor": its resistance depends on the previous amount of charge. Theorised by Chua (1971) as the 4th basic two-terminal element; first device by HP Labs (2008).' },
          { id: 'fc_p4_32', front: 'How is an ANN converted to an SNN, and what is the main problem?',            back: 'Train a normal ANN, then replace its activation with a spiking neuron. Problem: ReLU is unbounded but spike rate has a max → use weight normalisation / clamped ReLU for near-lossless conversion.' },
          { id: 'fc_p4_33', front: 'Why is backpropagation hard in SNNs (SpikeProp)?',                           back: 'Spike events are non-differentiable. Fixes: treat discontinuities as noise, or use a differentiable approximation. Backpropagation is still the most powerful learning algorithm.' },
        ],

        quiz: [
          { id: 'qz_p4_1', category: 'P4 — SNNs', question: 'In the LIF ODE C·dv/dt = I(t) − v(t)/R, what does the −v/R term model?', options: ['Ion channel gating', 'The spike threshold', 'Membrane leak (forgetting)', 'Post-synaptic potential'], correct: 2, explanation: 'The −v/R term is the "leaky" part — it causes the potential to decay toward 0 in absence of input (membrane leak).' },
          { id: 'qz_p4_2', category: 'P4 — SNNs', question: 'What is the time constant τ in the LIF model?', options: ['τ = C/R', 'τ = R/C', 'τ = RC', 'τ = 1/(RC)'], correct: 2, explanation: 'τ = RC. It determines how quickly the potential approaches its steady-state value.' },
          { id: 'qz_p4_3', category: 'P4 — SNNs', question: 'What is the main advantage of rate coding over time-to-first-spike coding?', options: ['Faster', 'Uses fewer spikes', 'More robust against noise and timing imprecisions', 'More biologically accurate'], correct: 2, explanation: 'Rate coding averages over a window → robust to noise. Time-to-first-spike is faster but more sensitive to timing errors.' },
          { id: 'qz_p4_4', category: 'P4 — SNNs', question: 'What problem does Oja\'s Rule solve?', options: ['The XOR problem', 'Unbounded weight growth in Hebbian Learning', 'Overfitting in deep networks', 'The vanishing gradient problem'], correct: 1, explanation: 'Oja\'s Rule adds normalisation to Hebbian Learning → weights stay bounded and converge to first principal component.' },
          { id: 'qz_p4_5', category: 'P4 — SNNs', question: 'Hebbian Learning is which type of learning?', options: ['Supervised', 'Reinforcement', 'Unsupervised', 'Semi-supervised'], correct: 2, explanation: 'Hebbian Learning is unsupervised — no teacher signal, just correlation between pre- and post-synaptic activity.' },
          { id: 'qz_p4_6', category: 'P4 — SNNs', question: 'What is structural plasticity?', options: ['Changing synaptic weight strengths', 'Physical changes to the brain structure due to injury', 'Creating and deleting synapses', 'Changing the firing threshold'], correct: 2, explanation: 'Structural plasticity = creating/deleting synapses. Functional plasticity = changing weights.' },
          { id: 'qz_p4_7', category: 'P4 — SNNs', question: 'For constant I and v(0)=0, the LIF solution is:', options: ['v(t) = IR·e^(−t/RC)', 'v(t) = IR·(1 − e^(t/RC))', 'v(t) = IR·(1 − e^(−t/RC))', 'v(t) = I/C·t'], correct: 2, explanation: 'v(t) = IR(1 − e^(−t/RC)). It starts at 0 and rises exponentially toward the steady-state IR.' },
          { id: 'qz_p4_8', category: 'P4 — SNNs', question: 'The resting membrane potential is mainly determined by which ion?', options: ['Sodium (Na⁺)', 'Potassium (K⁺)', 'Chloride (Cl⁻)', 'Calcium (Ca²⁺)'], correct: 1, explanation: 'At rest the membrane is highly permeable to K⁺, so the resting potential is approximated by the K⁺ Nernst potential (≈ −75 mV).' },
          { id: 'qz_p4_9', category: 'P4 — SNNs', question: 'What does the myelin sheath enable?', options: ['Slower but lossless conduction', 'Saltatory conduction (fast jumps between nodes of Ranvier)', 'Generation of neurotransmitters', 'Continuous regeneration along the whole axon'], correct: 1, explanation: 'Myelin increases membrane resistance; the spike jumps between nodes of Ranvier → fast saltatory conduction.' },
          { id: 'qz_p4_10', category: 'P4 — SNNs', question: 'Which neurotransmitter is used at a cholinergic chemical synapse?', options: ['Dopamine', 'Serotonin', 'Acetylcholine', 'GABA'], correct: 2, explanation: 'Cholinergic synapses transmit signals via acetylcholine diffusing across the synaptic cleft.' },
          { id: 'qz_p4_11', category: 'P4 — SNNs', question: 'Glial cells...', options: ['Generate the action potential', 'Outnumber neurons ~10:1 and play a supporting role', 'Are the main information processors', 'Store declarative memory'], correct: 1, explanation: 'Glia (~10× more than neurons) support — form myelin, nourish neurons, immune function — but do not directly process information.' },
          { id: 'qz_p4_12', category: 'P4 — SNNs', question: 'The gating variables m, n, h belong to which model?', options: ['Leaky integrate-and-fire', 'Hodgkin-Huxley', 'McCulloch-Pitts', 'Oja\'s rule'], correct: 1, explanation: 'm, n, h are the Hodgkin-Huxley gating variables modelling the time-dependent ion-channel conductances.' },
          { id: 'qz_p4_13', category: 'P4 — SNNs', question: 'Which learning rule converges to the first principal component (PCA)?', options: ['Basic Hebb', 'Covariance rule', 'Oja\'s rule', 'STDP'], correct: 2, explanation: 'Oja\'s rule adds normalisation to Hebbian learning → the weight vector converges to the first principal component.' },
          { id: 'qz_p4_14', category: 'P4 — SNNs', question: 'STDP determines weight changes based on...', options: ['The average firing rate', 'The precise timing difference of pre/post spikes', 'The membrane capacitance', 'The number of synapses'], correct: 1, explanation: 'Spike-Timing-Dependent Plasticity is temporally asymmetric — it depends on the timing difference between pre- and post-synaptic spikes.' },
          { id: 'qz_p4_15', category: 'P4 — SNNs', question: 'What is the main problem when converting a ReLU-ANN to an SNN?', options: ['ReLU is non-differentiable', 'Spiking neurons have a maximum firing rate but ReLU is unbounded', 'SNNs cannot represent negative weights', 'Spikes are continuous values'], correct: 1, explanation: 'ReLU has no upper limit but spike rate is capped → conversion loss; fixed by weight normalisation or a clamped ReLU.' },
        ],

        open: [
          { id: 'op_p4_1', points: '2 pts', question: 'Name two essential features of neural processing captured by the LIF model.', answer: '• Integration of input current over time (1).\n• Leak/forgetting via −v/R term (1).' },
          { id: 'op_p4_2', points: '8 pts', question: 'Solve the LIF ODE C·dv/dt = I(t)−v(t)/R for constant I, v(0)=0, t₀=0. Show your working and state the time constant.', answer: 'Rearrange: dv/dt = I/C − v/(RC) (1).\nFirst-order linear ODE (1).\nSteady state v∞ = IR (1).\nGeneral: v(t) = v∞ + (v(0)−v∞)·e^(−t/τ) (2).\nWith v(0)=0: v(t) = IR(1 − e^(−t/RC)) (2).\nTime constant τ = RC (1).' },
          { id: 'op_p4_3', points: '4 pts', question: 'Name and describe the two main encoding schemes for spiking neural networks, with one advantage each.', answer: '• Rate coding (1): info = average spike rate in time window (1). Advantage: robust against noise (0.5).\n• Time-to-first-spike (1): info = time of first spike (1). Advantage: very fast (0.5).' },
          { id: 'op_p4_4', points: '4 pts', question: 'State the basic principle of Hebbian Learning and explain the saturation problem.', answer: '• Weight change depends on pre- AND post-synaptic activity (1).\n• "Neurons that fire together, wire together" (1).\n• Saturation: without limiting growth, weights diverge (1) via positive feedback loop (1).' },
          { id: 'op_p4_5', points: '4 pts', question: 'Describe the Hodgkin-Huxley model (you may draw a diagram).', answer: '• Single-compartment, conductance-based model from the squid giant axon (1952) (1).\n• Membrane capacity = capacitor; ion currents (Na⁺, K⁺, leak) (1).\n• Nernst potentials = batteries; nonlinear resistors / gating variables m,n,h for channel dynamics (1).\n• C·du/dt = −Σ Iₖ + I (1).' },
          { id: 'op_p4_6', points: '3 pts', question: 'Name three learning rules based on Hebbian learning.', answer: 'Any 3 (1 each): Correlation rule, Covariance rule, Oja\'s rule, BCM theory, STDP.' },
          { id: 'op_p4_7', points: '4 pts', question: 'Explain the resting membrane potential of a neuron.', answer: '• Ions cross channels to reduce the chemical (concentration) gradient (1).\n• The resulting charge flow produces a voltage gradient directed opposite to it (1).\n• At equilibrium of the two gradients the voltage is the resting potential (1).\n• Dominated by K⁺; ≈ −75 mV (1).' },
          { id: 'op_p4_8', points: '4 pts', question: 'Explain the two modes of action-potential propagation.', answer: '• Electrotonic conductance: passive, fast, but the signal decays with distance (2).\n• Active regeneration: repeated depolarisation regenerates the spike; lossless but slow (2).' },
          { id: 'op_p4_9', points: '2 pts', question: 'Name and describe the two main classes of glial cells.', answer: '• Microglia: immune cells / phagocytes during injury or infection (1).\n• Macroglia: form the myelin sheath and nourish neurons (1).' },

        guided: [
          { id: 'g_p5_1', badge: 'Overfitting', title: 'Overfitting & How to Prevent It', body: 'Overfitting: model learns noise instead of pattern → good training error, bad test error.\n\n3 prevention methods (know at least 3):\n• Regularisation (L2/Dropout)\n• More training data\n• Dataset augmentation\n• Early stopping\n• Simpler model', example: '🔑 This is in EVERY exam, always 4 points. Name the problem + 3 methods.' },
          { id: 'g_p5_2', badge: '3 Paradigms', title: 'The Three Learning Paradigms', body: 'Supervised: learns input→output mapping from explicit labels. Data: (x,y) pairs.\n\nUnsupervised: learns statistical regularities. Data: x only.\n\nReinforcement: learns action selection to maximise reward via environment interaction.\n\nBonus: Semi-supervised = mixed labelled/unlabelled data.', example: '🔑 For each paradigm: know name + description + data type. 1 point each component.' },
          { id: 'g_p5_3', badge: 'Cross-Validation', title: 'k-fold Cross-Validation', body: 'How it works:\n1. Partition dataset into k folds\n2. Train k times — each time, one different fold is the validation set\n3. Overall performance = average of k validation scores\n\nWhy use it? Better estimate of generalisation than a single train/test split.', example: '🔑 3 points for: partition into k folds + different fold each time + average performance.' },
          { id: 'g_p5_4', badge: 'Occam\'s Razor', title: 'Model Selection & Occam\'s Razor', body: 'Occam\'s Razor: of two competing explanations, prefer the simpler one.\n\nIn ML: given equal performance, choose the model with the FEWEST parameters.\n\nDiscriminative model: classifies → P(y|x)\nGenerative model: generates data → P(x|y) or P(x,y)', example: '🔑 SVM vs least-squares: SVM maximises margin → more robust to outliers. Least-squares is sensitive to outliers.' },
          { id: 'g_p5_5', badge: '4 Components', title: 'What a Machine Learning System Is', body: 'Arthur Samuel (1959): ML "gives computers the ability to learn without being explicitly programmed." A ML system has four components:\n\n• Dataset 𝒮: samples (points, or input/output pairs)\n• Model ℳ: an adjustable compact representation of I/O relationships\n• Objective function ℒ: encodes current performance (loss or reward)\n• Algorithm 𝒜: adjusts ℳ based on 𝒮 and ℒ\n\nTraining = inductive learning: find ℳ* = argmin ℒ(ℳ) in a hypothesis space ℋ.', example: '🔑 4 components: Dataset, Model, Objective function, Algorithm. Memorise all four.' },
          { id: 'g_p5_6', badge: 'Perceptron Rule', title: 'The Perceptron Learning Rule & XOR', body: 'The perceptron is a linear classifier: y(x) = f(wᵀx), f = sign. Correct samples satisfy wᵀxₙyₙ > 0.\n\nLearning rule (stochastic gradient descent on the perceptron criterion):\nw_{t+1} = w_t + η·xₙyₙ for misclassified samples.\n\nConvergence theorem: IF the data is linearly separable, the rule finds a solution in finite steps. It does NOT converge for non-separable data → it cannot solve XOR (not linearly separable) → AI winter.', example: '🔑 Perceptron only converges for linearly separable data. XOR is the classic counter-example.' },
          { id: 'g_p5_7', badge: 'Least Squares', title: 'Least Squares & Maximum Likelihood', body: 'Regression with a sum-of-squares error: ℒ = ½ Σ (hw(xₙ) − yₙ)².\n\nLinear least-squares solution (normal equations): w* = (ΦᵀΦ)⁻¹Φᵀy. Geometrically: an orthogonal projection of y onto the space spanned by the basis functions.\n\nKey result: for linear basis-function models with Gaussian noise, maximising the log-likelihood is EQUIVALENT to the least-squares solution.', example: '🔑 Least squares = maximum likelihood under Gaussian noise. Add a λ‖w‖² term for regularisation.' },
          { id: 'g_p5_8', badge: 'Multi-class', title: 'Multi-class Classification & One-Hot', body: 'Combining binary classifiers leaves ambiguous regions:\n• One-vs-the-rest: K−1 discriminants (one class vs all).\n• One-vs-one: K(K−1)/2 discriminants + majority vote.\n\nBetter: one linear function per class, assign C* = argmax yCk(x). Decision regions are then always convex.\n\nUse one-hot encoding (not integer labels 1,2,3…) so no false ordering is imposed on the classes.', example: '🔑 One-vs-rest = K−1 classifiers. One-vs-one = K(K−1)/2 classifiers. Use one-hot to avoid fake class order.' },
          { id: 'g_p5_9', badge: 'CNN / Vision', title: 'Max-Pooling, Fourier & Visual Processing', body: 'Max-pooling: slide a kernel over the feature map, output the maximum of each window → downsampling + translation invariance.\n\nConvolution in Fourier space: convolutions become simple multiplications (fewer operations); challenge = keeping the cost of the Fourier transform low.\n\nHuman visual system — two streams: dorsal ("where/how"), ventral ("what"). Three processing layers: low-level (lines/edges), mid-level (surfaces/orientations), high-level (memory & intentions).', example: '🔑 Max-pooling = max over a sliding window. Fourier: convolution → multiplication.' },
        ],

        flashcards: [
          { id: 'fc_p5_1',  front: 'Define overfitting and name 3 ways to prevent it.',                             back: 'Model learns noise, high test error. Prevent: regularisation/dropout, more data, augmentation, early stopping, simpler model.' },
          { id: 'fc_p5_2',  front: 'Name and describe the 3 main learning paradigms.',                              back: 'Supervised: x→y from labels. Unsupervised: statistical regularities, x only. Reinforcement: action selection to maximise reward via environment.' },
          { id: 'fc_p5_3',  front: 'Describe k-fold cross-validation.',                                             back: 'Split into k folds; train k times, each with different validation fold; overall = average of k performances.' },
          { id: 'fc_p5_4',  front: 'State Occam\'s Razor and its ML application.',                                  back: 'Prefer the simpler of two explanations. In ML: choose the model with fewest parameters given equal performance.' },
          { id: 'fc_p5_5',  front: 'Discriminative vs Generative model — definition and probability.',              back: 'Discriminative: classifies P(y|x). Generative: generates data P(x|y) or P(x,y).' },
          { id: 'fc_p5_6',  front: 'Problem with least-squares classification? How do SVMs fix it?',               back: 'Least-squares: sensitive to outliers (hyperplane distorted). SVM: maximises margin between classes → robust to outliers.' },
          { id: 'fc_p5_7',  front: 'Why can a single perceptron NOT solve XOR?',                                    back: 'XOR is not linearly separable. A perceptron with linear activation can only classify linearly separable classes.' },
          { id: 'fc_p5_8',  front: 'What is max-pooling?',                                                           back: 'A kernel slides over the feature map; maps all inputs to the maximum value. Achieves downsampling and translation invariance.' },
          { id: 'fc_p5_9',  front: 'Regression vs Classification — difference?',                                    back: 'Regression: predicts a continuous output. Classification: assigns input to discrete class.' },
          { id: 'fc_p5_10', front: 'Output formula of a general analog neuron.',                                     back: 'y = A(w₁x₁ + w₂x₂ + … + wₙxₙ + b)\nA = activation function, b = bias.' },
          { id: 'fc_p5_11', front: 'Name the 4 components of a machine learning system.',                            back: 'Dataset 𝒮, Model ℳ, Objective function ℒ (loss/reward), Algorithm 𝒜.' },
          { id: 'fc_p5_12', front: 'Define machine learning (Arthur Samuel).',                                      back: '"The field of study that gives computers the ability to learn without being explicitly programmed." Example NOT needing ML: a pre-programmed welding robot / Boston Dynamics WildCat using fixed control algorithms.' },
          { id: 'fc_p5_13', front: 'Map each data type to its learning paradigm.',                                  back: 'Unlabeled → unsupervised; Labeled → supervised; Mixed → semi-supervised; Dynamic environment → reinforcement learning.' },
          { id: 'fc_p5_14', front: 'What is a hypothesis space ℋ? What is inductive learning?',                     back: 'ℋ = the set of candidate models the algorithm searches. Inductive learning = finding ℳ* ∈ ℋ that minimises ℒ on 𝒮. Usually only a local optimum is found.' },
          { id: 'fc_p5_15', front: 'What is boosting (ensemble learning)?',                                         back: 'Building a strong learner from many weak learners: each sample has a weight; weights of misclassified samples are increased so new hypotheses focus on hard samples (e.g. AdaBoost).' },
          { id: 'fc_p5_16', front: 'Underfitting vs overfitting?',                                                  back: 'Underfitting: ℋ not expressive enough → fits training data poorly. Overfitting: fits training data very well (incl. noise) but generalises poorly.' },
          { id: 'fc_p5_17', front: 'Name the three disjoint data subsets in supervised learning.',                  back: 'Training set (find h), validation set (tune training parameters), test set (assess final model). If h is changed based on the test set, the test set is invalidated.' },
          { id: 'fc_p5_18', front: 'State the perceptron learning rule and convergence theorem.',                   back: 'w_{t+1} = w_t + η·xₙyₙ for misclassified samples. Convergence theorem: if the data is linearly separable, a solution is found in finite steps; it does NOT converge otherwise.' },
          { id: 'fc_p5_19', front: 'Relationship between least squares and maximum likelihood?',                    back: 'For linear basis-function models with Gaussian noise, maximising the log-likelihood is equivalent to the least-squares solution.' },
          { id: 'fc_p5_20', front: 'Write the linear least-squares solution.',                                      back: 'w* = (ΦᵀΦ)⁻¹Φᵀy — an orthogonal projection of y onto the subspace spanned by the basis functions.' },
          { id: 'fc_p5_21', front: 'One-vs-rest vs one-vs-one classification — how many classifiers?',              back: 'One-vs-the-rest: K−1 binary discriminants. One-vs-one: K(K−1)/2 binary discriminants + majority vote. Both leave ambiguous regions.' },
          { id: 'fc_p5_22', front: 'Why use one-hot encoding for classes?',                                         back: 'Integer labels (1,2,3,…) impose a false ordering on the classes; one-hot vectors avoid introducing this non-existent order.' },
          { id: 'fc_p5_23', front: 'What are support vectors? What can be discarded after training?',               back: 'The training samples that define the maximum-margin hyperplane. After training, all samples except the support vectors can be discarded. Slack variables allow points inside the margin.' },
          { id: 'fc_p5_24', front: 'Advantage & challenge of computing convolutions in Fourier space?',            back: 'Advantage: convolutions become simple multiplications → fewer operations. Challenge: keeping the cost of the Fourier transform itself low.' },
          { id: 'fc_p5_25', front: 'Name the 3 conceptual processing layers of the human visual system.',          back: 'Low-level vision (lines/edges), mid-level vision (surfaces/orientations), high-level vision (based on memory & intentions).' },
          { id: 'fc_p5_26', front: 'What does the universal approximation theorem state?',                          back: 'A neural network with a single hidden layer can approximate any function arbitrarily well.' },
        ],

        quiz: [
          { id: 'qz_p5_1', category: 'P5 — ML', question: 'A model performs well on training data but badly on test data. What is this called?', options: ['Underfitting', 'Overfitting', 'Regularisation', 'Variance collapse'], correct: 1, explanation: 'Overfitting = learning noise/training data too specifically → poor generalisation.' },
          { id: 'qz_p5_2', category: 'P5 — ML', question: 'Which learning paradigm uses only unlabelled input data x?', options: ['Supervised', 'Reinforcement', 'Unsupervised', 'Semi-supervised'], correct: 2, explanation: 'Unsupervised: no labels, learns statistical regularities from x alone.' },
          { id: 'qz_p5_3', category: 'P5 — ML', question: 'In k-fold cross-validation, how is overall performance measured?', options: ['Best single fold result', 'Worst fold result', 'Average of all k fold results', 'First fold result only'], correct: 2, explanation: 'Average of all k validation performances gives a robust estimate.' },
          { id: 'qz_p5_4', category: 'P5 — ML', question: 'A discriminative model learns:', options: ['P(x)', 'P(y)', 'P(y|x)', 'P(x|y)'], correct: 2, explanation: 'Discriminative = learns the posterior P(y|x) to classify. Generative = P(x|y) to generate.' },
          { id: 'qz_p5_5', category: 'P5 — ML', question: 'Occam\'s Razor in ML says: of two equally performing models, prefer the one with...', options: ['More parameters', 'Fewer parameters', 'A deeper architecture', 'Higher validation accuracy'], correct: 1, explanation: 'Fewer parameters = simpler model = Occam\'s Razor. Complexity should not be added without benefit.' },
          { id: 'qz_p5_6', category: 'P5 — ML', question: 'Why does a single perceptron fail to solve XOR?', options: ['It has too many parameters', 'XOR is not linearly separable', 'It requires reinforcement learning', 'The activation function is too complex'], correct: 1, explanation: 'XOR cannot be separated by a single linear decision boundary. Need at least one hidden layer.' },
          { id: 'qz_p5_7', category: 'P5 — ML', question: 'Which is NOT one of the four components of a machine learning system?', options: ['Dataset', 'Model', 'Objective function', 'Compiler'], correct: 3, explanation: 'The four components are: dataset, model, objective function, and algorithm.' },
          { id: 'qz_p5_8', category: 'P5 — ML', question: 'For one-vs-one classification of K classes, how many binary classifiers are needed?', options: ['K', 'K−1', 'K(K−1)/2', 'K²'], correct: 2, explanation: 'One-vs-one needs K(K−1)/2 pairwise classifiers; one-vs-the-rest needs K−1.' },
          { id: 'qz_p5_9', category: 'P5 — ML', question: 'Under Gaussian noise, maximising the log-likelihood is equivalent to...', options: ['Maximising the margin', 'The least-squares solution', 'Cross-validation', 'Boosting'], correct: 1, explanation: 'For linear basis-function models with Gaussian noise, maximum likelihood = least squares.' },
          { id: 'qz_p5_10', category: 'P5 — ML', question: 'What is max-pooling?', options: ['Averaging all values in a window', 'Taking the maximum value in each sliding window', 'Adding a regularisation term', 'Normalising the weights'], correct: 1, explanation: 'Max-pooling slides a kernel and outputs the maximum of each window → downsampling and translation invariance.' },
          { id: 'qz_p5_11', category: 'P5 — ML', question: 'After training an SVM, which samples can be discarded?', options: ['The support vectors', 'All samples except the support vectors', 'The outliers only', 'None — all are needed'], correct: 1, explanation: 'Only the support vectors define the decision boundary; all other samples can be discarded.' },
          { id: 'qz_p5_12', category: 'P5 — ML', question: 'Why use one-hot encoding instead of integer class labels?', options: ['It uses less memory', 'It avoids imposing a false ordering on the classes', 'It speeds up training', 'It prevents overfitting'], correct: 1, explanation: 'Integer labels (1,2,3,…) imply an order the classes do not have; one-hot vectors avoid this.' },
          { id: 'qz_p5_13', category: 'P5 — ML', question: 'The universal approximation theorem states that a network with how many hidden layers can approximate any function?', options: ['At least three', 'A single hidden layer', 'Infinitely many', 'Exactly two'], correct: 1, explanation: 'A network with a single hidden layer can approximate any function arbitrarily well.' },
        ],
