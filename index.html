        quiz: [
  { id: 'qz_kf_l06_01', category: 'L6 — Superconducting Magnets', question: 'Superconductivity was first discovered by Heike Kamerlingh Onnes in 1911 while studying…', options: ['the resistivity of a tungsten wire at room temperature', 'the resistivity of mercury cooled to 4.2 K', 'the magnetization of iron in strong fields', 'the heat capacity of liquid nitrogen'], correct: 1, explanation: 'Onnes observed that mercury\'s electrical resistance dropped abruptly to zero when cooled to 4.2 K, the boiling point of helium which he had liquefied in 1908; this discovery earned him the 1913 Nobel Prize. (Lecture 06, Folie 4)' },
  { id: 'qz_kf_l06_02', category: 'L6 — Superconducting Magnets', question: 'Onnes\'s discovery of superconductivity was only possible because he had previously…', options: ['developed the BCS theory', 'discovered the Meissner effect', 'succeeded in liquefying helium', 'invented the cable-in-conduit conductor'], correct: 2, explanation: 'Liquid helium, with a boiling point of 4.2 K, was needed to cool mercury below its critical temperature; Onnes was the first to liquefy helium (1908), which enabled the 1911 discovery of superconductivity. (Lecture 06, Folie 4)' },
  { id: 'qz_kf_l06_03', category: 'L6 — Superconducting Magnets', question: 'The BCS theory, developed in 1957, explains conventional superconductivity as arising from…', options: ['a quantum mechanical effect near absolute zero', 'thermal expansion of the crystal lattice', 'magnetic flux pinning at grain boundaries', 'classical electron-electron repulsion'], correct: 0, explanation: 'Bardeen, Cooper and Schrieffer (BCS, 1972 Nobel Prize) explained conventional superconductivity in metals near absolute zero as a quantum mechanical effect, distinguishing it fundamentally from classical resistive conduction. (Lecture 06, Folie 6)' },
  { id: 'qz_kf_l06_04', category: 'L6 — Superconducting Magnets', question: 'A key distinguishing feature of a superconductor compared to a normal conductor like copper is that…', options: ['a superconductor\'s current can flow indefinitely without any external power source', 'a superconductor\'s resistance increases as temperature decreases', 'a superconductor always requires an external power source to maintain current', 'a normal conductor reaches exactly zero resistance at absolute zero'], correct: 0, explanation: 'Unlike normal conductors such as copper, which retain a small residual resistance even near absolute zero due to impurities, a superconductor below its Tc can sustain a persistent current indefinitely with no external power source. (Lecture 06, Folie 6-7)' },
  { id: 'qz_kf_l06_05', category: 'L6 — Superconducting Magnets', question: 'In normal conductors such as copper, the residual resistance remaining even near absolute zero is mainly attributed to…', options: ['quantum tunneling of Cooper pairs', 'exceeding the critical current density', 'the Meissner effect', 'impurities in the conductor'], correct: 3, explanation: 'While resistance in normal conductors decreases with decreasing temperature, a small residual resistance persists near absolute zero due to impurities in the material, unlike a true superconductor which abruptly loses all resistance below Tc. (Lecture 06, Folie 7)' },
  { id: 'qz_kf_l06_06', category: 'L6 — Superconducting Magnets', question: 'A Type I superconductor is best characterized by…', options: ['no dependence at all on the applied magnetic field', 'operation only above the boiling point of nitrogen', 'an abrupt loss of superconductivity once the applied field exceeds a single critical value Bc', 'a gradual transition to normal conductivity as the field increases, with high Tc and Bc'], correct: 2, explanation: 'Type I superconductors (typically pure metals) lose superconductivity abruptly once the applied magnetic field exceeds their critical value Bc, in contrast to Type II materials which transition gradually and tolerate higher fields. (Lecture 06, Folie 8)' },
  { id: 'qz_kf_l06_07', category: 'L6 — Superconducting Magnets', question: 'Compared to Type I superconductors, Type II superconductors (e.g., metal alloys, ceramics) are distinguished by…', options: ['an abrupt transition to the normal state at a single Bc', 'the complete absence of a critical current density', 'a gradual transition from super to normal conductivity as the field increases, generally with higher Tc and Bc', 'operation exclusively at room temperature'], correct: 2, explanation: 'Type II superconductors transition gradually between superconducting and normal states as the magnetic field increases, and generally exhibit higher critical temperatures and fields than Type I materials, which is why they are used for high-field magnet applications. (Lecture 06, Folie 8)' },
  { id: 'qz_kf_l06_08', category: 'L6 — Superconducting Magnets', question: 'The Meissner effect refers to…', options: ['the sudden increase of critical current density with temperature', 'the transformation of alternating current into direct current', 'the release of energy during a quench', 'the expulsion of the magnetic field from the interior of a superconductor below Tc'], correct: 3, explanation: 'Below Tc, a superconductor expels the magnetic field from its interior (Meissner state); the field penetrates only a very small distance (e.g. ~100 nm for most Type I materials) and decays exponentially inside the material. (Lecture 06, Folie 9)' },
  { id: 'qz_kf_l06_09', category: 'L6 — Superconducting Magnets', question: 'Inside a superconductor in the Meissner state, the penetrating external magnetic field…', options: ['remains constant in magnitude throughout the material', 'increases linearly with depth', 'decreases to zero exponentially over a very small penetration depth', 'is completely unaffected by the superconducting transition'], correct: 2, explanation: 'The magnetic field penetrates the superconductor only over a very small distance (on the order of 100 nm for most Type I superconductors) and decays exponentially to zero within that depth, which is the physical basis of the Meissner effect. (Lecture 06, Folie 9)' },
  { id: 'qz_kf_l06_10', category: 'L6 — Superconducting Magnets', question: 'A practical demonstration of the Meissner effect is magnetic levitation, in which…', options: ['a resistive heating element boils off liquid nitrogen', 'the superconductor becomes attracted to the magnet due to increased permeability', 'quenching causes the magnet to be repelled violently upward', 'currents in the superconductor create a field opposing the external field, exerting a magnetic pressure that can balance gravity'], correct: 3, explanation: 'When a superconductor is cooled below Tc near a magnet, screening currents flow in the superconductor that generate an opposing field; the resulting magnetic pressure can balance gravity and levitate the magnet, as long as the field stays below the critical values. (Lecture 06, Folie 10)' },
  { id: 'qz_kf_l06_11', category: 'L6 — Superconducting Magnets', question: 'High Temperature Superconductors (HTS) are commonly defined as those with a critical temperature…', options: ['below the boiling point of liquid helium (4.2 K)', 'exactly equal to room temperature', 'above the melting point of niobium', 'higher than the boiling point of nitrogen (77 K), or operating temperatures above about 10-20 K'], correct: 3, explanation: 'Since there is no universal consensus, HTS are typically defined either as materials with Tc above the 77 K boiling point of nitrogen, or as those whose practical operating temperature exceeds about 10-20 K, distinguishing them from LTS. (Lecture 06, Folie 11)' },
  { id: 'qz_kf_l06_12', category: 'L6 — Superconducting Magnets', question: 'The heat capacity of a superconductor as a function of temperature is best described as…', options: ['constant at all temperatures, including at Tc', 'zero above Tc and infinite below Tc', 'independent of temperature below Tc and linear above Tc', 'proportional to temperature above Tc, with an abrupt change at Tc, and an exponential function of temperature below Tc'], correct: 3, explanation: 'Above Tc the heat capacity is proportional to temperature; at Tc it undergoes an abrupt change; below Tc it follows an exponential function of temperature, reflecting the second-order phase transition into the superconducting state. (Lecture 06, Folie 11)' },
  { id: 'qz_kf_l06_13', category: 'L6 — Superconducting Magnets', question: 'The three critical limits that together define the critical surface of a superconductor are…', options: ['critical temperature, critical pressure, and critical density', 'critical voltage, critical resistance, and critical inductance', 'critical temperature, critical magnetic field, and critical current density', 'critical strain, critical stress, and critical fatigue limit'], correct: 2, explanation: 'A superconductor operates only within a three-dimensional envelope bounded by the critical temperature Tc, critical magnetic field Bc, and critical current density Jc; exceeding any one of these limits destroys superconductivity. (Lecture 06, Folie 12)' },
  { id: 'qz_kf_l06_14', category: 'L6 — Superconducting Magnets', question: 'The critical current density Jc of a superconductor generally…', options: ['increases with increasing applied magnetic field and strain', 'is completely independent of the applied magnetic field', 'only depends on the operating temperature, never on the field', 'decreases with increasing applied magnetic field and strain'], correct: 3, explanation: 'Jc depends on the applied magnetic field, stress, and strain, and in general decreases as the applied field and strain increase, which is why magnet designers must keep an adequate temperature margin to avoid inadvertently crossing the critical surface. (Lecture 06, Folie 12)' },
  { id: 'qz_kf_l06_15', category: 'L6 — Superconducting Magnets', question: 'A quench in a superconducting magnet is best described as…', options: ['a gradual, controlled reduction of the operating current', 'the normal shutdown procedure at the end of a pulse', 'an increase in critical current density due to cooling', 'an abrupt transition of the superconductor back to a resistive state, releasing energy rapidly and heating the coolant and conductor'], correct: 3, explanation: 'A quench occurs when the conductor suddenly transitions from superconducting back to resistive, producing a fast, large release of stored magnetic energy that heats the coolant and conductor; this is why an adequate temperature margin and a dedicated protection system are required. (Lecture 06, Folie 12)' },
  { id: 'qz_kf_l06_16', category: 'L6 — Superconducting Magnets', question: 'Compared to Nb3Sn, the low-temperature superconductor NbTi is characterized by…', options: ['a higher operating field of up to 14 T and mandatory heat treatment', 'operation only above 77 K', 'being classified as a high-temperature superconductor', 'a lower operating field of up to about 6-7 T, no heat treatment needed, and lower cost'], correct: 3, explanation: 'NbTi operates up to about 6-7 T and requires no heat treatment, making it easier and cheaper to produce than Nb3Sn, though it delivers lower performance (lower achievable field) than Nb3Sn, which operates up to 14 T. (Lecture 06, Folie 13)' },
  { id: 'qz_kf_l06_17', category: 'L6 — Superconducting Magnets', question: 'Nb3Sn conductors typically require a heat treatment step, which consists of…', options: ['cooling to 4.2 K for several days before winding', 'annealing in a vacuum furnace at 20 K', 'heating at around 650°C for 100-200 hours to form the superconducting compound', 'quenching in liquid nitrogen immediately after drawing'], correct: 2, explanation: 'Nb3Sn only becomes superconducting after a reaction heat treatment, typically around 650°C for 100-200 hours, performed before or after coil winding; this is a major manufacturing complexity not required for NbTi. (Lecture 06, Folie 13)' },
  { id: 'qz_kf_l06_18', category: 'L6 — Superconducting Magnets', question: 'Nb3Al, compared to Nb3Sn, is characterized by…', options: ['a much lower critical field of only a few tesla', 'requiring heat treatment at 650°C for 100-200 hours', 'being the cheapest of the low-temperature superconductor options', 'a similar operating field up to 14 T with no heat treatment needed, but very expensive base material and manufacturing'], correct: 3, explanation: 'Nb3Al reaches operating fields up to 14 T like Nb3Sn and does not need heat treatment, but its base material and special manufacturing process make it very expensive, which is why it sees more limited use. (Lecture 06, Folie 13)' },
  { id: 'qz_kf_l06_19', category: 'L6 — Superconducting Magnets', question: 'The four competing manufacturing technologies mentioned for Nb3Sn wires include the bronze route, internal tin diffusion, powder-in-tube, and…', options: ['the Sn-Ta route', 'the electron beam welding route', 'the cable-in-conduit route', 'the vacuum pressure impregnation route'], correct: 0, explanation: 'The lecture lists four competing Nb3Sn wire production technologies: bronze route, internal tin diffusion, powder in tube, and the Sn-Ta route; each offers different tradeoffs in performance and cost for achieving the A15 superconducting phase. (Lecture 06, Folie 13)' },
  { id: 'qz_kf_l06_20', category: 'L6 — Superconducting Magnets', question: 'Among HTS materials discussed, YBCO coated conductor stands out because it…', options: ['can only operate below 4.2 K', 'can be operated at 77 K (liquid nitrogen temperature) with reasonable current/field performance, up to 16 T', 'has the lowest critical field of all HTS materials', 'requires the longest heat treatment of any superconductor'], correct: 1, explanation: 'YBCO coated conductor can reach up to 16 T and, unlike most other HTS materials, can genuinely be operated at the relatively \'warm\' 77 K with reasonable current and field capability, whereas most other HTS materials need cooling to 20-30 K to perform well. (Lecture 06, Folie 14)' },
  { id: 'qz_kf_l06_21', category: 'L6 — Superconducting Magnets', question: 'Bi-2212 round wire (RW), as an HTS conductor, typically operates at…', options: ['77 K with fields up to 16 T', '4.2 K exclusively, like NbTi', 'up to 10-15 T at an operating temperature of about 20 K', 'room temperature with no field limit'], correct: 2, explanation: 'Bi-2212 round wire is used up to about 10-15 T at an operating temperature around 20 K, positioning it between the LTS materials and the higher-temperature-capable YBCO coated conductors. (Lecture 06, Folie 14)' },
  { id: 'qz_kf_l06_22', category: 'L6 — Superconducting Magnets', question: 'Most HTS materials other than YBCO, in order to achieve reasonable operating current and field, must be cooled to approximately…', options: ['77 K, the boiling point of nitrogen', '4.2 K, the boiling point of helium', 'room temperature (~300 K)', '20-30 K'], correct: 3, explanation: 'While YBCO can be operated near 77 K with good performance, most other HTS materials (e.g. Bi-2212, MgB2) must be cooled into the 20-30 K range to achieve reasonable operating current and field. (Lecture 06, Folie 14)' },
  { id: 'qz_kf_l06_23', category: 'L6 — Superconducting Magnets', question: 'MgB2, as discussed among HTS materials, is characterized by…', options: ['operating fields comparable to Nb3Sn, above 14 T', 'being usable only below 4.2 K', 'being the oldest known HTS material, discovered before BCS theory', 'operation still limited to a few tesla, at 20-30 K operating temperature'], correct: 3, explanation: 'MgB2 is described as still limited to operation at a few tesla with an operating temperature range of 20-30 K, making it less field-capable than YBCO or Bi-2212 at the current state of the art. (Lecture 06, Folie 14)' },
  { id: 'qz_kf_l06_24', category: 'L6 — Superconducting Magnets', question: 'The primary reason a magnet system for a fusion device needs a very high current density J is to…', options: ['reduce the plasma temperature', 'increase neutron flux through the blanket', 'save construction space', 'eliminate the need for cryogenic cooling'], correct: 2, explanation: 'A high current density [A/mm2] allows the required magnetic field and current to be achieved with less conductor cross-section, saving valuable construction space in a magnet system that must also satisfy stringent field, force, and neutron-resistance requirements. (Lecture 06, Folie 17)' },
  { id: 'qz_kf_l06_25', category: 'L6 — Superconducting Magnets', question: 'According to the lecture, superconducting magnets are essential for fusion devices mainly because they allow…', options: ['elimination of all mechanical support structures', 'operation without any need for cryogenic systems', 'the high magnetic fields required for good confinement while keeping good economy of space and negligible Joule losses', 'direct breeding of tritium in the coil windings'], correct: 2, explanation: 'Since the fusion triple product nTτE requires high magnetic fields (B is proportional to coil current), superconducting magnets provide the needed high current and field with very low energy consumption (no Joule losses) and reasonable use of space, unlike resistive magnets. (Lecture 06, Folie 17)' },
  { id: 'qz_kf_l06_26', category: 'L6 — Superconducting Magnets', question: 'Per the relation B = μ0NI / (2πr) presented in the lecture, the magnetic field B produced by the confinement coils is proportional to…', options: ['the coil current I (and number of turns N)', 'the plasma temperature only', 'the vacuum vessel pressure', 'the tritium breeding ratio'], correct: 0, explanation: 'The toroidal field B is proportional to the electric current I circulating in the confinement coils (and the number of turns N), which is why achieving high fields for good confinement drives the need for high-current-capacity superconducting coils. (Lecture 06, Folie 17)' },
  { id: 'qz_kf_l06_27', category: 'L6 — Superconducting Magnets', question: 'Among the requirements listed for a fusion magnet system, one is the need for high current capability in both…', options: ['steady state and pulsed operation', 'toroidal and poloidal geometries only', 'AC and superconducting modes simultaneously', 'vacuum and atmospheric pressure conditions'], correct: 0, explanation: 'Fusion magnets must supply high current both in steady-state operation (e.g., toroidal field coils continuously energized) and in pulsed operation (e.g., central solenoid and poloidal field coils for plasma initiation and shaping). (Lecture 06, Folie 17)' },
  { id: 'qz_kf_l06_28', category: 'L6 — Superconducting Magnets', question: 'The T-7 device at the Kurchatov Institute, historically significant as the first superconducting fusion device (1977), used which conductor technology?', options: ['NbTi filaments in a copper matrix with integrated cooling', 'Nb3Sn filaments with superfluid helium bath cooling', 'YBCO coated conductor tapes', 'MgB2 wires with forced-flow cooling'], correct: 0, explanation: 'T-7, the first superconducting fusion device, used NbTi filaments embedded in a copper matrix with integrated cooling channels, while its successor T-15 later used Nb3Sn filaments in a copper matrix. (Lecture 06, Folie 18)' },
  { id: 'qz_kf_l06_29', category: 'L6 — Superconducting Magnets', question: 'Tore Supra, which began operation in the 1980s at CEA Cadarache, used which superconducting technology?', options: ['Nb3Sn filaments with forced-flow cooling', 'NbTi filaments with superfluid helium bath cooling', 'HTS tapes with liquid nitrogen cooling', 'Nb3Al filaments with gaseous helium cooling'], correct: 1, explanation: 'Tore Supra used NbTi filaments cooled by a superfluid helium bath, representative of the generation of superconducting tokamaks (alongside the LCT coils, POLO, DPC, and later ITER model coils) developed from the 1970s-1990s. (Lecture 06, Folie 19)' },
  { id: 'qz_kf_l06_30', category: 'L6 — Superconducting Magnets', question: 'A cable-in-conduit conductor (CICC), as used for ITER magnets, was developed primarily to address the need for…', options: ['large volume, energy handling, and required stability for high-performance magnets', 'reduced manufacturing cost above all other considerations', 'operation exclusively at room temperature', 'eliminating the need for any conductor jacket'], correct: 0, explanation: 'Cable-in-conduit conductors bundle many superconducting strands within a structural jacket that also provides a cooling channel, a design driven by the large stored energy, volume, and stability requirements of high-performance fusion magnets such as those in ITER. (Lecture 06, Folie 22)' },
  { id: 'qz_kf_l06_31', category: 'L6 — Superconducting Magnets', question: 'In the ITER magnet system, NbTi conductor is used for the PF coils (fields below 7 T), while Nb3Sn is used for the higher-field TF coils and Central Solenoid mainly because…', options: ['NbTi is more expensive than Nb3Sn', 'Nb3Sn can sustain higher magnetic fields (up to 14 T) than NbTi (up to about 6-7 T)', 'Nb3Sn requires no heat treatment while NbTi does', 'NbTi cannot be manufactured into cables'], correct: 1, explanation: 'Since NbTi is limited to roughly 6-7 T while Nb3Sn can operate up to about 14 T, ITER uses NbTi for the lower-field PF coils and Nb3Sn for the higher-field TF coils and Central Solenoid, despite Nb3Sn\'s more complex and costly manufacturing. (Lecture 06, Folie 23)' },
  { id: 'qz_kf_l06_32', category: 'L6 — Superconducting Magnets', question: 'In the manufacturing sequence for superconducting cables described in the lecture, after strands are drawn/extruded and (optionally) electroplated with a resistive barrier, the next general step is…', options: ['heat treatment at 650°C', 'cabling of superconducting and copper strands in multi-staged braids', 'installation directly into the tokamak vessel', 'liquefaction in a helium bath'], correct: 1, explanation: 'The general cable production sequence is: assemble superconductor in a resistive matrix, draw/extrude into strands, optionally electroplate a resistive barrier, then cable the strands in multi-staged braids, wrap a protective steel foil, optionally add a cooling channel, insert into the jacket, and compact the finished conductor. (Lecture 06, Folie 23)' },
  { id: 'qz_kf_l06_33', category: 'L6 — Superconducting Magnets', question: 'For comparison with superconductors, the lecture notes that water-cooled copper conductors achieve a current density of roughly…', options: ['1000-1200 A/mm2, similar to Nb3Sn strands', '10 A/mm2', '790 A/mm2, similar to the bronze route Nb3Sn strand', '2 A/mm2, the same as copper without cooling'], correct: 1, explanation: 'The lecture contrasts copper current densities (about 2 A/mm2 uncooled, 4 A/mm2 air cooled, ~10 A/mm2 water cooled) with Nb3Sn strands reaching Jc of 1000-1200 A/mm2 at 4.2 K and 12 T, illustrating why superconductors are indispensable for compact high-field magnets. (Lecture 06, Folie 30)' },
  { id: 'qz_kf_l06_34', category: 'L6 — Superconducting Magnets', question: 'In the ITER Nb3Sn Internal Tin process, a key manufacturing constraint after the tin (Sn) rod is inserted is that…', options: ['extrusion is no longer possible, only cold drawing can be used', 'heat treatment must be skipped entirely', 'the strand must immediately be cabled without further drawing', 'only hot isostatic pressing (HIPing) can be applied afterward'], correct: 0, explanation: 'Once the tin rod has been inserted into the billet, extrusion is no longer possible (tin would melt/smear under extrusion conditions), so only cold drawing can be used to reduce the billet to final strand diameter. (Lecture 06, Folie 30)' },
  { id: 'qz_kf_l06_35', category: 'L6 — Superconducting Magnets', question: 'Scaling up Nb3Sn production for ITER required an increase from historical output of a few tons per year to an industrial-scale production of approximately…', options: ['10 tons/year', '100 tons/year', '1000 tons/year', '1 ton/year'], correct: 1, explanation: 'Nb3Sn production had historically been limited to a few tons per year worldwide, but ITER\'s conductor needs required scaling up to roughly 100 tons per year of industrial production, a major supply-chain achievement. (Lecture 06, Folie 30)' },
  { id: 'qz_kf_l06_36', category: 'L6 — Superconducting Magnets', question: 'The Tokamak magnet system is divided into three main subsystems: the Toroidal Field Magnet, the Poloidal Field Coils, and…', options: ['the Divertor Coils', 'the Blanket Coils', 'the Central Solenoid', 'the Cryostat Coils'], correct: 2, explanation: 'A tokamak magnet system consists of the Toroidal Field Magnet (basic confinement field), the Poloidal Field Coils (vertical stability, plasma shaping/control), and the Central Solenoid (acts as the primary transformer to induce plasma current and provide ohmic heating). (Lecture 06, Folie 35)' },
  { id: 'qz_kf_l06_37', category: 'L6 — Superconducting Magnets', question: 'The Toroidal Field (TF) Magnet in a tokamak is best described as…', options: ['a constantly energized coil providing the basic confinement field, which must withstand strong centripetal and out-of-plane forces', 'a pulsed coil that only operates briefly during plasma startup', 'the coil primarily responsible for inducing plasma current via transformer action', 'a coil used only for vertical position control of the plasma'], correct: 0, explanation: 'The TF magnet provides the basic toroidal confinement field and remains constantly energized throughout operation, unlike the pulsed Central Solenoid, and it must withstand large centripetal and out-of-plane electromagnetic forces. (Lecture 06, Folie 36)' },
  { id: 'qz_kf_l06_38', category: 'L6 — Superconducting Magnets', question: 'The Central Solenoid in a tokamak primarily functions as…', options: ['a passive structural support for the TF coils', 'the primary transformer coil that induces plasma current and provides ohmic heating', 'the source of the confinement toroidal field', 'a purely diagnostic coil with no role in plasma control'], correct: 1, explanation: 'The Central Solenoid acts as the primary transformer coil: by ramping its current, it induces the plasma current (like the secondary of a transformer) and thereby also provides ohmic heating of the plasma. (Lecture 06, Folie 36)' },
  { id: 'qz_kf_l06_39', category: 'L6 — Superconducting Magnets', question: 'The Poloidal Field (PF) Coils in a tokamak are primarily responsible for…', options: ['inducing the plasma current via transformer action', 'providing the toroidal confinement field', 'breeding tritium in the blanket', 'vertical stability, plasma shaping, and control'], correct: 3, explanation: 'The PF coils are responsible for vertical stability of the plasma column as well as shaping and controlling the plasma cross-section, complementing the TF magnet (confinement) and Central Solenoid (current drive/heating). (Lecture 06, Folie 36)' },
  { id: 'qz_kf_l06_40', category: 'L6 — Superconducting Magnets', question: 'Unlike the tokamak\'s three-subsystem magnet arrangement, the W7-X modular stellarator instead uses a coil arrangement based on…', options: ['only a Central Solenoid, with no toroidal field coils', 'non-planar coils (providing the basic confinement field) and planar coils (for plasma shaping and control)', 'a single continuous helical coil with no external supports', 'purely resistive copper coils with no cryogenic cooling'], correct: 1, explanation: 'Because a stellarator does not rely on an induced plasma current for confinement, W7-X uses non-planar coils to generate the basic 3D confinement field (constantly energized, withstanding strong 3D force fields) and planar coils for plasma shaping and control, rather than the tokamak\'s TF/PF/CS arrangement. (Lecture 06, Folie 39)' },
  { id: 'qz_kf_l06_41', category: 'L6 — Superconducting Magnets', question: 'The non-planar coils of the W7-X stellarator must be designed to withstand primarily…', options: ['only vertical gravitational loads', 'strong 3D force fields, since they are constantly energized to provide the basic confinement field', 'thermal fatigue from cyclic plasma current ramps only', 'the pressure of the vacuum vessel only'], correct: 1, explanation: 'Because the non-planar coils of a stellarator provide the basic confinement field and remain constantly energized, they must withstand strong three-dimensional electromagnetic force fields, analogous to (but more complex than) the centripetal/out-of-plane forces on a tokamak TF magnet. (Lecture 06, Folie 39)' },
  { id: 'qz_kf_l06_42', category: 'L6 — Superconducting Magnets', question: 'Among the demanding operating conditions listed for large fusion superconducting magnets, the required cryogenic temperature is on the order of…', options: ['77 K (liquid nitrogen temperature)', '4 K (about -269°C)', '20-30 K', 'room temperature, ~300 K'], correct: 1, explanation: 'Large fusion magnets such as ITER\'s must operate reliably at cryogenic temperatures around 4 K (-269°C) while sustaining high fields (up to 14 T), high mechanical loads (hundreds of MN), high vacuum, and high voltage. (Lecture 06, Folie 40)' },
  { id: 'qz_kf_l06_43', category: 'L6 — Superconducting Magnets', question: 'Large superconducting fusion magnets, as described in the lecture, must operate reliably under mechanical loads on the order of…', options: ['a few newtons', 'hundreds of micronewtons', 'hundreds of meganewtons (MN)', 'exactly zero, since superconductors are frictionless'], correct: 2, explanation: 'The magnets must withstand high mechanical loads of hundreds of MN, in addition to cryogenic temperatures (~4 K), high fields (up to 14 T), high vacuum (~10^-6 mbar), and high voltage (tens of kV), reflecting the extreme multi-physics environment of fusion magnet operation. (Lecture 06, Folie 40)' },
  { id: 'qz_kf_l06_44', category: 'L6 — Superconducting Magnets', question: 'Among the magnet design choices presented, the ITER TF coils use which conductor winding configuration?', options: ['Double layer coils, as used in W7-X', 'Double pancake coils', 'Single-layer helical winding', 'Radial plate winding with no pancakes'], correct: 1, explanation: 'The lecture lists double pancake coils (used for ITER TF) versus double layer coils (used for W7-X and HTS DEMO TF coils) as the two main conductor winding approaches, each paired with different winding-pack assembly methods. (Lecture 06, Folie 41)' },
  { id: 'qz_kf_l06_45', category: 'L6 — Superconducting Magnets', question: 'For the ITER TF coil winding pack assembly, the conductor is embedded and supported using…', options: ['radial plates', 'vacuum pressure impregnation (VPI) only', 'a cast stainless steel monolith with no plates', 'graphite tiles'], correct: 0, explanation: 'The ITER TF coils use radial plates for winding pack assembly (grooved plates machined with high precision to house the double pancake conductor), whereas an alternative approach used elsewhere is VPI (vacuum pressure impregnation). (Lecture 06, Folie 51)' },
  { id: 'qz_kf_l06_46', category: 'L6 — Superconducting Magnets', question: 'The ITER TF coil casing is manufactured from…', options: ['cast stainless steel, as used for the W7-X non-planar coils', 'forged and hot-rolled stainless steel', 'aluminum alloy AlMgSi (6063), as used for the W7-X NbTi jacket', 'pure copper'], correct: 1, explanation: 'The ITER TF coil casing uses forged and hot-rolled stainless steel fabrication, in contrast to the cast stainless steel casing used for the W7-X non-planar coils (NPC), reflecting different structural design choices for the two devices. (Lecture 06, Folie 43)' },
  { id: 'qz_kf_l06_47', category: 'L6 — Superconducting Magnets', question: 'Intercoil structures and supports in large tokamak magnet systems, such as poloidal keys and precompression rings, primarily serve to…', options: ['carry cooling helium between coils', 'transmit and react the large electromagnetic forces between coils, providing structural support', 'breed tritium near the coils', 'insulate the coils electrically from the vacuum vessel'], correct: 1, explanation: 'Poloidal keys and precompression rings are intercoil structures designed to react and distribute the enormous electromagnetic forces generated between adjacent TF coils, keeping the whole magnet assembly structurally stable during operation. (Lecture 06, Folie 41)' },
  { id: 'qz_kf_l06_48', category: 'L6 — Superconducting Magnets', question: 'In the fabrication of ITER TF coils, the double pancakes undergo a heat treatment in a large oven at approximately…', options: ['77 K, for cryogenic conditioning', '650°C, to form the Nb3Sn superconducting phase', '20°C, to cure adhesive insulation', '1500°C, to sinter the stainless steel casing'], correct: 1, explanation: 'The wound double pancakes are heat treated in a large oven (48 metres deep, per the lecture) at approximately 650°C, the reaction temperature needed to form the Nb3Sn superconducting compound, consistent with the general Nb3Sn heat treatment requirement described earlier. (Lecture 06, Folie 49)' },
  { id: 'qz_kf_l06_49', category: 'L6 — Superconducting Magnets', question: 'After heat treatment of the ITER TF double pancakes, a taping machine is used to apply…', options: ['the stainless steel jacket', 'turn insulation on the conductor', 'the liquid helium cooling channel', 'the resistive copper stabilizer'], correct: 1, explanation: 'A dedicated taping machine applies turn insulation to the heat-treated ITER TF conductor before it is placed into the radial plate grooves, since the brittle Nb3Sn phase (formed by heat treatment) must not be mechanically disturbed after reaction. (Lecture 06, Folie 50)' },
  { id: 'qz_kf_l06_50', category: 'L6 — Superconducting Magnets', question: 'Based on the wrap-up of the lecture, the most common LTS materials are Nb3Sn (up to 14 T) and NbTi (up to 7 T), while the most common HTS materials are…', options: ['MgB2 tapes', 'Bi-2212 round wire exclusively', 'Iron-based superconductors (FeSC)', 'ReBCO tapes (e.g., YBCO)'], correct: 3, explanation: 'The wrap-up summary states that the most common HTS conductors are ReBCO tapes such as YBCO, which (as detailed earlier) can be operated at 77 K with reasonable current and field performance. (Lecture 06, Folie 63)' }
],

      {
        id: 'kf7', name: 'In-Vessel Components', icon: '🛡️', color: '#ef4444', examWeight: 12,
        slideDeck: 'Folien_Kernfusion/MW1112 - Lecture 07 - In Vessel Components.pdf',
        quiz: [
{ id: 'qz_kf_l07_01', category: 'L7 — In-Vessel Components', question: 'In-Vessel Components are best defined as…', options: ['All superconducting coils surrounding the vacuum vessel', 'The external heating and fuelling systems outside the tokamak hall', 'All components located inside the vacuum vessel of a magnetic confinement fusion device', 'Only the diagnostics mounted on the cryostat'], correct: 2, explanation: 'The lecture explicitly defines In-Vessel Components as all components inside the Vacuum Vessel, including plasma facing components, thermal shields, diagnostics, and auxiliary systems such as cable/cooling networks. (Lecture 07, Folie 4)' },
{ id: 'qz_kf_l07_02', category: 'L7 — In-Vessel Components', question: 'Which two systems make up the main ITER In-Vessel Components discussed in this lecture?', options: ['The toroidal field coils and the poloidal field coils', 'The cryopumps and the glow discharge electrodes', 'The vacuum vessel and the cryostat', 'The Shielding Blanket System and the Divertor'], correct: 3, explanation: 'The lecture identifies the Shielding Blanket System and the Divertor as the two main ITER In-Vessel Components covered, each consisting of plasma facing components with armour, heat sink, and support structures. (Lecture 07, Folie 5)' },
{ id: 'qz_kf_l07_03', category: 'L7 — In-Vessel Components', question: 'The Plasma Facing Components (PFC) of a fusion reactor are structurally composed of…', options: ['Armour, heat sink, and support structures/piping', 'Superconducting cable, insulation, and cryogenic piping', 'Vacuum pumps, valves, and gauges', 'Only a single monolithic tungsten block'], correct: 0, explanation: 'The lecture states PFCs consist of an armour layer facing the plasma, a heat sink to remove the deposited power, and support structures and/or piping to carry coolant and mechanical loads. (Lecture 07, Folie 9)' },
{ id: 'qz_kf_l07_04', category: 'L7 — In-Vessel Components', question: 'In the ITER design, which armour material is used for the divertor targets, and which for the blanket first wall?', options: ['Beryllium for the divertor targets, tungsten for the first wall', 'Tungsten for the divertor targets, beryllium for the first wall', 'CFC for both the divertor and first wall', 'Stainless steel for both the divertor and first wall'], correct: 1, explanation: 'ITER pairs tungsten armour on the divertor targets, which face the most intense heat and particle fluxes, with beryllium armour on the blanket first wall, chosen for its low atomic number and benign effect on the plasma. (Lecture 07, Folie 9)' },
{ id: 'qz_kf_l07_05', category: 'L7 — In-Vessel Components', question: 'Compared with tungsten and beryllium, the main advantage of Carbon Fibre Composite (CFC) as a plasma facing armour material is…', options: ['Its very high melting point despite being a metal', 'The absence of a melting point combined with excellent thermal shock resistance', 'Its complete absence of tritium retention', 'Its very high atomic number, which shields neutrons effectively'], correct: 1, explanation: 'CFC sublimates rather than melts and has excellent thermal shock and thermal fatigue resistance, giving it the longest lifetime among armour candidates, though it suffers from dust formation and high tritium retention. (Lecture 07, Folie 13)' },
{ id: 'qz_kf_l07_06', category: 'L7 — In-Vessel Components', question: 'A key disadvantage of tungsten as an armour material, according to the comparison table, is…', options: ['High chemical sputtering yield', 'Low melting point', 'High tritium retention', 'Concerns over ductility'], correct: 3, explanation: 'While tungsten offers the lowest sputtering yield, the highest melting point, and no tritium inventory concerns, its ductility (brittleness, especially after neutron irradiation) is listed as a disadvantage. (Lecture 07, Folie 13)' },
{ id: 'qz_kf_l07_07', category: 'L7 — In-Vessel Components', question: 'Beryllium is favoured for the ITER first wall armour mainly because…', options: ['It has the highest melting point of all candidate materials', 'It has the highest thermal conductivity of all candidate armour materials', 'It gives the lowest effective plasma charge (Zeff) and best plasma performance', 'It is immune to sputtering erosion'], correct: 2, explanation: 'Beryllium\'s low atomic number minimizes the effective charge Zeff introduced into the plasma if eroded, limiting radiative (bremsstrahlung) losses and fuel dilution, which is why ITER selected it for the first wall despite its relatively low melting point. (Lecture 07, Folie 14)' },
{ id: 'qz_kf_l07_08', category: 'L7 — In-Vessel Components', question: 'The copper alloy CuCrZr is chosen as the standard heat sink material for plasma facing components primarily because it…', options: ['Has the lowest atomic number among all metals', 'Is immune to activation under neutron irradiation', 'Has a lower thermal conductivity than stainless steel, reducing heat sink cost', 'Combines high thermal conductivity with good mechanical strength at high temperature without ductility problems'], correct: 3, explanation: 'CuCrZr retains high thermal conductivity together with good high-temperature mechanical strength, avoiding the ductility issues of alternatives, which is why it is the preferred heat sink material joined to the armour and to stainless steel support structures. (Lecture 07, Folie 15)' },
{ id: 'qz_kf_l07_09', category: 'L7 — In-Vessel Components', question: 'CuCrZr reaches its optimum strength through a thermo-mechanical treatment that includes, in order…', options: ['Cold rolling, then annealing, then quenching', 'Only a single ageing step at room temperature', 'Melting, casting, and immediate machining with no heat treatment', 'Solution annealing at high temperature, water quench, then an ageing treatment at intermediate temperature'], correct: 3, explanation: 'The lecture describes precipitation hardening of CuCrZr: solution annealing above 980 C dissolves Cr and Zr, a water quench retains them in supersaturated solid solution, and a subsequent ageing treatment (e.g. 475 C, 3 h) precipitates a fine, strengthening distribution. (Lecture 07, Folie 15)' },
{ id: 'qz_kf_l07_10', category: 'L7 — In-Vessel Components', question: 'If a CuCrZr heat sink component experiences a thermal excursion above its ageing temperature, the main risk is…', options: ['Immediate superconducting transition', 'Instantaneous melting of the copper alloy', 'Over-ageing, causing a significant decrease in strength and reduced thermal conductivity', 'A large increase in beryllium retention'], correct: 2, explanation: 'Excursions above the ageing temperature can over-age the CuCrZr precipitates, coarsening or dissolving them, which significantly reduces both mechanical strength and thermal conductivity — a critical concern given CuCrZr\'s role in heat removal. (Lecture 07, Folie 15)' },
{ id: 'qz_kf_l07_11', category: 'L7 — In-Vessel Components', question: 'The special ITER-grade stainless steel 316L(N)-IG differs from standard 316L mainly by…', options: ['Having zero chromium content', 'Being a purely ferritic (non-austenitic) steel', 'A controlled increase in nitrogen content for strength and a low cobalt content to reduce activation', 'Containing no carbon at all'], correct: 2, explanation: 'The IG (ITER Grade) variant keeps cobalt low to limit activation under neutron irradiation, while a controlled nitrogen addition increases strength (via interstitial solid-solution strengthening) without impairing weldability. (Lecture 07, Folie 17)' },
{ id: 'qz_kf_l07_12', category: 'L7 — In-Vessel Components', question: 'Low carbon content is specified for austenitic stainless steels used in fusion structures mainly to…', options: ['Increase the melting point of the steel', 'Improve neutron multiplication', 'Avoid corrosion problems from chromium carbide precipitation at grain boundaries during welding (sensitization)', 'Reduce the material cost significantly'], correct: 2, explanation: 'At the high temperatures reached during welding, carbon can combine with chromium to precipitate carbides at grain boundaries, depleting nearby chromium and causing embrittlement and corrosion susceptibility (sensitization); low carbon content mitigates this. (Lecture 07, Folie 17)' },
{ id: 'qz_kf_l07_13', category: 'L7 — In-Vessel Components', question: 'Unlike in low-alloy steels, where nitrogen is an undesirable embrittling impurity, nitrogen in high-alloy austenitic stainless steels…', options: ['Still causes embrittlement and must be kept below 10 ppm', 'Stabilizes the austenite phase and increases strength via interstitial solid-solution strengthening', 'Has no measurable effect on mechanical properties', 'Only affects the electrical resistivity of the steel'], correct: 1, explanation: 'In austenitic stainless steels, nitrogen (introduced up to about 0.5%) occupies interstitial lattice sites, stabilizing austenite and enhancing hardness, yield and tensile strength, wear and fatigue resistance, and pitting corrosion resistance. (Lecture 07, Folie 18)' },
{ id: 'qz_kf_l07_14', category: 'L7 — In-Vessel Components', question: 'TZM, considered as an alternative heat sink material, is an alloy of…', options: ['Titanium-Zirconium-Molybdenum', 'Tungsten-Zinc-Manganese', 'Tantalum-Zirconium-Magnesium', 'Titanium-Zinc-Molybdenum'], correct: 0, explanation: 'TZM is a precipitation-hardened Titanium-Zirconium-Molybdenum alloy whose thermal expansion coefficient closely matches CFC and tungsten, though its high ductile-to-brittle transition temperature (DBTT) and difficult manufacturing are drawbacks. (Lecture 07, Folie 19)' },
{ id: 'qz_kf_l07_15', category: 'L7 — In-Vessel Components', question: 'The beryllium-to-copper alloy joint used in blanket first wall panels is particularly prone to…', options: ['Formation of brittle intermetallics (e.g. BeCu or Be2Cu) above about 600 C', 'Superconducting quench at the joint interface', 'Excessive neutron multiplication at the interface', 'Spontaneous detachment at room temperature due to magnetic forces'], correct: 0, explanation: 'Above roughly 600 C, brittle Be-Cu intermetallic compounds form at the joint, which is why diffusion barriers (e.g. titanium), fast brazing, or copper electroplating plus HIP are used to avoid or limit this reaction. (Lecture 07, Folie 21)' },
{ id: 'qz_kf_l07_16', category: 'L7 — In-Vessel Components', question: 'A major manufacturing challenge in joining CFC to copper alloy heat sinks is…', options: ['CFC has no measurable thermal conductivity', 'Copper reacts explosively with carbon at room temperature', 'CFC cannot withstand any neutron flux at all', 'A large thermal expansion mismatch and very poor wetting of molten copper on carbon (high contact angle, ~140°)'], correct: 3, explanation: 'The CFC-copper joint must cope with a large coefficient-of-thermal-expansion mismatch and with molten copper\'s poor wetting of carbon surfaces (contact angle around 140°), which prevents direct casting and requires surface activation techniques. (Lecture 07, Folie 22)' },
{ id: 'qz_kf_l07_17', category: 'L7 — In-Vessel Components', question: 'To mitigate high interface stresses from thermal expansion mismatch between CFC and CuCrZr, engineers insert…', options: ['A thick tungsten block between the two materials', 'A vacuum gap to thermally isolate the two materials', 'A thin (1-2 mm) soft pure copper interlayer between the CFC and the CuCrZr', 'An additional layer of beryllium'], correct: 2, explanation: 'A thin, soft pure-copper interlayer accommodates the differential thermal expansion between CFC and CuCrZr, reducing stress concentrations at the joint interface. (Lecture 07, Folie 23)' },
{ id: 'qz_kf_l07_18', category: 'L7 — In-Vessel Components', question: 'The Hot Isostatic Pressing (HIP) process used to join plasma facing component layers works by…', options: ['Applying pressure only from one direction while cooling the part', 'Immersing the component in liquid nitrogen under vacuum', 'Subjecting the component to simultaneous elevated temperature and isostatic gas pressure (typically inert argon) inside a sealed containment ("can")', 'Applying an electric current through the joint to weld it locally'], correct: 2, explanation: 'HIP applies heat and gas pressure (commonly inert argon, so no chemical reaction occurs) from all directions simultaneously inside a "can," which eliminates internal voids and achieves diffusion bonding — used e.g. to join tungsten monoblocks to CuCrZr. (Lecture 07, Folie 25)' },
{ id: 'qz_kf_l07_19', category: 'L7 — In-Vessel Components', question: 'The primary function of the ITER Shielding Blanket System (SBS) is to…', options: ['Generate the toroidal magnetic field', 'Breed tritium for the entire fuel cycle', 'Provide thermal and nuclear shielding to the vacuum vessel, magnets and external components while minimizing plasma impurities', 'Induce the plasma current like a transformer'], correct: 2, explanation: 'The SBS surrounds most of the plasma surface and its basic functions are to shield the vacuum vessel, magnets and external components from thermal and nuclear loads, to minimize impurity content in the plasma, and to withstand electromagnetic forces during instabilities. (Lecture 07, Folie 28)' },
{ id: 'qz_kf_l07_20', category: 'L7 — In-Vessel Components', question: 'The modular design of the ITER Shielding Blanket System is chosen primarily to allow…', options: ['A single monolithic structure with no joints for maximum strength', 'Direct human access for manual replacement', 'Independent maintenance of individual modules through equatorial ports using in-vessel remote handling equipment', 'Elimination of any cooling water requirement'], correct: 2, explanation: 'Modularity enables individual blanket modules (limited to about 4.5 t due to remote-handling capacity) to be replaced independently through the equatorial ports without requiring full disassembly of the machine. (Lecture 07, Folie 30)' },
{ id: 'qz_kf_l07_21', category: 'L7 — In-Vessel Components', question: 'Within the ITER Shielding Blanket System, "Special Shielding Blanket Modules" are distinguished from Primary Shielding Blanket Modules because they…', options: ['Contain no first wall panels at all', 'Are made entirely of tungsten instead of beryllium', 'Are located exclusively at the divertor region', 'Require a modified design due to special positions (e.g. near NBI or upper ports) or special requirements such as high heat flux or neutral beam shine-through'], correct: 3, explanation: 'While Primary SBMs share a similar standard design around most of the plasma, Special SBMs must be adapted for unusual locations (e.g. near NBI ports) or unusual loading conditions (e.g. neutral beam shine-through or elevated local heat flux). (Lecture 07, Folie 31)' },
{ id: 'qz_kf_l07_22', category: 'L7 — In-Vessel Components', question: 'Among the 18 ITER equatorial ports, the lower ports are primarily dedicated to…', options: ['Water supply and diagnostics', 'Neutral beam injection only', 'Pumping and divertor cassette maintenance', 'Test breeding blanket modules only'], correct: 2, explanation: 'The lecture specifies that lower ports serve pumping and divertor cassette maintenance, while upper ports handle water supply and diagnostics, and equatorial ports host NBI, RF/microwave heating, remote handling, diagnostics, and test blanket modules. (Lecture 07, Folie 31)' },
{ id: 'qz_kf_l07_23', category: 'L7 — In-Vessel Components', question: 'Off-normal heat loads on the Shielding Blanket System, such as those from plasma disruptions or Vertical Displacement Events, can deposit…', options: ['A negligible amount of energy compared to steady-state heat flux', 'Up to some tens of MJ/m2 into the PFCs within a fraction of a second, risking melting or evaporation', 'Only thermal energy over several hours', 'Exclusively electromagnetic energy with no thermal component'], correct: 1, explanation: 'Disruptions and VDEs can dump tens of MJ/m2 into plasma facing components within a fraction of a second, which can melt or evaporate the armour material — about 10% of ITER discharges are expected to end in disruptions, a fraction meant to drop below 1% in a commercial reactor. (Lecture 07, Folie 32)' },
{ id: 'qz_kf_l07_24', category: 'L7 — In-Vessel Components', question: 'Surface erosion (sputtering) of plasma facing components is a serious concern mainly because eroded particles can…', options: ['Instantly quench the superconducting magnets', 'Increase the plasma effective charge (Zeff), raise bremsstrahlung losses, dilute the fuel, and via codeposition trap tritium in redeposited material', 'Reduce the neutron wall loading to zero', 'Increase the plasma current beyond design limits'], correct: 1, explanation: 'Sputtered impurities migrating into the plasma raise Zeff and radiative losses while diluting D-T fuel; when eroded carbon or beryllium compounds redeposit, they can trap tritium ("codeposition"), increasing the in-vessel tritium inventory and raising safety concerns. (Lecture 07, Folie 33)' },
{ id: 'qz_kf_l07_25', category: 'L7 — In-Vessel Components', question: 'The ITER Blanket Modules are attached to their supports using a mechanical bolted system mainly to…', options: ['Ensure the module can never be removed once installed', 'Eliminate the need for any electrical continuity across the joint', 'Reduce the total mass of each module below 1 ton', 'Permit initial assembly and module replacement without thick-wall welding, cutting, or inspection'], correct: 3, explanation: 'A mechanical (bolted) attachment, using high-strength Inconel 718 bolts, allows blanket modules to be installed and replaced without the thick-wall welding/cutting/inspection that a fully welded design would require, while bolted electrical straps also carry halo currents safely out of the module. (Lecture 07, Folie 34)' },
{ id: 'qz_kf_l07_26', category: 'L7 — In-Vessel Components', question: 'The ITER first wall is designed to withstand a steady-state heat flux of up to…', options: ['0.5 MW/m2, comparable to household heating systems', '50 MW/m2, exceeding solar core heat fluxes', '500 MW/m2, comparable to a laser fusion target', '5 MW/m2, about 10 times higher than the heat flux on space shuttle carbon tiles during re-entry'], correct: 3, explanation: 'The lecture gives a design value of up to 5 MW/m2 for the ITER first wall, noting this is roughly ten times higher than the heat flux experienced by space shuttle carbon tiles during atmospheric re-entry — illustrating the severity of the thermal environment. (Lecture 07, Folie 38)' },
{ id: 'qz_kf_l07_27', category: 'L7 — In-Vessel Components', question: 'The primary function of the ITER divertor is to…', options: ['Extract heat and ash (helium) produced by fusion reactions, minimize plasma contamination, and protect surrounding walls', 'Generate the plasma current via transformer action', 'Breed tritium directly within the plasma volume', 'Provide the main toroidal magnetic field'], correct: 0, explanation: 'Located at the bottom of the vacuum vessel, the divertor removes power and helium ash exhaust from the plasma edge, limits impurity contamination of the core plasma, and shields the surrounding vessel walls from thermal and neutronic loads. (Lecture 07, Folie 43)' },
{ id: 'qz_kf_l07_28', category: 'L7 — In-Vessel Components', question: 'Each ITER divertor cassette assembly includes three main plasma-facing components:', options: ['Inner vertical target, outer vertical target, and the dome', 'First wall panel, shield block, and port plug', 'CuCrZr heat sink, TZM support, and cryopump', 'Toroidal field coil, poloidal field coil, and central solenoid'], correct: 0, explanation: 'The 54 ITER divertor cassette assemblies each combine a stainless-steel supporting structure with three PFCs — inner vertical target, outer vertical target, and dome — plus diagnostic components for plasma control. (Lecture 07, Folie 43)' },
{ id: 'qz_kf_l07_29', category: 'L7 — In-Vessel Components', question: 'The ITER divertor vertical targets must sustain a steady-state heat flux of about…', options: ['1 MW/m2, with 2 MW/m2 during slow transients', '100 MW/m2 continuously', '0.1 MW/m2, negligible compared to the first wall', '10 MW/m2, rising to 20 MW/m2 during slow transients'], correct: 3, explanation: 'The lecture states the ITER divertor vertical targets are estimated to sustain about 10 MW/m2 in steady state and up to 20 MW/m2 during slow transients — several times higher than the 5 MW/m2 design value for the first wall, reflecting the intense particle bombardment at the strike points. (Lecture 07, Folie 44)' },
{ id: 'qz_kf_l07_30', category: 'L7 — In-Vessel Components', question: 'Tungsten was selected as the ITER divertor target armour material largely because it has…', options: ['The lowest density of all candidate metals', 'The highest melting point of all metals, combined with favorable R&D and prototype test results', 'The lowest thermal conductivity, reducing heat sink loads', 'No compatibility with water cooling systems'], correct: 1, explanation: 'Tungsten\'s exceptionally high melting point makes it best suited to survive the intense, concentrated heat fluxes at the divertor strike points; this was confirmed by an international R&D effort and successful prototype high-heat-flux testing. (Lecture 07, Folie 44)' },
{ id: 'qz_kf_l07_31', category: 'L7 — In-Vessel Components', question: 'The private flux region below the separatrix X-point, home to the divertor dome, is characterized by…', options: ['Direct magnetic field line connection to the core plasma', 'The absence of flux line connections to the main plasma, with the dome mainly exposed to radiation and charge-exchange (CX) neutrals', 'The strongest toroidal magnetic field in the entire device', 'Zero particle or heat flux, making it a purely structural region'], correct: 1, explanation: 'The private flux region has no field-line connection to the core plasma; the dome located there sees mainly radiation and charge-exchange neutrals, and works together with the reflector plates to baffle neutrals and enhance partial plasma detachment, reducing peak heat flux. (Lecture 07, Folie 55)' },
{ id: 'qz_kf_l07_32', category: 'L7 — In-Vessel Components', question: 'The inner and outer neutral particle reflector plates, forming a "V" shape with the lower vertical targets, mainly serve to…', options: ['Confine particles within the divertor channels, enhancing partial plasma detachment and reducing peak heat flux on the plates', 'Amplify the peak heat flux at the strike point', 'Generate the poloidal magnetic field', 'Breed tritium from the incoming neutron flux'], correct: 0, explanation: 'By confining particles within the divertor channel geometry, the "V" shaped reflector arrangement promotes partial plasma detachment from the target surface, spreading and reducing the peak heat flux reaching the plasma facing components. (Lecture 07, Folie 55)' },
{ id: 'qz_kf_l07_33', category: 'L7 — In-Vessel Components', question: 'ITER divertor plasma facing components are designed to withstand approximately…', options: ['3000 equivalent pulses of 400 s duration, including 300 slow transients', '30 equivalent pulses of 4000 s duration', '300,000 equivalent pulses of 4 s duration', '3 equivalent pulses of 400,000 s duration'], correct: 0, explanation: 'The lecture gives a design lifetime specification of 3000 equivalent pulses of 400 s duration at nominal parameters for the ITER divertor PFCs, of which 300 are slow-transient pulses with elevated heat flux. (Lecture 07, Folie 57)' },
{ id: 'qz_kf_l07_34', category: 'L7 — In-Vessel Components', question: 'Precise alignment between divertor target plates is critical mainly to avoid…', options: ['Leading edges, where particles strike at large angles causing melting, evaporation, or critical heat flux in the nearest cooling tube', 'Excessive tritium breeding at the joints', 'Loss of the toroidal magnetic field at the plate edges', 'Reduced electrical conductivity between adjacent cassettes'], correct: 0, explanation: 'A misalignment creates a leading edge exposed to plasma particles at a grazing/large angle, concentrating heat flux to the point of causing melting, heavy evaporation (especially for CFC), or exceeding the critical heat flux in the underlying cooling tube. (Lecture 07, Folie 58)' },
{ id: 'qz_kf_l07_35', category: 'L7 — In-Vessel Components', question: 'A specialized Non-Destructive Examination (NDE) technique developed to assess bonding quality in divertor high heat flux components before installation is…', options: ['X-ray diffraction', 'Infrared Thermography', 'Optical microscopy only', 'Magnetic particle inspection'], correct: 1, explanation: 'Because divertor high heat flux elements combine many tiles bonded to a dissimilar heat sink material, Infrared Thermography was developed as a specialized NDE method to detect bonding defects, complementing (and being more reliable than) ultrasonic examination. (Lecture 07, Folie 58)' },
{ id: 'qz_kf_l07_36', category: 'L7 — In-Vessel Components', question: 'In divertor target cooling channels, swirl tapes are inserted mainly to…', options: ['Reduce the coolant flow rate to save pumping power', 'Act as turbulence promoters that enhance convective heat transfer and drag vapour bubbles away from the heated wall', 'Insulate the tube from the coolant to reduce heat transfer', 'Increase the neutron shielding of the cooling channel'], correct: 1, explanation: 'Swirl tapes increase flow turbulence, enhancing convective heat exchange, and are particularly effective at dragging vapour bubbles generated on the heated side (one-side heating) away from the wall so they condense in the colder bulk coolant, improving the critical heat flux margin. (Lecture 07, Folie 61)' },
{ id: 'qz_kf_l07_37', category: 'L7 — In-Vessel Components', question: 'To assure sufficient safety margin in divertor cooling, thermal-hydraulic design must avoid exceeding the…', options: ['Debye length in the coolant channel', 'Critical Heat Flux (CHF), which would otherwise cause tube burn-out', 'Curie temperature of the CuCrZr heat sink', 'Larmor radius of the coolant molecules'], correct: 1, explanation: 'Exceeding the Critical Heat Flux causes a transition to film boiling with drastically reduced heat transfer, which can burn out the cooling tube; divertor thermal-hydraulic design therefore keeps an adequate margin below CHF using highly subcooled water and turbulence promoters. (Lecture 07, Folie 60)' },
{ id: 'qz_kf_l07_38', category: 'L7 — In-Vessel Components', question: 'Empirical correlations used in divertor thermal-hydraulic design include the Dittus-Boelter or Gnielinski correlations, which are applied to describe…', options: ['Forced convection heat transfer in tubes without a turbulence promoter', 'Neutron multiplication in the shielding blanket', 'Tritium permeation through the first wall', 'Magnetic field ripple in the toroidal field coils'], correct: 0, explanation: 'The lecture lists Gnielinski/Dittus-Boelter as the correlations used for forced convection in tubes with no turbulence promoter, while the Gambill correction factor is applied when swirl tapes are present, and other correlations (Bergles-Rohsenow, Thom, Tong 75) cover boiling regimes and critical heat flux. (Lecture 07, Folie 62)' },
{ id: 'qz_kf_l07_39', category: 'L7 — In-Vessel Components', question: 'According to the lecture wrap-up, the choice of plasma facing armour material is primarily driven by the need for…', options: ['Low impurity deposition in the plasma, requiring either low atomic number (Z) or high resilience to particle and heat fluxes', 'The lowest possible manufacturing cost regardless of plasma performance', 'Maximum neutron multiplication at the plasma boundary', 'Compatibility exclusively with helium cooling'], correct: 0, explanation: 'The wrap-up summarizes that armour material selection balances low-Z materials (like beryllium), which minimize plasma contamination if eroded, against materials highly resilient to particle and heat loads (like tungsten), which erode less in the first place. (Lecture 07, Folie 68)' },
