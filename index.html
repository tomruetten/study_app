      {
        id: 'p6',
        name: 'Reinforcement Learning',
        icon: '🎮',
        color: '#ef4444',
        examWeight: 24,

        guided: [
          { id: 'g_p6_1', badge: 'Foundations', title: 'MDP & the Agent-Environment Interaction Loop', body: 'Humans/animals learn from interaction with the environment without examples; the learning is goal-directed (e.g. a new-born gazelle learns to run within 30 minutes). RL is one of three ML paradigms:\n• Supervised: learn a mapping input→output from explicit teacher instructions.\n• Unsupervised: learn statistical regularities in the input data.\n• Reinforcement: learn which action to choose in order to maximize an external reward signal through interaction with the environment.\n\nA Markov Process ⟨S, P⟩ is a sequence of states where the Markov property holds: the next state depends ONLY on the current state, not on the full history.\n\nA Markov Decision Process (MDP) ⟨S, A, P, R, γ⟩ extends this: actions steer states (and rewards). S = finite set of states, A = finite set of actions, P = state transition probability matrix, R = reward function, γ = discount factor.', example: '🔑 Markov property = memoryless: P[S_{t+1}|S_t] = P[S_{t+1}|S_1,…,S_t]. Cart-Pole is the lecture\'s MDP example: states = position/angle, actions = ±1 force, reward = +1/step, terminal = pole falls or cart leaves the track.' },
          { id: 'g_p6_2', badge: 'Core Concepts', title: 'Reward Hypothesis, Return, Policy & Value Functions', body: 'Reward Hypothesis: all goals/purposes can be thought of as maximizing the expected value of the cumulative sum of a received scalar reward signal.\n\nReturn G_t (simplest form): sum of all future rewards. For continuing (non-episodic) tasks this sum can be infinite — solved by discounting:\nG_t = R_{t+1} + γR_{t+2} + γ²R_{t+3} + …\nAs γ→0 the agent becomes shortsighted (only immediate reward matters); as γ→1 it becomes farsighted.\n\nPolicy: deterministic a=π(s) (e.g. Greedy) or stochastic π(a|s) = P[A_t=a | S_t=s] (e.g. ε-greedy) — a strategy mapping states to actions/action-probabilities.\n\nState-value function: v_π(s) = E_π[G_t | S_t=s]\nAction-value function: q_π(s,a) = E_π[G_t | S_t=s, A_t=a]', example: '🔑 Know BOTH value-function formulas cold, AND the discounting argument: why the plain sum of future rewards is undefined for continuing tasks, and how γ trades off short- vs farsightedness — both have appeared as full exam questions.' },
          { id: 'g_p6_3', badge: 'Bellman Eq.', title: 'Bellman Equations & Optimality', body: 'An important property of value functions is the recursive relationship between consecutive states. Bellman equation for v_π (holds for all s ∈ S, independent of policy/state):\nv_π(s) = Σ_a π(a|s) Σ_{s\',r} p(s\',r|s,a)[r + γv_π(s\')]\n\nBellman equation for q_π:\nq_π(s,a) = Σ_{s\',r} p(s\',r|s,a)[r + γ Σ_{a\'} π(a\'|s\')q_π(s\',a\')]\n\nBellman OPTIMALITY equations replace the policy-weighted sum Σ_a π(a|s)(…) with a max_a(…):\nv*(s) = max_a Σ_{s\',r} p(s\',r|s,a)[r + γv*(s\')]\nq*(s,a) = Σ_{s\',r} p(s\',r|s,a)[r + γ max_{a\'} q*(s\',a\')]\n\nA "backup diagram" visualizes which states/actions are looked ahead to compute an update. Algorithms that solve the optimality equations: Value Iteration (DP), Q-Learning (TD).', example: '🔑 Exam: draw/derive the backup diagram for q_π given v_π, and name ONE algorithm that solves the Bellman optimality equation (DP→Value Iteration, TD→Q-Learning — naming just "DP" or "TD" is also accepted).' },
          { id: 'g_p6_4', badge: 'GPI', title: 'Generalized Policy Iteration & the Conditioning Link', body: 'A value function depends on the policy; the policy depends on the value function — so we iteratively alternate:\n1. Policy Evaluation = PREDICTION: find v_π for the current policy π.\n2. Policy Improvement: update π greedily based on v_π. Evaluation + Improvement together = CONTROL.\n\nDirect link the lecture draws to learning psychology: Prediction ↔ CLASSICAL conditioning. Control ↔ OPERANT/instrumental conditioning — and under operant conditioning a policy itself can be interpreted as the stimulus-response relationship.\n\nExploration problem: a non-exploratory (always-greedy) policy may converge to a sub-optimal solution, since not all state-action pairs are guaranteed to be visited. ε-greedy fixes this by keeping a non-zero probability for every action:\nπ(a*|s) = 1 − ε + ε/|A|  (the greedy/optimal action)\nπ(a≠a*|s) = ε/|A|  (every other action)', example: '🔑 Exam fill-in-the-blank: "___ conditioning is the corresponding learning process for prediction, while ___ conditioning is the corresponding learning process for control." → Classical / Operant. Also: ε-greedy is STOCHASTIC, Greedy is DETERMINISTIC.' },
          { id: 'g_p6_5', badge: 'Dynamic Programming', title: 'DP: Policy Evaluation, Policy & Value Iteration', body: 'Dynamic Programming assumes the MDP (S, A, P, R) is fully KNOWN.\n\nDP Prediction (Policy Evaluation): iteratively sweep over all states, updating v(s) with the Bellman equation for the current π. Propagating values between consecutive states by exploiting this recursive Bellman relationship is called BOOTSTRAPPING (no environment interaction needed — it only requires the known model).\n\nDP Control — improve the policy by greedily acting on v. Two ways to combine evaluation + improvement (both = GPI):\n• Policy Iteration: an EXHAUSTIVE evaluation sweep (repeat until v converges), then a greedy improvement step — repeat until the policy is stable.\n• Value Iteration: a single combined evaluation+improvement update per sweep (no exhaustive evaluation); converges to v*, and the greedy policy is extracted only at the end.', example: '🔑 Policy Iteration = full evaluation each round, then improve. Value Iteration = one combined update per round. Both require a known model — that\'s what makes them "Dynamic Programming" and not Monte Carlo / TD.' },
          { id: 'g_p6_6', badge: 'Monte Carlo', title: 'Monte Carlo: Prediction & Control', body: 'In practice the MDP is usually UNKNOWN. Monte Carlo (MC) methods don\'t require knowledge of the MDP — they learn from sampled, complete state trajectories.\n\nMC Prediction: the return is computed for all states visited in a sampled trajectory; the value function is the AVERAGE of the experienced returns for each state (first-visit MC: only the first occurrence of a state per episode counts; can be computed incrementally).\n\nMC Control: without a model, state-values alone don\'t determine a policy — MC instead estimates ACTION-values q(s,a), updating value and policy after every sampled episode.\n• Exploring Starts: every state-action pair is guaranteed a non-zero chance of being the episode\'s start (needed because a deterministic π may otherwise never visit some pairs).\n• Without Exploring Starts: use an ε-greedy policy instead to keep exploring all actions.', example: '🔑 MC never bootstraps — it must wait for the full episode to terminate before it can update, unlike DP/TD which update from estimates mid-episode.' },
          { id: 'g_p6_7', badge: 'Algorithms', title: 'Temporal Difference: On-policy vs Off-policy, SARSA vs Q-Learning', body: 'TD is a mixture of DP and MC: it SAMPLES (like MC) AND BOOTSTRAPS (like DP). TD(0) / 1-step TD prediction updates v(s) after every single time step using the Bellman equation with the sampled next reward+state — no need to wait for the episode to end.\n\nTarget policy π(a|s): the policy whose value is being estimated/improved.\nBehavior policy b(a|s): the policy actually used to sample actions from the environment.\nOn-policy: behavior = target (e.g. SARSA). Off-policy: behavior ≠ target (e.g. Q-Learning). Validity condition for off-policy: π(a|s) > 0 wherever b(a|s) > 0 (coverage).\n\nSARSA (on-policy TD control): target = r + γ·Q(s\',a\') — uses the ACTUAL next action taken.\nQ-Learning (off-policy TD control): target = r + γ·max_a Q(s\',a) — uses the MAXIMUM over next actions.\nThe exam shows Python code — you identify which one from how next_action is obtained.', example: '🔑 Code uses next_action (passed in/sampled) → SARSA. Code uses max/argmax over next-state Q-values → Q-Learning. Off-policy\'s advantage: separates the optimal target policy from the exploratory behavior policy, handling exploration better than on-policy (which only learns a near-optimal, still-exploring policy).' },
          { id: 'g_p6_8', badge: 'Comparison', title: 'Cliff Walking, n-step Bootstrapping & DP/MC/TD Comparison', body: 'Cliff Walking example: Q-learning (off-policy) learns values for the OPTIMAL path, but online performance suffers because ε-greedy exploration occasionally drops it over the cliff. SARSA (on-policy) factors its own exploratory action selection into the update, so it learns a longer but SAFER path → SARSA achieves higher online performance than Q-learning here.\n\nn-step Bootstrapping unifies TD and MC: an n-step TD algorithm waits for n samples before bootstrapping.\nn = 1 → (1-step) TD.  n = ∞ (full episode) → Monte Carlo.\n\nKey ideas all three paradigms share: (1) estimate value functions, (2) back up value updates, (3) Generalized Policy Iteration. They differ in DEPTH (steps before backing up: DP=1, TD=1, MC=full episode) and WIDTH (sample vs. full-expectation backups: DP uses the full model expectation, MC and TD sample).', example: '🔑 Bootstrapping ≠ sampling! DP bootstraps but does NOT sample (uses the full expectation over the known model). MC samples but does NOT bootstrap. TD does BOTH — exactly why it\'s "a mixture of DP and MC."' },
          { id: 'g_p6_9', badge: 'Approximate RL', title: 'Approximate RL: Deep Q-Networks', body: 'For large/continuous state spaces, the Q-table is replaced by a function approximator — a neural network (DQN) trained via SGD for semi-gradient Q-evaluation. Input: state S_t (e.g. camera signal, joint angle/speed). Output: one Q-value per possible action — the network generalizes states using a non-linear function approximator (NN).\n\nThis design (state-only input, one Q-value PER ACTION as a vector output) generalizes ONLY on states, not on actions — a SINGLE forward pass at every time step is enough to obtain all action-values and pick max_a Q(s,a). (The alternative, a network taking state+action jointly as input, would instead need |A| separate forward passes per time step.)\n\nThe output layer uses a LINEAR activation function: Q-value estimation is a REGRESSION problem (the target can be any real value), not a classification problem, so linear (not e.g. softmax/sigmoid) output is appropriate.', example: '🔑 Examiners ask these separately: (1) which architecture — state-only input, vector of Q-values output (2) generalizes on states only (3) needs only ONE forward pass per time step to find max_a Q(s,a) (4) WHY linear output — regression, not classification.' },
          { id: 'g_p6_10', badge: 'Conditioning', title: 'Classical vs Operant Conditioning', body: 'Classical and operant conditioning are two basic ASSOCIATIVE learning processes that link sensory stimuli to corresponding actions; both are common across vertebrate animals.\n\nClassical conditioning: a subject learns the relationship between an initially neutral conditioned stimulus (CS) and an unconditioned stimulus (US) that reflexively produces a conditioned response (CR). After the CS and US are repeatedly presented together, the CS alone eventually produces the CR (Pavlov\'s dog).\n\nOperant/instrumental conditioning: a subject learns the relationship between a STIMULUS and its OWN BEHAVIOUR. A stimulus (reinforcer) is presented only in response to a certain action and increases or decreases the probability of that action recurring (reward/punishment).\n\nLink to GPI: Classical conditioning ↔ Prediction (policy evaluation). Operant conditioning ↔ Control (evaluation + improvement); a policy can be interpreted as the operant stimulus-response relationship.', example: '🔑 Classical = stimulus↔stimulus association, passive/reflexive (CS+US→CR). Operant = behaviour↔consequence association, active (reward/punishment shapes future action probability) — exactly the reward signal\'s role in RL.' },
        ],

        flashcards: [
          { id: 'fc_p6_1',  front: 'What are the 5 components of an MDP ⟨S,A,P,R,γ⟩?',                                back: 'S = finite set of states, A = finite set of actions, P = state transition probability matrix, R = reward function, γ = discount factor.' },
          { id: 'fc_p6_2',  front: 'State the Markov property.',                                                    back: 'The probability of the next state depends only on the current state, not on the full history: P[S_{t+1}|S_t] = P[S_{t+1}|S_1,…,S_t].' },
          { id: 'fc_p6_3',  front: 'Briefly define supervised, unsupervised and reinforcement learning.',           back: 'Supervised: learn input→output mapping from explicit teacher instructions.\nUnsupervised: learn statistical regularities in input data.\nReinforcement: learn which action to choose to maximize an external reward via environment interaction.' },
          { id: 'fc_p6_4',  front: 'State the Reward Hypothesis.',                                                  back: 'All goals/purposes can be thought of as the maximization of the expected value of the cumulative sum of a received scalar signal (the reward).' },
          { id: 'fc_p6_5',  front: 'Why is the plain (undiscounted) sum of future rewards problematic for continuing tasks, and how does discounting fix it?', back: 'For continuing tasks T=∞, so the undiscounted return could be infinite. Discounting (γ<1): G_t = R_{t+1}+γR_{t+2}+γ²R_{t+3}+… keeps it finite; γ→0 = shortsighted, γ→1 = farsighted.' },
          { id: 'fc_p6_6',  front: 'Deterministic vs stochastic policy — give the formula and one example of each.',  back: 'Deterministic: a = π(s), e.g. Greedy.\nStochastic: π(a|s) = P[A_t=a | S_t=s], e.g. ε-greedy.' },
          { id: 'fc_p6_7',  front: 'Write the state-value and action-value function formulas.',                    back: 'v_π(s) = E_π[G_t | S_t=s]\nq_π(s,a) = E_π[G_t | S_t=s, A_t=a]' },
          { id: 'fc_p6_8',  front: 'Write the Bellman equation for v_π(s).',                                        back: 'v_π(s) = Σ_a π(a|s) Σ_{s\',r} p(s\',r|s,a)[r + γv_π(s\')]' },
          { id: 'fc_p6_9',  front: 'Write the Bellman optimality equation for v*(s).',                              back: 'v*(s) = max_a Σ_{s\',r} p(s\',r|s,a)[r + γv*(s\')]' },
          { id: 'fc_p6_10', front: 'Name one algorithm that solves the Bellman optimality equation for DP, and one for TD.', back: 'DP → Value Iteration.\nTD → Q-Learning.' },
          { id: 'fc_p6_11', front: 'Describe Generalized Policy Iteration (GPI) and its 2 steps.',                 back: 'Iterative alternation: 1. Policy Evaluation (Prediction): find v_π for current π. 2. Policy Improvement: update π greedily from v_π.' },
          { id: 'fc_p6_12', front: '"___ conditioning is the learning process for prediction, ___ conditioning is the learning process for control." Fill the blanks.', back: 'Classical conditioning ↔ prediction (policy evaluation).\nOperant/instrumental conditioning ↔ control (evaluation + improvement).' },
          { id: 'fc_p6_13', front: 'What is the ε-greedy formula?',                                                 back: 'π(a*|s) = 1 − ε + ε/|A|\nπ(a≠a*|s) = ε/|A|\nProbability of a non-optimal action: ε·(|A|−1)/|A|' },
          { id: 'fc_p6_14', front: 'What does Dynamic Programming require that Monte Carlo and TD do not?',         back: 'A fully known MDP (S, A, P, R) — DP needs the model; MC and TD learn from sampled experience instead.' },
          { id: 'fc_p6_15', front: 'Policy Iteration vs Value Iteration — what\'s the key difference?',             back: 'Policy Iteration: exhaustive evaluation sweep until convergence, then greedy improvement. Value Iteration: a single combined evaluation+improvement update per sweep; greedy policy extracted only after final convergence.' },
          { id: 'fc_p6_16', front: 'What is Monte Carlo prediction?',                                               back: 'The return is computed for all states in a sampled (complete) trajectory; the value function estimate is the average of experienced returns per state.' },
          { id: 'fc_p6_17', front: 'Why are "Exploring Starts" needed in MC control, and what\'s the alternative?', back: 'A deterministic policy may never visit some state-action pairs; Exploring Starts guarantees every pair can start an episode. Alternative: use an ε-greedy policy instead.' },
          { id: 'fc_p6_18', front: 'Why is TD described as "a mixture of DP and MC"?',                              back: 'TD samples experience like MC, but bootstraps (updates from an estimate) like DP — it does both.' },
          { id: 'fc_p6_19', front: 'Define target policy and behavior policy.',                                    back: 'Target policy π(a|s): the policy being estimated/improved. Behavior policy b(a|s): the policy actually used to sample actions from the environment.' },
          { id: 'fc_p6_20', front: 'On-policy vs Off-policy — define, example each.',                               back: 'On-policy: behavior = target policy (e.g. SARSA).\nOff-policy: behavior ≠ target policy (e.g. Q-Learning).' },
          { id: 'fc_p6_21', front: 'Advantage of off-policy learning?',                                             back: 'Separates the optimal target policy from the exploratory behavior policy → handles exploration better. On-policy only learns a near-optimal, still-exploring policy.' },
          { id: 'fc_p6_22', front: 'What is the validity condition for off-policy learning?',                        back: 'π(a|s) > 0 wherever b(a|s) > 0 (coverage condition).' },
          { id: 'fc_p6_23', front: 'SARSA vs Q-Learning — how to identify from code?',                             back: 'SARSA: target = r + γ·Q(s\', next_action) — uses the actual next action → on-policy TD.\nQ-Learning: target = r + γ·max Q(s\', a) — uses max → off-policy TD.' },
          { id: 'fc_p6_24', front: 'In the Cliff Walking example, why does SARSA outperform Q-learning online?', back: 'Q-learning targets the optimal (cliff-edge) path but its ε-greedy exploration occasionally falls off; SARSA factors its own exploration into the update and learns a longer but safer path.' },
          { id: 'fc_p6_25', front: 'What does n-step bootstrapping unify, and for which n values?',                back: 'Unifies TD and MC. n=1 → (1-step) TD. n=∞ (full episode) → Monte Carlo.' },
          { id: 'fc_p6_26', front: 'Which paradigms bootstrap? Which does NOT?',                                    back: 'Dynamic Programming: YES. Temporal Difference: YES. Monte Carlo: NO (must wait for episode completion).' },
          { id: 'fc_p6_27', front: 'Why use a linear output activation in a DQN?',                                  back: 'Q-function estimation is a REGRESSION task (output can be any real value), not classification → linear activation is appropriate.' },
          { id: 'fc_p6_28', front: 'A DQN takes only the state as input and outputs one Q-value per action. What does this generalize on, and how many forward passes are needed to find max_a Q(s,a)?', back: 'Generalizes on states only (not actions). A single forward pass per time step yields all action-values at once.' },
          { id: 'fc_p6_29', front: 'Classical vs operant conditioning — define both.',                              back: 'Classical: a conditioned stimulus (CS), repeatedly paired with an unconditioned stimulus (US), eventually triggers the conditioned reaction (CR) alone. Operant: a stimulus given as a consequence of a behaviour strengthens or weakens that behaviour.' },
          { id: 'fc_p6_30', front: 'In classical conditioning, what are the US, CS and CR?',                       back: 'US = unconditioned stimulus (naturally/reflexively triggers a reaction); CS = conditioned stimulus (initially neutral); CR = conditioned reaction (triggered by the CS alone after pairing).' },
        ],

        quiz: [
          { id: 'qz_p6_1', category: 'P6 — RL', question: 'Which property defines a Markov Process?', options: ['The next state depends on the entire history', 'The next state depends only on the current state', 'States transition deterministically', 'Rewards are always positive'], correct: 1, explanation: 'Markov property: P[S_{t+1}|S_t] = P[S_{t+1}|S_1,…,S_t] — the next state depends only on the current state.' },
          { id: 'qz_p6_2', category: 'P6 — RL', question: 'Which of these is NOT one of the 5 MDP components ⟨S,A,P,R,γ⟩?', options: ['State transition probability matrix', 'Reward function', 'Discount factor', 'Loss function'], correct: 3, explanation: 'An MDP is ⟨S,A,P,R,γ⟩: states, actions, transition matrix, reward function, discount factor. No loss function.' },
          { id: 'qz_p6_3', category: 'P6 — RL', question: 'Why is discounting (γ<1) introduced for the return G_t in continuing tasks?', options: ['It speeds up convergence', 'The undiscounted sum of infinite future rewards could be infinite', 'It removes the need for a policy', 'It avoids negative rewards'], correct: 1, explanation: 'For continuing tasks T=∞; without discounting, the sum of rewards could diverge to infinity.' },
          { id: 'qz_p6_4', category: 'P6 — RL', question: 'As γ approaches 0, the agent becomes...', options: ['Farsighted', 'Shortsighted', 'Risk-averse', 'Deterministic'], correct: 1, explanation: 'γ→0 weighs immediate rewards much more than distant ones → shortsighted behaviour.' },
          { id: 'qz_p6_5', category: 'P6 — RL', question: 'Which is a stochastic policy?', options: ['a = π(s)', 'Greedy action selection', 'π(a|s) = P[A_t=a|S_t=s], e.g. ε-greedy', 'Value iteration'], correct: 2, explanation: 'A stochastic policy assigns a probability distribution over actions, e.g. ε-greedy. Greedy / a=π(s) is deterministic.' },
          { id: 'qz_p6_6', category: 'P6 — RL', question: 'The Bellman optimality equation v*(s) uses which operator instead of summing over π?', options: ['Average over all policies', 'Sum over all actions', 'Max over all actions', 'Min over all actions'], correct: 2, explanation: 'v*(s) = max_a (…) — takes the maximum over actions rather than a policy-weighted average.' },
          { id: 'qz_p6_7', category: 'P6 — RL', question: 'According to the lecture, which form of conditioning corresponds to "prediction" (policy evaluation)?', options: ['Operant conditioning', 'Classical conditioning', 'Latent conditioning', 'Avoidance conditioning'], correct: 1, explanation: 'Classical conditioning ↔ prediction (policy evaluation). Operant conditioning ↔ control (evaluation + improvement).' },
          { id: 'qz_p6_8', category: 'P6 — RL', question: 'In ε-greedy with |A|=4 actions and ε=0.4, what is the probability of choosing a NON-optimal action (any one of them)?', options: ['0.4', '0.1', '0.3', '0.133'], correct: 2, explanation: 'P(non-optimal, total) = ε·(|A|−1)/|A| = 0.4 × 3/4 = 0.3. Each individual non-optimal action gets ε/|A| = 0.1.' },
          { id: 'qz_p6_9', category: 'P6 — RL', question: 'Dynamic Programming requires which of the following?', options: ['Sampled episodes only', 'A fully known MDP model', 'A neural network function approximator', 'Off-policy learning'], correct: 1, explanation: 'DP assumes the MDP (S,A,P,R) is fully known and computes updates analytically by sweeping over states.' },
          { id: 'qz_p6_10', category: 'P6 — RL', question: 'Policy Iteration differs from Value Iteration because Policy Iteration...', options: ['Does not require a model', 'Performs an exhaustive evaluation sweep before each improvement step', 'Only works for episodic tasks', 'Uses neural networks'], correct: 1, explanation: 'Policy Iteration alternates an exhaustive (converged) evaluation with greedy improvement; Value Iteration combines both into a single sweep per update.' },
          { id: 'qz_p6_11', category: 'P6 — RL', question: 'Why does Monte Carlo control typically use "Exploring Starts" or ε-greedy?', options: ['To speed up convergence of the Bellman equation', 'Because a deterministic policy may never visit some state-action pairs', 'To avoid needing a value function', 'Because MC always needs a known model'], correct: 1, explanation: 'Without exploration, some state-action pairs are never sampled, so MC cannot estimate their values.' },
          { id: 'qz_p6_12', category: 'P6 — RL', question: 'Which of these correctly characterizes Temporal Difference (TD) learning?', options: ['Samples but never bootstraps', 'Bootstraps but never samples', 'Both samples and bootstraps', 'Neither samples nor bootstraps'], correct: 2, explanation: 'TD is "a mixture of DP and MC": it samples experience (like MC) and bootstraps from an estimate (like DP).' },
          { id: 'qz_p6_13', category: 'P6 — RL', question: 'A code snippet uses `target = reward + gamma * model.predict(next_state)[0][next_action]`. What algorithm is this?', options: ['Q-Learning (off-policy TD)', 'SARSA (on-policy TD)', 'Monte Carlo', 'Dynamic Programming'], correct: 1, explanation: 'Using next_action (the actual next action taken) → SARSA, on-policy TD. Q-Learning would use max/argmax.' },
          { id: 'qz_p6_14', category: 'P6 — RL', question: 'In the Cliff Walking example, why does Q-learning achieve lower online (during-training) return than SARSA?', options: ['Q-learning converges slower', 'Q-learning targets the optimal path but still falls off the cliff due to ε-greedy exploration', 'SARSA does not explore at all', 'Q-learning cannot handle discrete actions'], correct: 1, explanation: 'Q-learning learns values for the optimal (cliff-adjacent) path, so its ε-greedy exploration occasionally causes a fall; SARSA learns a longer but safer path.' },
          { id: 'qz_p6_15', category: 'P6 — RL', question: 'n-step bootstrapping with n=∞ (full episode) is equivalent to:', options: ['Dynamic Programming', '1-step TD', 'Monte Carlo', 'Value Iteration'], correct: 2, explanation: 'n-step TD unifies TD and MC: n=1 gives 1-step TD, n=∞ (waiting for the full episode) gives Monte Carlo.' },
          { id: 'qz_p6_16', category: 'P6 — RL', question: 'A DQN takes only the state as input and outputs one Q-value per action. What does this architecture generalize on, and how many forward passes find max_a Q(s,a)?', options: ['Generalizes on actions only; needs |A| passes', 'Generalizes on states only; needs 1 pass', 'Generalizes on both; needs 1 pass', 'Generalizes on neither; needs |A| passes'], correct: 1, explanation: 'State-only input with a vector of Q-values as output generalizes on states only, and a single forward pass yields all action-values at once.' },
        ],

        open: [
          { id: 'op_p6_1', points: '6 pts', question: 'Give a brief explanation of: (i) return, (ii) action policy, (iii) state-value function.', answer: '• Return G_t: discounted sum of future rewards G_t = R_{t+1}+γR_{t+2}+… (2).\n• Policy: strategy mapping states to action probabilities π(a|s) (2).\n• State-value function: expected return from state s under π, v_π(s)=E_π[G_t|S_t=s] (2).' },
          { id: 'op_p6_2', points: '5 pts', question: 'The simple return definition G_t := R_{t+1}+R_{t+2}+…+R_T causes a problem for continuing tasks. State the problem, give the corrected (discounted) definition, and explain how it lets the agent shift between farsighted and shortsighted.', answer: '• Problem: for continuing tasks T=∞, so the return could become infinite (2).\n• Corrected: G_t := R_{t+1} + γR_{t+2} + γ²R_{t+3} + … + γ^{T−t−1}R_T (1).\n• As γ→0, immediate rewards are weighted far more strongly than distant rewards → the agent becomes more shortsighted (2).' },
          { id: 'op_p6_3', points: '4 pts', question: 'Write the Bellman equation for v_π(s) and the Bellman optimality equation for v*(s).', answer: 'v_π(s) = Σ_a π(a|s) Σ_{s\',r} p(s\',r|s,a)[r + γv_π(s\')] (2).\nv*(s) = max_a Σ_{s\',r} p(s\',r|s,a)[r + γv*(s\')] (2).' },
          { id: 'op_p6_4', points: '4 pts', question: 'Explain GPI and describe the two alternating steps.', answer: '• GPI = iterative alternation until convergence (1).\n• Policy Evaluation: find V for current π (1.5).\n• Policy Improvement: update π greedily from V (1.5).' },
          { id: 'op_p6_5', points: '4 pts', question: 'Fill in the blanks and explain: "___ conditioning is the corresponding learning process for prediction, while ___ conditioning is the corresponding learning process for control." Briefly explain prediction and control.', answer: '• Classical conditioning ↔ prediction; Operant/instrumental conditioning ↔ control (2).\n• Prediction: evaluation of a value function according to a policy (policy evaluation) (1).\n• Control: iterative evaluation of a value function and updating the policy accordingly (policy evaluation + improvement) (1).' },
          { id: 'op_p6_6', points: '4 pts', question: 'Explain bootstrapping in RL. State which paradigms bootstrap and which do not.', answer: '• Bootstrapping: propagating value between consecutive states by iteratively exploiting the recursive relationship formulated by the Bellman equation (2).\n• DP: bootstraps. TD: bootstraps. Monte Carlo: does NOT bootstrap (2).' },
          { id: 'op_p6_7', points: '6 pts', question: 'Explain on-policy vs off-policy learning (define target and behavior policy), the advantage of off-policy, and the validity condition.', answer: '• Target policy π(a|s): policy used for the improvement step. Behavior policy b(a|s): policy used to sample actions from the environment (1).\n• On-policy: behavior = target policy, e.g. SARSA (1). Off-policy: behavior ≠ target, e.g. Q-Learning (1).\n• Advantage: separates the optimal target policy from the exploratory behavior policy → handles the exploration problem better; on-policy only learns a near-optimal, still-exploring policy (2).\n• Condition: π(a|s)>0 wherever b(a|s)>0 (coverage) (1).' },
          { id: 'op_p6_8', points: '5 pts', question: 'A Python function `train_model(state, action, reward, next_state, next_action)` computes `target = reward + gamma * model.predict(next_state)[0][next_action]`. (i) Name the exact algorithm and its category. (ii) Assuming an ε-greedy action-selection strategy is used to pick actions, is this on-policy or off-policy? Justify.', answer: '• (i) SARSA — an on-policy Temporal Difference control algorithm (uses the actual sampled next_action, not a max) (2).\n• (ii) On-policy: the behavior policy (ε-greedy, used to select next_action) is the same policy whose value is being estimated/improved by the target — there is no separate greedy target policy (3).' },
          { id: 'op_p6_9', points: '6 pts', question: 'A DQN-style network approximates the action-value function q_π(s,a) by taking only the state as input and outputting one Q-value per action (k possible actions). (i) State what this architecture generalizes on. (ii) How many forward passes are needed per time step to find max_a Q(s,a)? (iii) Why does the output layer use a linear activation function?', answer: '• (i) It generalizes on states only (2).\n• (ii) One forward pass per time step (2).\n• (iii) The output approximates a real-valued Q-value — a regression problem, not classification — so a linear activation is appropriate (2).' },
          { id: 'op_p6_10', points: '4 pts', question: 'Describe and state the differences between classical and operant conditioning.', answer: '• Classical: a subject learns the relationship between an initially neutral conditioned stimulus (CS) and an unconditioned stimulus (US) that reflexively produces a conditioned response (CR); after repeated CS+US pairing, the CS alone eventually produces the CR (2).\n• Operant: a subject learns the relationship between a stimulus and its own behaviour — a stimulus presented only in response to an action serves as a reinforcer that increases/decreases the probability of that action (2).' },
        ],
      },
    ],
  },

        slideDeck: 'Folien_Kernfusion/MW1112 - Lecture 01 - Introduction - Fusion as an Energy Source.pdf',
        quiz: [
  { id: 'qz_kf_l01_01', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'According to the lecture, world population is currently increasing at a rate of roughly…', options: ['1 billion every 5 years', '1 billion every 100 years', '1 billion every 12 years', '1 billion every 50 years'], correct: 2, explanation: 'The slide states population grows steadily at about 1 billion people every 12 years, which the lecturer uses to motivate rising global energy demand. (Lecture 01, Folie 33)' },
  { id: 'qz_kf_l01_02', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'By approximately how much is world energy consumption expected to grow by the year 2050, according to the lecture?', options: ['It will decrease by a third', 'It will stay constant', 'It will roughly double', 'It will roughly triple'], correct: 3, explanation: 'The slide explicitly states energy consumption is expected to roughly triple by 2050, driven by population growth and rising living standards, which motivates the need for new large-scale energy sources such as fusion. (Lecture 01, Folie 33)' },
  { id: 'qz_kf_l01_03', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'The atomic number Z of a nucleus is defined as…', options: ['the number of protons, which determines the chemical element', 'the number of neutrons only', 'the sum of protons and neutrons', 'the number of electrons in the outer shell'], correct: 0, explanation: 'Z is the number of protons in the nucleus and defines which chemical element the atom belongs to, as distinct from A (mass number) and N (neutron number). (Lecture 01, Folie 34)' },
  { id: 'qz_kf_l01_04', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'Given the mass number A and atomic number Z of a nucleus, the number of neutrons N is calculated as…', options: ['N = A + Z', 'N = A · Z', 'N = Z − A', 'N = A − Z'], correct: 3, explanation: 'The mass number A is the total number of nucleons (protons + neutrons), so the neutron number is obtained by subtracting the proton number Z from A: N = A − Z, which determines the isotope. (Lecture 01, Folie 34)' },
  { id: 'qz_kf_l01_05', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'Among the four fundamental forces, which one has by far the shortest range, of order 1 femtometer?', options: ['Electromagnetism', 'The weak interaction (10⁻³ fm)', 'The strong interaction', 'Gravitation'], correct: 2, explanation: 'The lecture table lists the strong interaction with a range of about 1 fm and relative strength 1 (the reference strength), which is what allows it to bind nucleons together only at very short distances, unlike the infinite-range electromagnetic and gravitational forces. (Lecture 01, Folie 36)' },
  { id: 'qz_kf_l01_06', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'Compared to the strong interaction, the weak interaction has a relative strength of about…', options: ['1 (equal strength)', '10⁻²', '10⁻⁷', '10⁻³⁸'], correct: 2, explanation: 'The fundamental forces table gives the weak interaction a relative strength of about 10⁻⁷ compared to the strong force (set to 1), far weaker than electromagnetism (10⁻²) but enormously stronger than gravitation (10⁻³⁸). (Lecture 01, Folie 36)' },
  { id: 'qz_kf_l01_07', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'Nuclear fusion is best described as the process by which…', options: ['two atomic nuclei combine to form a heavier nucleus and subatomic particles', 'an electron is captured by a proton to form a neutron', 'a heavy nucleus splits into two lighter fragments plus neutrons', 'a nucleus emits an alpha particle to become a lighter, more stable nucleus'], correct: 0, explanation: 'The lecture defines nuclear fusion as the combination of two atomic nuclei into a heavier nucleus (plus subatomic particles), with the associated mass difference releasing or absorbing energy according to the difference in binding energy. (Lecture 01, Folie 38)' },
  { id: 'qz_kf_l01_08', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'In an exothermic fusion reaction, the released energy can appear as all of the following EXCEPT…', options: ['kinetic energy of the heavier product nucleus', 'kinetic energy of subnuclear particles such as neutrons or protons', 'electromagnetic radiation (photons)', 'chemical bond energy stored in the electron shells'], correct: 3, explanation: 'The slide lists released fusion energy as appearing as kinetic energy of the heavier nucleus, kinetic energy of subnuclear particles (neutrons, protons, neutrinos), or electromagnetic radiation — chemical bond energy is unrelated, since fusion is a nuclear, not a chemical, process. (Lecture 01, Folie 39)' },
  { id: 'qz_kf_l01_09', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'One electronvolt (eV) is defined as…', options: ['the average binding energy per nucleon in iron', 'the energy gained by an electron accelerated through a potential difference of 1 Volt in vacuum', 'the energy released by one deuterium-tritium fusion reaction', 'the rest-mass energy of an electron'], correct: 1, explanation: 'The eV is the standard energy unit in nuclear physics, defined as the energy gained by a single electron accelerated from rest through a 1 Volt potential difference in vacuum, equal to 1.602·10⁻¹⁹ J. (Lecture 01, Folie 39)' },
  { id: 'qz_kf_l01_10', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'The nuclear binding energy of a nucleus can be equivalently defined as…', options: ['the minimum energy needed to separate the nucleus into its individual protons and neutrons', 'the energy required to accelerate the nucleus to relativistic speed', 'the kinetic energy of its constituent nucleons at absolute zero', 'the energy released when the nucleus captures an additional neutron'], correct: 0, explanation: 'The binding energy is defined as the minimum energy required to disassemble a nucleus into its free constituent protons and neutrons (equivalently, the energy released when assembling them into the nucleus), reflecting the net balance of strong attraction and electromagnetic repulsion. (Lecture 01, Folie 40)' },
  { id: 'qz_kf_l01_11', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'The nuclear binding energy fundamentally arises from the balance between…', options: ['gravitational attraction and the weak force', 'thermal pressure and magnetic pressure', 'Coulomb attraction and neutron degeneracy pressure', 'the strong force (attraction) and the electromagnetic force (repulsion)'], correct: 3, explanation: 'The lecture states binding energy is related to the balance of the strong nuclear force, which attracts nucleons together, and the electromagnetic force, which causes repulsion between protons — this balance determines nuclear stability. (Lecture 01, Folie 40)' },
  { id: 'qz_kf_l01_12', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'The mass defect Δm of a nucleus is defined as…', options: ['the difference between the measured mass and the mass predicted by the liquid-drop model', 'the mass lost by the nucleus during radioactive decay', 'the sum of the constituent proton and neutron masses minus the actual nuclear mass', 'the difference between the proton mass and the neutron mass'], correct: 2, explanation: 'Δm = Z·mp + N·mn − mA: because the nucleus mass mA is always less than the sum of its free constituent nucleon masses, this "missing" mass corresponds to the binding energy released when the nucleus formed, via ΔE = Δm·c².  (Lecture 01, Folie 41)' },
  { id: 'qz_kf_l01_13', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'The relationship ΔE = Δm·c² expresses that…', options: ['energy is proportional to the square of a particle\'s velocity', 'the Coulomb barrier height scales with the square of atomic number', 'the mass defect of a nucleus is converted into an equivalent amount of energy', 'binding energy per nucleon is proportional to mass number squared'], correct: 2, explanation: 'This is the mass-energy equivalence relation applied to nuclear mass defect: the mass "missing" from a bound nucleus compared to its separated nucleons corresponds to energy ΔE = Δm·c², which is the energy released during fusion (or needed to break the nucleus apart). (Lecture 01, Folie 41)' },
  { id: 'qz_kf_l01_14', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'On the curve of average binding energy per nucleon (ΔE/A) versus mass number A, the absolute maximum occurs at…', options: ['A ≈ 1 (hydrogen)', 'A ≈ 56 (iron/nickel region)', 'A ≈ 238 (uranium region)', 'A ≈ 12 (carbon)'], correct: 1, explanation: 'The curve rises steeply for very light nuclei, peaks near A = 56 for highly stable nuclei like iron and nickel, then slowly decreases for heavier nuclei — this is why fission (heavy nuclei splitting toward A ≈ 56) and fusion (light nuclei combining toward A ≈ 56) both release energy. (Lecture 01, Folie 43)' },
  { id: 'qz_kf_l01_15', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'A fusion reaction is exothermic when…', options: ['the binding energy of the product nucleus is higher than the sum of the binding energies of the reactant nuclei', 'the binding energy of the product nucleus is lower than that of the reactants', 'the mass number of the product equals the sum of the reactant mass numbers', 'the reactants have equal atomic numbers'], correct: 0, explanation: 'Just as fission releases energy when product binding energy exceeds the reactant\'s, fusion releases energy when the newly formed heavier nucleus has greater total binding energy than the sum of the binding energies of the two lighter reactant nuclei. (Lecture 01, Folie 43)' },
  { id: 'qz_kf_l01_16', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'Why is ⁴He (helium-4) described as a particularly favorable fusion product?', options: ['It has zero binding energy, so it forms spontaneously', 'It has the lowest atomic mass of any nucleus', 'It is chemically inert and therefore safe to store', 'It shows a pronounced local peak in binding energy per nucleon, making its formation especially energetically favorable'], correct: 3, explanation: '⁴He exhibits an unusually high (locally peaked) average binding energy per nucleon compared to its light neighbors, meaning fusion reactions that produce ⁴He release a large amount of energy per nucleon — this is why almost all practical fusion reactions target ⁴He as a product. (Lecture 01, Folie 44)' },
  { id: 'qz_kf_l01_17', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'In the example calculation ²H + ³H → ⁴He + n, the fusion energy released (17.589 MeV) is obtained by…', options: ['subtracting the binding energies of ²H and ³H from the binding energy of ⁴He', 'adding the binding energies of all three reactants and products', 'multiplying the binding energies of deuterium and tritium', 'dividing the ⁴He binding energy by the neutron binding energy'], correct: 0, explanation: 'Fusion energy equals the binding energy of the product minus the sum of the binding energies of the reactants: 28.296 MeV (⁴He) − 2.225 MeV (²H) − 8.482 MeV (³H) = 17.589 MeV, illustrating how the binding-energy difference directly gives the released fusion energy. (Lecture 01, Folie 45)' },
  { id: 'qz_kf_l01_18', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'The D-T fusion reaction (D + T → ⁴He + n) releases about 17.59 MeV, distributed as approximately…', options: ['3.52 MeV to the neutron and 14.1 MeV to the alpha particle', 'equal energy of 8.8 MeV to each product', '3.52 MeV to the alpha particle and 14.1 MeV to the neutron', 'all 17.59 MeV carried away by the neutron alone'], correct: 2, explanation: 'Due to momentum conservation, the lighter neutron carries away most of the kinetic energy (14.1 MeV) while the heavier alpha particle (⁴He) carries the smaller share (3.52 MeV), even though the total released energy is 17.59 MeV. (Lecture 01, Folie 46)' },
  { id: 'qz_kf_l01_19', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'Which of the following is NOT one of the important light-nuclei fusion reactions listed in the lecture?', options: ['D + D → T + p + 4.03 MeV', 'D + ³He → ⁴He + p + 18.35 MeV', 'p + ¹¹B → 3α + 8.68 MeV', 'D + ⁴He → ⁶Li + n + 5.2 MeV'], correct: 3, explanation: 'The lecture lists D-T, two D-D branches, T-T, D-³He, p-⁶Li and p-¹¹B as the important fusion reactions of light nuclei; a "D + ⁴He" reaction producing ⁶Li is not among them and was not presented on the slide. (Lecture 01, Folie 46)' },
  { id: 'qz_kf_l01_20', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'The p-¹¹B fusion reaction (p + ¹¹B → 3α + 8.68 MeV) is notable because…', options: ['it is the reaction with the largest cross section at low temperature', 'it requires the lowest ignition temperature of all fusion reactions', 'it produces large quantities of tritium as a byproduct', 'it produces only alpha particles, making it an aneutronic reaction'], correct: 3, explanation: 'The reaction produces three alpha particles and no neutrons, making it aneutronic; the lecture notes that aneutronic reactions exist but are not easy to achieve, unlike the neutron-producing D-T reaction which is comparatively easy. (Lecture 01, Folie 46)' },
  { id: 'qz_kf_l01_21', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'The D-T reaction is considered the most easily achievable fusion reaction for energy production mainly because of which combination of factors?', options: ['It requires the highest possible temperature, ensuring complete ionization', 'It produces no neutrons and needs no shielding', 'It uses only naturally abundant tritium with no breeding required', 'It is feasible at relatively low energy, has good cross sections, and releases large kinetic energy in its products'], correct: 3, explanation: 'The lecture lists three reasons D-T is preferred: it is feasible at relatively low temperature/energy, occurs with relatively large cross sections (high reaction probability), and releases a large amount of energy per reaction — despite tritium having to be bred rather than being naturally abundant. (Lecture 01, Folie 48)' },
  { id: 'qz_kf_l01_22', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'Why must tritium be bred inside a fusion reactor rather than mined or stockpiled from natural sources?', options: ['Tritium is chemically identical to deuterium and cannot be separated', 'Tritium is radioactive and decays with a 12.4-year half-life, so it is naturally scarce', 'Tritium reacts too slowly to be useful as fuel', 'Natural tritium causes uncontrollable chain reactions'], correct: 1, explanation: 'Tritium spontaneously decays with a 12.4-year half-life and is therefore scarce on Earth, so it cannot simply be stockpiled; instead it must be continuously bred inside the reactor from lithium via neutron reactions. (Lecture 01, Folie 51)' },
  { id: 'qz_kf_l01_23', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'Tritium breeding for a fusion reactor is achieved primarily through neutron reactions with…', options: ['Lithium (⁶Li and ⁷Li)', 'Deuterium', 'Beryllium', 'Boron-11'], correct: 0, explanation: 'The lecture gives the two breeding reactions n + ⁶Li → ³H + ⁴He + 4.78 MeV and n + ⁷Li → ³H + ⁴He + n − 2.5 MeV, showing that lithium is the key breeding material and therefore part of the fusion fuel mix alongside deuterium. (Lecture 01, Folie 51)' },
  { id: 'qz_kf_l01_24', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'Regarding fuel abundance for D-T fusion, the lecture states that…', options: ['deuterium and lithium are extremely scarce, limiting fusion to a few decades of operation', 'deuterium and lithium resources (in seawater and Earth\'s crust) are estimated to last thousands of years', 'only lithium is abundant, while deuterium must be synthesized artificially', 'tritium is abundant in seawater and needs no breeding'], correct: 1, explanation: 'The slide notes deuterium (about 1 in every 5000 hydrogen atoms in seawater) and lithium (about 230 billion tonnes in seawater, 0.002% of Earth\'s crust) are abundant enough that estimated resources would last thousands of years, supporting fusion as a long-term energy source. (Lecture 01, Folie 51)' },
  { id: 'qz_kf_l01_25', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'Comparing specific energies, the D-T fusion reaction releases roughly how much more energy per kilogram of fuel than typical fossil fuels (order of magnitude)?', options: ['About 10 times more', 'About 1,000 times more', 'About 10 million times more', 'About the same, roughly 40 MJ/kg for both'], correct: 2, explanation: 'The lecture calculates a D-T specific energy of about 3.374×10⁸ MJ/kg versus roughly 30–50 MJ/kg for coal, oil, or natural gas — a difference of about seven orders of magnitude, i.e. on the order of ten million times more energy per unit mass. (Lecture 01, Folie 50)' },
  { id: 'qz_kf_l01_26', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'Compared to D-T fusion\'s specific energy of about 3.37×10⁸ MJ/kg, the specific energy of fission fuel Uranium-235 (about 77×10⁶ MJ/kg) is…', options: ['roughly the same order of magnitude', 'about an order of magnitude higher than D-T fusion', 'noticeably lower than D-T fusion, by roughly a factor of 4-5', 'exactly zero, since U-235 fission is a chemical process'], correct: 2, explanation: 'The lecture\'s comparison table shows U-235 fission yields about 77×10⁶ MJ/kg, which is lower than the D-T fusion specific energy of about 337×10⁶ MJ/kg, so fusion releases somewhat more energy per unit mass than fission, and vastly more than fossil fuels. (Lecture 01, Folie 50)' },
  { id: 'qz_kf_l01_27', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'The Coulomb repelling force between two nuclei, as given in the lecture, is proportional to…', options: ['the sum of the two atomic numbers and inversely proportional to distance', 'the product of the two atomic numbers and inversely proportional to the square of the distance', 'the product of the two mass numbers and independent of distance', 'the difference of the two atomic numbers and proportional to distance squared'], correct: 1, explanation: 'F = Z1Z2e²/(4πε0r²) shows the Coulomb repulsion scales with the product of the atomic numbers (charges) of the two nuclei and grows with the inverse square of their separation distance, meaning it becomes very large as nuclei approach each other. (Lecture 01, Folie 52)' },
  { id: 'qz_kf_l01_28', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'At very short range, nuclei are ultimately able to fuse despite Coulomb repulsion because…', options: ['the electromagnetic force reverses sign and becomes attractive', 'gravitational attraction becomes dominant at nuclear distances', 'the strong interaction becomes predominant and overcomes the Coulomb repulsion', 'the weak interaction cancels out the electric charges'], correct: 2, explanation: 'While Coulomb repulsion would in principle diverge as separation goes to zero, at short range (about 1 fm) the strong nuclear interaction becomes dominant and allows the nuclei to overcome the Coulomb barrier and fuse. (Lecture 01, Folie 53)' },
  { id: 'qz_kf_l01_29', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'The lecture notes a counterintuitive fact about D-T fusion: the calculated Coulomb barrier height is about 380 keV, yet fusion experiments observe reactions occurring at energies as low as about…', options: ['380 keV, exactly matching the barrier', '100 keV, well below the classical barrier height', '17.6 MeV, far above the barrier', '1 keV, essentially at rest'], correct: 1, explanation: 'Classically, particles would need about 380 keV to overcome the Coulomb barrier, but fusion is observed to occur at energies around 100 keV — much lower than the barrier — which can only be explained by quantum mechanical tunneling. (Lecture 01, Folie 54)' },
  { id: 'qz_kf_l01_30', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'The phenomenon that explains why fusing nuclei can react at energies well below the classical Coulomb barrier height is known as…', options: ['Debye shielding', 'the tunnel effect (quantum tunneling)', 'Bremsstrahlung', 'the Meissner effect'], correct: 1, explanation: 'The lecture explains that this counterintuitive behavior can only be understood through quantum mechanics: particles are described by probability amplitudes rather than deterministic trajectories, allowing a nonzero probability of "tunneling" through the Coulomb barrier even without classically sufficient energy. (Lecture 01, Folie 54)' },
  { id: 'qz_kf_l01_31', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'According to the lecture\'s wrap-up, why are most practically important fusion reactions (involving hydrogen isotopes) not aneutronic?', options: ['Because aneutronic reactions release far too little energy to be useful', 'Because the most important reactions involve deuterium and tritium, which all generate neutrons as products', 'Because neutrons are required to initiate the Coulomb tunneling process', 'Because aneutronic fusion violates conservation of mass number'], correct: 1, explanation: 'The wrap-up states that the most important fusion reactions involve hydrogen isotopes (D, T) and all of them generate neutrons; genuinely aneutronic reactions do exist (e.g. p-¹¹B) but are much harder to achieve than D-T. (Lecture 01, Folie 55)' },
  { id: 'qz_kf_l01_32', category: 'L1 — Introduction: Fusion as an Energy Source', question: 'A key environmental and resource advantage of D-T fusion power highlighted in the wrap-up is that…', options: ['it produces high-level radioactive waste comparable to fission', 'it would be totally CO2-free, with fuels (D, Li) abundant in Earth\'s crust and seawater', 'it requires no neutron shielding at all', 'its fuel cycle produces no radioactivity of any kind'], correct: 1, explanation: 'The lecture emphasizes that D-T fusion power generation would be entirely free of CO2 emissions, and its fuel resources — deuterium and lithium — are very abundant in the Earth\'s crust and seawater, supporting fusion as a long-term sustainable energy source. (Lecture 01, Folie 55)' }

      {
        id: 'kf2', name: 'Obtaining Nuclear Fusion', icon: '🔆', color: '#06b6d4', examWeight: 8,
        slideDeck: 'Folien_Kernfusion/MW1112 - Lecture 02 - Obtaining Nuclear Fusion.pdf',
        quiz: [
  { id: 'qz_kf_l02_01', category: 'L2 — Obtaining Nuclear Fusion', question: 'Thermonuclear fusion is best described as fusion driven by…', options: ['neutron capture reactions', 'gravitational compression alone', 'high particle temperature (thermal motion) providing the energy to overcome the Coulomb barrier', 'externally applied electromagnetic radiation'], correct: 2, explanation: 'The slide defines thermonuclear fusion as fusion obtained when high particle (thermal) temperature provides the kinetic energy needed to overcome the Coulomb barrier, as opposed to other methods like acceleration in an external field. (Lecture 02, Folie 4)' },
  { id: 'qz_kf_l02_02', category: 'L2 — Obtaining Nuclear Fusion', question: 'According to the lecture, to produce a large quantity of fusion energy (power) in a useful time, the fuel nuclei must simultaneously have…', options: ['high density only, regardless of temperature or confinement', 'high density, long confinement time, and high temperature', 'high temperature only, regardless of density or confinement', 'low density, short confinement time, and low temperature'], correct: 1, explanation: 'The slide states that a large number of fusion reactions requires nuclei to be present in high density, confined for a long enough time, and to have enough kinetic energy (high temperature) — the three conditions later combined in the triple product. (Lecture 02, Folie 5)' },
  { id: 'qz_kf_l02_03', category: 'L2 — Obtaining Nuclear Fusion', question: 'Plasma, described as the fourth state of matter, is best characterized as…', options: ['a solid lattice of ionized atoms', 'a liquid metal used only for cooling', 'a neutral gas of atoms with no free charges', 'a collection of charged particles (ions and/or electrons) that is electrically conductive and reacts to electromagnetic fields'], correct: 3, explanation: 'The slide defines plasma as made of charged particles (ions and/or electrons), electrically conductive, with particle dynamics affected by internal and external electromagnetic fields — and notes it is the most abundant form of ordinary matter in the universe. (Lecture 02, Folie 6)' },
  { id: 'qz_kf_l02_04', category: 'L2 — Obtaining Nuclear Fusion', question: 'In stars, what keeps the fusing plasma confined at the necessary high densities and temperatures?', options: ['External magnetic field coils', 'Electrostatic wire cages', 'Gravitation', 'Inertial confinement via laser implosion'], correct: 2, explanation: 'The slide explains that gravitation keeps the stellar plasma confined at the high energies and densities needed for fusion — this is the "fusion gravity drive" unique to stars, unlike man-made reactors which need magnetic or inertial confinement. (Lecture 02, Folie 7)' },
  { id: 'qz_kf_l02_05', category: 'L2 — Obtaining Nuclear Fusion', question: 'The creation of new chemical elements in stars through the fusion of lighter nuclei is known as…', options: ['the Gamow peak process', 'the Lawson criterion', 'Bremsstrahlung production', 'stellar nucleosynthesis'], correct: 3, explanation: 'The slide states that stars provide the universe with new elements created by fusion of lighter nuclei, a process called stellar nucleosynthesis. (Lecture 02, Folie 7)' },
  { id: 'qz_kf_l02_06', category: 'L2 — Obtaining Nuclear Fusion', question: 'In the proton-proton (p-p) chain that dominates in Sun-sized or smaller stars, the overall net reaction converts…', options: ['one proton and one neutron into deuterium releasing 0.42 MeV', '4 protons into one helium-4 nucleus plus positrons and neutrinos, releasing about 26.7 MeV', 'two helium-4 nuclei into beryllium-8', 'one deuterium and one helium-3 nucleus into helium-4 releasing 100 MeV'], correct: 1, explanation: 'The slide gives the overall p-p chain reaction as 4 protons → helium-4 + 2 positrons + 2 neutrinos + 26.7 MeV, summing the energy released across the individual steps (p+p→D, e+e annihilation, D+H→He-3, He-3+He-3→He-4). (Lecture 02, Folie 8)' },
  { id: 'qz_kf_l02_07', category: 'L2 — Obtaining Nuclear Fusion', question: 'Why does the p-p chain reaction proceed so slowly (on the order of 10^9 years to complete in the Sun)?', options: ['Because it only occurs during a star\'s final collapse', 'Because the Sun\'s core temperature is too high for the reaction', 'Because it does not release any net energy', 'Because it keeps the star burning stable for very long times by limiting the reaction rate'], correct: 3, explanation: 'The slide notes the p-p chain\'s slow rate (average ~10^9 years in the Sun) is what allows the star to burn stably over long lifetimes, rather than rapidly depleting its fuel. (Lecture 02, Folie 8)' },
  { id: 'qz_kf_l02_08', category: 'L2 — Obtaining Nuclear Fusion', question: 'The gravity-fusion balance mechanism in stars works such that if the fusion reaction rate decreases…', options: ['internal pressure decreases, gravity shrinks the star, increasing density and temperature, which raises the reaction rate again', 'the star instantly extinguishes and stops radiating', 'the star immediately expands into a red giant', 'the star\'s magnetic field collapses'], correct: 0, explanation: 'The slide describes a self-regulating feedback: a lower reaction rate reduces internal plasma pressure, letting gravity compress the star, raising density and temperature, which in turn increases the reaction rate and restores the pressure balance. (Lecture 02, Folie 10)' },
  { id: 'qz_kf_l02_09', category: 'L2 — Obtaining Nuclear Fusion', question: 'Which of the following core parameters is cited for the Sun in the lecture?', options: ['Core temperature of about 1.36 × 10^11 K', 'Core temperature of about 1.36 × 10^3 K', 'Core temperature of about 1.36 × 10^9 K', 'Core temperature of about 1.36 × 10^7 K'], correct: 3, explanation: 'The slide lists the Sun\'s core temperature as approximately 1.36 × 10^7 K, along with radius (~6.96×10^8 m), core density (~150,000 kg/m3), and radiated power (~3.9×10^26 W). (Lecture 02, Folie 14)' },
  { id: 'qz_kf_l02_10', category: 'L2 — Obtaining Nuclear Fusion', question: 'Comparing the mean kinetic energy of particles at room temperature (300 K) to the Sun\'s core (~1.36×10^7 K), the lecture shows that…', options: ['room temperature particles have higher kinetic energy than solar core particles', 'room temperature gives ~0.04 eV while the Sun\'s core gives only ~1.8 keV, still far below the ~380 keV classically required to overcome the Coulomb barrier', 'both energies are approximately equal at ~0.04 eV', 'the Sun\'s core kinetic energy already exceeds the Coulomb barrier requirement'], correct: 1, explanation: 'Using E = 3/2 kT, the slide computes ~0.04 eV at 300 K and ~1.8 keV at the solar core temperature, far below the >380 keV needed classically to overcome the Coulomb barrier — motivating the need for quantum tunneling to explain solar fusion. (Lecture 02, Folie 16)' },
  { id: 'qz_kf_l02_11', category: 'L2 — Obtaining Nuclear Fusion', question: 'Given that the mean thermal kinetic energy in the solar core is only about 1.8 keV, far below the ~380 keV classically needed to overcome the Coulomb barrier, how does the lecture explain that fusion nonetheless occurs in the Sun?', options: ['Via chemical catalysis of the reaction', 'Via relativistic time dilation of the reacting nuclei', 'Via electron screening effects unique to metals', 'Via quantum tunneling, aided by the high-energy tail of the Maxwellian distribution'], correct: 3, explanation: 'The slide explicitly poses this puzzle and answers it with the "tunnel effect": particles in the high-energy tail of the Maxwellian distribution have a non-negligible tunneling probability, allowing fusion at energies well below the classical Coulomb barrier threshold. (Lecture 02, Folie 16)' },
  { id: 'qz_kf_l02_12', category: 'L2 — Obtaining Nuclear Fusion', question: 'The Gamow peak refers to…', options: ['the temperature at which a star begins helium burning', 'the maximum density achievable in inertial confinement', 'the energy at which the product of the Maxwellian tail probability and the tunneling probability is maximized, giving the maximum reaction probability', 'the peak magnetic field strength required for magnetic confinement'], correct: 2, explanation: 'The slide explains that the high-energy tail of the Maxwellian distribution combines with the (increasing) tunneling probability; their product peaks at a specific energy, called the Gamow peak, which represents the most likely energy for a fusion reaction to occur. (Lecture 02, Folie 17)' },
  { id: 'qz_kf_l02_13', category: 'L2 — Obtaining Nuclear Fusion', question: 'Simple particle accelerators using a single static DC voltage (kV to MV range), such as the Van de Graaff type, are described in the lecture as…', options: ['the most commonly used accelerator type in industry', 'used exclusively for tritium breeding', 'unsuitable for any industrial use', 'only capable of decelerating particles'], correct: 0, explanation: 'The slide states that simple DC electrostatic accelerators (e.g., Van de Graaff) are the most commonly used accelerator type in industry, contrasted later with LINACs that overcome the voltage limits of DC devices. (Lecture 02, Folie 20)' },
  { id: 'qz_kf_l02_14', category: 'L2 — Obtaining Nuclear Fusion', question: 'A linear particle accelerator (LINAC) achieves higher particle energies than a simple DC electrostatic accelerator mainly by…', options: ['relying entirely on gravitational acceleration', 'using superconducting magnets to bend the beam repeatedly through the same cavity', 'using a single very high static voltage instead of multiple stages', 'applying a series of oscillating (alternating) electric potentials along a linear beamline'], correct: 3, explanation: 'The slide explains that a LINAC alternates the potential of successive segments along a linear beamline, overcoming the voltage limits of static DC accelerators and producing beams at higher energies. (Lecture 02, Folie 21)' },
  { id: 'qz_kf_l02_15', category: 'L2 — Obtaining Nuclear Fusion', question: 'The primary purpose of the IFMIF facility, which uses LINAC technology, is to…', options: ['produce tritium fuel for commercial sale', 'investigate the effect of high-energy neutrons on structural materials under fusion-reactor-relevant conditions', 'generate net electrical power from D-T fusion', 'test tokamak plasma confinement scenarios'], correct: 1, explanation: 'The slide states that IFMIF uses LINAC-accelerated beams to study fusion-related topics, specifically the effect of high-energy neutrons on structural materials under conditions relevant to fusion reactors, rather than producing fusion power itself. (Lecture 02, Folie 22)' },
  { id: 'qz_kf_l02_16', category: 'L2 — Obtaining Nuclear Fusion', question: 'A Fusor, which can achieve small quantities of real D-D fusion in a tabletop device, is an example of…', options: ['gravitational confinement', 'laser-driven inertial confinement', 'magnetic confinement fusion', 'inertial electrostatic confinement'], correct: 3, explanation: 'The slide describes the Fusor as using an electric field between two wire cages in vacuum to accelerate ions toward the center where they can fuse — explicitly labeled an example of an inertial electrostatic confinement device, distinct from magnetic or laser inertial confinement. (Lecture 02, Folie 24)' },
  { id: 'qz_kf_l02_17', category: 'L2 — Obtaining Nuclear Fusion', question: 'The fusion cross section σ, as introduced via accelerator physics in the lecture, is best described as…', options: ['the physical cross-sectional area of the vacuum vessel', 'the proportionality constant relating the number of collisions in a beam-target interaction to the beam and target particle densities, i.e. a measure of reaction probability', 'the ratio of fusion power to heating power', 'a measure of the confinement time achievable in a device'], correct: 1, explanation: 'The slide defines σ from dn1/dx = -σ n1(x) n2, the proportionality constant linking the number of collisions to beam and target densities — it quantifies the probability that a nuclear reaction occurs, and is measured in barns (10^-28 m2). (Lecture 02, Folie 26)' },
  { id: 'qz_kf_l02_18', category: 'L2 — Obtaining Nuclear Fusion', question: 'The unit "barn" (10^-28 m^2) is used in nuclear physics because…', options: ['it corresponds exactly to the Larmor radius of a proton', 'it represents the diameter of a typical accelerator beamline', 'it is the SI base unit for area', 'it conveniently expresses the very small dimensions of nuclear cross sections'], correct: 3, explanation: 'The slide notes that due to the small dimensions of nuclear targets, the cross section is conveniently expressed in barns (1 barn = 10^-28 m2), a unit scaled to typical nuclear reaction cross sections. (Lecture 02, Folie 26)' },
  { id: 'qz_kf_l02_19', category: 'L2 — Obtaining Nuclear Fusion', question: 'The reaction parameter (or reactivity), denoted <σv>, is defined as…', options: ['the product of cross section and particle velocity, averaged over the particle energy (Maxwellian) distribution', 'the number of barns per cubic meter of plasma', 'the energy confinement time divided by particle density', 'the ratio of fusion power to external heating power'], correct: 0, explanation: 'The slide defines the reaction rate as r = n1 n2 <σv>, where <σv>, the product of cross section and velocity averaged over the Maxwellian velocity distribution, is called the reaction parameter or reactivity, and is a key figure of merit for fusion power generation. (Lecture 02, Folie 27)' },
  { id: 'qz_kf_l02_20', category: 'L2 — Obtaining Nuclear Fusion', question: 'The two main confinement methods mankind has used to create significant quantities of nuclear fusion are…', options: ['accelerator confinement and cryogenic confinement', 'gravitational confinement and electrostatic confinement only', 'magnetic confinement and inertial confinement', 'thermal confinement and chemical confinement'], correct: 2, explanation: 'The slide states that, since accelerators alone cannot yield net positive energy output, mankind instead relies on magnetic confinement (plasma held by magnetic fields) and inertial confinement (extremely short explosive-style reactions confined by the mass\'s own inertia). (Lecture 02, Folie 28)' },
  { id: 'qz_kf_l02_21', category: 'L2 — Obtaining Nuclear Fusion', question: 'In inertial confinement fusion, plasma confinement is achieved because…', options: ['gravitational attraction confines the fuel as in stars', 'the fusion reactions occur so quickly (explosively) that the mass\'s own inertia keeps it together long enough to fuse', 'a static electric field between wire cages accelerates ions toward a common center indefinitely', 'strong external magnetic fields hold the plasma in a closed volume'], correct: 1, explanation: 'The slide explains that in inertial confinement, reactions occur in an extremely short, explosive-like time so that the inertia of the imploding mass provides sufficient confinement time to fuse the fuel, unlike the steady magnetic confinement approach. (Lecture 02, Folie 28)' },
  { id: 'qz_kf_l02_22', category: 'L2 — Obtaining Nuclear Fusion', question: 'For a D-T plasma with an optimal 50-50 mixture (nD = nT = n/2), why is the thermonuclear power density expressed as p_DT = (1/4) n^2 <σv> E rather than n^2 <σv> E?', options: ['Because the reduced mass factor introduces a 1/4 coefficient', 'Because substituting nD = nT = n/2 into nD·nT gives (n/2)(n/2) = n^2/4', 'Because 75% of the energy is lost to Bremsstrahlung radiation', 'Because only a quarter of D-T collisions result in fusion'], correct: 1, explanation: 'The slide derives p_DT = nD nT <σv> E and shows that maximizing output requires nD = nT = n/2, so nD·nT = n^2/4, giving the factor 1/4 in p_DT = (1/4) n^2 <σv> E for a 50-50 D-T mixture. (Lecture 02, Folie 32)' },
  { id: 'qz_kf_l02_23', category: 'L2 — Obtaining Nuclear Fusion', question: 'In a D-T fusion reaction releasing 17.59 MeV, how is this energy split between the reaction products?', options: ['All the energy goes to the neutron; the alpha particle is created at rest', 'The neutron carries about 1/5 (~3.5 MeV) and the alpha particle carries about 4/5 (~14.1 MeV)', 'The alpha particle carries about 1/5 (~3.5 MeV) and the neutron carries about 4/5 (~14.1 MeV)', 'The alpha particle and neutron each receive exactly half (8.8 MeV each)'], correct: 2, explanation: 'The slide states that for each D-T reaction, about 1/5 of the 17.59 MeV goes to the alpha particle (~3.5 MeV) as kinetic energy, while the remaining 4/5 (~14.1 MeV) goes to the neutron — a split arising from momentum conservation given the mass ratio of the two products. (Lecture 02, Folie 35)' },
  { id: 'qz_kf_l02_24', category: 'L2 — Obtaining Nuclear Fusion', question: 'Why does the neutron produced in a D-T fusion reaction not contribute to internal (alpha-particle-style) heating of the plasma?', options: ['The neutron converts back into a proton before leaving the plasma', 'The neutron has too little kinetic energy to transfer', 'Being electrically neutral, the neutron leaves the plasma without interacting via the confining fields, carrying its energy away rather than depositing it in the plasma', 'The neutron is absorbed instantly by deuterium nuclei in the plasma'], correct: 2, explanation: 'The slide explains that because the neutron carries no electric charge, it is unaffected by the magnetic/electric confinement and leaves the plasma without interacting, so its energy is deposited outside the plasma rather than heating it, unlike the charged alpha particle which stays confined and heats the plasma via collisions. (Lecture 02, Folie 35)' },
  { id: 'qz_kf_l02_25', category: 'L2 — Obtaining Nuclear Fusion', question: 'Ignition in a D-T fusion plasma is defined in the lecture as the condition where…', options: ['the plasma current reaches zero', 'the vacuum vessel reaches a pressure of 10^-9 mbar', 'alpha particle heating alone is sufficient to balance all power losses, allowing external heating to be switched off', 'the external heating power exceeds the internal alpha heating power'], correct: 2, explanation: 'The slide defines ignition as the condition where the power balance PH + Pα = PL is satisfied even with PH = 0, i.e. alpha heating alone compensates the power losses, allowing external heating to be turned off while the plasma temperature is self-sustained. (Lecture 02, Folie 36)' },
  { id: 'qz_kf_l02_26', category: 'L2 — Obtaining Nuclear Fusion', question: 'The energy confinement time τE, as defined in the lecture\'s power balance for a fusion plasma, represents…', options: ['the time required to cool the magnets to cryogenic temperature', 'the time needed for the plasma current to reach steady state', 'the average lifetime of a single fusion reaction', 'the ratio of the total plasma energy E to the power loss PL (τE = E / PL)'], correct: 3, explanation: 'The slide defines the power loss as PL = E / τE, so τE = E / PH under steady-state balance (PH = PL) — it characterizes how well the plasma retains its thermal energy against losses, a key figure of merit alongside density and temperature. (Lecture 02, Folie 34)' },
  { id: 'qz_kf_l02_27', category: 'L2 — Obtaining Nuclear Fusion', question: 'The Lawson criterion, derived from the ignition power balance for D-T reactions, states that ignition requires nτE to exceed approximately what value, and at what optimal temperature?', options: ['nτE > 1.5×10^10 m^-3 s at T = 3 keV', 'nτE > 1.5×10^20 m^-3 s at T = 30 keV', 'nτE > 3×10^21 m^-3 s at T = 10 keV', 'nτE > 1.5×10^20 m^-3 s at T = 300 keV'], correct: 1, explanation: 'The slide shows the ignition condition nτE > 12 <σv>/(kT) reaches its minimum value at T = 30 keV, giving nτE > 1.5×10^20 m^-3 s as the Lawson criterion for D-T reactions, first formulated by J. D. Lawson. (Lecture 02, Folie 38)' },
  { id: 'qz_kf_l02_28', category: 'L2 — Obtaining Nuclear Fusion', question: 'The fusion triple product nTτE is best described as…', options: ['the ratio of alpha heating power to neutron energy loss', 'a unit used only to measure vacuum vessel pressure', 'a combination of density, temperature, and confinement time that quantifies how close a device is to reactor (ignition) conditions', 'a purely theoretical quantity with no practical use in comparing devices'], correct: 2, explanation: 'The slide derives the triple product nTτE > 3×10^21 m^-3 keV s (for flat profiles) from the ignition condition using the T^2 approximation for <σv>, and states it gives a quantitative measure of how far a device is from reactor/ignition conditions, making it a key figure of merit used to compare different fusion devices. (Lecture 02, Folie 39)' },
  { id: 'qz_kf_l02_29', category: 'L2 — Obtaining Nuclear Fusion', question: 'The fusion gain factor Q is defined as the ratio of…', options: ['plasma pressure to magnetic pressure', 'heating power supplied to thermonuclear power produced', 'alpha particle energy to neutron energy', 'thermonuclear power produced to the heating power supplied'], correct: 3, explanation: 'The slide defines Q = Pfusion / PH, the thermonuclear power produced divided by the external heating power supplied; since Pα is only 1/5 of the total fusion power, Q = 1 corresponds to Pα being 20% of PH, and Q → ∞ at ignition since PH → 0. (Lecture 02, Folie 40)' },
  { id: 'qz_kf_l02_30', category: 'L2 — Obtaining Nuclear Fusion', question: 'The lecture states that a value of Q = 10 is generally considered…', options: ['the exact Q value corresponding to ignition', 'a minimum for economical operation of a fusion reactor, even though ignition (Q→∞) is not strictly required', 'irrelevant, since only Q=1 (breakeven) matters commercially', 'the theoretical maximum achievable in any fusion device'], correct: 1, explanation: 'The slide states that while ignition (Q → ∞) is not strictly required for a fusion reactor to be viable, Q = 10 is considered a practical minimum for economical operation. (Lecture 02, Folie 40)' }
