      {
        id: 'kf10', name: 'Plasma Heating Systems', icon: '🔥', color: '#eab308', examWeight: 8,
        slideDeck: 'Folien_Kernfusion/MW1112 - Lecture 10 - Plasma Heating Systems.pdf',
        quiz: [
  { id: 'qz_kf_l10_01', category: 'L10 — Plasma Heating Systems', question: 'Ohmic heating in a tokamak arises directly from…', options: ['the resistance to the toroidal plasma current caused by electron-ion collisions', 'resonant absorption of electromagnetic waves', 'charge exchange between injected neutrals and plasma ions', 'neutron bombardment of the first wall'], correct: 0, explanation: 'The toroidal plasma current needed to create the poloidal field also heats the plasma via resistive (Joule) dissipation from electron-ion collisions; this is the definition of Ohmic heating. (Lecture 10, Folie 6)' },
  { id: 'qz_kf_l10_02', category: 'L10 — Plasma Heating Systems', question: 'Ohmic heating becomes ineffective at high plasma temperature mainly because…', options: ['the plasma current cannot exceed 1 MA', 'the plasma resistivity decreases with temperature (scaling as T^-3/2)', 'the toroidal field weakens as temperature rises', 'electron-ion collisions increase in frequency with temperature'], correct: 1, explanation: 'Plasma resistivity falls off as T^-3/2, so as the plasma gets hotter it becomes an increasingly poor resistor, and Ohmic heating power (which depends on resistance) drops sharply — this is why it cannot reach thermonuclear temperatures alone. (Lecture 10, Folie 6)' },
  { id: 'qz_kf_l10_03', category: 'L10 — Plasma Heating Systems', question: 'For a tokamak with a toroidal field of about 5 T, the maximum temperature achievable with Ohmic heating alone is approximately…', options: ['300 keV', '30 keV', '3 keV', '0.3 keV'], correct: 2, explanation: 'The slides state that with ~5 T toroidal field, Ohmic heating alone saturates around 3 keV, far below the 10-15 keV required for relevant thermonuclear operating regimes, which is why auxiliary heating (NBI, RF) is essential. (Lecture 10, Folie 6)' },
  { id: 'qz_kf_l10_04', category: 'L10 — Plasma Heating Systems', question: 'In Neutral Beam Injection (NBI), the beam particles must first be neutralized before entering the plasma because…', options: ['neutralization increases the kinetic energy of the beam', 'neutral particles undergo more Coulomb collisions than charged particles', 'only neutral particles can be accelerated by electrostatic grids', 'charged particles would be deflected by the confining magnetic field before penetrating the plasma'], correct: 3, explanation: 'Charged particles would be bent by the strong confinement magnetic field and driven into the vessel walls before reaching the plasma core, so the beam must travel as neutrals (which move in straight lines) and only becomes re-ionized once inside the plasma. (Lecture 10, Folie 8)' },
  { id: 'qz_kf_l10_05', category: 'L10 — Plasma Heating Systems', question: 'The NBI \'shine-through\' phenomenon refers to…', options: ['neutral beam power depositing on the far wall because the beam is not fully absorbed in the plasma', 'plasma current inducing eddy currents in the vessel', 'RF power leaking through the vacuum vessel window', 'excess tritium escaping through the first wall'], correct: 0, explanation: 'If the plasma density or absorption length is such that too little of the beam is absorbed, unabsorbed fast neutrals continue through and strike the wall opposite the injection port, wasting power and risking wall damage — this is shine-through. (Lecture 10, Folie 13)' },
  { id: 'qz_kf_l10_06', category: 'L10 — Plasma Heating Systems', question: 'According to the lecture, the NBI shine-through fraction…', options: ['is independent of beam energy and plasma density', 'decreases with plasma density, injection angle effects, and absorption length, but increases with beam energy', 'increases with plasma density and decreases with beam energy', 'only occurs for negative-ion beams'], correct: 1, explanation: 'Higher density and shorter absorption length mean the beam is absorbed sooner (less shine-through), whereas higher beam energy increases penetration depth and thus increases the chance of the beam reaching the far wall unabsorbed. (Lecture 10, Folie 13)' },
  { id: 'qz_kf_l10_07', category: 'L10 — Plasma Heating Systems', question: 'Compared to positive ion beams, negative ion beams (H⁻/D⁻) used in NBI are…', options: ['impossible to accelerate electrostatically', 'easier to generate at high current but harder to neutralize', 'harder to generate and limited to lower current, but much easier to neutralize at high energy', 'only usable for start-up heating, never for steady-state current drive'], correct: 2, explanation: 'Negative ion sources are technically more difficult and yield lower beam current than positive ion sources, but their neutralization efficiency stays high even at very high energies, which is why they are required for the multi-hundred-keV to MeV beams needed in large devices like ITER. (Lecture 10, Folie 15)' },
  { id: 'qz_kf_l10_08', category: 'L10 — Plasma Heating Systems', question: 'For positive ion beams, the neutralization efficiency through gas-cell collisions…', options: ['is always higher than for negative ions at all energies', 'increases with beam energy, reaching 100% above 200 keV', 'stays constant near 90% regardless of beam energy', 'drops strongly with increasing energy, falling to 0% above roughly 200 keV'], correct: 3, explanation: 'The lecture gives concrete values: about 90% at 10 keV, 50% at 100 keV, 20% at 200 keV, and 0% at higher energies — this steep drop-off is exactly why negative ions are needed for high-energy beams such as ITER\'s 1 MeV injectors. (Lecture 10, Folie 24)' },
  { id: 'qz_kf_l10_09', category: 'L10 — Plasma Heating Systems', question: 'For energies above about 100 keV, NBI systems must start from negative ions rather than positive ions because…', options: ['positive ion neutralization efficiency has essentially collapsed to zero by this energy, while negative ions remain neutralizable (around 60%)', 'negative ion sources produce higher currents at these energies', 'negative ions do not require an accelerator grid', 'positive ions cannot be accelerated to these energies'], correct: 0, explanation: 'The slides show positive-ion neutralization efficiency falling to 0% above ~200 keV, whereas negative ions maintain roughly 60% neutralization efficiency even at high energy, making them the only practical option for high-energy beams like ITER\'s 1 MeV systems. (Lecture 10, Folie 24)' },
  { id: 'qz_kf_l10_10', category: 'L10 — Plasma Heating Systems', question: 'The two main ion source types described for generating NBI ion beams are…', options: ['laser-driven and microwave-driven sources', 'arc-discharge driven and radiofrequency driven sources', 'thermionic and photoionization sources', 'cyclotron-driven and betatron-driven sources'], correct: 1, explanation: 'Arc discharge driven sources create ions at the boundary of an arc discharge, while radiofrequency driven sources create ions by applying an RF electric field to a rarefied gas — these are the two ion source concepts used, e.g., in ITER\'s NBI system. (Lecture 10, Folie 15)' },
  { id: 'qz_kf_l10_11', category: 'L10 — Plasma Heating Systems', question: 'In the ITER negative-ion NBI source, cesium is injected mainly in order to…', options: ['cool the accelerator grids', 'reduce the plasma temperature at the source', 'increase the yield of negative ions via surface production', 'neutralize the beam before acceleration'], correct: 2, explanation: 'Cesium seeding lowers the work function of the source surface, enhancing the surface production of negative ions (D⁻/H⁻), which is essential for achieving the required negative ion beam current (e.g. 40 A at 1 MeV for ITER). (Lecture 10, Folie 16)' },
  { id: 'qz_kf_l10_12', category: 'L10 — Plasma Heating Systems', question: 'The two accelerator grid concepts mentioned for extracting and accelerating NBI ion beams are…', options: ['magnetic mirror and cusp confinement grids', 'toroidal and poloidal grid arrays', 'single-stage and multi-stage electrostatic lenses', 'multi-aperture multi-grid (MAMuG) and single-aperture single-gap (SINGAP)'], correct: 3, explanation: 'Both MAMuG and SINGAP use electrostatic grids with multiple apertures to extract and accelerate ions into a sufficiently homogeneous beam, and both are current concepts used for high-energy NBI systems such as ITER\'s. (Lecture 10, Folie 20)' },
  { id: 'qz_kf_l10_13', category: 'L10 — Plasma Heating Systems', question: 'External magnetic fields are superimposed on the electrostatic accelerator grids in NBI mainly to…', options: ['deflect and remove co-extracted electrons before they are accelerated', 'increase the beam divergence for better plasma coverage', 'increase the plasma source temperature', 'neutralize the ion beam directly'], correct: 0, explanation: 'Co-extracted electrons waste power supply current capacity and energy (since they cannot be neutralized or used for heating), so magnetic fields are added to deflect them away immediately after extraction and along the acceleration stages. (Lecture 10, Folie 21)' },
  { id: 'qz_kf_l10_14', category: 'L10 — Plasma Heating Systems', question: 'Besides steady-state heating, the lecture lists which additional use of NBI in tokamaks/stellarators?', options: ['Cooling the divertor plates', 'Driving a net plasma current for steady-state operation (current drive)', 'Generating the toroidal magnetic field', 'Breeding tritium directly within the neutral beam'], correct: 1, explanation: 'A directed flow of fast ions (I_NB) can drive a net plasma current, enabling steady-state tokamak operation; NBI is also used for heating during ramp-up/start-up and for controlling the current profile. (Lecture 10, Folie 14)' },
  { id: 'qz_kf_l10_15', category: 'L10 — Plasma Heating Systems', question: 'The injection angle of an NBI beam is deliberately chosen to not be purely perpendicular to the torus mainly to avoid…', options: ['excessive heating of the plasma core', 'interaction with the ohmic heating current', 'fast ions becoming trapped in the magnetic ripple and lost before thermalizing', 'triggering ECRH resonance absorption'], correct: 2, explanation: 'Energetic ions have large Larmor radii and banana orbits; if injected purely perpendicular they risk becoming trapped in the toroidal field ripple and lost to the wall before depositing their energy, so injection angles are chosen to reduce this risk. (Lecture 10, Folie 27)' },
  { id: 'qz_kf_l10_16', category: 'L10 — Plasma Heating Systems', question: 'The three main frequency ranges used for radiofrequency/microwave plasma heating are…', options: ['ohmic, bootstrap, and neutral beam heating', 'gyrotron, klystron, and tetrode heating', 'alpha, neutron, and Bremsstrahlung heating', 'electron cyclotron, ion cyclotron, and lower hybrid resonance heating'], correct: 3, explanation: 'ECRH heats electrons, ICRH heats ions (and electrons), and Lower Hybrid heating targets electrons and is particularly useful for current drive — these are the three resonant frequency ranges exploited in magnetically confined plasmas. (Lecture 10, Folie 30)' },
  { id: 'qz_kf_l10_17', category: 'L10 — Plasma Heating Systems', question: 'RF/microwave heating transfers energy to the plasma through two distinct physical mechanisms: direct acceleration via collisions, and…', options: ['resonant absorption, a collisionless process producing strong heating', 'neutron moderation', 'Coulomb barrier tunneling', 'Meissner expulsion of the wave'], correct: 0, explanation: 'Besides ordinary collisional heating (where the wave\'s electric field accelerates particles that then collide), electromagnetic waves are also subject to resonant absorption at the plasma\'s natural resonant frequencies, a collisionless mechanism that produces strong localized heating. (Lecture 10, Folie 30)' },
  { id: 'qz_kf_l10_18', category: 'L10 — Plasma Heating Systems', question: 'In RF heating, resonant absorption occurs at the radial location where…', options: ['the plasma density equals the critical density for reflection', 'the launched wave frequency ω_RF equals the local ion or electron cyclotron frequency ω_ic(r) or ω_ec(r)', 'the plasma temperature reaches its maximum', 'the magnetic field is exactly zero'], correct: 1, explanation: 'Since the cyclotron frequencies depend on the local magnetic field (which varies with position in the torus), resonance and strong energy transfer occur only where the fixed launched frequency matches the local ion or electron cyclotron frequency. (Lecture 10, Folie 32)' },
  { id: 'qz_kf_l10_19', category: 'L10 — Plasma Heating Systems', question: 'The electron cyclotron resonance frequency scales with magnetic field approximately as f_ce ≈ 28×B [GHz]. For ITER, this corresponds to an ECRH operating range of about…', options: ['1-8 GHz', '35-55 MHz', '120-170 GHz', '0.02-0.4 GHz'], correct: 2, explanation: 'Using f_ce ≈ 28×B GHz with ITER\'s magnetic field, the ECRH system operates at 120-170 GHz, delivering 22-40 MW — this is distinctly higher frequency than ICRH (MHz range) or Lower Hybrid (GHz range but lower than ECRH). (Lecture 10, Folie 33)' },
  { id: 'qz_kf_l10_20', category: 'L10 — Plasma Heating Systems', question: 'For ITER, the ICRH system is designed to operate at approximately…', options: ['120-170 GHz at 22-40 MW', '1-8 GHz at 25 MW/m²', '5 GHz at 20 MW', '35-55 MHz at 20 MW'], correct: 3, explanation: 'Using f_ci,D ≈ 7.63×B MHz for the deuteron cyclotron frequency and ITER\'s field of about 5.3 T, the ICRH range is 35-55 MHz, delivering about 20 MW — much lower frequency than ECRH\'s mm-wave range. (Lecture 10, Folie 33)' },
  { id: 'qz_kf_l10_21', category: 'L10 — Plasma Heating Systems', question: 'The Lower Hybrid resonance frequency is approximately the geometric mean of which two frequencies?', options: ['The ion and electron cyclotron frequencies (f_LH ≈ sqrt(f_ci × f_ce))', 'The plasma frequency and the Larmor frequency', 'The ohmic heating frequency and the ECRH frequency', 'The Coulomb collision frequency and the gyrofrequency'], correct: 0, explanation: 'The lecture gives f_LH = sqrt(f_ci × f_ce) ≈ 0.46×B GHz, placing ITER\'s LH system at about 5 GHz and 20 MW, intermediate in frequency between ICRH (MHz) and ECRH (100+ GHz). (Lecture 10, Folie 33)' },
  { id: 'qz_kf_l10_22', category: 'L10 — Plasma Heating Systems', question: 'A typical radiofrequency heating system, as described in the lecture, generally consists of…', options: ['a plasma source, an accelerator grid, and a neutralizer cell', 'a high-power generator remote from the plasma, a low-loss transmission line, and an efficient antenna/launcher', 'a cryostat, a vacuum vessel, and a divertor', 'a tetrode, a Faraday shield, and a blanket module'], correct: 1, explanation: 'Whether ECRH, ICRH, or LH, RF heating systems share this common architecture: the wave is generated far from the plasma, transported with minimal losses, and coupled into the plasma through a dedicated antenna or launcher structure. (Lecture 10, Folie 33)' },
  { id: 'qz_kf_l10_23', category: 'L10 — Plasma Heating Systems', question: 'Comparing the three RF heating/current-drive systems by power source technology, the lecture pairs ECRH, Lower Hybrid, and ICRH respectively with…', options: ['klystron, tetrode, gyrotron', 'tetrode, gyrotron, klystron', 'gyrotron, klystron, tetrode/klystron', 'gyrotron, tetrode, klystron'], correct: 2, explanation: 'ECRH power is generated by gyrotrons (28-170 GHz), Lower Hybrid by klystrons or gyrotrons (1-8 GHz), and ICRH by tetrodes or klystrons (0.02-0.4 GHz) — each matched to its respective frequency and power range. (Lecture 10, Folie 34)' },
  { id: 'qz_kf_l10_24', category: 'L10 — Plasma Heating Systems', question: 'In ICRH discharges with modest core thermal ion pressure, the RF power is typically damped predominantly on…', options: ['free electrons at the plasma edge', 'the bulk deuterium ions directly', 'alpha particles from fusion reactions', 'a minority ion species (e.g. H or ³He at a few percent concentration)'], correct: 3, explanation: 'ICRH commonly uses minority-ion heating: a small concentration (a few percent) of a different ion species such as H or ³He resonates strongly with the RF wave and preferentially absorbs the power, which is then shared with the bulk plasma via collisions. (Lecture 10, Folie 35)' },
  { id: 'qz_kf_l10_25', category: 'L10 — Plasma Heating Systems', question: 'Lower Hybrid Current Drive (LHCD) achieves efficient current drive at low electron temperatures mainly because…', options: ['the wave-plasma interaction generates a high-energy electron tail that carries current efficiently', 'it heats ions preferentially over electrons', 'it directly drives the poloidal magnetic field', 'it avoids all wave-particle resonance'], correct: 0, explanation: 'When the parallel phase velocity of the LH wave matches the parallel thermal speed of plasma electrons, energy transfers into a fast electron tail, which is highly effective at carrying current even when the bulk electron temperature is low. (Lecture 10, Folie 37)' },
  { id: 'qz_kf_l10_26', category: 'L10 — Plasma Heating Systems', question: 'The ITER Lower Hybrid system frequency (5 GHz, or alternatively 3.7 GHz) is chosen mainly to…', options: ['maximize coupling to the divertor plasma', 'avoid absorption of the wave by fusion-produced alpha particles', 'match the ECRH frequency for synergistic heating', 'minimize the required antenna size'], correct: 1, explanation: 'The proposed ITER LHCD frequency is selected specifically to avoid unwanted absorption of the wave energy by energetic alpha particles, ensuring the power instead couples to the target electron population for current drive. (Lecture 10, Folie 37)' },
  { id: 'qz_kf_l10_27', category: 'L10 — Plasma Heating Systems', question: 'A key physics advantage of ECRH over other RF heating schemes highlighted in the lecture is that…', options: ['it requires no vacuum window at all', 'it always heats ions before electrons', 'single-pass absorption can reach up to 100%, allowing highly localized heating and current drive', 'it cannot be used for plasma start-up assist'], correct: 2, explanation: 'ECRH benefits from near-complete single-pass wave absorption at the fundamental (or second harmonic) electron cyclotron frequency, giving strong, localized, and controllable heating/current drive without needing multiple wave passes or an antenna near the plasma. (Lecture 10, Folie 39)' },
  { id: 'qz_kf_l10_28', category: 'L10 — Plasma Heating Systems', question: 'The high-power millimeter waves for ECRH are generated by a device called the…', options: ['klystron', 'tetrode', 'diacrode', 'gyrotron'], correct: 3, explanation: 'The gyrotron is a high-power linear-beam vacuum tube in which an annular electron beam passes through a cavity in a strong DC magnetic field, converting beam energy into millimeter-wave power; latest gyrotrons (e.g. for W7-X, ITER) can produce 1 MW in steady state. (Lecture 10, Folie 40)' },
  { id: 'qz_kf_l10_29', category: 'L10 — Plasma Heating Systems', question: 'Inside a gyrotron, after the millimeter-wave power is extracted, the depleted electron beam is directed into the…', options: ['collector, where remaining energy is partly recovered and the rest dissipated as heat', 'neutralizer cell', 'Faraday shield', 'accelerator grid for reuse'], correct: 0, explanation: 'The spent electron beam enters the collector region of the gyrotron tube, where part of its remaining kinetic energy is recovered and the balance is dissipated as heat and removed by water cooling. (Lecture 10, Folie 40)' },
  { id: 'qz_kf_l10_30', category: 'L10 — Plasma Heating Systems', question: 'In the ITER ECRH system, how many transmission lines are foreseen for the equatorial launcher versus the upper launcher?', options: ['8 lines equatorial, 24 lines upper', '24 lines equatorial, 8 lines upper', '12 lines equatorial, 12 lines upper', '4 lines equatorial, 4 lines upper'], correct: 1, explanation: 'The lecture states ITER has 24 lines in one equatorial launcher and 8 lines for one upper launcher, reflecting the different roles (core heating versus off-axis current drive/instability control) served by each launcher location. (Lecture 10, Folie 42)' },
  { id: 'qz_kf_l10_31', category: 'L10 — Plasma Heating Systems', question: 'The optimal beam attenuation length for a neutral beam injector is chosen to correspond to approximately…', options: ['the full major radius of the torus', 'zero, so absorption happens instantly at the edge', 'the plasma minor radius, so that all beam energy is deposited inside the plasma', 'the Larmor radius of the injected ions'], correct: 2, explanation: 'If the attenuation length matches the plasma minor radius, the beam power is deposited within the plasma rather than escaping to the far wall (shine-through), which is why beam energies (e.g. 1 MeV for ITER) are chosen based on the operating density and machine size. (Lecture 10, Folie 47)' },

      {
        id: 'kf11', name: 'Cryogenic Technology', icon: '❄️', color: '#22c55e', examWeight: 9,
        slideDeck: 'Folien_Kernfusion/MW1112 - Lecture 11 - Cryogenic Technology.pdf',
        quiz: [
  { id: 'qz_kf_l11_01', category: 'L11 — Cryogenic Technology', question: 'Cryogenics is best defined as the branch of physics studying…', options: ['vacuum technology in general', 'materials and processes at temperatures below about 120 K', 'superconductivity at any temperature', 'plasma confinement below the Coulomb barrier'], correct: 1, explanation: 'The lecture defines cryogenics (from Greek "cryos" = cold and "genis" = generating) as the study of very low temperatures (< 120 K), how to produce them, and how materials behave there. (Lecture 11, Folie 5)' },
  { id: 'qz_kf_l11_02', category: 'L11 — Cryogenic Technology', question: 'According to the temperature ranges given in the lecture, the "helium range" of cryogenics spans approximately…', options: ['22 K to 14 K', '80 K to 63 K', '120 K to 80 K', '5.2 K to 1 K'], correct: 3, explanation: 'The slide lists application ranges: LNG 120-80 K, nitrogen 80-63 K, hydrogen 22-14 K, and helium 5.2-1 K, reflecting the progressively lower boiling points of these fluids. (Lecture 11, Folie 5)' },
  { id: 'qz_kf_l11_03', category: 'L11 — Cryogenic Technology', question: 'Among the fluids listed with their boiling points, which has the lowest boiling point?', options: ['Helium-3 (3.19 K)', 'Neon (27.09 K)', 'Helium-4 (4.214 K)', 'Hydrogen (20.27 K)'], correct: 0, explanation: 'The boiling-point table shows Helium-3 at 3.19 K as the lowest of the listed fluids, even lower than Helium-4 at 4.214 K, due to its lighter isotope mass affecting intermolecular binding. (Lecture 11, Folie 5)' },
  { id: 'qz_kf_l11_04', category: 'L11 — Cryogenic Technology', question: 'Historically, who is credited with first liquefying helium?', options: ['James Dewar', 'Carl von Linde', 'Heike Kamerlingh Onnes', 'Raoul Pictet'], correct: 2, explanation: 'The historical timeline states that in 1908 Heike Kamerlingh Onnes liquefied helium, and in 1911 he went on to discover superconductivity using this capability. (Lecture 11, Folie 6)' },
  { id: 'qz_kf_l11_05', category: 'L11 — Cryogenic Technology', question: 'James Dewar\'s key 1892 invention that enabled practical cryogenic storage was…', options: ['the Hampson-Linde liquefaction cycle', 'the vacuum-insulated, silver-plated glass flask (Dewar flask)', 'the turbo expander', 'the multilayer insulation blanket'], correct: 1, explanation: 'The timeline credits James Dewar in 1892 with inventing the vacuum-insulated, silver-plated glass Dewar flask, the ancestor of modern cryogenic storage dewars. (Lecture 11, Folie 6)' },
  { id: 'qz_kf_l11_06', category: 'L11 — Cryogenic Technology', question: 'In the context of fusion, cryogenic technology is primarily applied to…', options: ['RF heating antennas', 'superconducting magnets and cryo vacuum pumps', 'tritium breeding blankets', 'divertor armor materials'], correct: 1, explanation: 'The lecture\'s list of cryogenics applications specifically names superconducting magnets and cryo vacuum pumps as the fusion-relevant uses of cryogenic technology. (Lecture 11, Folie 7)' },
  { id: 'qz_kf_l11_07', category: 'L11 — Cryogenic Technology', question: 'Why is helium the only practical fluid for cooling below about 5 K?', options: ['It is chemically inert and therefore safest', 'It has the highest thermal conductivity of any element', 'It is the only element with no solid phase at low temperature when kept below about 25 bar', 'It has the largest latent heat of vaporization of any substance'], correct: 2, explanation: 'The slide explains that all other elements are solid at these temperatures, whereas helium uniquely remains a fluid (never solidifying) at low temperature as long as pressure stays below about 25 bar, making it the only usable coolant near 5 K. (Lecture 11, Folie 8)' },
  { id: 'qz_kf_l11_08', category: 'L11 — Cryogenic Technology', question: 'Superfluid helium (He II) is best described as…', options: ['the supercritical phase of helium above 5.2 K', 'a metastable solid phase of helium under high pressure', 'a quantum state below 2.17 K with zero viscosity and extremely efficient heat transport', 'helium gas ionized into a plasma-like state'], correct: 2, explanation: 'The lecture describes He II (superfluid helium, existing below the lambda point at 2.17 K) as a quantum state where all molecules behave collectively, producing zero viscosity and near-perfect heat transport, unlike normal He I. (Lecture 11, Folie 8)' },
  { id: 'qz_kf_l11_09', category: 'L11 — Cryogenic Technology', question: 'On the helium phase diagram, the "lambda line" separates…', options: ['normal liquid helium (He I) from superfluid helium (He II)', 'saturated He I from pressurized He I', 'solid helium from liquid helium', 'the supercritical region from the gaseous region'], correct: 0, explanation: 'The helium state diagram shows the lambda line as the boundary between the normal liquid phase He I and the superfluid phase He II, crossing at about T = 2.17 K, P = 0.05 bar. (Lecture 11, Folie 9)' },
  { id: 'qz_kf_l11_10', category: 'L11 — Cryogenic Technology', question: 'The helium critical point shown on the phase diagram, above which liquid and gas phases become indistinguishable, occurs at…', options: ['T = 4.2 K, P = 1 bar', 'T = 2.17 K, P = 0.05 bar', 'T = 1.9 K, P = 1 bar', 'T = 5.2 K, P = 2.23 bar'], correct: 3, explanation: 'The helium state diagram marks the critical point (onset of the supercritical region) at T = 5.2 K and P = 2.23 bar, above which there is no distinct liquid-gas phase boundary. (Lecture 11, Folie 9)' },
  { id: 'qz_kf_l11_11', category: 'L11 — Cryogenic Technology', question: 'The "conductivity integral" of a material, ∫k(T)dT from 0 to some temperature, is a useful parameter in cryogenic conduction analysis mainly because…', options: ['it gives the emissivity of the material directly', 'it is only relevant for superconductors', 'it replaces the need for Fourier\'s law entirely', 'thermal conductivity k(T) varies strongly with temperature at cryogenic conditions, so integrating captures the total conductive effect over the range'], correct: 3, explanation: 'Because thermal conductivity changes dramatically at cryogenic temperatures, Fourier\'s law Q = k(T)A dT/dx requires integrating k(T) over the temperature range; the conductivity integral tabulates this for materials like copper, aluminum alloy, stainless steel, and G10 GFRP. (Lecture 11, Folie 11)' },
  { id: 'qz_kf_l11_12', category: 'L11 — Cryogenic Technology', question: 'Comparing the conductivity integral values (0→300K) given in the lecture, which material conducts heat the least, making it attractive for structural supports that must minimize conductive heat leaks?', options: ['G10 GFRP', 'OFHC Copper', '304 Stainless steel', '2024 Aluminium alloy'], correct: 0, explanation: 'G10 GFRP has by far the lowest conductivity integral (153 W/m from 0-300K) compared to copper (152000), aluminium alloy (22900), and stainless steel (3060), which is why it is used for low-conductivity structural supports in cryogenic systems. (Lecture 11, Folie 11)' },
  { id: 'qz_kf_l11_13', category: 'L11 — Cryogenic Technology', question: 'Radiative heat transfer in cryogenic systems follows the Stefan-Boltzmann law, Q = εσAT⁴. A key trend noted in the lecture is that…', options: ['emissivity is independent of surface finish', 'radiative heat transfer becomes negligible below 4 K regardless of surface finish', 'emissivity decreases at low temperature for good electrical conductors and polished surfaces', 'emissivity increases sharply at low temperature for all materials'], correct: 2, explanation: 'The lecture states emissivity decreases at low temperature for good electrical conductors and polished surfaces, which is why polished or electropolished metals are preferred for minimizing radiative heat load in cryogenic systems (as shown in the emissivity table). (Lecture 11, Folie 12)' },
  { id: 'qz_kf_l11_14', category: 'L11 — Cryogenic Technology', question: 'Per the emissivity table, which surface finish gives the lowest emissivity in the liquid helium temperature range?', options: ['Aluminum, rough', 'Aluminum, anodized', 'Stainless steel with aluminum foil', 'Stainless steel, rough'], correct: 2, explanation: 'The table lists stainless steel with aluminum foil at an emissivity of only 0.01 in the liquid helium range, far lower than rough or even polished/electropolished stainless steel or aluminum, illustrating why aluminum foil layers are used in insulation. (Lecture 11, Folie 12)' },
  { id: 'qz_kf_l11_15', category: 'L11 — Cryogenic Technology', question: 'Inserting a single floating-temperature radiation shield of the same emissivity between two surfaces reduces the radiative heat flux by a factor of…', options: ['N (number of layers)', '4', 'It has no effect unless actively cooled', '2'], correct: 3, explanation: 'The lecture shows that one intermediate floating shield halves the exchanged radiative heat flux, and generalizes this to a reduction factor of N+1 for N layers in the ideal case, which is the basis for multilayer insulation (MLI). (Lecture 11, Folie 13)' },
  { id: 'qz_kf_l11_16', category: 'L11 — Cryogenic Technology', question: 'For an ideal multilayer insulation (MLI) blanket with N reflective layers between flat surfaces, the theoretical reduction factor in radiative heat exchange compared to no shielding is…', options: ['N²', 'N + 1', 'N', '2N'], correct: 1, explanation: 'The lecture states that for N layers under ideal conditions (flat surfaces, uniform emissivity), the radiative heat flux reduction factor is N+1, which is the theoretical basis for using many thin reflective layers in MLI. (Lecture 11, Folie 13)' },
  { id: 'qz_kf_l11_17', category: 'L11 — Cryogenic Technology', question: 'Why does simply adding more and more layers to an MLI blanket NOT continue to proportionally reduce total heat transfer indefinitely?', options: ['Because additional layers increase solid contact conduction and trapped residual-gas conduction/convection between layers, offsetting the radiation benefit', 'Because MLI layers become superconducting after a critical number', 'Because emissivity increases with more layers', 'Because Fourier\'s law breaks down for more than 10 layers'], correct: 0, explanation: 'MLI performance is a complex combination of radiation, solid contact conduction, and residual-gas conduction; too many layers increase packing and contact conduction and trap residual gas, both of which increase heat transfer and counteract the radiative benefit. (Lecture 11, Folie 14)' },
  { id: 'qz_kf_l11_18', category: 'L11 — Cryogenic Technology', question: 'Typical multilayer insulation (MLI) is constructed from…', options: ['thick stainless steel shields welded in series', 'solid copper plates bolted together', 'aluminum or aluminized polymer films with low packing density from crinkling or net spacers', 'liquid nitrogen-filled bladders'], correct: 2, explanation: 'MLI consists of aluminium or aluminized polymer films kept at low packing density (via crinkling or net-type spacers) to minimize solid contact conduction between layers, and can be wrapped in situ or applied as prefabricated blankets. (Lecture 11, Folie 14)' },
  { id: 'qz_kf_l11_19', category: 'L11 — Cryogenic Technology', question: 'The fundamental difference between a refrigerator and a liquefier is that…', options: ['a refrigerator uses helium exclusively while a liquefier uses nitrogen exclusively', 'a liquefier requires no mechanical work input while a refrigerator does', 'a refrigerator delivers isothermal cooling capacity at the working fluid\'s liquid temperature, while a liquefier cools part of the fluid from ambient to its boiling point and delivers it as liquid product', 'a refrigerator only works above 80 K while a liquefier works below it'], correct: 2, explanation: 'The lecture distinguishes the two: a refrigerator provides continuous isothermal cooling capacity at the working fluid\'s liquid temperature, whereas a liquefier converts a portion of the working fluid into liquid product as the final output of the process. (Lecture 11, Folie 17)' },
  { id: 'qz_kf_l11_20', category: 'L11 — Cryogenic Technology', question: 'For an ideal Carnot refrigeration cycle, the minimum work Wi required to extract heat Qi from a source at Ti while rejecting heat to a sink at T0 is given by…', options: ['Wi ≥ Qi (Ti/T0)', 'Wi ≥ Qi / (T0 − Ti)', 'Wi ≥ Qi · T0 · Ti', 'Wi ≥ Qi (T0/Ti − 1)'], correct: 3, explanation: 'The lecture gives the minimum Carnot refrigeration work as Wi ≥ Qi(T0/Ti − 1), showing that the work required grows sharply as Ti (the cold temperature) decreases relative to T0 (room temperature). (Lecture 11, Folie 18)' },
  { id: 'qz_kf_l11_21', category: 'L11 — Cryogenic Technology', question: 'Why can a practical Carnot cycle NOT be used to liquefy helium between 4.5 K and 300 K?', options: ['Carnot cycles cannot involve adiabatic transformations', 'The required compression would reach about 613 kbar, which is thermodynamically ideal but practically infeasible', 'Helium has no measurable latent heat of vaporization', 'Helium becomes chemically unstable under compression'], correct: 1, explanation: 'The lecture notes that an ideal Carnot cycle for helium between 4.5 K and 300 K would require compression up to about 613 kbar, which is far beyond practical engineering limits, so alternative cycles (Joule-Thomson, Brayton, Claude) are used instead. (Lecture 11, Folie 18)' },
  { id: 'qz_kf_l11_22', category: 'L11 — Cryogenic Technology', question: 'The Claude process used for helium liquefaction is best described as…', options: ['a combination of the Brayton (expansion engine) and Joule-Thomson (throttling) processes', 'a pure Joule-Thomson throttling process with no moving parts', 'a purely mechanical refrigeration cycle using only compressors', 'a variant of the Hampson-Linde cycle used only for nitrogen'], correct: 0, explanation: 'The lecture explicitly defines the Claude process as combining the Brayton expansion-engine effect with the Joule-Thomson throttling effect, and states it is the process used for liquefying helium. (Lecture 11, Folie 18, Folie 22)' },
  { id: 'qz_kf_l11_23', category: 'L11 — Cryogenic Technology', question: 'The Joule-Thomson effect describes…', options: ['the temperature change of a real gas or liquid forced through an adiabatic orifice (throttling)', 'the heat released when tritium is bred in a blanket', 'the pressure drop across a turbo expander turbine blade', 'the change in magnetic field during quench of a superconductor'], correct: 0, explanation: 'The Joule-Thomson effect is defined as the temperature change of a real gas or liquid when forced through an adiabatic orifice, a process called throttling, and is the basis of the Joule-Thomson liquefaction process. (Lecture 11, Folie 19)' },
  { id: 'qz_kf_l11_24', category: 'L11 — Cryogenic Technology', question: 'At room temperature, which of the following gases WARMS (rather than cools) upon Joule-Thomson expansion through an orifice?', options: ['Oxygen', 'Helium', 'Argon', 'Nitrogen'], correct: 1, explanation: 'The lecture states that at room temperature, all gases except hydrogen, helium, and neon cool upon Joule-Thomson expansion; helium instead warms because room temperature is below its JT inversion temperature. (Lecture 11, Folie 19)' },
  { id: 'qz_kf_l11_25', category: 'L11 — Cryogenic Technology', question: 'The Joule-Thomson inversion temperature is defined as the temperature at which…', options: ['the Joule-Thomson coefficient changes sign', 'a gas becomes superconducting', 'the gas reaches its critical pressure', 'the gas fully liquefies at 1 bar'], correct: 0, explanation: 'The inversion temperature is the point where the sign of the Joule-Thomson coefficient (dT/dP) flips, determining whether throttling causes cooling or warming; it depends on the gas pressure before expansion. (Lecture 11, Folie 19)' },
  { id: 'qz_kf_l11_26', category: 'L11 — Cryogenic Technology', question: 'Why can helium not be cooled directly from room temperature to cryogenic levels using simple Joule-Thomson throttling alone?', options: ['Because helium has no measurable Joule-Thomson coefficient at any temperature', 'Because throttling only works for liquids, not gases', 'Because helium\'s inversion temperature at 1 bar is only about 40 K, well below room temperature, so at room temperature its JT coefficient is negative and it warms on expansion', 'Because helium reacts chemically with the orifice material at high pressure'], correct: 2, explanation: 'Since helium\'s inversion temperature at 1 bar is about 40 K, throttling it from 300 K (above the inversion temperature) causes warming rather than cooling; the lecture example shows He at 200 bar, 300 K warming to 312 K after expansion to 1 bar. (Lecture 11, Folie 21)' },
  { id: 'qz_kf_l11_27', category: 'L11 — Cryogenic Technology', question: 'The practical solution to pre-cool helium below its inversion temperature before Joule-Thomson throttling can be effective is to…', options: ['increase the throttling pressure further', 'add liquid nitrogen directly into the helium stream', 'increase the ambient temperature before compression', 'use a turbo expander so the gas performs mechanical work as it expands, cooling it directly'], correct: 3, explanation: 'The lecture shows that making the gas "work" via a turbo expander (isentropic expansion doing external work) cools helium directly — e.g., He at 20 bar, 300 K expanding to 1 bar drops to 91 K, unlike simple JT throttling which would warm it. This expansion-engine cooling is the Brayton element combined with JT throttling in the Claude process. (Lecture 11, Folie 21)' },
  { id: 'qz_kf_l11_28', category: 'L11 — Cryogenic Technology', question: 'In the multistage nitrogen liquefaction example shown in the lecture, nitrogen is progressively cooled through repeated stages of…', options: ['isothermal compression at constant 300 K', 'direct contact with liquid helium', 'adiabatic compression only', 'throttling (Joule-Thomson expansion) combined with counter-flow heat exchangers between stages'], correct: 3, explanation: 'The example shows nitrogen at 200 bar being throttled to 1 bar in successive stages (300K→270K→230K→170K→78K), using counter-flow heat exchangers between each throttling stage to progressively approach the liquefaction temperature. (Lecture 11, Folie 20)' },
  { id: 'qz_kf_l11_29', category: 'L11 — Cryogenic Technology', question: 'A cryogenic storage dewar maintains low boil-off rates primarily by…', options: ['having double (or multi-) walled construction with a high vacuum maintained between the layers', 'circulating cold nitrogen gas around the outside of the vessel', 'continuously refrigerating the liquid with an external compressor', 'chemically absorbing the vapor produced'], correct: 0, explanation: 'The lecture describes a dewar as a vacuum flask with walls of two or more layers separated by high vacuum, which provides strong thermal insulation between interior and exterior and reduces the rate of boil-off. (Lecture 11, Folie 23)' },
  { id: 'qz_kf_l11_30', category: 'L11 — Cryogenic Technology', question: 'In a sophisticated (pressurized) dewar that traps vapor above the liquid at elevated pressure, the main benefit compared to a simple open-top dewar is that…', options: ['it converts the liquid to superfluid state', 'it eliminates the need for vacuum insulation entirely', 'it lowers the boiling point, causing faster evaporative cooling', 'it raises the boiling point of the liquid, and the trapped pressure can be used to push the fluid out of the dewar'], correct: 3, explanation: 'Trapping and pressurizing the vapor above the liquid raises the fluid\'s boiling point (since boiling point increases with pressure) and the built-up pressure can be used to expel the liquid from the dewar, avoiding the need for a separate pump. (Lecture 11, Folie 23)' },
  { id: 'qz_kf_l11_31', category: 'L11 — Cryogenic Technology', question: 'Among the main cryogenic users in a fusion reactor, which system typically operates at the lowest temperature (~3.7 K)?', options: ['Cryopumps', 'Current leads', 'Superconducting magnet coils', 'Thermal shields'], correct: 0, explanation: 'The lecture lists cryopump cooling as using liquid helium at about 3.7 K, which is colder than the magnet system (supercritical helium at ~4.5 K), current leads (~50 K), and thermal shields (~80 K). (Lecture 11, Folie 26)' },
  { id: 'qz_kf_l11_32', category: 'L11 — Cryogenic Technology', question: 'In a fusion reactor cryogenic system, the superconducting magnet coils are typically cooled using…', options: ['liquid nitrogen at 77 K', 'supercritical helium at about 4.5 K', 'liquid helium-3 at 3.19 K', 'gaseous helium at 50 K'], correct: 1, explanation: 'The lecture specifies that the magnet system is cooled with supercritical helium at approximately 4.5 K, distinct from cryopumps (liquid He ~3.7 K), current leads (~50 K), and thermal shields (~80 K, often via LN2). (Lecture 11, Folie 26)' },
  { id: 'qz_kf_l11_33', category: 'L11 — Cryogenic Technology', question: 'The "current leads" that feed electrical current into superconducting magnets are typically cooled to around…', options: ['3.7 K', '50 K', '4.5 K', '300 K'], correct: 1, explanation: 'The lecture lists current lead cooling at approximately 50 K, an intermediate temperature between the ~4.5 K magnet coils and the ~80 K thermal shields, reflecting the temperature gradient current leads must bridge. (Lecture 11, Folie 26)' },
  { id: 'qz_kf_l11_34', category: 'L11 — Cryogenic Technology', question: 'The Refrigerator Cold Box (RCB) in a fusion cryoplant primarily contains…', options: ['the plasma heating antennas and gyrotrons', 'the main heat exchangers, liquid nitrogen precooling, an 80 K purifier, and expansion turbines', 'the tritium breeding blanket modules', 'the vacuum vessel thermal shield segments only'], correct: 1, explanation: 'The lecture describes the RCB as containing the main heat exchangers, LN2 precooling, an integrated 80 K purifier, and expansion turbines that together provide refrigeration at multiple temperature levels for the plant. (Lecture 11, Folie 27)' },
  { id: 'qz_kf_l11_35', category: 'L11 — Cryogenic Technology', question: 'The Auxiliary Cold Box (ACB) in a fusion cryoplant is primarily responsible for…', options: ['liquid helium storage, subcooling for the cryopump coolant, and circulating supercritical helium to plant users via cold compressors and circulators', 'housing the toroidal field coil conductors', 'warm helium compression and oil/water removal', 'RF power generation for plasma heating'], correct: 0, explanation: 'The lecture states the ACB includes liquid helium storage, a subcooler for cryopump precooling, a cold compressor to subcool the liquid helium further, and cryogenic circulators that push supercritical helium through plant users like coils and structures. (Lecture 11, Folie 27)' },
  { id: 'qz_kf_l11_36', category: 'L11 — Cryogenic Technology', question: 'The primary purpose of the warm helium compressor subsystem in a fusion cryoplant is to…', options: ['generate the toroidal magnetic field', 'directly cool the superconducting coils', 'compress and clean helium gas (removing oil and water, controlling pressure) before it enters the cold refrigeration stages', 'store liquid nitrogen for the thermal shields'], correct: 2, explanation: 'The warm helium compressors, together with oil/water removal, pressure control, gas management, and additional vacuum pumps, prepare and compress the helium gas before it is processed through the cold boxes to reach cryogenic temperatures. (Lecture 11, Folie 27)' },
  { id: 'qz_kf_l11_37', category: 'L11 — Cryogenic Technology', question: 'The primary purpose of the quench tank in a fusion reactor cryoplant is to…', options: ['purify helium gas of impurities before liquefaction', 'house the expansion turbines', 'store liquid nitrogen for precooling', 'recover cold helium gas released after a magnet quench or fast discharge of the superconducting coils'], correct: 3, explanation: 'The lecture lists at least one quench tank in the gas storage and distribution subsystem, whose role is to recover the cold helium gas that is rapidly expelled following a superconducting coil quench or fast discharge, protecting the system from overpressure. (Lecture 11, Folie 28)' },
  { id: 'qz_kf_l11_38', category: 'L11 — Cryogenic Technology', question: 'Cryogenic transfer lines connecting a cryoplant to magnets, thermal shields, current leads, and cryopumps are designed so that…', options: ['only one temperature level can be transported per line', 'temperature, vapour quality, and pressure changes along the line are negligibly small', 'no insulation is needed since the fluid is already cold', 'the fluid is allowed to fully vaporize before reaching the user'], correct: 1, explanation: 'The lecture specifies that cryogenic transfer lines are designed so that temperature, vapour quality, and pressure changes remain negligibly small during transport, which is why they use vacuum jacketing and, for complex plants, multiple insulated channels for different users. (Lecture 11, Folie 36)' },
  { id: 'qz_kf_l11_39', category: 'L11 — Cryogenic Technology', question: 'In sophisticated multi-channel cryogenic transfer lines, the individual fluid channels are supported within the line using…', options: ['liquid nitrogen filled cushions', 'high thermal conductivity copper brackets', 'low thermal conductivity supports made of low-temperature resistant plastic such as G10/GFRP', 'direct welding to the outer vacuum jacket'], correct: 2, explanation: 'To minimize conductive heat leaks into the cold channels, the channels are held in place by low-thermal-conductivity supports made of materials like G10 GFRP, consistent with G10\'s very low conductivity integral shown earlier in the lecture. (Lecture 11, Folie 37)' },
  { id: 'qz_kf_l11_40', category: 'L11 — Cryogenic Technology', question: 'Cryogenic transfer line segments are connected using flexible bellows mainly in order to…', options: ['allow easy disassembly for maintenance only', 'increase the flow velocity of the cryogenic fluid', 'compensate for thermal contraction that occurs during cool-down', 'reduce the vacuum quality requirement'], correct: 2, explanation: 'The lecture notes that channel segments are connected by flexible bellows specifically to compensate for the contraction that occurs as the line cools down from room temperature to cryogenic temperature, preventing mechanical stress buildup. (Lecture 11, Folie 37)' },
  { id: 'qz_kf_l11_41', category: 'L11 — Cryogenic Technology', question: 'The primary function of thermal shields (such as the ITER VVTS, CTS, and PTS) in a fusion reactor is to…', options: ['protect the cold mass from heat radiation coming from warm structures like the cryostat or vacuum vessel', 'breed tritium from lithium', 'generate the toroidal magnetic field', 'provide the vacuum seal of the cryostat'], correct: 0, explanation: 'Thermal shields are complex insulating structures that intercept radiative heat from warm surfaces (cryostat, vacuum vessel) before it reaches the cold superconducting magnets, and are split into vacuum vessel (VVTS), cryostat (CTS), and port (PTS) thermal shields. (Lecture 11, Folie 39)' },
  { id: 'qz_kf_l11_42', category: 'L11 — Cryogenic Technology', question: 'Thermal shields are typically made of stainless steel that is polished or plated in order to…', options: ['increase mechanical strength at cryogenic temperature', 'improve compatibility with liquid nitrogen cooling channels', 'minimize surface emissivity and thereby reduce radiative heat transfer', 'increase electrical conductivity for eddy current shielding'], correct: 2, explanation: 'Polishing or plating the stainless steel shield surfaces minimizes emissivity, directly reducing the εσAT⁴ radiative heat transfer per the Stefan-Boltzmann law, consistent with the emissivity data shown earlier for polished vs. rough surfaces. (Lecture 11, Folie 39)' },
  { id: 'qz_kf_l11_43', category: 'L11 — Cryogenic Technology', question: 'Thermal shields are actively cooled at around 80 K mainly because…', options: ['80 K is required to keep the vacuum vessel warm', '80 K is the boiling point of helium', 'it prevents the plasma from disrupting', 'it allows efficient use of readily available and cheap liquid nitrogen heat exchangers, while dramatically reducing the radiative heat load reaching the 4 K loop'], correct: 3, explanation: 'Cooling shields with LN2 at ~80 K is cost-effective since nitrogen is cheap and abundant, and the lecture shows quantitatively that the radiative term between 300 K and 80 K is about 200 times larger than between 80 K and 4 K, so intercepting heat at 80 K greatly reduces the load on the expensive 4 K refrigeration loop. (Lecture 11, Folie 40, Folie 41)' },
  { id: 'qz_kf_l11_44', category: 'L11 — Cryogenic Technology', question: 'Based on the Stefan-Boltzmann radiative heat transfer breakdown shown in the lecture (300⁴ - 4⁴ split into 300⁴-80⁴ and 80⁴-4⁴ terms), the radiative heat transfer between 300 K and 80 K compared to that between 80 K and 4 K is approximately…', options: ['equal in magnitude', 'about 200 times larger', 'about 10 times smaller', 'negligibly small in both cases'], correct: 1, explanation: 'The lecture explicitly states that the radiative term between 300 K and 80 K is about 200 times larger than the term between 80 K and 4 K, which is the quantitative justification for introducing an 80 K thermal shield to protect the magnets and reduce cryoplant load. (Lecture 11, Folie 41)' },
  { id: 'qz_kf_l11_45', category: 'L11 — Cryogenic Technology', question: 'For superconducting magnets cooled by a liquid helium bath (as opposed to forced supercritical flow), a key characteristic is that…', options: ['the temperature increases continuously along the conductor with the heat load', 'the coolant is a two-phase system at constant temperature defined by the pressure level (e.g. 4.4 K at 1.2 bar), requiring close contact between conductor and helium', 'the coolant is single-phase supercritical fluid throughout', 'thermo-physical properties are pressure-independent'], correct: 1, explanation: 'Liquid helium bath cooling maintains a constant temperature two-phase system whose temperature is set by the pressure (e.g., 4.4 K at 1.2 bar), and requires close thermal contact between the conductor and the surrounding helium bath for effective cooling. (Lecture 11, Folie 47)' },

  <script>
/**
 * SM-2 Spaced Repetition Algorithm
 * Based on SuperMemo SM-2 by Piotr Wozniak (1987)
 *
 * Rating scale:
 *   0 = complete blackout / again
 *   1 = incorrect, but correct answer easy to recall
 *   2 = hard — correct with serious difficulty
 *   3 = good — correct with some hesitation
 *   4 = easy — correct after brief hesitation
 *   5 = perfect — immediate correct response
 */

const SM2 = (() => {

  const STORAGE_KEY = 'cogsys_sm2_v2';

  function load() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    } catch { return {}; }
  }

  function save(data) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
  }

  /**
   * Returns a card state object, creating a fresh one if not found.
   * cardId: unique string identifier for the card
   */
  function getCard(cardId) {
    const data = load();
    if (!data[cardId]) {
      data[cardId] = {
        id: cardId,
        interval: 1,       // days until next review
        repetition: 0,     // number of times reviewed successfully
        ef: 2.5,           // easiness factor
        nextReview: 0,     // timestamp ms — 0 = new, due now
        lastReview: null,
        totalReviews: 0,
        correctStreak: 0,
      };
      save(data);
    }
    return data[cardId];
  }

  /**
   * Apply a rating (0-5) to a card and return the updated card.
   */
  function review(cardId, rating) {
    const data = load();
    let card = data[cardId] || getCard(cardId);

    const now = Date.now();
    card.lastReview = now;
    card.totalReviews += 1;

    if (rating < 3) {
      // Failed — reset repetition, keep ef, short interval
      card.repetition = 0;
      card.interval = 1;
      card.correctStreak = 0;
    } else {
      // Passed
      card.correctStreak += 1;
      if (card.repetition === 0) {
        card.interval = 1;
      } else if (card.repetition === 1) {
        card.interval = 6;
      } else {
        card.interval = Math.round(card.interval * card.ef);
      }
      card.repetition += 1;

      // Update EF: EF' = EF + (0.1 - (5-q) * (0.08 + (5-q) * 0.02))
      const q = rating;
      card.ef = card.ef + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02));
      if (card.ef < 1.3) card.ef = 1.3;
    }

    // Cap interval at 365 days
    card.interval = Math.min(card.interval, 365);

    // Schedule next review
    card.nextReview = now + card.interval * 24 * 60 * 60 * 1000;

    data[cardId] = card;
    save(data);
    return card;
  }

  /**
   * Returns true if card is due now (or new).
   */
  function isDue(cardId) {
    const card = getCard(cardId);
    return Date.now() >= card.nextReview;
  }

  /**
   * Format next review interval nicely.
   */
  function formatInterval(cardId) {
    const card = getCard(cardId);
    if (!card.lastReview) return 'New';
    const days = card.interval;
    if (days < 1) return 'Today';
    if (days === 1) return '1 day';
    if (days < 7) return `${days} days`;
    if (days < 30) return `${Math.round(days/7)} wk`;
    return `${Math.round(days/30)} mo`;
  }

  /**
   * Get all due cards from a list of card IDs.
   */
  function getDueCards(cardIds) {
    return cardIds.filter(id => isDue(id));
  }

  /**
   * Get stats for a set of card IDs.
   */
  function getStats(cardIds) {
    const data = load();
    let newCards = 0, due = 0, learned = 0, totalReviews = 0;
    const now = Date.now();

    cardIds.forEach(id => {
      const card = data[id];
      if (!card || card.totalReviews === 0) {
        newCards++;
      } else if (now >= card.nextReview) {
        due++;
      } else {
        learned++;
      }
      if (card) totalReviews += card.totalReviews || 0;
    });

    return { newCards, due, learned, totalReviews, total: cardIds.length };
  }

  /**
   * Sort card IDs: due first (sorted by most overdue), then new.
   */
  function sortForStudy(cardIds) {
    const data = load();
    const now = Date.now();

    return [...cardIds].sort((a, b) => {
      const ca = data[a];
      const cb = data[b];
      const aNew = !ca || ca.totalReviews === 0;
      const bNew = !cb || cb.totalReviews === 0;

      if (aNew && bNew) return 0;
      if (aNew) return 1;   // new cards after due
      if (bNew) return -1;

      const aDue = now - ca.nextReview;
      const bDue = now - cb.nextReview;
      return bDue - aDue; // most overdue first
    });
  }

  /**
   * Reset all SM2 data (for debugging).
   */
  function resetAll() {
    localStorage.removeItem(STORAGE_KEY);
  }

  /**
   * Get overall progress across all known cards.
   */
  function getAllStats() {
    const data = load();
    const allIds = Object.keys(data);
    return getStats(allIds);
  }

  return { getCard, review, isDue, formatInterval, getDueCards, getStats, sortForStudy, resetAll, getAllStats };
})();

  <script>
/**
 * Quiz SRS — Leitner-style adaptive weighting for multiple-choice quiz mode
 * Wrong / new questions come back around far more often than mastered ones,
 * mirroring the SM-2 flashcard behaviour but tuned for MC quizzes.
 *
 * box 0 = new or just missed → always included, shown first
 * box 1 = correct once        → always included
 * box 2 = correct 2x in a row → included ~75% of the time
 * box 3 = correct 3x in a row → included ~50% of the time
 * box 4 = mastered (4x+)      → included ~30% of the time (light retention check)
 */
const QuizSRS = (() => {
  const KEY = 'quiz_srs_v1';
  const INCLUDE_PROB = [1, 1, 0.75, 0.5, 0.3];

  function load() {
    try { return JSON.parse(localStorage.getItem(KEY) || '{}'); } catch { return {}; }
  }
  function save(d) {
    try { localStorage.setItem(KEY, JSON.stringify(d)); } catch {}
  }

  function getEntry(id) {
    const d = load();
    return d[id] || { box: 0, seen: 0, correct: 0, wrong: 0, streak: 0, lastSeen: null };
  }

  function record(id, correct) {
    const d = load();
    const e = d[id] || { box: 0, seen: 0, correct: 0, wrong: 0, streak: 0, lastSeen: null };
    e.seen += 1;
    e.lastSeen = Date.now();
    if (correct) {
      e.correct += 1;
      e.streak += 1;
      e.box = Math.min(e.box + 1, 4);
    } else {
      e.wrong += 1;
      e.streak = 0;
      e.box = 0;
    }
    d[id] = e;
    save(d);
    return e;
  }

  /** Build an adaptively-ordered question list: weak items first, mastered items thinned out. */
  function buildSession(ids) {
    const d = load();
    const weak = [];
    const rest = [];
    ids.forEach(id => {
      const e = d[id];
      const box = e ? e.box : 0;
      if (!e || e.seen === 0 || box === 0) { weak.push(id); return; }
      const prob = INCLUDE_PROB[Math.min(box, INCLUDE_PROB.length - 1)];
      if (Math.random() < prob) rest.push(id);
    });
    if (weak.length === 0 && rest.length === 0) rest.push(...ids);
    return [...shuffleArray(weak), ...shuffleArray(rest)];
  }

  function getStats(ids) {
    const d = load();
    let mastered = 0, learning = 0, wrong = 0, unseen = 0;
    ids.forEach(id => {
      const e = d[id];
      if (!e || e.seen === 0) unseen++;
      else if (e.box >= 3) mastered++;
      else if (e.box === 0) wrong++;
      else learning++;
    });
    return { mastered, learning, wrong, unseen, total: ids.length };
  }

  function resetAll() { localStorage.removeItem(KEY); }

  return { getEntry, record, buildSession, getStats, resetAll };
})();

  <script>
/**
 * Game — XP, Levels & Titles
 * Turns studying into a light RPG progression system.
 */
const Game = (() => {
  const KEY = 'game_xp_v1';

  function load() {
    try { return JSON.parse(localStorage.getItem(KEY) || '{"xp":0}'); } catch { return { xp: 0 }; }
  }
  function save(d) {
    try { localStorage.setItem(KEY, JSON.stringify(d)); } catch {}
  }

  function getXP() { return load().xp || 0; }

  function addXP(n) {
    const d = load();
    d.xp = (d.xp || 0) + n;
    save(d);
    return d.xp;
  }

  function levelXPFloor(level) { return (level - 1) * (level - 1) * 40; }

  function levelForXP(xp) {
    let level = 1;
    while (xp >= levelXPFloor(level + 1)) level++;
    return level;
  }

  const TITLES = [
    'Novize', 'Lernling', 'Grübler', 'Wissenshungrig', 'Konzept-Jäger',
    'Fleißige Biene', 'Klausur-Kadett', 'Prüfungs-Stratege', 'Fusions-Adept',
    'Reaktor-Ingenieur', 'Klausur-Meister', 'Quiz-Champion', 'Wissens-Titan', 'Legende',
  ];
  function titleForLevel(level) { return TITLES[Math.min(level - 1, TITLES.length - 1)]; }

  function getLevelInfo() {
    const xp = getXP();
    const level = levelForXP(xp);
    const curFloor = levelXPFloor(level);
    const nextFloor = levelXPFloor(level + 1);
    const pct = Math.round(((xp - curFloor) / Math.max(nextFloor - curFloor, 1)) * 100);
    return { xp, level, title: titleForLevel(level), curFloor, nextFloor, pct: Math.max(0, Math.min(100, pct)) };
  }

  function resetAll() { localStorage.removeItem(KEY); }

  const COMBO_KEY = 'game_best_combo_v1';
  function getBestCombo() {
    try { return parseInt(localStorage.getItem(COMBO_KEY) || '0'); } catch { return 0; }
  }
  function reportCombo(n) {
    if (n > getBestCombo()) { try { localStorage.setItem(COMBO_KEY, String(n)); } catch {} }
  }

  return { addXP, getXP, getLevelInfo, resetAll, getBestCombo, reportCombo };
})();

  <script>
/**
 * CogSys PWA — Main App Controller
 * Handles: navigation, all 4 study modes, SM-2 integration, progress tracking
 */

// ── App State ────────────────────────────────────────────────────────────────
const State = {
  activeScreen: 'home',
  activeModule: null,
  activeTopic: null,
  activeMode: 'guided',
  sessionItems: [],
  sessionIndex: 0,
  sessionCorrect: 0,
  cardFlipped: false,
  combo: 0,
  bestCombo: 0,
};

// ── Storage helpers ──────────────────────────────────────────────────────────
const Store = {
  KEY: 'cogsys_progress_v2',
  STREAK_KEY: 'cogsys_streak_v2',

  load() {
    try { return JSON.parse(localStorage.getItem(this.KEY) || '{}'); } catch { return {}; }
  },
  save(data) {
    try { localStorage.setItem(this.KEY, JSON.stringify(data)); } catch {}
  },
  markResult(itemId, correct) {
    const d = this.load();
    if (!d[itemId]) d[itemId] = { seen: 0, correct: 0, lastSeen: null };
    d[itemId].seen += 1;
    if (correct) d[itemId].correct += 1;
    d[itemId].lastSeen = Date.now();
    this.save(d);
  },
  getAccuracy(itemId) {
    const d = this.load();
    const s = d[itemId];
    if (!s || s.seen === 0) return null;
    return Math.round((s.correct / s.seen) * 100);
  },
  getTopicProgress(topicId) {
    const topic = DATA.getTopic(topicId);
    if (!topic) return 0;
    const allIds = [
      ...(topic.flashcards||[]).map(c=>c.id),
      ...(topic.quiz||[]).map(c=>c.id),
      ...(topic.fillblank||[]).map(c=>c.id),
      ...(topic.open||[]).map(c=>c.id),
    ];
    if (allIds.length === 0) return 0;
    const d = this.load();
    const seen = allIds.filter(id => d[id] && d[id].seen > 0).length;
    return Math.round((seen / allIds.length) * 100);
  },
  updateStreak() {
    try {
      const today = new Date().toDateString();
      let s = JSON.parse(localStorage.getItem(this.STREAK_KEY) || '{"dates":[],"last":null}');
      if (s.last !== today) {
        s.dates.push(today);
        if (s.dates.length > 30) s.dates = s.dates.slice(-30);
        s.last = today;
        localStorage.setItem(this.STREAK_KEY, JSON.stringify(s));
      }
    } catch {}
  },
  getStreak() {
    try {
      return JSON.parse(localStorage.getItem(this.STREAK_KEY) || '{"dates":[],"last":null}');
    } catch { return { dates: [], last: null }; }
  }
};

// ── Cross-module helpers ─────────────────────────────────────────────────────
const MODE_TYPES = ['guided', 'flashcard', 'quiz', 'fillblank', 'open'];
const MODE_LABELS = { guided: 'Guided', flashcard: 'Flashcards', quiz: 'Quiz', fillblank: 'Fill Blank', open: 'Open Q' };

function getTopicItemIds(topic, type) {
  if (type) return (topic[type === 'flashcard' ? 'flashcards' : type] || []).map(c => c.id);
  return [
    ...(topic.flashcards || []).map(c => c.id),
    ...(topic.quiz || []).map(c => c.id),
    ...(topic.fillblank || []).map(c => c.id),
    ...(topic.open || []).map(c => c.id),
  ];
}

function getModuleItemIds(module, type) {
  return (module.topics || []).flatMap(t => getTopicItemIds(t, type));
}

function moduleHasMode(module, type) {
  return (module.topics || []).some(t => (getTopicItemIds(t, type)).length > 0);
}

function getModuleQuizStats(module) {
  return QuizSRS.getStats(getModuleItemIds(module, 'quiz'));
}

function getModuleProgressPct(module) {
  const allIds = getModuleItemIds(module);
  if (allIds.length === 0) return 0;
  const d = Store.load();
  const seen = allIds.filter(id => d[id] && d[id].seen > 0).length;
  return Math.round((seen / allIds.length) * 100);
}

function showXPToast(text) {
  const el = document.createElement('div');
  el.className = 'xp-toast';
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1650);
}

function renderRing(pct, color, sizeClass, centerHtml) {
  const deg = Math.max(0, Math.min(100, pct)) * 3.6;
  return `
    <div class="ring ${sizeClass || ''}" style="background:conic-gradient(${color} ${deg}deg, rgba(255,255,255,0.07) ${deg}deg);">
      <div class="ring-center">${centerHtml}</div>
    </div>
  `;
}

/** Multi-segment donut, e.g. [{value, color}, ...] for mastered/learning/wrong/unseen breakdowns. */
function renderMultiRing(segments, sizeClass, centerHtml) {
  const total = segments.reduce((s, x) => s + x.value, 0) || 1;
  let acc = 0;
  const stops = segments.map(seg => {
    const start = (acc / total) * 360;
    acc += seg.value;
    const end = (acc / total) * 360;
    return `${seg.color} ${start}deg ${end}deg`;
  }).join(', ');
  return `
    <div class="ring ${sizeClass || ''}" style="background:conic-gradient(${stops});">
      <div class="ring-center">${centerHtml}</div>
    </div>
  `;
}

// ── Screen Navigation ────────────────────────────────────────────────────────
function showScreen(id) {

  if (id === 'home')  renderHome();

    renderModePills();
    renderTopicList();

// ── Neuron Net Canvas ────────────────────────────────────────────────────────
function drawNeuronNet() {
  const canvas = document.getElementById('neuronNet');
  if (!canvas || canvas.tagName !== 'CANVAS') {
    // Replace div with canvas
    const c = document.createElement('canvas');
    c.id = 'neuronNet';
    c.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;';
    canvas.replaceWith(c);
    animateNeuronNet(c);
  }
}

function animateNeuronNet(canvas) {
  const ctx = canvas.getContext('2d');
  let nodes = [];
  let w, h;

  function resize() {
    w = canvas.width  = canvas.offsetWidth  || window.innerWidth;
    h = canvas.height = canvas.offsetHeight || window.innerHeight;
  }
  resize();
  window.addEventListener('resize', () => { resize(); initNodes(); });

  function initNodes() {
    const count = Math.floor((w * h) / 18000);
    nodes = Array.from({length: Math.min(count, 40)}, () => ({
      x: Math.random() * w, y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
      r: 2 + Math.random() * 2,
      pulse: Math.random() * Math.PI * 2,
    }));
  }
  initNodes();

  let raf;
  function draw() {
    ctx.clearRect(0, 0, w, h);
    const t = Date.now() / 1000;

    nodes.forEach(n => {
      n.x += n.vx; n.y += n.vy;
      if (n.x < 0 || n.x > w) n.vx *= -1;
      if (n.y < 0 || n.y > h) n.vy *= -1;
      n.pulse += 0.02;
    });

    // Draw edges
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i+1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 150) {
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.strokeStyle = `rgba(59,130,246,${0.15 * (1 - dist/150)})`;
          ctx.lineWidth = 0.8;
          ctx.stroke();
        }
      }
    }

    // Draw nodes
    nodes.forEach(n => {
      const pulse = 0.5 + 0.5 * Math.sin(n.pulse);
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(6,182,212,${0.3 + 0.4 * pulse})`;
      ctx.fill();
    });

    raf = requestAnimationFrame(draw);
  }
  draw();

  // Pause when off-screen
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) cancelAnimationFrame(raf);
    else draw();
  });
}

// ── Topic List Screen ────────────────────────────────────────────────────────
function renderTopicList() {
  const el = document.getElementById('topicList');
  const module = State.activeModule || MODULES[0];

    }
    const deckLink = t.slideDeck ? `<a href="${encodeURI(t.slideDeck)}" target="_blank" rel="noopener" class="ti-deck-link" onclick="event.stopPropagation()">📄 Folien öffnen</a>` : '';
    return `
      <div class="topic-item ${count === 0 ? 'topic-item-empty' : ''}" data-topic="${t.id}">
        <div class="ti-icon">${t.icon}</div>
        <div class="ti-body">

// ── Mode Pills (dynamic per module) ─────────────────────────────────────────
function renderModePills() {
  const el = document.getElementById('modePills');
  const module = State.activeModule || MODULES[0];
  const available = MODE_TYPES.filter(t => moduleHasMode(module, t));

  if (!available.includes(State.activeMode)) {
    State.activeMode = available[0] || 'quiz';
  }

  el.innerHTML = available.map(t =>
    `<button class="pill ${t === State.activeMode ? 'active' : ''}" data-mode="${t}">${MODE_LABELS[t]}</button>`
  ).join('');

  el.querySelectorAll('.pill').forEach(pill => {
    pill.addEventListener('click', () => {
      el.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      State.activeMode = pill.dataset.mode;
      renderTopicList();
    });
