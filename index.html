<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0a0f1e"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Klausur Quest — Exam Prep Hub</title>
  
  <style>
/* ─── Reset & Base ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0a0f1e;
  --bg2:      #111827;
  --bg3:      #1a2236;
  --border:   rgba(255,255,255,0.08);
  --blue:     #3b82f6;
  --blue-dim: #1d4ed8;
  --cyan:     #06b6d4;
  --green:    #22c55e;
  --yellow:   #eab308;
  --red:      #ef4444;
  --purple:   #a855f7;
  --text:     #f1f5f9;
  --text-dim: #94a3b8;
  --text-faint: #475569;
  --radius:   16px;
  --radius-sm: 10px;
  --nav-h:    68px;
  --header-h: 56px;
  --ease:     cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}

#app {
  height: 100dvh;
  padding-bottom: var(--nav-h);
  position: relative;
  overflow: hidden;
}

/* ─── Screens ───────────────────────────────────────────────────────────── */
.screen {
  position: absolute;
  inset: 0;
  bottom: var(--nav-h);
  overflow-y: auto;
  overflow-x: hidden;
  opacity: 0;
  pointer-events: none;
  transform: translateY(12px);
  transition: opacity 0.3s var(--ease), transform 0.3s var(--ease);
  -webkit-overflow-scrolling: touch;
}

.screen.active {
  opacity: 1;
  pointer-events: all;
  transform: translateY(0);
}

/* ─── Home Screen ───────────────────────────────────────────────────────── */
.home-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

#neuronNet {
  width: 100%; height: 100%;
  opacity: 0.35;
}

.home-content {
  position: relative;
  z-index: 1;
  padding: 56px 24px 24px;
  min-height: 100%;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.home-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 999px;
  border: 1px solid var(--cyan);
  color: var(--cyan);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  width: fit-content;
  animation: fadeInDown 0.5s var(--ease) both;
}

.home-title {
  font-size: clamp(42px, 11vw, 60px);
  font-weight: 800;
  line-height: 1.05;
  letter-spacing: -2px;
  background: linear-gradient(135deg, #fff 0%, var(--cyan) 60%, var(--blue) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: fadeInDown 0.55s 0.05s var(--ease) both;
}

.home-sub {
  color: var(--text-dim);
  font-size: 14px;
  line-height: 1.6;
  animation: fadeInDown 0.55s 0.1s var(--ease) both;
}

/* ─── Exam Grid (Home — pick your Klausur) ─────────────────────────────── */
.exam-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
  animation: fadeInDown 0.55s 0.2s var(--ease) both;
}

.exam-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 14px;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s var(--ease), border-color 0.2s, box-shadow 0.2s;
}
.exam-card:active { transform: scale(0.98); }
.exam-card:hover { border-color: var(--card-accent, var(--blue)); box-shadow: 0 0 24px rgba(59,130,246,0.12); }
.exam-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; bottom: 0;
  width: 3px;
  background: var(--card-accent, var(--blue));
}
.exam-card.locked { cursor: default; opacity: 0.55; }
.exam-card.locked:hover { border-color: var(--border); box-shadow: none; }

.ec-icon {
  font-size: 30px;
  width: 54px; height: 54px;
  flex-shrink: 0;
  border-radius: 14px;
  background: rgba(255,255,255,0.04);
  display: flex; align-items: center; justify-content: center;
}
.ec-body { flex: 1; min-width: 0; }
.ec-name { font-size: 16px; font-weight: 700; color: var(--text); }
.ec-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.ec-meta { font-size: 11px; color: var(--text-faint); margin-top: 6px; display: flex; gap: 10px; flex-wrap: wrap; }
.ec-soon {
  display: inline-block; margin-top: 6px; padding: 2px 9px; border-radius: 999px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
  background: rgba(148,163,184,0.12); color: var(--text-faint); border: 1px solid var(--border);
}
.ec-arrow { color: var(--text-faint); font-size: 20px; flex-shrink: 0; }
.ec-ring { flex-shrink: 0; }

/* ─── XP / Level Card ───────────────────────────────────────────────────── */
.xp-card {
  background: linear-gradient(135deg, #0f1f3d, #162040);
  border: 1px solid rgba(59,130,246,0.3);
  border-radius: var(--radius);
  padding: 18px 20px;
  animation: fadeInDown 0.5s var(--ease) both;
}
.xp-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.xp-level {
  display: flex; align-items: center; gap: 10px;
}
.xp-badge {
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, var(--blue), var(--cyan));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800; color: #fff;
  box-shadow: 0 0 16px rgba(59,130,246,0.4);
  flex-shrink: 0;
}
.xp-title { font-size: 14px; font-weight: 700; color: var(--text); }
.xp-title-sub { font-size: 11px; color: var(--text-dim); }
.xp-streak { text-align: right; font-size: 12px; color: var(--yellow); font-weight: 700; white-space: nowrap; }
.xp-bar-track { margin-top: 14px; height: 8px; background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden; }
.xp-bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--blue), var(--cyan)); transition: width 0.8s var(--ease); }
.xp-bar-label { margin-top: 6px; font-size: 11px; color: var(--text-faint); display: flex; justify-content: space-between; }

/* ─── Donut / Ring Chart ────────────────────────────────────────────────── */
.ring {
  width: 46px; height: 46px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.ring span { font-size: 11px; font-weight: 800; color: var(--text); }
.ring-lg { width: 128px; height: 128px; }
.ring-lg span { font-size: 26px; }
.ring-lg .ring-sub { font-size: 10px; font-weight: 500; color: var(--text-dim); margin-top: 2px; }
.ring-center { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 74%; height: 74%; border-radius: 50%; background: var(--bg3); }

/* ─── Combo / streak-in-session badge ───────────────────────────────────── */
.combo-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 999px;
  background: rgba(234,179,8,0.12); border: 1px solid rgba(234,179,8,0.35);
  color: var(--yellow); font-size: 13px; font-weight: 700;
  animation: comboPop 0.3s var(--ease);
}
@keyframes comboPop { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.xp-toast {
  position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
  background: var(--bg3); border: 1px solid rgba(34,197,94,0.4); color: var(--green);
  padding: 8px 18px; border-radius: 999px; font-size: 13px; font-weight: 700;
  z-index: 999; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  animation: xpToast 1.6s ease forwards;
  pointer-events: none;
}
@keyframes xpToast {
  0%   { opacity: 0; transform: translate(-50%, -10px); }
  15%  { opacity: 1; transform: translate(-50%, 0); }
  80%  { opacity: 1; transform: translate(-50%, 0); }
  100% { opacity: 0; transform: translate(-50%, -10px); }
}

/* ─── Badges grid (Stats screen) ────────────────────────────────────────── */
.badge-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
.badge-cell {
  aspect-ratio: 1; border-radius: var(--radius-sm); background: var(--bg);
  border: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; font-size: 22px; text-align: center; padding: 4px;
}
.badge-cell.earned { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.35); }
.badge-cell.locked { opacity: 0.3; filter: grayscale(1); }
.badge-cell { min-width: 0; overflow: hidden; }
.badge-cell .badge-label { font-size: 8.5px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.3px; overflow-wrap: break-word; word-break: break-word; hyphens: auto; max-width: 100%; }

.module-stat-card { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 10px; }
.module-stat-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.module-stat-head .msc-name { flex: 1; font-size: 14px; font-weight: 700; }
.msc-legend { display: flex; gap: 14px; font-size: 11px; color: var(--text-dim); flex-wrap: wrap; }
.msc-legend span { display: inline-flex; align-items: center; gap: 5px; }
.msc-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

/* ─── Buttons ───────────────────────────────────────────────────────────── */
.btn-primary {
  background: linear-gradient(135deg, var(--blue-dim), var(--blue));
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 14px 24px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: opacity 0.2s, transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-primary:active  { transform: scale(0.97); opacity: 0.9; }
.btn-primary.btn-full { width: 100%; }

.btn-secondary {
  background: var(--bg3);
  color: var(--text-dim);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 20px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-secondary:active { transform: scale(0.97); }

.btn-back {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  width: 40px; height: 40px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}

.btn-icon-only {
  background: transparent;
  border: none;
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  -webkit-tap-highlight-color: transparent;
}

.btn-icon { font-size: 18px; }

/* ─── Screen Header ─────────────────────────────────────────────────────── */
.screen-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(10, 15, 30, 0.9);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  height: var(--header-h);
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
}

.screen-header h2 {
  flex: 1;
  font-size: 17px;
  font-weight: 700;
  text-align: center;
}

.header-right { width: 40px; }

/* ─── Mode Pills ────────────────────────────────────────────────────────── */
.mode-pills {
  display: flex;
  gap: 8px;
  padding: 16px;
  overflow-x: auto;
  scrollbar-width: none;
}
.mode-pills::-webkit-scrollbar { display: none; }

.pill {
  flex-shrink: 0;
  padding: 7px 14px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text-dim);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.pill.active {
  background: var(--blue);
  border-color: var(--blue);
  color: #fff;
}

/* ─── Topic List ────────────────────────────────────────────────────────── */
.topic-list { padding: 0 16px 24px; display: flex; flex-direction: column; gap: 10px; }

.topic-item {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: transform 0.2s, border-color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.topic-item:active { transform: scale(0.98); }
.topic-item:hover  { border-color: var(--blue); }

.ti-icon { font-size: 24px; flex-shrink: 0; }
.ti-body { flex: 1; }
.ti-name { font-size: 15px; font-weight: 600; }
.ti-meta { font-size: 12px; color: var(--text-dim); margin-top: 3px; }
.ti-due { font-size: 11px; color: var(--yellow); margin-top: 4px; }
.ti-arrow { color: var(--text-faint); font-size: 18px; }

.ti-mini-bar { margin-top: 8px; height: 3px; background: var(--bg); border-radius: 999px; overflow: hidden; }
.ti-mini-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--cyan)); border-radius: 999px; }
.topic-item-empty { opacity: 0.45; cursor: default; }
.topic-item-empty:active { transform: none; }
.ti-deck-link { display: inline-block; margin-top: 8px; font-size: 11px; color: var(--cyan); text-decoration: none; }
.ti-deck-link:active { opacity: 0.7; }

/* ─── Progress Bar (study header) ──────────────────────────────────────── */
.progress-bar-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 10px;
}
.progress-bar-track {
  flex: 1;
  height: 6px;
  background: var(--bg3);
  border-radius: 999px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blue), var(--cyan));
  border-radius: 999px;
  transition: width 0.4s var(--ease);
}
.progress-label { font-size: 12px; color: var(--text-dim); white-space: nowrap; }

/* ─── Mode Containers ───────────────────────────────────────────────────── */
.mode-container { padding: 20px 20px 32px; }
.mode-container.hidden { display: none; }

/* ─── Guided Mode ───────────────────────────────────────────────────────── */
.card-wrap {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 24px;
  animation: slideUp 0.35s var(--ease) both;
}

.study-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  background: rgba(59,130,246,0.15);
  color: var(--blue);
  border: 1px solid rgba(59,130,246,0.3);
  margin-bottom: 14px;
}

.concept-title {
  font-size: 22px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 14px;
}

.concept-body {
  font-size: 15px;
  color: var(--text-dim);
  line-height: 1.7;
}

.concept-example {
  margin-top: 16px;
  padding: 12px 16px;
  background: rgba(6,182,212,0.08);
  border-left: 3px solid var(--cyan);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: 13px;
  color: var(--cyan);
  line-height: 1.6;
}

.action-row {
  display: flex;
  gap: 12px;
}
.action-row .btn-secondary,
.action-row .btn-primary { flex: 1; }

/* ─── Flashcard ─────────────────────────────────────────────────────────── */
.flip-card-scene {
  perspective: 1000px;
  margin-bottom: 24px;
}

.flip-card {
  width: 100%;
  min-height: 220px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: pointer;
}

.flip-card.flipped { transform: rotateY(180deg); }

.flip-card-front,
.flip-card-back {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: var(--radius);
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  border: 1px solid var(--border);
}

.flip-card-front {
  background: var(--bg3);
}

.flip-card-back {
  background: linear-gradient(135deg, #0f1f3d, #162040);
  border-color: rgba(59,130,246,0.3);
  transform: rotateY(180deg);
}

.card-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 14px;
}

.card-content {
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.5;
}

.flip-card-back .card-content {
  font-size: 15px;
  font-weight: 400;
  color: var(--text);
}

.card-hint {
  margin-top: 20px;
  font-size: 12px;
  color: var(--text-faint);
  text-align: center;
}

.sm2-row {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 8px;
  margin-bottom: 16px;
}

.sm2-btn {
  padding: 10px 4px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  transition: transform 0.15s, opacity 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.sm2-btn span { font-size: 10px; font-weight: 400; opacity: 0.7; }
.sm2-btn:active { transform: scale(0.95); }

.sm2-again { background: rgba(239,68,68,0.15);  color: var(--red);    border-color: rgba(239,68,68,0.3); }
.sm2-hard  { background: rgba(234,179,8,0.12);   color: var(--yellow); border-color: rgba(234,179,8,0.3); }
.sm2-good  { background: rgba(59,130,246,0.15);  color: var(--blue);   border-color: rgba(59,130,246,0.3); }
.sm2-easy  { background: rgba(34,197,94,0.12);   color: var(--green);  border-color: rgba(34,197,94,0.3); }

.fc-stats {
  text-align: center;
  font-size: 12px;
  color: var(--text-faint);
}

/* ─── Quiz Mode ─────────────────────────────────────────────────────────── */
.quiz-wrap { display: flex; flex-direction: column; gap: 16px; }

.quiz-category {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-faint);
}

.quiz-question {
  font-size: 18px;
  font-weight: 700;
  line-height: 1.4;
  color: var(--text);
}

.quiz-options { display: flex; flex-direction: column; gap: 10px; }

.quiz-opt {
  padding: 14px 18px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  text-align: left;
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
  line-height: 1.4;
  -webkit-tap-highlight-color: transparent;
}
.quiz-opt:active  { transform: scale(0.98); }
.quiz-opt.correct { background: rgba(34,197,94,0.15);  border-color: var(--green); color: var(--green); }
.quiz-opt.wrong   { background: rgba(239,68,68,0.12);  border-color: var(--red);   color: var(--red); }
.quiz-opt:disabled { cursor: default; }

.quiz-feedback {
  padding: 14px 18px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  line-height: 1.6;
  animation: slideUp 0.25s var(--ease);
}
.quiz-feedback.correct { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
.quiz-feedback.wrong   { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
.slide-ref { display: inline-block; margin-top: 8px; font-size: 12px; font-weight: 700; color: var(--cyan); }

/* ─── Fill Blank Mode ───────────────────────────────────────────────────── */
.fill-wrap { display: flex; flex-direction: column; gap: 16px; }

.fill-category {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--text-faint);
}

.fill-sentence {
  font-size: 18px; font-weight: 600; line-height: 1.6; color: var(--text);
}

.fill-sentence .blank {
  display: inline-block;
  min-width: 100px;
  border-bottom: 2px solid var(--blue);
  color: var(--blue);
  font-style: italic;
  padding: 0 4px;
}

.fill-input {
  width: 100%;
  padding: 14px 16px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 16px;
  outline: none;
  transition: border-color 0.2s;
}
.fill-input:focus { border-color: var(--blue); }

.fill-hint-row { display: flex; align-items: center; gap: 10px; }
.btn-hint {
  background: none; border: 1px solid var(--border); color: var(--text-dim);
  border-radius: 999px; padding: 4px 12px; font-size: 12px; cursor: pointer;
}
.fill-hint-text { font-size: 13px; color: var(--cyan); }

.fill-feedback {
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  animation: slideUp 0.25s var(--ease);
}
.fill-feedback.correct { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
.fill-feedback.wrong   { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }

/* ─── Open Question Mode ────────────────────────────────────────────────── */
.open-wrap { display: flex; flex-direction: column; gap: 14px; }

.open-category { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-faint); }

.open-points-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 999px;
  background: rgba(168,85,247,0.15);
  color: var(--purple);
  border: 1px solid rgba(168,85,247,0.3);
  font-size: 11px;
  font-weight: 700;
  width: fit-content;
}

.open-question { font-size: 18px; font-weight: 700; line-height: 1.4; color: var(--text); }

.open-textarea {
  width: 100%;
  min-height: 140px;
  padding: 14px 16px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  line-height: 1.6;
  resize: vertical;
  outline: none;
  transition: border-color 0.2s;
}
.open-textarea:focus { border-color: var(--blue); }

.model-answer {
  background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(6,182,212,0.08));
  border: 1px solid rgba(59,130,246,0.25);
  border-radius: var(--radius-sm);
  padding: 16px;
  font-size: 14px;
  color: var(--text-dim);
  line-height: 1.7;
  animation: slideUp 0.3s var(--ease);
}
.model-answer strong { color: var(--cyan); }
.model-answer .point { display: block; margin-bottom: 4px; }
.model-answer .point::before { content: '• '; color: var(--blue); }

.self-rate p { font-size: 14px; color: var(--text-dim); text-align: center; }
.self-rate-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 10px; }
.sr-btn {
  padding: 12px 8px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); cursor: pointer;
  font-size: 13px; font-weight: 600;
  transition: transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.sr-btn:active { transform: scale(0.96); }
.sr-no      { background: rgba(239,68,68,0.12);  color: var(--red);    border-color: rgba(239,68,68,0.3); }
.sr-partial { background: rgba(234,179,8,0.12);  color: var(--yellow); border-color: rgba(234,179,8,0.3); }
.sr-got     { background: rgba(34,197,94,0.12);  color: var(--green);  border-color: rgba(34,197,94,0.3); }

/* ─── Stats Screen ──────────────────────────────────────────────────────── */
.stats-content { padding: 20px; display: flex; flex-direction: column; gap: 20px; }

.stat-section {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

.stat-section h3 {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 16px;
}

.stat-topic-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.st-name { flex: 1; font-size: 13px; color: var(--text); }
.st-bar  { flex: 2; height: 6px; background: var(--bg); border-radius: 999px; overflow: hidden; }
.st-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--blue), var(--cyan)); transition: width 0.8s var(--ease); }
.st-pct  { font-size: 12px; color: var(--text-dim); width: 32px; text-align: right; }

.streak-row { display: flex; gap: 4px; flex-wrap: wrap; }
.streak-dot { width: 20px; height: 20px; border-radius: 4px; background: var(--bg); }
.streak-dot.done { background: var(--blue); }
.streak-dot.today { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }

.due-list { display: flex; flex-direction: column; gap: 8px; }
.due-item { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
.due-item .due-name { color: var(--text-dim); }
.due-item .due-count { background: rgba(234,179,8,0.15); color: var(--yellow); padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; }

/* ─── Bottom Nav ────────────────────────────────────────────────────────── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: rgba(10,15,30,0.95);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: stretch;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom, 0);
}

.nav-btn {
  flex: 1;
  background: none;
  border: none;
  color: var(--text-faint);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  transition: color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.nav-btn.active { color: var(--blue); }
.nav-icon { font-size: 22px; }
.nav-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

/* ─── Animations ────────────────────────────────────────────────────────── */
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-16px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.6; }
}

/* ─── Utilities ─────────────────────────────────────────────────────────── */
.hidden { display: none !important; }

/* Scrollbar styling */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }

/* Math/formula styling */
.formula {
  display: inline-block;
  font-family: 'Courier New', monospace;
  background: rgba(59,130,246,0.1);
  border: 1px solid rgba(59,130,246,0.2);
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 13px;
  color: var(--cyan);
}

@media (max-width: 360px) {
  .sm2-row { grid-template-columns: repeat(2,1fr); }
  .badge-grid { grid-template-columns: repeat(3, minmax(0,1fr)); }
}

/**
 * CogSys Learning Data
 * Module: Cognitive Systems IN2222, TU Munich (Prof. Knoll)
 * Based on: Lecture slides C01–C05, E01–E04, E09 + Past exams SS21/SS23/SS24
 *
 * Each topic has:
 *   - guided: short explanation + follow-up question
 *   - flashcards: front/back pairs (SM-2 compatible)
 *   - quiz: multiple choice with explanation
 *   - fillblank: sentence with ___
 *   - open: exam-style questions with model answers
 */

const MODULES = [
  {
    id: 'cogsys',
    name: 'Cognitive Systems',
    subtitle: 'IN2222 · TU Munich',
    icon: '🧠',
    locked: false,
    topics: [
      {
        id: 'p1',
        name: 'Cognition & Cognitive Science',
        icon: '💡',
        color: '#3b82f6',
        examWeight: 20,

        guided: [
          {
            id: 'g_p1_1',
            badge: 'Core Definition',
            title: 'What is Cognition?',
            body: 'Cognition is a system-level process that integrates many different processing modalities — learning, memory, perception, interaction. It is NOT wishing or feeling.\n\nThe key word is integration: cognition is the whole, not any single ability.',
            example: '🔑 Exam tip: Cognition ≠ Intelligence. Intelligence is ONE special cognitive skill — a constituent of cognition, like a single instrument in an orchestra.',
          },
          {
            id: 'g_p1_2',
            badge: 'Chinese Room',
            title: 'Searle\'s Chinese Room',
            body: 'A person with no Chinese knowledge sits in a room. A rulebook maps every Chinese question to a correct answer. The person follows the rules and sends correct replies — but understands nothing.\n\nThis is Searle\'s argument that syntax (symbol manipulation) ≠ semantics (meaning/understanding).',
            example: '🔑 Exam tip: The Chinese Room argues that passing the Turing Test does NOT prove understanding. It is the classic counter-argument to the Turing Test.',
          },
          {
            id: 'g_p1_3',
            badge: 'Cognitive Cycle',
            title: 'The Cycle of Cognitive Processing',
            body: 'Cognitive systems operate in a loop:\n\nPerception → Cognition → Action → (back to Perception)\n\nWithin Cognition: Anticipation → Assimilation → Adaptation\n\nThis cycle never stops — the system continuously updates its world model.',
            example: '🔑 Exam tip: Memorise the full cycle with subdivisions. 1 point per stage + arrow in the exam.',
          },
          {
            id: 'g_p1_4',
            badge: 'Two Systems',
            title: 'Cognitivist vs Emergent Systems',
            body: 'Cognitivist: Cognition IS computation. All operations are syntactic symbol manipulations. Learning = acquiring new knowledge. Based on the computational theory of mind.\n\nEmergent: Cognition is a continuous self-organising process driven by agent-environment interaction. Embodiment is essential. Learning = acquiring new anticipatory skills.',
            example: '🔑 Exam tip: The key contrast — cognitivist systems process symbols to reach goals; emergent systems self-organise to maintain themselves.',
          },
          {
            id: 'g_p1_5',
            badge: 'Phenomena',
            title: 'Uncanny Valley & Proximate/Ultimate',
            body: 'Uncanny Valley: Familiarity does NOT increase steadily with human-likeness. It rises, then drops sharply at high-but-not-perfect human-likeness, then rises again.\n\nProximate explanation: HOW is a behaviour implemented? (mechanism)\nUltimate explanation: WHY does the system exhibit it? (evolutionary purpose)',
            example: '🔑 Bird song: Ultimate = attract mates; Proximate = singing loudly attracts potential mates.',
          },
          {
            id: 'g_p1_6',
            badge: 'Mind-Body',
            title: 'The Mind-Body Problem',
            body: 'How is the mental world related to the physical world? Two schools of thought:\n\nSubstance Dualism (Descartes / Cartesian): mind and body are two DIFFERENT substances. This decoupling makes the soul immortal and is the basis for free will. (Descartes wrongly thought the pineal gland is the interface.)\n\nMonism (Physicalism): there is only ONE substance — mental states ARE physical states.',
            example: '🔑 Dualism = two substances (free will). Monism = one substance (mental = physical). Name BOTH + describe each.',
          },
          {
            id: 'g_p1_7',
            badge: 'Cognitivism',
            title: 'Computational Theory of Mind & Physical Symbol Systems',
            body: 'The Computational Theory of Mind (CTM) is the basis of cognitivism: the mind is a digital computer that stores symbolic representations and manipulates them by syntactic rules. Mental processes are driven by syntactic — NOT semantic — properties of symbols.\n\nPhysical Symbol System (PSS), Newell & Simon:\n• PSS Hypothesis: a physical symbol system has the necessary and sufficient means for general intelligent action.\n• Heuristic Search Hypothesis: a PSS solves problems by searching — generating and modifying symbol structures until a solution is found.',
            example: '🔑 The Chinese Room attacks CTM: syntax (symbol manipulation) ≠ semantics (understanding).',
          },
          {
            id: 'g_p1_8',
            badge: 'Paradigms',
            title: 'Paradigms in Cognitive Science',
            body: 'Two families (+ hybrids):\n\nCognitivist: cognition = computation; symbolic manipulation; learning = new knowledge; embodiment plays no role (functionalist); atemporal.\n\nEmergent: cognition = self-organising process driven by agent-environment interaction; self-maintenance; embodiment is constitutive; real-time. Three sub-types:\n• Connectionist: networks of simple units, knowledge in connection weights (e.g. neural nets)\n• Dynamical: time-dependent differential equations (attractors, stability)\n• Enactive: the agent builds its own understanding through interaction',
            example: '🔑 Enaction has 2 mechanisms: Phylogeny (innate embodied capabilities) and Ontogeny (development through structural coupling / sense-making).',
          },
          {
            id: 'g_p1_9',
            badge: 'Neuroimaging',
            title: 'Neuroimaging: Structural vs Functional',
            body: 'Structural neuroimaging (anatomy):\n• MRI: magnetic properties of hydrogen atoms\n• DTI (Diffusion Tensor Imaging): extension of MRI, detects nerve fibres via water diffusion\n\nFunctional neuroimaging (activity):\n• EEG / MEG: electrical potentials / magnetic fields — HIGH temporal resolution\n• PET / SPECT: nuclear imaging via blood flow (radiotracers)\n• fMRI: blood oxygen level — HIGH spatial resolution',
            example: '🔑 Guest-lecture favourite: MRI = structural (anatomy); fMRI = functional (oxygen level → activity, high spatial resolution).',
          },
          {
            id: 'g_p1_10',
            badge: 'Marr Levels',
            title: 'Three Levels of Abstraction (Marr)',
            body: 'Every cognitive system can be modelled at three hierarchical levels:\n\n1. Computational Theory: WHAT is the goal of the computation and the logic of the strategy?\n2. Representation & Algorithms: HOW — input/output representations and the algorithms that transform them.\n3. Hardware Implementation: the PHYSICAL realisation.',
            example: '🔑 Order matters: Computational theory → Representation/Algorithm → Hardware implementation.',
          },
          {
            id: 'g_p1_11',
            badge: 'History',
            title: 'First Autonomous Robot & Cybernetics',
            body: 'The FIRST autonomous robot was built by a neurophysiologist, William Grey Walter (1950), to study how complex behaviour emerges from a simple control system (only two radio tubes). His robots (Elmer & Elsie, "Machina speculatrix") implemented phototaxis and returned to their charging station.\n\nCybernetics (Norbert Wiener, 1948): "the scientific study of control and communication in the animal and the machine" — the theoretical foundation.',
            example: '🔑 Exam framing: the first autonomous robots were built by a neurophysiologist to study the BRAIN, not for engineering.',
          },
          {
            id: 'g_p1_12',
            badge: 'LLMs',
            title: 'Four Key Innovations Behind ChatGPT',
            body: '1. Training of a generative language model (self-supervised → no manual labels)\n2. The Transformer architecture for text ("the CNN-equivalent for text"), using self-attention to capture context\n3. A new training procedure for dialogues (optimised for human preferences)\n4. Massive scaling of the model (more data + compute)\n\nGenerative vs discriminative: ML shifted from discriminative models (classify, P(y|x)) to generative models (generate new data).',
            example: '🔑 Self-attention captures semantic relationships between words, just as convolutions capture local features in images.',
          },
        ],

        flashcards: [
          { id: 'fc_p1_1',  front: 'Define cognition vs intelligence.',                                                     back: 'Cognition = global system-level process integrating many modalities. Intelligence = ONE special cognitive skill (a synergy/constituent of a cognitive system).' },
          { id: 'fc_p1_2',  front: 'What does the Chinese Room Argument prove?',                                             back: 'That passing the Turing Test does NOT mean a machine understands. Syntactic symbol manipulation ≠ semantic understanding.' },
          { id: 'fc_p1_3',  front: 'Name the full cycle of cognitive processing including subdivisions.',                    back: '… → Perception → Cognition (Anticipation → Assimilation → Adaptation) → Action → Perception → …' },
          { id: 'fc_p1_4',  front: 'Cognitivist vs Emergent systems — key difference?',                                     back: 'Cognitivist: cognition = computation, symbol operations, learning = new knowledge. Emergent: self-organising via environment interaction, embodiment essential, learning = anticipatory skills.' },
          { id: 'fc_p1_5',  front: 'What is the Uncanny Valley?',                                                            back: 'Familiarity rises with human-likeness, then drops sharply (the "valley") at high-but-imperfect resemblance, then rises again near human-level.' },
          { id: 'fc_p1_6',  front: 'Proximate explanation vs Ultimate explanation — what question does each answer?',        back: 'Proximate: HOW is the behaviour implemented? (mechanism). Ultimate: WHY does the system show this behaviour? (evolutionary purpose).' },
          { id: 'fc_p1_7',  front: 'Name the two schools of thought on the Mind-Body Problem.',                              back: 'Monism: mind & body are the same substance (mental = physical states). Dualism: two different substances — decouples mind from body, basis for free will.' },
          { id: 'fc_p1_8',  front: 'What is the Robotics Paradox?',                                                          back: 'Seemingly easy tasks (e.g. shopping) are hard for robots; seemingly hard but well-defined tasks (e.g. spot welding) are easy.' },
          { id: 'fc_p1_9',  front: 'Name 3 of the 7 cognitive capabilities for self-reliance & adaptation.',                back: 'Self-Reliance: Goal-Directedness, Autonomy, Interaction. Adaptation: Reaction, Learning, Anomaly Detection. Perception & Action: Interpretation, Sensing, Anticipation, Action.' },
          { id: 'fc_p1_10', front: 'Name 3 key innovations that enabled ChatGPT/LLMs.',                                      back: '1. Generative language model training. 2. Transformer architecture. 3. New training procedure for dialogues. 4. Massive scaling.' },
          { id: 'fc_p1_11', front: 'Define a Cognitive System.',                                                              back: 'An autonomous system that perceives its environment, anticipates outcomes, learns from experience, adapts to change, and is goal-directed.' },
          { id: 'fc_p1_12', front: 'What are the 4 components of a cognitive system?',                                       back: 'Embodiment, constraints, interaction with other agents, situatedness in environment.' },
          { id: 'fc_p1_13', front: 'Describe the Turing Test (imitation game).',                                            back: 'An interrogator communicates by text with player A (man) and B (woman) and must tell them apart. A is replaced by a computer; the machine passes if it deceives the interrogator as often as the man does.' },
          { id: 'fc_p1_14', front: 'Name the two schools on the mind-body problem and describe each.',                       back: 'Substance Dualism (Descartes): mind & body are 2 different substances → free will, immortal soul. Monism/Physicalism: only 1 substance → mental states ARE physical states.' },
          { id: 'fc_p1_15', front: 'What is the Computational Theory of Mind (CTM)?',                                       back: 'The mind is a digital computer storing symbolic representations and manipulating them by syntactic rules; mental processes are driven by syntactic — not semantic — properties of symbols. It is the basis of cognitivism.' },
          { id: 'fc_p1_16', front: 'State the two hypotheses on Physical Symbol Systems (Newell & Simon).',                  back: 'PSS Hypothesis: a physical symbol system has the necessary and sufficient means for general intelligent action. Heuristic Search Hypothesis: a PSS exercises intelligence by searching/modifying symbol structures until a solution is found.' },
          { id: 'fc_p1_17', front: 'Name the three sub-types of emergent cognitive systems.',                              back: 'Connectionist (networks of simple units), Dynamical (differential equations), Enactive (agent builds its own understanding through interaction).' },
          { id: 'fc_p1_18', front: 'What are the two mechanisms of enaction?',                                              back: 'Phylogeny: interaction determined by innate embodied physical/cognitive capabilities. Ontogeny: structural coupling + sense-making → development (gradual increase of cognitive capacity).' },
          { id: 'fc_p1_19', front: 'Structural vs functional neuroimaging — give examples.',                               back: 'Structural (anatomy): MRI, DTI. Functional (activity): EEG/MEG (high temporal res.), PET/SPECT, fMRI (high spatial res.).' },
          { id: 'fc_p1_20', front: 'Difference between MRI and fMRI?',                                                      back: 'MRI = structural; magnetic properties of hydrogen atoms → anatomy. fMRI = functional; measures blood oxygen level changes due to neural activity → activity at high spatial resolution.' },
          { id: 'fc_p1_21', front: 'Name Marr\'s three levels of abstraction in cognitive modelling.',                      back: '1. Computational theory (goal/logic). 2. Representation & algorithms (how). 3. Hardware implementation (physical).' },
          { id: 'fc_p1_22', front: 'Optimal vs bounded rationality?',                                                       back: 'Optimal rationality: an ideal agent optimises its choices given its belief-desire system (infeasible). Bounded rationality: rationality of decision makers with limited abilities.' },
          { id: 'fc_p1_23', front: 'Who built the first autonomous robot and why?',                                         back: 'Neurophysiologist William Grey Walter (1950), to study how complex behaviour emerges from a simple control system (two radio tubes). Robots: Elmer & Elsie (Machina speculatrix), phototaxis.' },
          { id: 'fc_p1_24', front: 'What is cybernetics and who founded it?',                                              back: 'Norbert Wiener (1948): "the scientific study of control and communication in the animal and the machine."' },
          { id: 'fc_p1_25', front: 'Name 3 valid hypotheses inherited from phrenology.',                                   back: 'Brain = centre of thought; modular organisation into anatomical regions; functional specialisation of individual brain regions. (Phrenology itself is NOT a science.)' },
          { id: 'fc_p1_26', front: 'Name the 4 key innovations behind ChatGPT.',                                           back: '1. Generative language-model training (self-supervised). 2. Transformer architecture (self-attention). 3. New dialogue training procedure (human preferences). 4. Massive scaling.' },
          { id: 'fc_p1_27', front: 'Generative vs discriminative models?',                                                  back: 'Discriminative: P(y|x), classify data. Generative: model the data distribution and generate new data (P(x|y) or P(x,y)). ChatGPT is generative.' },
          { id: 'fc_p1_28', front: 'Cognitivist vs emergent: role of embodiment?',                                          back: 'Cognitivist: no role implied (functionalist). Emergent: direct constitutive role (non-functionalist) — embodiment is essential.' },
        ],

        quiz: [
          { id: 'qz_p1_1', category: 'P1 — Cognition', question: 'What is the key difference between cognition and intelligence?', options: ['They are synonyms', 'Intelligence is a system-level process; cognition is a subset', 'Cognition integrates many modalities; intelligence is one special cognitive skill', 'Cognition is biological; intelligence is artificial'], correct: 2, explanation: 'Cognition = global system-level integration. Intelligence is ONE constituent skill of a cognitive system.' },
          { id: 'qz_p1_2', category: 'P1 — Cognition', question: 'What does the Chinese Room Argument demonstrate?', options: ['That computers will never speak Chinese', 'Passing the Turing Test proves understanding', 'Syntactic symbol manipulation does not equal semantic understanding', 'Rule-based systems are more intelligent than humans'], correct: 2, explanation: 'Searle: correct symbol manipulation (syntax) ≠ understanding meaning (semantics). The person in the room answers correctly but understands nothing.' },
          { id: 'qz_p1_3', category: 'P1 — Cognition', question: 'In the cycle of cognitive processing, what are the three sub-stages of Cognition?', options: ['Learning, Memory, Action', 'Sensing, Processing, Outputting', 'Anticipation, Assimilation, Adaptation', 'Input, Transform, Output'], correct: 2, explanation: 'Cognition subdivides into: Anticipation → Assimilation → Adaptation. Know this for the diagram question.' },
          { id: 'qz_p1_4', category: 'P1 — Cognition', question: 'Which statement about the Uncanny Valley is correct?', options: ['Familiarity always increases with human-likeness', 'There is no relationship between human-likeness and acceptance', 'Familiarity rises, drops sharply at high-but-imperfect likeness, then rises again', 'Robots should always be made more human-like'], correct: 2, explanation: 'The uncanny valley = the dip in familiarity at high-but-not-quite-human resemblance.' },
          { id: 'qz_p1_5', category: 'P1 — Cognition', question: '"Why do birds sing?" — which explanation is the ULTIMATE one?', options: ['By singing loudly, potential mates are attracted', 'Birds use their syrinx to produce sound', 'To attract mates for reproduction', 'Songs are learned from parents during early development'], correct: 2, explanation: 'Ultimate = WHY (evolutionary purpose) = attract mates. Proximate = HOW (mechanism) = loud singing attracts mates.' },
          { id: 'qz_p1_6', category: 'P1 — Cognition', question: 'In emergent cognitive systems, what is the role of cognition?', options: ['Goal achievement through computation', 'Syntactic symbol manipulation', 'Self-maintenance through environment interaction', 'Rational decision making'], correct: 2, explanation: 'In emergent systems, cognition = self-maintenance. The system self-organises to extend its autonomy.' },
          { id: 'qz_p1_7', category: 'P1 — Cognition', question: 'Which is NOT a component of a cognitive system as defined in the lecture?', options: ['Embodiment', 'Situatedness in environment', 'A silicon processor', 'Interaction with other agents'], correct: 2, explanation: 'The 4 components are: embodiment, constraints, interaction with agents, situatedness. "Silicon processor" is not part of the definition.' },
          { id: 'qz_p1_8', category: 'P1 — Cognition', question: 'Which school of thought claims mind and body are two different substances?', options: ['Monism', 'Physicalism', 'Substance Dualism', 'Functionalism'], correct: 2, explanation: 'Substance (Cartesian) Dualism: mind & body are different substances → basis for free will. Monism/physicalism: only one substance.' },
          { id: 'qz_p1_9', category: 'P1 — Cognition', question: 'The Computational Theory of Mind says mental processes are driven by which property of symbols?', options: ['Semantic', 'Syntactic', 'Phonetic', 'Statistical'], correct: 1, explanation: 'CTM: mental processes are causal sequences driven by the SYNTACTIC (not semantic) properties of symbols. This is exactly what the Chinese Room attacks.' },
          { id: 'qz_p1_10', category: 'P1 — Cognition', question: 'Which imaging method has HIGH spatial resolution and measures blood oxygen level?', options: ['EEG', 'MEG', 'fMRI', 'DTI'], correct: 2, explanation: 'fMRI = functional, high spatial resolution, measures blood-oxygen-level changes. EEG/MEG have high temporal resolution; DTI is structural.' },
          { id: 'qz_p1_11', category: 'P1 — Cognition', question: 'Which is a STRUCTURAL neuroimaging method?', options: ['EEG', 'fMRI', 'PET', 'DTI'], correct: 3, explanation: 'DTI (and MRI) are structural — they image anatomy. EEG, fMRI and PET are functional — they image activity.' },
          { id: 'qz_p1_12', category: 'P1 — Cognition', question: 'In Marr\'s levels, which level states the GOAL and logic of the computation?', options: ['Hardware implementation', 'Representation & algorithms', 'Computational theory', 'Physical level'], correct: 2, explanation: 'The computational-theory level describes WHAT is computed and the logic of the strategy. Below it: representation/algorithm, then hardware.' },
          { id: 'qz_p1_13', category: 'P1 — Cognition', question: 'Which is NOT a sub-type of emergent cognitive systems?', options: ['Connectionist', 'Dynamical', 'Enactive', 'Symbolic'], correct: 3, explanation: 'Emergent sub-types: connectionist, dynamical, enactive. "Symbolic" belongs to the cognitivist family.' },
          { id: 'qz_p1_14', category: 'P1 — Cognition', question: 'Who built the first autonomous robot, and for what purpose?', options: ['An engineer, for industrial automation', 'A neurophysiologist, to study brain-like cognition', 'A mathematician, to test Turing completeness', 'A computer scientist, for AI research'], correct: 1, explanation: 'Neurophysiologist William Grey Walter built it to study how complex behaviour emerges from a simple control system.' },
        ],

        open: [
          { id: 'op_p1_1', points: '4 pts', question: 'Explain the difference between cognition and intelligence.', answer: '• Cognition = global process at system level (1) integrating many processing modalities (1).\n• Intelligence = a special cognitive skill (1) that is a constituent/synergy of a cognitive system (1).' },
          { id: 'op_p1_2', points: '6 pts', question: 'Describe the Chinese Room Argument and state the central question it addresses.', answer: '• Person with no Chinese knowledge sits in room (1).\n• Rulebook maps Chinese questions to answers (1).\n• Person answers using rules like a program (1).\n• Answers are correct (1) but person understands nothing (1).\n• Central question: Does passing the Turing Test prove understanding? → No (1).' },
          { id: 'op_p1_3', points: '4 pts', question: 'Draw the cycle of cognitive processing with all stages and subdivisions.', answer: '… → Perception → Cognition → Action → Perception → …\nCognition: Anticipation → Assimilation → Adaptation\n(1 point per correct stage + connecting arrow)' },
          { id: 'op_p1_4', points: '6 pts', question: 'Explain the difference between cognitivist and emergent cognitive systems.', answer: '• Cognitivist: cognition = computation (1), syntactic symbol operations (1), learning = new knowledge (1).\n• Emergent: continuous self-organising process (1), driven by agent-environment interaction (1), embodiment essential (1).' },
          { id: 'op_p1_5', points: '2 pts', question: 'Explain "birds sing" using a proximate and an ultimate explanation.', answer: '• Ultimate (WHY): attract mates for reproduction (1).\n• Proximate (HOW): by singing loudly, potential mates are attracted (1).' },
          { id: 'op_p1_6', points: '4 pts', question: 'Describe the Turing Test.', answer: '• Interrogator communicates by text with player A (man) and player B (woman) (1).\n• Interrogator must tell who is the woman (1).\n• Player A is replaced by a computer trying to deceive the interrogator (1).\n• The machine passes if it deceives the interrogator as often as the man (1).' },
          { id: 'op_p1_7', points: '4 pts', question: 'Name the two schools of thought on the mind-body problem and describe each.', answer: '• Substance Dualism (1): mind & body are two different substances → decouples mind/body, basis for free will (1).\n• Monism / Physicalism (1): only one substance → mental states are physical states (1).' },
          { id: 'op_p1_8', points: '4 pts', question: 'Name the two main types of modern neuroimaging and give one example each.', answer: '• Structural neuroimaging (1): e.g. MRI or DTI (1).\n• Functional neuroimaging (1): e.g. EEG, fMRI, or PET (1).' },
          { id: 'op_p1_9', points: '4 pts', question: 'Explain the difference between MRI and fMRI.', answer: '• MRI: structural; uses magnetic properties of hydrogen atoms to image anatomy (2).\n• fMRI: functional; measures blood-oxygen-level changes caused by neural activity at high spatial resolution (2).' },
          { id: 'op_p1_10', points: '6 pts', question: 'Name and briefly describe Marr\'s three levels of abstraction in cognitive modelling.', answer: '• Computational theory (1): goal of the computation + logic of the strategy (1).\n• Representation & algorithms (1): input/output representations + algorithms (1).\n• Hardware implementation (1): physical realisation (1).' },
        ],
      },

      {
        id: 'p2',
        name: 'Cognitive Architectures & NRP',
        icon: '🏗️',
        color: '#a855f7',
        examWeight: 17,

        guided: [
          { id: 'g_p2_1', badge: '3 Types', title: 'Types of Cognitive Architectures', body: 'Three types — memorise them:\n\n1. Symbolic: cognition = symbol computation (e.g. SOAR)\n2. Emergent: cognition emerges from interaction (e.g. neural nets)\n3. Hybrid: combines symbolic and emergent approaches (e.g. ACT-R)', example: '🔑 This comes up in EVERY exam. Just name: Symbolic, Emergent, Hybrid.' },
          { id: 'g_p2_2', badge: 'ACT-R Core', title: 'ACT-R: Modules & Buffers', body: 'ACT-R has 4 main modules:\n• Intention module (goals)\n• Declarative module (factual knowledge)\n• Visual module (seeing)\n• Manual module (action — NOT "action module"!)\n\nEach module has a buffer: exposes current state, stores exactly ONE chunk, serves as interface between modules.\n\nProduction: an if-then rule controlling behaviour.', example: '🔑 Trap: "manual" not "action". And each buffer holds exactly 1 chunk.' },
          { id: 'g_p2_3', badge: 'ACT-R Parallel/Serial', title: 'How ACT-R Processes Information', body: 'Parallel: all modules run simultaneously and independently.\n\nSerial: only ONE production can fire per cycle. Only one chunk per buffer. This creates serial control at the top level.\n\nSo ACT-R is both: parallel modules, serial production execution.', example: '🔑 This is the elegant answer: parallel at module level, serial at production level.' },
          { id: 'g_p2_4', badge: 'NRP', title: 'Neurorobotics Platform & Transfer Function', body: 'NRP: simulation platform coupling brain models with robots. Connects neuroscience, AI/ML, and robotics.\n\nTransfer Function (TF): connects and synchronises brain models with robot models.\n\nTools usable with TF: ROS/Gazebo, OpenSim, NEST, Neuromorphic Hardware, TensorFlow/PyTorch, physical robot.', example: '🔑 "What does the TF do?" → connects and synchronises brain ↔ robot. That is 2 points.' },
          { id: 'g_p2_5', badge: 'Definition', title: 'What is a Cognitive Architecture?', body: 'A cognitive architecture is the overall, essential structure and process of a broadly-scoped, domain-generic computational cognitive model — a framework for multi-level, multi-domain analysis of cognition.\n\n• It only specifies basic components & processes (memory, knowledge representation, learning) — NOT domain knowledge.\n• Instantiating an architecture with a specific body of knowledge gives a cognitive model.\n• Rooted in Newell\'s Unified Theory of Cognition: one model covering attention, memory, problem solving, decision making, learning.', example: '🔑 Architecture = the empty framework. Cognitive model = architecture + specific knowledge.' },
          { id: 'g_p2_6', badge: 'Production System', title: 'Production Systems', body: 'Reasoning in cognitivist architectures is implemented by production systems — sets of rules:\n\nif <conditions> then <actions>\n\n• Conditions are propositions stored in working memory.\n• A production fires (its actions execute) when ALL its conditions are satisfied.\n• If several productions match, precedence/conflict-resolution rules decide.\n• Production systems are Turing complete and can adapt.', example: '🔑 A production = "a statement of a particular contingency that controls behaviour" (if-then rule).' },
          { id: 'g_p2_7', badge: 'Chunks', title: 'Chunks: Declarative Knowledge in ACT-R', body: 'In ACT-R, declarative knowledge is represented by chunks:\n\n• A chunk is comprised of slots; each slot stores a single value (which may itself be a chunk).\n• Chunks have neither a name nor a type.\n• A buffer stores exactly ONE chunk → acts as an attention mechanism.\n\nExample (8+4=12): a chunk with slots addend1=Eight, addend2=Four, sum=Twelve.', example: '🔑 Declarative knowledge = chunks (facts). Procedural knowledge = productions (rules).' },
          { id: 'g_p2_8', badge: 'Activation', title: 'Chunk Activation (Declarative Memory)', body: 'On a retrieval request, the declarative module returns the chunk with highest activation Aᵢ:\n\nAᵢ = Bᵢ + Sᵢ + Pᵢ + εᵢ\n\n• Base-level Bᵢ: recency & frequency of use\n• Spreading activation Sᵢ: effect of chunks currently in the buffers\n• Partial matching Pᵢ: how well the chunk matches the request\n• Noise εᵢ: transient + permanent random component', example: '🔑 Remember the 4 terms: base-level, spreading, partial matching, noise.' },
          { id: 'g_p2_9', badge: 'Procedural', title: 'Procedural Module, Utility & Compilation', body: 'The procedural module manages, matches and executes productions and coordinates all other modules.\n\n• Only ONE production fires per cycle. Conflict resolution picks the highest UTILITY value Uᵢ (random if tied).\n• Utility is learned online: Uᵢ(n) = Uᵢ(n−1) + α[Rᵢ(n) − Uᵢ(n−1)].\n• Production compilation learns NEW productions by combining productions that fire in sequence (buffer-by-buffer).\n• IMPORTANT: the procedural module has NO buffer!', example: '🔑 Trap: the procedural module has no buffer. Conflict resolution → highest utility.' },
        ],

        flashcards: [
          { id: 'fc_p2_1',  front: 'Name the 3 types of cognitive architectures.',                               back: 'Symbolic, Emergent, Hybrid.' },
          { id: 'fc_p2_2',  front: 'Name the 4 main modules of ACT-R.',                                          back: 'Intention module, Declarative module, Visual module, Manual module. (Procedural also acceptable.)' },
          { id: 'fc_p2_3',  front: 'What is a Buffer in ACT-R?',                                                 back: 'Exposes the current state of a module; stores exactly ONE chunk; assigned to one module; serves as interface between modules.' },
          { id: 'fc_p2_4',  front: 'What is a Production in ACT-R?',                                             back: 'A statement of a particular contingency that controls behaviour (if-then rule).' },
          { id: 'fc_p2_5',  front: 'How does ACT-R implement PARALLEL processing?',                              back: 'All modules operate simultaneously and independently.' },
          { id: 'fc_p2_6',  front: 'How does ACT-R implement SERIAL processing?',                                back: 'Only ONE production can fire per cycle; only one chunk per buffer → serial control flow at the top level.' },
          { id: 'fc_p2_7',  front: 'What does the Transfer Function (TF) do in the NRP?',                        back: 'Connects and synchronises brain models with robot models.' },
          { id: 'fc_p2_8',  front: 'Name 4 tools usable with the NRP Transfer Function.',                        back: 'Any 4 of: ROS/Gazebo, OpenSim, NEST, Neuromorphic Hardware, TensorFlow/PyTorch, physical robot.' },
          { id: 'fc_p2_9',  front: 'Name 2 advantages of ACT-R over a standard programming language.',           back: 'Any 2: advances understanding of human cognition; generic across domains; unified integrative model; executable implementation of cognitive theory.' },
          { id: 'fc_p2_10', front: 'Write the ACT-R chunk type for multiplication and encode 11×3=33.',           back: '(chunk-type multiplication factor1 factor2 product)\n(add-dm (Multiply113 ISA multiplication factor1 11 factor2 3 product 33))' },
          { id: 'fc_p2_11', front: 'Define a cognitive architecture.',                                            back: 'The overall, essential structure & process of a broadly-scoped, domain-generic computational cognitive model — a framework specifying basic components/processes (memory, knowledge, learning) but NO domain knowledge.' },
          { id: 'fc_p2_12', front: 'Cognitive architecture vs cognitive model?',                                   back: 'Architecture = generic empty framework. Model = architecture instantiated with a specific body of knowledge.' },
          { id: 'fc_p2_13', front: 'What is a Unified Theory of Cognition (Newell)?',                              back: 'A single theory addressing a broad range of cognitive issues (attention, memory, problem solving, decision making, learning) from psychology, neuroscience and computer science. All cognitivist architectures are unified theories of cognition.' },
          { id: 'fc_p2_14', front: 'What is a production system? What rule form does it use?',                      back: 'A set of "if <conditions> then <actions>" rules. A production fires when all conditions (in working memory) are satisfied. Production systems are Turing complete and can adapt.' },
          { id: 'fc_p2_15', front: 'What is a chunk in ACT-R?',                                                    back: 'The representation of declarative knowledge: comprised of slots, each storing a single value (possibly another chunk). Chunks have neither a name nor a type.' },
          { id: 'fc_p2_16', front: 'Declarative vs procedural knowledge in ACT-R?',                                back: 'Declarative knowledge = chunks (facts), stored in the declarative module. Procedural knowledge = productions (if-then rules), managed by the procedural module.' },
          { id: 'fc_p2_17', front: 'Write the chunk-activation equation and name its 4 terms.',                    back: 'Aᵢ = Bᵢ + Sᵢ + Pᵢ + εᵢ. Base-level (recency/frequency), Spreading (buffer contents), Partial matching (match degree), Noise.' },
          { id: 'fc_p2_18', front: 'How does ACT-R resolve conflicts when several productions match?',             back: 'It selects the production with the highest sub-symbolic UTILITY value (random choice if tied). Utility is learned online: Uᵢ(n)=Uᵢ(n−1)+α[Rᵢ(n)−Uᵢ(n−1)].' },
          { id: 'fc_p2_19', front: 'What is production compilation?',                                              back: 'A learning mechanism that creates NEW productions by combining productions that fire in sequence (only compatible buffer usage, buffer-by-buffer).' },
          { id: 'fc_p2_20', front: 'Which ACT-R module has NO buffer?',                                            back: 'The procedural module. (It manages/matches/executes the productions and coordinates the other modules.)' },
          { id: 'fc_p2_21', front: 'What does the limitation of one chunk per buffer + one production per cycle implement?', back: 'An attention mechanism (serial bottleneck on top of parallel module processing).' },
          { id: 'fc_p2_22', front: 'Name 4 advantages of virtual robots over physical ones.',                     back: 'Any 4: faster than real-time simulation; easy parameter changes; no sensor imperfections; repeatable runs without deviation; automatic reset; no expensive robots; no risk of breakage.' },
          { id: 'fc_p2_23', front: 'Name 2 software tools integrated in the NRP.',                                 back: 'Any 2: Gazebo (rigid-body robot simulation), OpenSim (muscle/movement simulation), ROS (robot communication/OS), NEST ("TensorFlow for SNNs").' },
        ],

        quiz: [
          { id: 'qz_p2_1', category: 'P2 — Architectures', question: 'Which is NOT one of the three types of cognitive architectures?', options: ['Symbolic', 'Emergent', 'Computational', 'Hybrid'], correct: 2, explanation: 'The three types are: Symbolic, Emergent, Hybrid. "Computational" is not a category.' },
          { id: 'qz_p2_2', category: 'P2 — Architectures', question: 'How many chunks can a single ACT-R buffer store?', options: ['Unlimited', 'One per module type', 'Exactly one', 'Up to three'], correct: 2, explanation: 'A buffer stores EXACTLY ONE chunk at a time. This is a classic 1-point fact.' },
          { id: 'qz_p2_3', category: 'P2 — Architectures', question: 'What is the role of the Transfer Function in the Neurorobotics Platform?', options: ['It trains neural networks', 'It connects and synchronises brain models with robot models', 'It converts sensor data to images', 'It translates code between programming languages'], correct: 1, explanation: 'The TF connects and synchronises brain ↔ robot. Two keywords: connects, synchronises.' },
          { id: 'qz_p2_4', category: 'P2 — Architectures', question: 'How does ACT-R implement SERIAL processing?', options: ['Modules run one at a time', 'Only one production fires per cycle', 'Buffers process information sequentially', 'The visual module blocks others'], correct: 1, explanation: 'Serial in ACT-R means only ONE production fires per cognitive cycle. Modules themselves are parallel.' },
          { id: 'qz_p2_5', category: 'P2 — Architectures', question: 'Which module in ACT-R handles physical actions?', options: ['Action module', 'Motor module', 'Manual module', 'Output module'], correct: 2, explanation: 'It is called the MANUAL module — a classic exam trap. Not "action" or "motor".' },
          { id: 'qz_p2_6', category: 'P2 — Architectures', question: 'In ACT-R, what represents declarative knowledge?', options: ['Productions', 'Chunks', 'Buffers', 'Modules'], correct: 1, explanation: 'Chunks (slots with values) represent declarative knowledge (facts). Productions represent procedural knowledge (rules).' },
          { id: 'qz_p2_7', category: 'P2 — Architectures', question: 'Which ACT-R module has NO buffer?', options: ['Visual module', 'Declarative module', 'Procedural module', 'Manual module'], correct: 2, explanation: 'The procedural module has no buffer — it manages the productions and coordinates the other modules.' },
          { id: 'qz_p2_8', category: 'P2 — Architectures', question: 'When several productions match, ACT-R selects the one with the highest...', options: ['Base-level activation', 'Utility value', 'Spreading activation', 'Chunk count'], correct: 1, explanation: 'Conflict resolution picks the production with the highest sub-symbolic utility value (random if tied).' },
          { id: 'qz_p2_9', category: 'P2 — Architectures', question: 'Which term is NOT part of the chunk-activation equation Aᵢ = Bᵢ + Sᵢ + Pᵢ + εᵢ?', options: ['Base-level activation', 'Spreading activation', 'Partial matching', 'Utility value'], correct: 3, explanation: 'Activation = base-level + spreading + partial matching + noise. Utility is for selecting productions, not retrieving chunks.' },
          { id: 'qz_p2_10', category: 'P2 — Architectures', question: 'A cognitive architecture instantiated with a specific body of knowledge is called a...', options: ['Production system', 'Cognitive model', 'Unified theory', 'Chunk'], correct: 1, explanation: 'Architecture = generic framework; architecture + specific knowledge = cognitive model.' },
          { id: 'qz_p2_11', category: 'P2 — Architectures', question: 'A production fires when...', options: ['Any one of its conditions is satisfied', 'All of its conditions are satisfied', 'Its utility exceeds 1', 'Its buffer is empty'], correct: 1, explanation: 'A production (if-then rule) is activated only when ALL of its conditions are satisfied.' },

          { id: 'op_p2_3', points: '4 pts', question: 'Explain how ACT-R implements parallel and serial information processing.', answer: '• Parallel: modules operate simultaneously and independently (2).\n• Serial: only one production fires per cycle / one chunk per buffer → serial control (2).' },
          { id: 'op_p2_4', points: '6 pts', question: 'Describe the role of the Transfer Function in the NRP and name 4 tools it can interface with.', answer: '• TF connects and synchronises brain models with robot models (2).\n• 4 of: ROS/Gazebo, OpenSim, NEST, Neuromorphic Hardware, TF/PyTorch, physical robot (1 each, max 4).' },
          { id: 'op_p2_5', points: '3 pts', question: 'Explain what a module in ACT-R is and name two features of modules.', answer: '• A module is an independent parallel processing unit that encapsulates specific functions (1).\n• Feature 1: each corresponds to one or more cognitive functions of the brain / processes independently of other modules (1).\n• Feature 2: each can encapsulate arbitrarily complex sub-functions (1).' },
