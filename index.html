      {
        id: 'kf3', name: 'Outline of Nuclear Fusion Devices', icon: '🧲', color: '#a855f7', examWeight: 9,
        slideDeck: 'Folien_Kernfusion/MW1112 - Lecture 03 - Outline of Nuclear Fusion Devices.pdf',
        quiz: [
  { id: 'qz_kf_l03_01', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'In a thermonuclear fusion reactor, the primary role of the Shielding and Breeding Blanket is to…', options: ['protect outer components from heat and neutron/gamma radiation while breeding tritium via lithium reactions', 'generate the toroidal magnetic field', 'pump down the vacuum vessel to ultrahigh vacuum', 'induce the plasma current like a transformer'], correct: 0, explanation: 'The blanket surrounds the plasma to absorb neutron and gamma heat load, shield outer components, and use fast neutrons to breed tritium through reactions with lithium, closing the fuel cycle. (Lecture 03, Folie 5)' },
  { id: 'qz_kf_l03_02', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'The Vacuum Vessel (VV) in a fusion reactor is best described as…', options: ['a component solely for aesthetic enclosure of the plasma', 'the first safety barrier, a pressure-retaining part that also provides additional neutron/gamma shielding', 'the device that breeds tritium from lithium', 'the coil system generating the poloidal field'], correct: 1, explanation: 'The VV is described as the first safety barrier and a pressure-retaining component; ultrahigh vacuum (typically 10⁻⁹ mbar) is maintained inside it, and it also acts as further neutron and gamma shielding. (Lecture 03, Folie 5)' },
  { id: 'qz_kf_l03_03', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'Which system in a thermonuclear fusion reactor is responsible for transferring energy externally to the D-T particles, such as via neutral beam or radiofrequency systems?', options: ['the Remote Handling system', 'the Cryostat', 'the Heating System', 'the Primary Cooling System'], correct: 2, explanation: 'The Heating System is explicitly described as an external system used to transfer energy to the D-T particles, with examples given as the Neutral Injector System and Radiofrequency Heating System. (Lecture 03, Folie 6)' },
  { id: 'qz_kf_l03_04', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'Why can the ~100 million Kelvin fusion fuel not be physically contained by a material wall?', options: ['because it is not electrically charged', 'because material walls are magnetic and would repel the plasma', 'because the plasma has zero pressure at that temperature', 'because at such extreme temperatures the plasma would instantly destroy or vaporize any solid wall it contacts'], correct: 3, explanation: 'The lecture states the fuel must be heated to above 100 MK to enter the plasma state, and due to its temperature it cannot be physically contained — hence the need for magnetic or inertial confinement instead of a material vessel wall. (Lecture 03, Folie 7)' },
  { id: 'qz_kf_l03_05', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'In magnetic confinement, charged particles are "tied" to magnetic field lines because…', options: ['they are forced into circular/helical orbits around the field lines while moving freely along the field direction', 'the field completely stops all particle motion', 'the field only acts on neutral particles', 'the field converts particles into a solid state'], correct: 0, explanation: 'Ions and electrons gyrate helically around field lines due to the Lorentz force but can move freely in the longitudinal direction along them, which is the basic mechanism enabling magnetic confinement away from material walls. (Lecture 03, Folie 8)' },
  { id: 'qz_kf_l03_06', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'For a charged particle moving in a uniform magnetic field, the Lorentz force relevant to gyration is given by…', options: ['F = q(v·B)', 'F = qv⊥B, acting perpendicular to both the field line and v⊥', 'F = qE only, independent of B', 'F = m·v∥, independent of charge'], correct: 1, explanation: 'With a constant, homogeneous field, only the perpendicular velocity component v⊥ produces a force via F_L = q·v⊥×B, which acts perpendicular to both the field line and v⊥, driving the particle into circular gyration while v∥ remains unaffected. (Lecture 03, Folie 9-10)' },
  { id: 'qz_kf_l03_07', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'The Larmor radius of a gyrating charged particle in a magnetic field depends on…', options: ['only the magnetic field strength', 'only the parallel velocity component v∥', 'the perpendicular velocity, the particle mass, the charge, and the magnetic field strength', 'only the plasma density'], correct: 2, explanation: 'The Larmor radius is derived by balancing the Lorentz force with the centrifugal force, giving ρ = v⊥·m / (q·B); it therefore depends on velocity (i.e. temperature), mass, charge, and field strength — and since ions are heavier than electrons, ρ_ion > ρ_electron. (Lecture 03, Folie 11)' },
  { id: 'qz_kf_l03_08', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'Comparing the Larmor radius of ions (protons) and electrons at the same temperature and magnetic field, one finds that…', options: ['the electron Larmor radius is larger because electrons are faster', 'both are always identical regardless of mass', 'the Larmor radius is independent of particle mass', 'the ion Larmor radius is larger because ions have greater mass'], correct: 3, explanation: 'Since ρ = v⊥·m/(qB) scales with mass, and ions are much heavier than electrons, the ion (proton) Larmor radius is significantly larger than the electron Larmor radius, as shown in the lecture\'s comparison table (e.g. ρ_p ≈ 0.15 mm vs ρ_e ≈ 0.003 mm at 1 T, 0.01 keV). (Lecture 03, Folie 13)' },
  { id: 'qz_kf_l03_09', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'The cyclotron (gyro-) frequency of a charged particle in a magnetic field is best described as…', options: ['the frequency f = qB/(2πm), independent of the particle velocity', 'a frequency that depends only on the particle\'s velocity', 'a quantity that decreases with increasing magnetic field', 'a property only defined for neutral particles'], correct: 0, explanation: 'The cyclotron frequency ω_cy = qB/m (or f = qB/2πm) depends only on the charge-to-mass ratio and the field strength, not on the particle velocity, which is why electrons gyrate at much higher frequency than protons for the same B. (Lecture 03, Folie 12)' },
  { id: 'qz_kf_l03_10', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'Inside an ideal solenoid, far from its ends, the magnetic field derived from Ampere\'s law is…', options: ['proportional to 1/r, decreasing radially', 'approximately uniform, B = μ0·i·N', 'zero everywhere inside the coil', 'dependent only on the coil diameter, not the current'], correct: 1, explanation: 'Applying Ampere\'s law to a perfect solenoid yields a nearly uniform field B = μ0·i·N, where N is turns per unit length and i is the current; this uniform field is a key building block before considering toroidal geometries. (Lecture 03, Folie 15)' },
  { id: 'qz_kf_l03_11', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'A solenoid alone cannot serve as a particle confinement device because…', options: ['its magnetic field is too weak to be useful', 'it only produces a poloidal field', 'it is open-ended, so particles can escape along the field lines out of the ends', 'it cannot be superconducting'], correct: 2, explanation: 'A solenoid can guide particles along its field lines, but because it is open-ended, particles are free to stream out at the ends — motivating the idea of bending the solenoid into a closed toroid. (Lecture 03, Folie 15-16)' },
  { id: 'qz_kf_l03_12', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'When a solenoid is bent into a toroid, the resulting magnetic field B(r) inside the toroid…', options: ['remains perfectly uniform, identical to the straight solenoid case', 'becomes independent of the current i', 'becomes purely poloidal instead of toroidal', 'becomes inversely proportional to the radius r, i.e. B(r) = μ0·i·N/(2πr)'], correct: 3, explanation: 'Unlike the straight solenoid, the toroidal geometry yields a field that varies as B(r) = μ0·i·N/(2πr), meaning the field is stronger on the inboard side (small r) than the outboard side — this non-uniformity is the root cause of particle drifts. (Lecture 03, Folie 16)' },
  { id: 'qz_kf_l03_13', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'A simple toroidal magnetic field alone is insufficient for stable plasma confinement mainly because…', options: ['the field\'s non-uniformity and curvature cause velocity drifts that push particles toward the walls', 'it heats the plasma to uncontrollable temperatures', 'it eliminates the Larmor radius', 'it prevents any current from flowing in the plasma'], correct: 0, explanation: 'Because B is inversely proportional to radius and curved, non-uniformities and curvature cause guiding-center drifts that migrate particles outward until they hit the walls, drastically reducing confinement time — this is why an additional poloidal field is required. (Lecture 03, Folie 17)' },
  { id: 'qz_kf_l03_14', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'The E×B drift velocity in a magnetized plasma is notable because it is…', options: ['dependent on the particle charge and mass', 'independent of the particle\'s charge, mass, and perpendicular velocity', 'only present for electrons, not ions', 'proportional to the square of the magnetic field'], correct: 1, explanation: 'The E×B drift velocity v_E = (E×B)/B² does not depend on q, m, or v⊥, meaning ions and electrons drift together at the same velocity in the same direction under a perpendicular electric field. (Lecture 03, Folie 19)' },
  { id: 'qz_kf_l03_15', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'Unlike the E×B drift, the force drift (and the ∇B drift, treated analogously) has the property that it…', options: ['is identical for ions and electrons in both magnitude and direction', 'is completely independent of the applied force', 'changes sign with the particle\'s charge, causing ions and electrons to drift in opposite directions', 'only occurs for neutral particles'], correct: 2, explanation: 'The force drift v_F = (F×B)/(qB²) depends on charge sign, so ions and electrons drift in opposite directions under a generic force (e.g. gravity), creating a charge separation and net current density in the plasma — the same logic underlies the ∇B drift. (Lecture 03, Folie 20-21)' },
  { id: 'qz_kf_l03_16', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'In a curved magnetic field such as that of a toroid, the curvature drift arises together with which other drift, such that their effects add up in the same direction?', options: ['the E×B drift', 'the polarization drift', 'the Coulomb collision drift', 'the ∇B (gradient-B) drift'], correct: 3, explanation: 'In a toroidal field, both the centrifugal-force-driven curvature drift and the ∇B drift act because the field lines are circular and B decreases with radius (∝1/r); since both drifts point in the same direction, their effects sum, worsening particle loss. (Lecture 03, Folie 22)' },
  { id: 'qz_kf_l03_17', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'In a magnetic mirror configuration, a particle moving from a weak-field region toward a strong-field throat is reflected back because…', options: ['to keep the magnetic moment μ constant, v⊥ must increase and v∥ must decrease as B increases, eventually reaching v∥ = 0', 'its magnetic moment decreases while its parallel velocity increases', 'the particle loses its charge in the strong-field region', 'the total kinetic energy of the particle increases without bound'], correct: 0, explanation: 'Conservation of the magnetic moment μ = ½mv⊥²/B and of total kinetic energy means that as B increases toward the mirror throat, v⊥ must grow and v∥ must shrink; if B is high enough, v∥ reaches zero and the particle is reflected back to the weak-field region. (Lecture 03, Folie 23)' },
  { id: 'qz_kf_l03_18', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'In a magnetic bottle formed by two opposing magnetic mirrors, the "loss cone" refers to…', options: ['the region of physical space closest to the mirror coils', 'the portion of velocity space (small v⊥/v∥ ratio) for which particles are not trapped and escape the bottle', 'the area where the magnetic field is exactly zero', 'the zone where tritium breeding occurs'], correct: 1, explanation: 'Particles with too small a v⊥/v∥ ratio at the midplane do not gain enough v⊥ to be reflected before reaching the mirror throat, so they escape; this range of velocity-space angles is called the loss cone, with aperture given by sin²θm = B0/Bm. (Lecture 03, Folie 24)' },
  { id: 'qz_kf_l03_19', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'In a simple (non-tokamak) toroidal confinement device, the combined effect of the ∇B drift pushing ions and electrons to opposite sides of the torus is that…', options: ['the plasma current disappears entirely', 'the magnetic field becomes perfectly uniform', 'a charge separation builds up, creating an electric field whose resulting E×B drift (with curvature drift) pushes particles radially outward', 'tritium breeding is enhanced'], correct: 2, explanation: 'The ∇B drift separates ions and electrons to opposite sides of the torus, producing a vertical electric field; the resulting E×B drift combines with the curvature drift to push particles radially outward, which is exactly the confinement problem that the poloidal field is designed to solve. (Lecture 03, Folie 26)' },
  { id: 'qz_kf_l03_20', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'The addition of a poloidal magnetic field to the toroidal field in a tokamak solves the drift-induced confinement problem primarily because…', options: ['it cancels the toroidal field completely', 'it eliminates the need for any magnetic field at all', 'it stops all particle motion along field lines', 'it transforms the field lines into helical lines, so particles circulate around the torus and no persistent charge accumulation occurs'], correct: 3, explanation: 'Combining toroidal and poloidal fields produces helical field lines; as particles travel along these helical paths around the torus, they visit both the top and bottom, preventing the sustained charge accumulation that caused the outward E×B drift. (Lecture 03, Folie 27)' },
  { id: 'qz_kf_l03_21', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'In tokamak geometry, the "aspect ratio" is defined as…', options: ['the ratio of the plasma major radius to the plasma minor radius, R0/a', 'the ratio of toroidal field to poloidal field, Bt/Bp', 'the ratio of plasma current to coil current', 'the ratio of poloidal angle to toroidal angle'], correct: 0, explanation: 'The tokamak parameters defined in the lecture include the plasma major radius R0 and minor radius a, whose ratio R0/a is defined as the aspect ratio, a key geometric parameter describing the torus shape. (Lecture 03, Folie 28)' },
  { id: 'qz_kf_l03_22', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'In a tokamak, the poloidal magnetic field is mainly generated by…', options: ['a set of external helical coils wound around the vacuum vessel', 'a current driven to flow within the plasma itself', 'the central solenoid acting as a permanent magnet', 'the divertor plates'], correct: 1, explanation: 'Rather than placing a physical current loop inside the extremely hot plasma, the tokamak instead induces a current to flow directly in the plasma itself, and this plasma current generates the poloidal field. (Lecture 03, Folie 29)' },
  { id: 'qz_kf_l03_23', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'The plasma current in a tokamak is induced through which physical process?', options: ['direct injection of an external current loop into the plasma core', 'chemical ionization of the D-T gas by lithium', 'a varying current in the central solenoid creates a changing magnetic field, which by Faraday\'s law induces an electric field that accelerates and ionizes the gas into a current-carrying plasma', 'gravitational compression of the fuel pellet'], correct: 2, explanation: 'The tokamak works like a transformer: ramping the current in the central solenoid changes the magnetic flux, inducing an electric field per Maxwell-Faraday\'s law that ionizes the gas (breakdown) and accelerates the resulting charged particles, driving the plasma current. (Lecture 03, Folie 30)' },
  { id: 'qz_kf_l03_24', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'A tokamak is inherently a "pulsed" machine mainly because…', options: ['the plasma must be replaced every few seconds', 'the toroidal field coils overheat instantly', 'the divertor requires periodic replacement after each pulse', 'the plasma current is driven by a continuously increasing central-solenoid current, which eventually saturates and must be ramped down before a new cycle can start'], correct: 3, explanation: 'The current in the central solenoid must keep increasing to sustain the induced plasma current; once it reaches its maximum (saturation), both currents must be ramped down before the cycle can restart, making pulsed rather than continuous operation an intrinsic feature of the classic tokamak concept. (Lecture 03, Folie 31)' },
  { id: 'qz_kf_l03_25', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'Compared to stellarators, a key advantage of the tokamak concept is…', options: ['intrinsic ohmic heating from the plasma current itself, plus being the most technologically advanced and researched concept', 'it requires no plasma current at all', 'it can operate in true steady state without any solenoid', 'it has no risk of disruptions'], correct: 0, explanation: 'The lecture lists as tokamak advantages the intrinsic heating provided by the plasma current and the fact that it is the most advanced concept with several generations of devices; its disadvantages are pulsed operation and the possibility of disruptions (sudden plasma collapse). (Lecture 03, Folie 31)' },
  { id: 'qz_kf_l03_26', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'A stellarator can operate in steady state primarily because…', options: ['it uses a pulsed central solenoid like a tokamak but with a larger capacity', 'both its toroidal and poloidal fields are generated entirely by external coils, without needing a plasma current', 'it has no magnetic field at all', 'the plasma is confined solely by inertia'], correct: 1, explanation: 'In stellarators, helical (or modular) external coils generate the poloidal field directly, so unlike a tokamak, no current needs to be induced in the plasma — this removes the need for a central solenoid and allows genuinely steady-state operation. (Lecture 03, Folie 37)' },
  { id: 'qz_kf_l03_27', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'A key engineering disadvantage of classical stellarators, compared to tokamaks, is…', options: ['they cannot achieve steady-state operation', 'they cannot use lithium breeding blankets', 'their complicated, continuous helical coil geometries make them difficult to manufacture and assemble', 'they require far higher plasma temperatures'], correct: 2, explanation: 'While classical stellarators avoid needing a plasma current, their continuous helical conductors wound around the toroidal magnets create complex geometries that are difficult to manufacture and assemble, and the concept is less researched than tokamaks. (Lecture 03, Folie 37)' },
  { id: 'qz_kf_l03_28', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'Modular stellarators improve on classical stellarators mainly by…', options: ['eliminating the need for any external magnetic coils', 'introducing a central solenoid for pulsed operation', 'removing the need for computer-aided coil design', 'using a combination of non-planar and skewed planar coils to generate the required helical fields without continuous helical conductors, at the cost of very complex individual coil shapes'], correct: 3, explanation: 'Modular stellarators combine non-planar and skewed planar coils to produce the needed closed helical magnetic surfaces, eliminating the continuous helical conductor disadvantage of classical stellarators, though this requires very complex coil shapes only designable with sophisticated computer codes. (Lecture 03, Folie 38)' },
  { id: 'qz_kf_l03_29', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'In Inertial Confinement Fusion (ICF), the fuel is confined by…', options: ['its own inertia, with fusion completing before the particles can move appreciably', 'a strong external toroidal magnetic field', 'a magnetic mirror configuration', 'a continuously flowing plasma current'], correct: 0, explanation: 'ICF relies on extremely rapid heating so that the fusion reaction completes before the compressed fuel has time to move or disperse significantly — the particles are confined by their own inertia rather than by any magnetic field. (Lecture 03, Folie 42)' },
  { id: 'qz_kf_l03_30', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'In direct-drive inertial confinement fusion, the process called "ablation" refers to…', options: ['the freezing of the D-T pellet before the shot', 'the sudden conversion of the pellet\'s outer surface into plasma that rapidly blows off outward, creating a recoil pressure wave that compresses the remaining fuel', 'the absorption of neutrons by the lithium blanket', 'the ionization of the gas inside the tokamak central solenoid'], correct: 1, explanation: 'Powerful laser or ion beams suddenly convert the pellet surface into plasma, which streams outward (ablation); by recoil (as in a rocket), this blow-off drives an inward pressure wave that compresses the remaining fuel to as much as 30 times its original density. (Lecture 03, Folie 42)' },
  { id: 'qz_kf_l03_31', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'In indirect-drive inertial confinement fusion, the "Hohlraum" serves to…', options: ['directly compress the fuel pellet mechanically without any radiation', 'store the deuterium-tritium fuel before it is frozen into a pellet', 'enclose the pellet so that lasers heat its inner cylinder walls to produce X-rays, which then implode the fuel target instead of direct laser illumination', 'shield the laser optics from neutron damage'], correct: 2, explanation: 'In indirect drive, laser beams heat the inner surface of a small container (the Hohlraum) surrounding the pellet, producing X-rays that are absorbed by the target surface and implode it, achieving the same compression effect as direct laser illumination but via X-ray drive. (Lecture 03, Folie 44)' },
  { id: 'qz_kf_l03_32', category: 'L3 — Outline of Nuclear Fusion Devices', question: 'A key drawback of inertial confinement fusion compared to magnetic confinement, as summarized in the lecture, is that…', options: ['its energy gain is inherently much lower', 'it cannot reach the required 100 MK ignition temperature', 'it requires a continuously operating plasma current', 'although the energy gain can be pretty large, it is difficult to sustain the reaction repeatedly and the facility investment required is very significant'], correct: 3, explanation: 'The wrap-up notes that inertial fusion can achieve a large energy gain per shot, but sustaining repeated reactions is difficult and the required investment (high-power laser/beam facilities) is very relevant, unlike continuously operating magnetic confinement devices. (Lecture 03, Folie 48)' }
],

      {
        id: 'kf4', name: 'The Plasma', icon: '🌪️', color: '#eab308', examWeight: 7,
        slideDeck: 'Folien_Kernfusion/MW1112 - Lecture 04 - The Plasma.pdf',
        quiz: [
  { id: 'qz_kf_l04_01', category: 'L4 — The Plasma', question: 'A plasma is formally defined as…', options: ['an ionized gas where recombination always dominates', 'a quasi-neutral gas of charged and neutral particles exhibiting collective behavior', 'any gas heated above room temperature', 'a fully neutral gas with no free charges'], correct: 1, explanation: 'The lecture defines a plasma as a quasi-neutral gas of charged and neutral particles that exhibits collective behavior, distinguishing it from an ordinary ionized gas. This collective, long-range electromagnetic interaction is the defining feature of the plasma state. (Lecture 04, Folie 4)' },
  { id: 'qz_kf_l04_02', category: 'L4 — The Plasma', question: 'Why is plasma often called the \'fourth state of matter\'?', options: ['It occurs after solid, liquid, and gas as a distinct state produced by sufficient ionization', 'It only exists briefly during nuclear reactions', 'It is a mixture of solid and gas phases', 'It can only be created artificially in laboratories'], correct: 0, explanation: 'When a gas is heated enough that its average kinetic energy reaches the ionization energy, electrons dissociate from atoms, producing a distinct state beyond the classical solid, liquid, and gas states. (Lecture 04, Folie 4)' },
  { id: 'qz_kf_l04_03', category: 'L4 — The Plasma', question: 'Approximately what fraction of the known matter in the universe exists in the plasma state?', options: ['Less than 1%', '95-99%', '10-20%', '50%'], correct: 1, explanation: 'The lecture states that 95-99% of known matter is in the plasma state, while natural plasmas on Earth are comparatively rare. This highlights why plasma physics is central to astrophysics as well as fusion research. (Lecture 04, Folie 6)' },
  { id: 'qz_kf_l04_04', category: 'L4 — The Plasma', question: 'According to the Saha ionization equation, the degree of ionization of a gas in thermal equilibrium…', options: ['remains low while the ionization energy exceeds the thermal energy kT, then rises sharply as kT approaches or exceeds it', 'is independent of temperature', 'decreases monotonically as temperature increases', 'depends only on the gas pressure, not temperature'], correct: 0, explanation: 'The Saha equation shows the ion-to-neutral ratio stays low as long as the ionization energy U_i is greater than kT, then increases dramatically once thermal energy becomes comparable to or exceeds U_i, so gases in the keV range are almost fully ionized. (Lecture 04, Folie 6)' },
  { id: 'qz_kf_l04_05', category: 'L4 — The Plasma', question: 'The state of ionization of a gas at a given temperature is best described as…', options: ['directly proportional to the ion density', 'unrelated to the ion density', 'proportional to the square of the ion density', 'inversely proportional to the ion density'], correct: 3, explanation: 'At low ion density (e.g., the interstellar medium) the chance of an ion meeting an electron and recombining is low, so ionization stays high; at higher density recombination becomes more frequent, lowering the ionization fraction. This is why the ionization state is inversely proportional to ion density. (Lecture 04, Folie 7)' },
  { id: 'qz_kf_l04_06', category: 'L4 — The Plasma', question: 'The \'collective behavior\' of a plasma refers to the fact that…', options: ['particle motion depends only on immediate local collisions, like in a neutral gas', 'particles never generate electric or magnetic fields', 'particle motion depends on the state of the plasma in remote regions as well, via long-range electromagnetic fields', 'all particles move with identical velocity at all times'], correct: 2, explanation: 'Unlike neutral gas molecules that interact only through direct collisions, charged plasma particles generate electric and magnetic fields that influence particles far away, so plasma dynamics depend on conditions elsewhere in the plasma, not just locally. (Lecture 04, Folie 8)' },
  { id: 'qz_kf_l04_07', category: 'L4 — The Plasma', question: 'A plasma is fully characterized, in the simplest description, by which two parameters?', options: ['Pressure and volume', 'Density n and temperature T', 'Magnetic field and current', 'Ionization energy and Debye length'], correct: 1, explanation: 'The lecture states that a plasma can be characterized by two parameters: density n and temperature T, even though these vary by many orders of magnitude across different plasma applications (n by about 28 orders of magnitude, T by about 7). (Lecture 04, Folie 8)' },
  { id: 'qz_kf_l04_08', category: 'L4 — The Plasma', question: 'In a simple electric discharge used to generate a plasma, ionization spreads through the gas mainly by…', options: ['an avalanche process where accelerated free electrons collide with and ionize further neutral molecules', 'spontaneous thermal ionization only', 'chemical reactions between electrodes and gas', 'Bremsstrahlung radiation absorption'], correct: 0, explanation: 'An electron accelerated by the applied potential gains enough energy to ionize a neutral molecule on collision; the resulting free electrons repeat this process, producing an ionization avalanche that sustains the discharge. (Lecture 04, Folie 11)' },
  { id: 'qz_kf_l04_09', category: 'L4 — The Plasma', question: 'A corona discharge occurs when…', options: ['a conductor is cooled below its critical temperature', 'two electrodes make direct physical contact', 'the electric field around a conductor exceeds the dielectric strength of the surrounding fluid', 'a plasma is confined by a purely toroidal magnetic field'], correct: 2, explanation: 'A corona discharge is a local electrical breakdown that occurs where the electric field strength around a high-voltage conductor exceeds the dielectric strength of the surrounding air, allowing charge to continuously leak off the conductor. (Lecture 04, Folie 14)' },
  { id: 'qz_kf_l04_10', category: 'L4 — The Plasma', question: 'In magnetic confinement devices, glow discharge cleaning (GDC) is primarily used to…', options: ['desorb adsorbed impurity gases from plasma-facing surfaces using ion/electron bombardment', 'breed tritium in the first wall', 'generate the toroidal magnetic field', 'measure the plasma density profile'], correct: 0, explanation: 'Adsorbed gases on plasma-facing surfaces cause impurity accumulation and energy losses if desorbed during operation; weakly bound species are removed by baking, while more strongly bound species require ion/electron bombardment in a low-pressure glow discharge without magnetic field. (Lecture 04, Folie 15)' },
  { id: 'qz_kf_l04_11', category: 'L4 — The Plasma', question: 'In Tungsten Inert Gas (TIG/GTAW) welding, the shielding gas (e.g. Argon) serves primarily to…', options: ['increase the arc temperature above 28000 °C', 'act as the filler metal for thick welds', 'protect the molten metal from oxidation', 'neutralize the electric arc current'], correct: 2, explanation: 'TIG welding uses an inert shielding gas such as Argon specifically to protect the heated, melting metal from reacting with oxygen in the air, while the arc itself is conducted through a column of plasma between the tungsten electrode and the workpiece. (Lecture 04, Folie 18)' },
  { id: 'qz_kf_l04_12', category: 'L4 — The Plasma', question: 'What distinguishes Plasma Arc Welding (PAW) from a standard TIG process?', options: ['PAW uses no electrode at all', 'PAW operates without any shielding gas', 'PAW constricts the arc plasma through a fine-bore nozzle using two separate inert gases, reaching much higher temperatures', 'PAW can only be used on non-metallic materials'], correct: 2, explanation: 'PAW employs two inert gases — one forming the arc plasma, one shielding it — and forces the plasma through a fine-bore copper nozzle that constricts the arc, producing high-velocity plasma jets exceeding 28000 °C, hotter and more concentrated than an open TIG arc. (Lecture 04, Folie 19)' },
  { id: 'qz_kf_l04_13', category: 'L4 — The Plasma', question: 'Electrical Discharge Machining (EDM) removes material from a workpiece by…', options: ['direct mechanical abrasion between tool and workpiece', 'melting the workpiece with a continuous DC arc in open air', 'chemical etching using acid baths', 'a series of rapidly recurring current discharges across a dielectric liquid between tool and workpiece, with no physical contact'], correct: 3, explanation: 'EDM relies on repeated electrical discharges that cause dielectric breakdown of the liquid separating the two electrodes; material is removed from the workpiece without the tool ever touching it, unlike conventional machining. (Lecture 04, Folie 21)' },
  { id: 'qz_kf_l04_14', category: 'L4 — The Plasma', question: 'Radiofrequency and microwave discharges are useful for starting and heating plasmas in magnetic confinement devices mainly because…', options: ['they require electrodes in direct contact with the plasma', 'they only work at frequencies below 1 Hz', 'they eliminate the need for a vacuum vessel', 'they can ionize and heat the gas via inductive coupling without needing electrodes in contact with it'], correct: 3, explanation: 'RF (MHz range) and microwave (GHz range) discharges can be produced by inductive coupling, so electrons oscillate in the alternating field and ionize neutrals through collisions without electrodes touching the gas — a key advantage for breakdown and heating in fusion devices. (Lecture 04, Folie 22)' },
  { id: 'qz_kf_l04_15', category: 'L4 — The Plasma', question: 'Debye shielding describes the phenomenon in which…', options: ['an electric potential introduced into a plasma is screened out by a surrounding cloud of opposite-charge particles within a characteristic length', 'a plasma is completely opaque to all electromagnetic radiation', 'magnetic field lines are expelled from the plasma volume', 'ions in a plasma cannot move in response to an electric field'], correct: 0, explanation: 'Charged particles of opposite sign are attracted toward an introduced potential, forming a screening cloud; beyond the Debye length the electric field of the source charge is effectively canceled by this shielding cloud. (Lecture 04, Folie 24-25)' },
  { id: 'qz_kf_l04_16', category: 'L4 — The Plasma', question: 'Physically, the edge of the Debye shielding cloud is defined by the point where…', options: ['the ion and electron densities become exactly equal', 'the magnetic field strength drops to zero', 'the collision frequency reaches its maximum', 'the electrostatic potential energy is approximately equal to the thermal energy kT of the particles'], correct: 3, explanation: 'Particles at the edge of the shielding cloud have just enough thermal energy to escape the electrostatic potential well; this balance point, where potential energy is about equal to kT, sets the characteristic radius known as the Debye length. (Lecture 04, Folie 24)' },
  { id: 'qz_kf_l04_17', category: 'L4 — The Plasma', question: 'For a system to behave as a true plasma rather than a mere collection of charges, the Debye length λD must satisfy…', options: ['λD ≫ L (system dimension)', 'λD = 0', 'λD ≪ L (system dimension)', 'λD must equal the Larmor radius'], correct: 2, explanation: 'The lecture states that electric potentials are shielded out over a distance short compared with the system dimensions L, i.e. λD ≪ L, so that the bulk of the plasma remains quasi-neutral outside the thin shielding clouds around individual charges. (Lecture 04, Folie 25)' },
  { id: 'qz_kf_l04_18', category: 'L4 — The Plasma', question: 'Plasma electrical resistivity is primarily caused by…', options: ['scattering of photons off neutral atoms', 'the Meissner effect', 'collisions, mainly of the highly mobile electrons with ions', 'recombination radiation'], correct: 2, explanation: 'Analogous to a metal wire, plasma resistivity arises mainly from collisions of the more mobile electrons; under an applied field, electrons accelerate to a drift velocity where the field force balances the collisional drag from ions. (Lecture 04, Folie 26)' },
  { id: 'qz_kf_l04_19', category: 'L4 — The Plasma', question: 'As plasma temperature increases toward thermonuclear values, plasma resistivity…', options: ['increases proportionally, like most metals', 'decreases, ultimately limiting the effectiveness of ohmic heating', 'stays constant regardless of temperature', 'becomes infinite due to the Meissner effect'], correct: 1, explanation: 'Unlike a normal metal, plasma resistivity decreases with increasing temperature (it is comparable to copper at Te ≈ 1.4 keV and roughly an order of magnitude lower at tokamak thermonuclear temperatures), which is why ohmic heating alone becomes insufficient at high temperature and additional heating systems are needed. (Lecture 04, Folie 26)' },
  { id: 'qz_kf_l04_20', category: 'L4 — The Plasma', question: 'Runaway electrons in a tokamak plasma arise because…', options: ['decreasing collision frequency at high temperature lets some electrons accelerate under an electric field to relativistic velocities largely unimpeded', 'electron collision frequency increases with temperature, slowing all electrons uniformly', 'the magnetic field is completely absent during normal operation', 'Bremsstrahlung radiation continuously decelerates all free electrons'], correct: 0, explanation: 'As temperature rises, electron collision frequency drops, so electrons in the high-energy tail of the velocity distribution can be accelerated by even a modest electric field toward relativistic speeds without being sufficiently slowed by collisions, escaping normal confinement and damaging the first wall. (Lecture 04, Folie 27)' },
  { id: 'qz_kf_l04_21', category: 'L4 — The Plasma', question: 'Runaway electron generation is a particular concern during…', options: ['steady-state ohmic heating at low current', 'disruptions, when a strong inductive electric field forms as plasma thermal energy is rapidly lost', 'glow discharge cleaning of the vessel', 'normal H-mode operation with no current changes'], correct: 1, explanation: 'During a disruption, the sudden loss of plasma thermal energy induces a strong electric field that can drive electrons into the runaway regime, accelerating them to relativistic energies capable of penetrating and damaging first-wall materials. (Lecture 04, Folie 27-28)' },
  { id: 'qz_kf_l04_22', category: 'L4 — The Plasma', question: 'A gyrating charged particle in a magnetic field makes the plasma behave as a diamagnetic material because…', options: ['gyrating particles completely cancel their own thermal energy', 'the particle\'s gyration current loop generates a field that opposes the externally applied magnetic field', 'the particle stops moving once magnetized', 'the resulting field always reinforces the external field'], correct: 1, explanation: 'Each gyrating particle forms a current loop that generates its own magnetic field; because particles gyrate so that this induced field opposes the external field, the plasma as a whole reduces the net magnetic field, i.e. behaves diamagnetically. (Lecture 04, Folie 29)' },
  { id: 'qz_kf_l04_23', category: 'L4 — The Plasma', question: 'The plasma parameter β is defined as the ratio of…', options: ['magnetic pressure to particle (kinetic) pressure', 'electron temperature to ion temperature', 'particle (kinetic) pressure to magnetic pressure', 'confinement time to collision time'], correct: 2, explanation: 'β = 2μ0(n_iT_i + n_eT_e)/B², i.e. particle pressure divided by magnetic pressure B²/2μ0; a high β is economically desirable in fusion because it means a given plasma pressure can be confined with a smaller (cheaper) magnetic field. (Lecture 04, Folie 30-31)' },
  { id: 'qz_kf_l04_24', category: 'L4 — The Plasma', question: 'Why is a high β value desirable in a fusion device?', options: ['It reduces the need for tritium breeding', 'It eliminates the need for a divertor', 'It allows high plasma pressure to be sustained with a smaller, less costly external magnetic field', 'It increases the Debye length beyond the system size'], correct: 2, explanation: 'Since fusion power scales with plasma pressure while magnets are expensive, achieving high plasma pressure relative to magnetic pressure (high β) is economically desirable; however, stability constraints in tokamaks currently limit β to about 0.3 at best. (Lecture 04, Folie 31)' },
  { id: 'qz_kf_l04_25', category: 'L4 — The Plasma', question: 'The Rotational Transform ι of a magnetic field line in a toroidal device is defined as…', options: ['the amount of poloidal twist a field line makes while completing one full toroidal circuit', 'the ratio of plasma density to magnetic field strength', 'the number of neutral particles ionized per second', 'the ratio of Bremsstrahlung to cyclotron radiation losses'], correct: 0, explanation: 'The rotational transform ι = 2π(R/a)(Bp/Bt) quantifies how much a magnetic field line rotates in the poloidal direction θ for one full trip around the torus in the toroidal direction φ, and is essential for confinement in tokamak/stellarator geometries. (Lecture 04, Folie 32)' },
  { id: 'qz_kf_l04_26', category: 'L4 — The Plasma', question: 'The safety factor q = 2π/ι in a tokamak is best described as…', options: ['the number of toroidal revolutions a field line makes for one poloidal revolution, with higher q generally giving greater stability', 'the ratio of tritium breeding rate to fusion power', 'the plasma resistivity divided by that of copper', 'the fraction of alpha particles reabsorbed by the plasma'], correct: 0, explanation: 'q equals the number of toroidal turns per poloidal turn (q=1 corresponds to ι=2π); higher q values increase MHD stability, but since q varies with minor radius and too-high q degrades particle confinement, a trade-off between stability and confinement is required. (Lecture 04, Folie 33)' },
  { id: 'qz_kf_l04_27', category: 'L4 — The Plasma', question: 'In present-day tokamaks, the safety factor q typically…', options: ['is constant across the entire plasma cross-section', 'is at a minimum (around 1) at the plasma center and increases toward the plasma edge', 'is at a maximum at the plasma center and decreases toward the edge', 'is undefined for toroidal devices'], correct: 1, explanation: 'Because the poloidal and toroidal fields vary with minor radius, q typically starts near a minimum of about 1 at the center (r=0) and rises toward higher values at the plasma border (r=a). (Lecture 04, Folie 33)' },
  { id: 'qz_kf_l04_28', category: 'L4 — The Plasma', question: 'In a magnetically confined fusion plasma, the dominant radiative loss channel that must be considered in practice comes mainly from…', options: ['ions, due to their large mass and slow acceleration', 'neutral atoms only', 'the magnetic field coils', 'electrons, due to their light mass and correspondingly larger acceleration under forces'], correct: 3, explanation: 'Radiated power from accelerated charges depends on acceleration, and because electrons are far lighter than ions they accelerate much more strongly under the same force, so in practice only electron radiation needs to be considered. (Lecture 04, Folie 34)' },
  { id: 'qz_kf_l04_29', category: 'L4 — The Plasma', question: 'Bremsstrahlung radiation in a plasma is produced specifically by…', options: ['ions gyrating around magnetic field lines', 'neutral particles recombining with free electrons', 'photons scattering off the vacuum vessel wall', 'electrons accelerated through Coulomb collisions with ions'], correct: 3, explanation: 'The lecture distinguishes two mechanisms of electron acceleration: collisions (producing Bremsstrahlung radiation) and cyclotron motion (producing cyclotron/synchrotron radiation). Bremsstrahlung specifically arises from collisional deceleration/acceleration of electrons in the Coulomb field of ions. (Lecture 04, Folie 34)' },
  { id: 'qz_kf_l04_30', category: 'L4 — The Plasma', question: 'According to the Bremsstrahlung power loss formula presented, the radiated power density scales with…', options: ['the square of electron density, Zeff, and the square root of electron temperature', 'the square root of electron density and Zeff, and the square root of electron temperature', 'only the ion temperature, independent of density', 'the inverse of the magnetic field squared'], correct: 0, explanation: 'The formula P_Br ≈ 5.35×10⁻³⁷ n_e² Z_eff Te^(1/2) [W/m³] shows Bremsstrahlung losses scale with the square of electron density, linearly with the effective charge Zeff, and with the square root of electron temperature — explaining why high-Z impurities are especially damaging. (Lecture 04, Folie 35)' },
  { id: 'qz_kf_l04_31', category: 'L4 — The Plasma', question: 'High-Z impurities (e.g. Fe, Cr, Ni sputtered from plasma-facing components) are particularly harmful to a fusion plasma mainly because…', options: ['they reduce the Debye length to zero', 'they increase the safety factor beyond stable limits', 'they strongly increase Bremsstrahlung radiation losses via the Zeff term', 'they suppress the plasma\'s diamagnetic response'], correct: 2, explanation: 'Since Bremsstrahlung losses depend strongly on Zeff (a density-weighted average of Z²), even small amounts of high-Z impurity ions from sputtered wall material sharply raise radiative losses, which is why ingress of such impurities must be minimized. (Lecture 04, Folie 35)' },
  { id: 'qz_kf_l04_32', category: 'L4 — The Plasma', question: 'Although the total cyclotron (synchrotron) radiation emitted by gyrating particles can be large, in a fusion reactor the net power actually lost from the plasma by this mechanism is relatively low mainly because…', options: ['cyclotron radiation is not produced at fusion-relevant temperatures', 'cyclotron radiation only affects neutral particles', 'the magnetic field cancels all cyclotron emission', 'the plasma is not transparent to this radiation, so much of it is reabsorbed rather than escaping'], correct: 3, explanation: 'The plasma is optically thick (not transparent) to cyclotron radiation, so a large fraction of the emitted power is reabsorbed within the plasma rather than escaping, keeping the net loss to roughly 10⁻² MW/m³ in a reactor. (Lecture 04, Folie 36)' },
  { id: 'qz_kf_l04_33', category: 'L4 — The Plasma', question: 'Thermal conduction parallel (axial) to the magnetic field lines in a plasma mainly causes…', options: ['direct energy losses through the plasma edge', 'a redistribution of temperature within the plasma, since it is much higher than the perpendicular conductivity', 'complete loss of confinement', 'an increase in the safety factor'], correct: 1, explanation: 'Conduction along field lines is much faster than across them, so it primarily redistributes/equalizes temperature inside the plasma volume, whereas the much weaker perpendicular conduction is what actually drives energy losses at the plasma border. (Lecture 04, Folie 37)' },
  { id: 'qz_kf_l04_34', category: 'L4 — The Plasma', question: 'Energy losses at the edge of a magnetically confined plasma are mainly attributed to…', options: ['axial (parallel) thermal conduction', 'perpendicular thermal conduction and convective particle diffusion across field lines, which are much weaker than parallel transport but drive the border losses', 'increases in the safety factor at the plasma center', 'Debye shielding breakdown'], correct: 1, explanation: 'While parallel conduction quickly equilibrates temperature along field lines, it is the comparatively weak perpendicular conduction and convective diffusion across the field that cause net energy and particle losses at the plasma boundary. (Lecture 04, Folie 37-38)' },
  { id: 'qz_kf_l04_35', category: 'L4 — The Plasma', question: 'Thermal convection in a plasma is best described as…', options: ['electromagnetic radiation emitted by accelerated electrons', 'the shielding of an external electric potential by a cloud of opposite charge', 'the process by which the plasma becomes diamagnetic', 'diffusion of particles driven by temperature gradients, contributing to losses at the plasma border'], correct: 3, explanation: 'Thermal convection arises from particle motion driven by temperature gradients, causing particle diffusion; when this diffusion occurs from the plasma border outward, it contributes directly to plasma particle and energy losses. (Lecture 04, Folie 38)' }

      {
        id: 'kf5', name: 'Tokamaks: Plasma Main Operation', icon: '🍩', color: '#22c55e', examWeight: 8,

        quiz: [
  { id: 'qz_kf_l05_01', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'The Tokamak concept was originally invented in the USSR based on theoretical ideas developed by…', options: ['Andrei Sakharov and Igor Tamm', 'John Lawson and Enrico Fermi', 'Lev Artsimovich alone', 'Robert Bussard and Lyman Spitzer'], correct: 0, explanation: 'The tokamak was invented in the early 1950s in the USSR based on the theoretical ideas of Andrei Sakharov and Igor Tamm; Artsimovich later led its early experimental development. (Lecture 05, Folie 4)' },
  { id: 'qz_kf_l05_02', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'The H-mode (high confinement mode) of tokamak plasmas was first discovered in the early 1980s on which device?', options: ['TFTR', 'ASDEX', 'T-3', 'JET'], correct: 1, explanation: 'The H-mode was discovered in 1982 on the ASDEX tokamak at IPP Germany, and it remains the reference confinement scenario for future machines such as ITER. (Lecture 05, Folie 4, 28)' },
  { id: 'qz_kf_l05_03', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'Compared to the original NET/early ITER design goal, the ignition target for ITER was later revised to a more modest fusion gain of…', options: ['Q = 5', 'Q = 30', 'Q = 10', 'Q = 1'], correct: 2, explanation: 'When the USA left ITER in 1998 and the project continued at reduced scale (15 MA, 6.2 m R, 500 MW), the ignition goal was reduced to a fusion gain of Q = 10 rather than true ignition. (Lecture 05, Folie 4)' },
  { id: 'qz_kf_l05_04', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'Which of the following is NOT listed among the main historical evolutions of tokamak design?', options: ['Shift from circular to vertically elongated plasma shapes', 'Substitution of copper coils by superconducting coils', 'Replacement of the iron transformer core by air-core/superconducting solutions', 'Replacement of the divertor by a pumped limiter'], correct: 3, explanation: 'The historical trend went the opposite way: the divertor has replaced the pumped limiter as the preferred plasma-facing configuration, not vice versa. (Lecture 05, Folie 5)' },
  { id: 'qz_kf_l05_05', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'In modern high-performance neutral beam injectors, negative-ion-based beams are increasingly preferred over positive-ion beams mainly because…', options: ['they allow efficient neutralization at the high energies needed for large reactors', 'they eliminate the need for magnetic confinement', 'negative ions are cheaper to produce', 'they directly breed tritium'], correct: 0, explanation: 'The lecture notes that NBI systems using accelerated negative ions are substituting positive-ion systems, since negative ions can be efficiently neutralized at the higher energies required by large devices. (Lecture 05, Folie 5)' },
  { id: 'qz_kf_l05_06', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'The fusion gain achieved during JET\'s D-T campaigns leading up to and including the first D-T campaign was on the order of…', options: ['Q ≈ 10', 'Q ≈ 1', 'Q ≈ 100', 'Q ≈ 0.01'], correct: 1, explanation: 'JET operated with a fusion gain of about Q ≈ 1, with specific D-T campaign results of Q = 0.67 and Q = 0.33, well below the Q = 10 target set for ITER. (Lecture 05, Folie 6-7)' },
  { id: 'qz_kf_l05_07', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'A tokamak plasma discharge cycle is generally divided into which three main phases?', options: ['Ignition, burn, extinguishment', 'Pre-magnetization, discharge, cooldown', 'Ramp-up, flat-top (burn), ramp-down', 'Breakdown, quench, recovery'], correct: 2, explanation: 'Every tokamak discharge is structured into a ramp-up phase where current is built up, a flat-top (burn) phase of steady operation, and a ramp-down phase where the current is reduced back to zero. (Lecture 05, Folie 10)' },
  { id: 'qz_kf_l05_08', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'During the ramp-up and ramp-down phases of a tokamak discharge, the plasma current is normally driven by…', options: ['the bootstrap effect', 'radiofrequency waves only', 'neutral beam injection only', 'inductive current drive from the central solenoid'], correct: 3, explanation: 'Ramp-up and ramp-down are normally operated with inductive current drive, where the plasma current is induced entirely by the changing current in the central solenoid (transformer action). (Lecture 05, Folie 10)' },
  { id: 'qz_kf_l05_09', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'The bootstrap current in a tokamak plasma is best described as…', options: ['a self-generated, non-inductive current driven by density (pressure) gradients', 'the current used only during plasma breakdown', 'a current produced exclusively by neutral beam injectors', 'current induced solely by the central solenoid'], correct: 0, explanation: 'The bootstrap current is a self-generated plasma current arising from density/pressure gradients in the plasma, and it is one of several non-inductive current drive mechanisms alongside NBI and RF/microwave heating. (Lecture 05, Folie 10)' },
  { id: 'qz_kf_l05_10', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'The main limitation on the duration of the inductive ramp-up/ramp-down phases in a tokamak is set by…', options: ['the cryostat thermal insulation performance', 'the maximum current (and thus magnetic flux) achievable in the central solenoid', 'the tritium breeding ratio of the blanket', 'the divertor tungsten melting point'], correct: 1, explanation: 'Inductive current drive relies on flux swing in the central solenoid; the total available magnetic flux is limited by the maximum current the central solenoid can reach, which caps how much inductive current drive is available. (Lecture 05, Folie 11)' },
  { id: 'qz_kf_l05_11', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'Just after breakdown, before the plasma is moved to its final divertor configuration, the plasma is held against the wall in a configuration called…', options: ['the divertor configuration', 'the double-null configuration', 'the limiter configuration', 'the flat-top configuration'], correct: 2, explanation: 'After breakdown the plasma current starts low and the growing plasma initially rests on the wall in the so-called limiter configuration, before later being detached and moved into the divertor configuration. (Lecture 05, Folie 11-12)' },
  { id: 'qz_kf_l05_12', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'During tokamak start-up, the plasma temperature rises during ramp-up mainly because of…', options: ['compressional heating from elongation', 'neutral beam injection only', 'alpha particle heating', 'the Joule (resistive) heating effect of the induced plasma current'], correct: 3, explanation: 'Because the plasma has electrical resistance, the induced current causes ohmic (Joule) heating, which raises the plasma temperature during the current ramp-up before other heating methods are needed. (Lecture 05, Folie 11)' },
  { id: 'qz_kf_l05_13', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'An early switch-on of additional heating (e.g. ECRH) during the ramp-up phase is advantageous mainly because it…', options: ['reduces plasma resistivity and hence reduces magnetic flux consumption', 'increases the plasma resistivity, increasing flux consumption', 'eliminates the need for the central solenoid entirely', 'prevents the formation of the separatrix'], correct: 0, explanation: 'Heating the plasma early lowers its electrical resistivity (resistivity decreases with temperature), which reduces the amount of magnetic flux the central solenoid must consume to drive the same current, helping conserve flux for the flat-top phase. (Lecture 05, Folie 12)' },
  { id: 'qz_kf_l05_14', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'The last closed magnetic flux surface that separates the confined plasma from the scrape-off layer, formed once the plasma enters the divertor configuration, is called the…', options: ['halo boundary', 'separatrix', 'Larmor surface', 'pedestal'], correct: 1, explanation: 'When the plasma is moved into the divertor configuration, a last closed magnetic surface called the separatrix forms, with the inboard/outboard sides crossing at one or two X-points (null points). (Lecture 05, Folie 12)' },
  { id: 'qz_kf_l05_15', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'The points where the inboard and outboard sides of the separatrix cross are known as…', options: ['pedestal points', 'breakdown points', 'X points (null points)', 'kink points'], correct: 2, explanation: 'These crossing points of the separatrix are called X-points or null points; a single-null configuration has one such point (typically at the bottom), while a double-null configuration has a second one at the top. (Lecture 05, Folie 12-13)' },
  { id: 'qz_kf_l05_16', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'In a double-null divertor configuration, compared to a single-null configuration, the plasma has…', options: ['no X-point at all', 'an X-point only on the inboard midplane', 'one X-point at the bottom of the plasma only', 'two X-points, one at the bottom and one at the top of the plasma'], correct: 3, explanation: 'A single-null configuration has one X-point commonly at the bottom; a double-null configuration adds a second X-point at the top of the plasma. (Lecture 05, Folie 13)' },
  { id: 'qz_kf_l05_17', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'In ITER, the flat-top (burn) phase is expected to last, depending on the operating scenario, roughly…', options: ['more than 400 s (potentially longer at lower performance)', 'about 50 s, same as the ramp-up', 'exactly 1 hour, matching steady-state operation', 'less than 1 s'], correct: 0, explanation: 'The lecture states that in ITER the flat-top phase could last more than 400 s depending on the scenario, and even longer at lower performance levels, in contrast to the roughly 50 s ramp-up. (Lecture 05, Folie 13)' },
  { id: 'qz_kf_l05_18', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'During the central solenoid discharge that initiates an ITER plasma pulse, breakdown is triggered because…', options: ['the divertor plates are heated resistively', 'the fast change of B field induces an electric field strong enough to break down the gas', 'a static magnetic field ionizes the gas directly', 'tritium decay ionizes the fill gas'], correct: 1, explanation: 'After pre-magnetization, the central solenoid current is discharged rapidly; the resulting time-varying B field induces an electric field in the vessel that ionizes the gas and triggers breakdown of the plasma. (Lecture 05, Folie 14)' },
  { id: 'qz_kf_l05_19', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'Toroidal field ripple in a tokamak arises fundamentally because…', options: ['the divertor is not perfectly axisymmetric', 'the plasma current decays during flat-top', 'the number of toroidal field coils is finite, breaking perfect axisymmetry', 'the central solenoid current reverses direction'], correct: 2, explanation: 'Since the toroidal field is produced by a finite, discrete number of coils rather than a continuous current sheet, the field varies periodically between coils, breaking the ideal axisymmetry and creating a ripple. (Lecture 05, Folie 15)' },
  { id: 'qz_kf_l05_20', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'Particles trapped in the magnetic well of the toroidal field ripple tend to drift vertically out of the plasma due to…', options: ['Bremsstrahlung radiation pressure', 'Bootstrap current gradients', 'the Meissner effect', 'the ∇B drift'], correct: 3, explanation: 'Particles trapped locally in the ripple magnetic well experience a vertical drift driven by the gradient of the magnetic field (∇B drift), and other particle orbits are also disturbed by the ripple, enhancing transport. (Lecture 05, Folie 15)' },
  { id: 'qz_kf_l05_21', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'Toroidal field ripple affects ions more strongly than electrons mainly because…', options: ['ions have a larger Larmor radius than electrons', 'ions carry no electric charge', 'ions do not experience the ∇B drift', 'electrons are shielded by Debye length effects'], correct: 0, explanation: 'Because ions have a much larger Larmor radius than electrons at the same energy, their orbits sample more of the spatial variation of the ripple field, making them more susceptible to ripple-induced losses, including alpha particle losses in a reactor. (Lecture 05, Folie 16)' },
  { id: 'qz_kf_l05_22', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'For a fusion reactor, the toroidal field ripple is generally required to stay below approximately…', options: ['0.001 %', '1 to 2 %', '50 %', '10 to 20 %'], correct: 1, explanation: 'To limit enhanced losses of alpha particles and neutral beam particles, the ripple in a reactor should not exceed about 1 to 2 %, which sets a lower bound on the number of toroidal field coils (typically 16–24, e.g. 18 in ITER). (Lecture 05, Folie 16)' },
  { id: 'qz_kf_l05_23', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'Neutral beam particles injected to heat the plasma are especially prone to ripple-induced losses when…', options: ['the beam energy is very low', 'the beam is injected nearly parallel to the plasma axis', 'the beam is injected at large angles with respect to the plasma axis', 'the beam uses only positive ions'], correct: 2, explanation: 'The lecture notes that a fraction of high-energy neutral beam particles can be lost to ripple effects, particularly when the beam is injected at large angles relative to the plasma axis. (Lecture 05, Folie 16)' },
  { id: 'qz_kf_l05_24', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'The plasma elongation κ is defined as…', options: ['κ = B_φ/B_θ', 'κ = a/b', 'κ = R/a', 'κ = b/a (vertical minor radius over horizontal minor radius)'], correct: 3, explanation: 'Plasma elongation is defined as κ = b/a, the ratio of the vertical (b) to horizontal (a) minor radius; vertically elongated plasmas allow higher plasma currents without increasing the major radius. (Lecture 05, Folie 17)' },
  { id: 'qz_kf_l05_25', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'To achieve vertically elongated plasmas efficiently, modern tokamaks (with few exceptions) use toroidal field coils shaped like a…', options: ['D shape (Princeton D coil)', 'perfect circle', 'square frame', 'triangle'], correct: 0, explanation: 'A "D"-shaped toroidal field coil, known as the Princeton D shape, was found optimal for producing elongated plasmas; it also results in constant tension along the coil strands, which is mechanically favorable. (Lecture 05, Folie 17-18)' },
  { id: 'qz_kf_l05_26', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'Besides the mechanical benefit of constant strand tension, the D-shaped coil design also provides which additional advantage?', options: ['It eliminates the need for a divertor', 'It better accommodates space for the divertor component and reduces machine cost at equal performance', 'It removes the need for toroidal field coils altogether', 'It increases the Coulomb barrier'], correct: 1, explanation: 'Beyond mechanical benefits, the D-shaped, elongated plasma geometry better accommodates space for the divertor and is advantageous in terms of machine cost for a given performance level. (Lecture 05, Folie 18)' },
  { id: 'qz_kf_l05_27', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'The global energy confinement time τ_E of a plasma is fundamentally defined as…', options: ['the time needed for breakdown to occur', 'the ratio of total plasma current to magnetic field', 'the ratio of the plasma\'s stored thermal energy to the total power losses', 'the ratio of fusion power to auxiliary heating power'], correct: 2, explanation: 'τ_E is defined as the volume integral of (3/2)nk(T_i+T_e) — the plasma\'s stored thermal energy — divided by the total power losses P; it quantifies how well the plasma retains its energy in the absence of instabilities. (Lecture 05, Folie 19)' },
  { id: 'qz_kf_l05_28', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'Because analytically computing tokamak confinement time is extremely difficult, the practical approach used to predict τ_E is to rely on…', options: ['the Lawson criterion alone', 'purely theoretical MHD stability calculations', 'the Coulomb collision cross section only', 'empirical scaling laws derived statistically from experimental data across many devices'], correct: 3, explanation: 'Since analytical prediction of confinement time is very complex, empirical scaling laws based on statistical analysis of large experimental databases from many tokamaks are used instead to predict and extrapolate confinement performance. (Lecture 05, Folie 19, 22)' },
  { id: 'qz_kf_l05_29', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'In the absence of instabilities, classical (cylindrical) transport theory for a plasma is based on treating particle and energy transport as a…', options: ['diffusion process', 'radiative transfer process only', 'purely ballistic (collisionless) process', 'pure convection process only'], correct: 0, explanation: 'The lecture describes that in a cylindrical plasma, particle and energy transport can be calculated in terms of a diffusion process, referred to as classical transport, though this theory does not directly apply to toroidal geometries. (Lecture 05, Folie 20)' },
  { id: 'qz_kf_l05_30', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'Neoclassical transport differs from classical transport mainly because it accounts for…', options: ['tritium breeding reactions', 'the toroidal geometry, including an outward force along the major radius that increases transport', 'radiation losses from impurities', 'the Meissner effect in superconducting coils'], correct: 1, explanation: 'Neoclassical transport is the analytical collisional transport theory adapted for a torus; it includes a toroidally induced outward force along the major radius causing internal convective flows, resulting in higher transport than the simple cylindrical (classical) case. (Lecture 05, Folie 20)' },
  { id: 'qz_kf_l05_31', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'Experimentally observed transport in tokamaks, which is much higher than neoclassical theory predicts (electron thermal transport can be two orders of magnitude higher), is referred to as…', options: ['bootstrap transport', 'ripple transport', 'anomalous transport', 'ohmic transport'], correct: 2, explanation: 'This extra transport beyond neoclassical predictions, thought to arise from plasma instabilities and magnetic surface perturbations, is termed anomalous transport, and confinement deteriorates as heating power and pressure increase. (Lecture 05, Folie 21)' },
  { id: 'qz_kf_l05_32', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'The four basic categories of tokamak confinement behavior mentioned in the lecture are…', options: ['Classical, neoclassical, anomalous, and bootstrap confinement', 'Ramp-up, flat-top, ramp-down, and quench confinement', 'Limiter, divertor, single-null, and double-null confinement', 'Ohmically heated, L-mode additionally heated, H-mode additionally heated, and enhanced confinement'], correct: 3, explanation: 'The lecture lists four confinement regimes: ohmically heated plasmas, L-mode additionally heated plasmas, H-mode additionally heated plasmas, and enhanced confinement regimes. (Lecture 05, Folie 23)' },
  { id: 'qz_kf_l05_33', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'In an ohmically heated plasma, the heating efficiency decreases as temperature increases mainly because…', options: ['the plasma resistance decreases with temperature, reducing ohmic power', 'the plasma resistance increases with temperature', 'the poloidal field becomes zero at high temperature', 'the magnetic field weakens with temperature'], correct: 0, explanation: 'Since plasma resistivity decreases as temperature rises (similar to a very hot conductor), ohmic heating becomes progressively less effective at higher temperatures, ultimately saturating and requiring auxiliary heating to reach reactor-relevant temperatures. (Lecture 05, Folie 24, 42)' },
  { id: 'qz_kf_l05_34', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'The Goldston L-mode confinement scaling law shows that increasing the auxiliary heating power P…', options: ['only affects the safety factor q', 'degrades the confinement time τ_E, since P appears in the denominator', 'has no effect on τ_E', 'increases τ_E proportionally'], correct: 1, explanation: 'In the Goldston scaling τ_G ∝ I·R^1.75·κ^0.5 / (P^0.5·a^0.37), the heating power P appears in the denominator, meaning confinement time decreases as more auxiliary power is coupled into the plasma — the defining degradation of L-mode. (Lecture 05, Folie 26)' },
  { id: 'qz_kf_l05_35', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'The H-mode (high confinement mode) is best characterized as a regime in which…', options: ['ohmic heating alone is sufficient for ignition', 'confinement is worse than in L-mode below a certain power threshold', 'confinement improves abruptly by roughly a factor of 2 above a specific heating power threshold', 'the plasma current must be zero'], correct: 2, explanation: 'H-mode is an enhanced confinement regime discovered on ASDEX in which confinement improves discontinuously by nearly a factor of 2 once a specific power threshold is exceeded, compared to the lower L-mode confinement below that threshold. (Lecture 05, Folie 21, 28)' },
  { id: 'qz_kf_l05_36', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'Edge Localized Modes (ELMs) are specifically associated with which confinement regime\'s dedicated scaling law in the lecture (IPB98(y,2))?', options: ['Ohmic confinement', 'L-mode confinement', 'Anomalous transport in limiter configuration', 'H-mode confinement'], correct: 3, explanation: 'The IPB98(y,2) scaling law given in the lecture is specifically derived for H-mode plasmas exhibiting edge localized modes (ELMs), distinct from the general H-mode ITERH93-P scaling. (Lecture 05, Folie 28)' },
  { id: 'qz_kf_l05_37', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'The power threshold P_th required to access H-mode is, according to the empirical scaling shown, primarily dependent on…', options: ['density, magnetic field, and machine size (major/minor radius)', 'only the safety factor q', 'only the plasma elongation κ', 'the tritium breeding ratio'], correct: 0, explanation: 'The empirical H-mode power threshold scaling P_th = 1.38·n^0.77·B^0.92·R^1.23·a^0.76 [MW] depends on the line-averaged density n, toroidal field B, and machine major/minor radius, not on breeding or safety factor terms. (Lecture 05, Folie 29)' },
  { id: 'qz_kf_l05_38', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'Plasma macro-instabilities, which involve large-scale movements of the plasma, are typically studied within the framework of…', options: ['classical diffusion theory', 'magnetohydrodynamics (MHD)', 'quantum electrodynamics', 'Debye shielding theory'], correct: 1, explanation: 'Large-scale, global plasma movements are called macro-instabilities and are analyzed as MHD phenomena, in contrast to micro-instabilities, which are local perturbations developing inside the plasma. (Lecture 05, Folie 32)' },
  { id: 'qz_kf_l05_39', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'When a plasma is displaced from equilibrium, the configuration is considered stable if…', options: ['there is no restoring force at all', 'the restoring force weakens as displacement grows', 'the restoring force strengthens as displacement grows', 'the plasma current reverses direction'], correct: 2, explanation: 'A configuration is stable if the restoring force gets stronger as the plasma is displaced further from equilibrium (pushing it back); if the restoring force weakens, the perturbation grows and the configuration is unstable, potentially leading to a disruption. (Lecture 05, Folie 32)' },
  { id: 'qz_kf_l05_40', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'The kink instability is best described as…', options: ['an instability caused only by neutral beam ripple losses', 'a thermal collapse of the plasma core', 'a local density perturbation confined to the plasma edge', 'a current-driven instability where the plasma column\'s cross-section shifts laterally from its centerline'], correct: 3, explanation: 'The kink instability is a current-driven macro-instability in which the plasma column translates laterally from its undisturbed centerline; when displaced, the poloidal field weakens in the direction of the perturbation, causing the displacement to grow. (Lecture 05, Folie 33)' },
  { id: 'qz_kf_l05_41', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'Regarding magnetic field curvature effects on stability in a tokamak, the situation is generally described as…', options: ['good curvature on the inboard side, bad curvature on the outboard side', 'good curvature on the outboard side, bad curvature on the inboard side', 'curvature only matters for the toroidal field ripple', 'curvature has no effect on stability'], correct: 0, explanation: 'In tokamaks the field curvature is stabilizing ("good") on the inboard side, where the radius of curvature points into the plasma, and destabilizing ("bad") on the outboard side, where it points outward, which underlies ballooning mode behavior. (Lecture 05, Folie 34)' },
  { id: 'qz_kf_l05_42', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'Ballooning modes in a tokamak plasma are triggered primarily by…', options: ['a decrease in the safety factor to exactly zero', 'high plasma beta causing local bulges to expand on the bad-curvature outboard side', 'low plasma beta and weak heating', 'excessive tritium breeding in the blanket'], correct: 1, explanation: 'At high plasma beta, a local bulge on the outboard (bad curvature) side tends to expand as plasma pressure pushes outward, producing ballooning modes; this instability effectively sets a beta limit for tokamak operation. (Lecture 05, Folie 34)' },
  { id: 'qz_kf_l05_43', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'A major tokamak disruption is characterized fundamentally by…', options: ['a slow, gradual decrease of plasma density over minutes', 'a smooth ramp-down identical to normal operation', 'a thermal quench followed by a current quench, with sudden loss of plasma confinement', 'the onset of the Meissner effect in the plasma'], correct: 2, explanation: 'A major disruption involves the plasma confinement being suddenly destroyed, typically evolving as a thermal quench (rapid core temperature collapse) followed by a current quench (rapid decay of the plasma current to zero). (Lecture 05, Folie 35, 38)' },
  { id: 'qz_kf_l05_44', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'Disruptions in present-day tokamaks most commonly occur when…', options: ['the central solenoid is fully demagnetized', 'the toroidal field coils exceed their critical temperature only', 'the auxiliary heating is turned off during flat-top', 'the plasma current or density approaches operational limits, or an accidental event (e.g. a falling tile) occurs'], correct: 3, explanation: 'Disruptions mainly occur when the current or density limits of the operational space are approached, or due to an accidental event such as a foreign object (e.g. a falling tile or wall piece) entering the plasma. (Lecture 05, Folie 35)' },
  { id: 'qz_kf_l05_45', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'The large electromagnetic forces experienced by surrounding structures during a disruption arise mainly from…', options: ['induced eddy currents from the fast decay of plasma current/magnetic field interacting with the toroidal field', 'reduced cryostat vacuum pressure', 'increased tritium breeding rates', 'the slow increase of plasma density'], correct: 0, explanation: 'The rapid quench of the plasma current causes a fast decay of the magnetic field, which by Faraday\'s law induces eddy currents in surrounding conductive structures; these eddy currents interacting with the toroidal field generate large magnetic forces. (Lecture 05, Folie 36)' },
  { id: 'qz_kf_l05_46', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'The four typical phases of a disruption event, in order, are…', options: ['Thermal quench, current quench, precursor, pre-precursor', 'Pre-precursor, precursor, thermal quench, current quench', 'Precursor, pre-precursor, current quench, thermal quench', 'Current quench, thermal quench, precursor, pre-precursor'], correct: 1, explanation: 'A disruption evolves through a pre-precursor phase (conditions drift toward instability), a precursor phase (onset of MHD instability, ~10 ms), a thermal quench (core temperature collapse, ~1 ms), and finally a current quench (current decays to zero, e.g. at ~100 MA/s). (Lecture 05, Folie 38)' },
  { id: 'qz_kf_l05_47', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'A Vertical Displacement Event (VDE) is specifically associated with the instability of…', options: ['the central solenoid to overheating', 'the divertor tungsten tiles to sputtering', 'elongated plasmas to gross vertical displacements', 'circular, unelongated plasmas to horizontal shifts'], correct: 2, explanation: 'A VDE arises from the inherent instability of vertically elongated plasmas to gross vertical displacement, which can be triggered by a control system failure or as a consequence of another disruption; large VDEs are considered rare accidental events to be avoided. (Lecture 05, Folie 40)' },
  { id: 'qz_kf_l05_48', category: 'L5 — Tokamaks: Plasma Main Operation', question: 'During a large Vertical Displacement Event, the halo current is best described as…', options: ['a current induced purely in the central solenoid', 'the current that drives ohmic heating during ramp-up', 'a current found only in the toroidal field coils', 'a portion of the plasma current that flows through the tokamak\'s conductive in-vessel structures and vessel'], correct: 3, explanation: 'As the plasma contacts the plasma-facing components during a VDE, the halo current — a portion of the plasma current flowing along field lines and then through the conductive vacuum vessel and in-vessel components — closes its circuit there, generating large forces that must be accounted for in structural design. (Lecture 05, Folie 40, 42)' },
],
