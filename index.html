// ── Start Study Session ──────────────────────────────────────────────────────
function startStudySession() {
  const topic = State.activeTopic;
  if (!topic) return;

  const mode = State.activeMode;
  let items = [];

  if (mode === 'guided') {
    items = topic.guided || [];
  } else if (mode === 'flashcard') {
    const ids = SM2.sortForStudy((topic.flashcards||[]).map(c=>c.id));
    items = ids.map(id => DATA.getItem(id)).filter(Boolean);
    if (items.length === 0) items = topic.flashcards || [];
  } else if (mode === 'quiz') {
    items = shuffleArray([...(topic.quiz||[])]);
  } else if (mode === 'fillblank') {
    items = shuffleArray([...(topic.fillblank||[])]);
  } else if (mode === 'open') {
    items = topic.open || [];
  }

  if (items.length === 0) {
    alert('No content available for this mode yet. Try another mode!');
    return;
  }

  State.sessionItems = items;
  State.sessionIndex = 0;
  State.sessionCorrect = 0;
  State.cardFlipped = false;

  Store.updateStreak();
  showScreen('study');
  renderStudyItem();
}

function updateStudyProgress() {
  const total = State.sessionItems.length;
  const current = State.sessionIndex;
  const pct = total > 0 ? (current / total) * 100 : 0;
  document.getElementById('studyProgressBar').style.width = pct + '%';
  document.getElementById('studyProgressLabel').textContent = `${current}/${total}`;
}

function renderStudyItem() {
  const mode = State.activeMode;
  updateStudyProgress();

  // Hide all mode containers
  document.querySelectorAll('.mode-container').forEach(c => c.classList.add('hidden'));

  if (State.sessionIndex >= State.sessionItems.length) {
    showSessionComplete();
    return;
  }

  const item = State.sessionItems[State.sessionIndex];

  if (mode === 'guided')    renderGuided(item);
  if (mode === 'flashcard') renderFlashcard(item);
  if (mode === 'quiz')      renderQuiz(item);
  if (mode === 'fillblank') renderFillBlank(item);
  if (mode === 'open')      renderOpenQuestion(item);
}

// ── Guided Mode ──────────────────────────────────────────────────────────────
function renderGuided(item) {
  const el = document.getElementById('mode-guided');
  el.classList.remove('hidden');

  document.getElementById('guidedBadge').textContent = item.badge || '';
  document.getElementById('guidedTitle').textContent = item.title || '';
  document.getElementById('guidedBody').textContent = item.body || '';
  document.getElementById('guidedExample').textContent = item.example || '';
  document.getElementById('guidedExample').style.display = item.example ? '' : 'none';

  const isLast = State.sessionIndex >= State.sessionItems.length - 1;
  document.getElementById('guidedNext').textContent = isLast ? 'Finish ✓' : 'Got it →';
  document.getElementById('guidedPrev').disabled = State.sessionIndex === 0;

  Store.markResult(item.id, true);
}

document.getElementById('guidedNext').addEventListener('click', () => {
  State.sessionIndex++;
  renderStudyItem();
});
document.getElementById('guidedPrev').addEventListener('click', () => {
  if (State.sessionIndex > 0) { State.sessionIndex--; renderStudyItem(); }
});

// ── Flashcard Mode ───────────────────────────────────────────────────────────
function renderFlashcard(item) {
  const el = document.getElementById('mode-flashcard');
  el.classList.remove('hidden');

  State.cardFlipped = false;
  const card = document.getElementById('flipCard');
  card.classList.remove('flipped');

  document.getElementById('fcFront').innerHTML = formatCardText(item.front);
  document.getElementById('fcBack').innerHTML  = formatCardText(item.back);

  const sm2 = SM2.getCard(item.id);
  document.getElementById('fcStats').textContent =
    `Reviews: ${sm2.totalReviews} · Interval: ${SM2.formatInterval(item.id)} · EF: ${sm2.ef.toFixed(2)}`;

  // Hide rating buttons until flipped
  document.getElementById('sm2Row').style.opacity = '0.3';
  document.getElementById('sm2Row').style.pointerEvents = 'none';
}

document.getElementById('flipCard').addEventListener('click', () => {
  if (!State.cardFlipped) {
    State.cardFlipped = true;
    document.getElementById('flipCard').classList.add('flipped');
    document.getElementById('sm2Row').style.opacity = '1';
    document.getElementById('sm2Row').style.pointerEvents = 'all';
  }
});

document.getElementById('sm2Row').addEventListener('click', e => {
  const btn = e.target.closest('.sm2-btn');
  if (!btn) return;
  const rating = parseInt(btn.dataset.rating);
  const item = State.sessionItems[State.sessionIndex];
  SM2.review(item.id, rating);
  Store.markResult(item.id, rating >= 3);
  State.sessionIndex++;
  renderStudyItem();
});

// ── Quiz Mode ────────────────────────────────────────────────────────────────
function renderQuiz(item) {
  const el = document.getElementById('mode-quiz');
  el.classList.remove('hidden');

  document.getElementById('quizCategory').textContent = item.category || '';
  document.getElementById('quizQuestion').innerHTML = formatCardText(item.question);

  const optEl = document.getElementById('quizOptions');
  const shuffled = item.options.map((opt, i) => ({ opt, i }));
  // Don't shuffle to keep correct index stable
  optEl.innerHTML = shuffled.map(({opt, i}) =>
    `<button class="quiz-opt" data-idx="${i}">${opt}</button>`
  ).join('');

  document.getElementById('quizFeedback').classList.add('hidden');
  document.getElementById('quizNext').classList.add('hidden');

  optEl.querySelectorAll('.quiz-opt').forEach(btn => {
    btn.addEventListener('click', () => handleQuizAnswer(parseInt(btn.dataset.idx), item));
  });
}

function handleQuizAnswer(chosen, item) {
  const optEls = document.querySelectorAll('.quiz-opt');
  optEls.forEach(b => { b.disabled = true; });

  const correct = chosen === item.correct;
  optEls[chosen].classList.add(correct ? 'correct' : 'wrong');
  if (!correct) optEls[item.correct].classList.add('correct');

  const fb = document.getElementById('quizFeedback');
  fb.className = 'quiz-feedback ' + (correct ? 'correct' : 'wrong');
  fb.textContent = (correct ? '✓ Correct! ' : '✗ Incorrect. ') + (item.explanation || '');
  fb.classList.remove('hidden');

  document.getElementById('quizNext').classList.remove('hidden');
  Store.markResult(item.id, correct);
  if (correct) State.sessionCorrect++;
}

document.getElementById('quizNext').addEventListener('click', () => {
  State.sessionIndex++;
  renderStudyItem();
});

// ── Fill Blank Mode ──────────────────────────────────────────────────────────
function renderFillBlank(item) {
  const el = document.getElementById('mode-fillblank');
  el.classList.remove('hidden');

  document.getElementById('fillCategory').textContent = State.activeTopic?.name || '';

  // Mark blank in sentence
  const parts = item.sentence.split('___');
  const display = parts.join('<span class="blank">___</span>');
  document.getElementById('fillSentence').innerHTML = display;

  const input = document.getElementById('fillInput');
  input.value = '';
  input.focus();

  document.getElementById('fillHintText').classList.add('hidden');
  document.getElementById('fillHintText').textContent = item.hint || '';
  document.getElementById('fillFeedback').classList.add('hidden');
  document.getElementById('fillFeedback').classList.remove('correct','wrong');
  document.getElementById('fillNext').classList.add('hidden');
}

document.getElementById('fillHint').addEventListener('click', () => {
  document.getElementById('fillHintText').classList.remove('hidden');
});

document.getElementById('fillCheck').addEventListener('click', () => checkFillBlank());
document.getElementById('fillInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkFillBlank();
});

function checkFillBlank() {
  const item = State.sessionItems[State.sessionIndex];
  const userAnswer = document.getElementById('fillInput').value.trim().toLowerCase();
  const correct = item.blank.toLowerCase();

  // Accept partial match — any correct word/phrase in the answer
  const correctParts = correct.split('/').map(p => p.trim());
  const isCorrect = correctParts.some(part =>
    userAnswer === part ||
    userAnswer.includes(part) ||
    part.includes(userAnswer)
  );

  const fb = document.getElementById('fillFeedback');
  fb.className = 'fill-feedback ' + (isCorrect ? 'correct' : 'wrong');
  fb.innerHTML = isCorrect
    ? `✓ Correct! The answer is: <strong>${item.blank}</strong>`
    : `✗ Not quite. The correct answer is: <strong>${item.blank}</strong>`;
  fb.classList.remove('hidden');

  document.getElementById('fillNext').classList.remove('hidden');
  Store.markResult(item.id, isCorrect);
  if (isCorrect) State.sessionCorrect++;
}

document.getElementById('fillNext').addEventListener('click', () => {
  State.sessionIndex++;
  renderStudyItem();
});

// ── Open Question Mode ───────────────────────────────────────────────────────
function renderOpenQuestion(item) {
  const el = document.getElementById('mode-open');
  el.classList.remove('hidden');

  document.getElementById('openCategory').textContent = State.activeTopic?.name || '';
  document.getElementById('openPoints').textContent = item.points || '';
  document.getElementById('openQuestion').innerHTML = formatCardText(item.question);

  const ta = document.getElementById('openAnswer');
  ta.value = '';

  document.getElementById('modelAnswer').classList.add('hidden');
  document.getElementById('selfRate').classList.add('hidden');
  document.getElementById('openReveal').classList.remove('hidden');

  // Format model answer with bullet points
  const formatted = (item.answer || '').split('\n').map(line => {
    if (line.startsWith('•')) return `<span class="point">${line.slice(1).trim()}</span>`;
    return `<span>${line}</span>`;
  }).join('');
  document.getElementById('modelAnswer').innerHTML = formatted;
}

document.getElementById('openReveal').addEventListener('click', () => {
  document.getElementById('modelAnswer').classList.remove('hidden');
  document.getElementById('selfRate').classList.remove('hidden');
  document.getElementById('openReveal').classList.add('hidden');
});

document.getElementById('selfRate').addEventListener('click', e => {
  const btn = e.target.closest('.sr-btn');
  if (!btn) return;
  const val = parseInt(btn.dataset.val);
  const item = State.sessionItems[State.sessionIndex];
  const correct = val >= 1;
  Store.markResult(item.id, correct);
  // Map self-rating to SM-2 rating for flashcard-like cards
  const sm2rating = val === 0 ? 0 : val === 1 ? 2 : 4;
  SM2.review(item.id, sm2rating);
  if (correct) State.sessionCorrect++;
  State.sessionIndex++;
  renderStudyItem();
});

// ── Session Complete ─────────────────────────────────────────────────────────
function showSessionComplete() {
  const total = State.sessionItems.length;
  const correct = State.sessionCorrect;
  const pct = total > 0 ? Math.round((correct/total)*100) : 0;

  document.querySelectorAll('.mode-container').forEach(c => c.classList.add('hidden'));

  const el = document.createElement('div');
  el.className = 'mode-container';
  el.style.textAlign = 'center';
  el.style.paddingTop = '40px';

  const emoji = pct >= 80 ? '🎉' : pct >= 50 ? '💪' : '📚';
  const msg = pct >= 80 ? 'Excellent work!' : pct >= 50 ? 'Good progress!' : 'Keep studying!';

  el.innerHTML = `
    <div style="font-size:56px;margin-bottom:16px;">${emoji}</div>
    <div style="font-size:24px;font-weight:800;margin-bottom:8px;">${msg}</div>
    <div style="font-size:15px;color:var(--text-dim);margin-bottom:32px;">
      ${State.activeMode !== 'guided' && State.activeMode !== 'open'
        ? `${correct} / ${total} correct (${pct}%)`
        : `${total} items completed`}
    </div>
    <div style="display:flex;flex-direction:column;gap:12px;max-width:320px;margin:0 auto;">
      <button class="btn-primary" id="btnStudyAgain">Study Again</button>
      <button class="btn-secondary" id="btnBackToTopics">Back to Topics</button>
    </div>
  `;

  document.getElementById('screen-study').appendChild(el);

  document.getElementById('btnStudyAgain').addEventListener('click', () => {
    el.remove();
    startStudySession();
  });
  document.getElementById('btnBackToTopics').addEventListener('click', () => {
    el.remove();
    showScreen('topics');
  });

  updateStudyProgress();
  document.getElementById('studyProgressBar').style.width = '100%';
}

// ── Stats Screen ─────────────────────────────────────────────────────────────
function renderStats() {
  const el = document.getElementById('statsContent');
  const topics = MODULES[0].topics;
  const streak = Store.getStreak();

  // Per-topic progress
  const topicRows = topics.map(t => {
    const prog = Store.getTopicProgress(t.id);
    return `
      <div class="stat-topic-row">
        <div class="st-name">${t.icon} ${t.name}</div>
        <div class="st-bar"><div class="st-fill" style="width:${prog}%"></div></div>
        <div class="st-pct">${prog}%</div>
      </div>
    `;
  }).join('');

  // SM-2 stats per topic
  const sm2Rows = topics.map(t => {
    const ids = (t.flashcards||[]).map(c=>c.id);
    const stats = SM2.getStats(ids);
    return `
      <div class="due-item">
        <div class="due-name">${t.icon} ${t.name}</div>
        <div style="display:flex;gap:6px;align-items:center;">
          <span style="font-size:11px;color:var(--text-dim);">${stats.learned} learned</span>
          ${stats.due > 0 ? `<span class="due-count">${stats.due} due</span>` : ''}
        </div>
      </div>
    `;
  }).join('');

  // Streak dots (last 14 days)
  const today = new Date().toDateString();
  const last14 = Array.from({length:14}, (_,i) => {
    const d = new Date(); d.setDate(d.getDate() - (13-i));
    return d.toDateString();
  });
  const dots = last14.map(d => {
    const done = streak.dates.includes(d);
    const isToday = d === today;
    return `<div class="streak-dot ${done ? (isToday ? 'today' : 'done') : ''}"></div>`;
  }).join('');

  el.innerHTML = `
    <div class="stat-section">
      <h3>Study Streak (last 14 days)</h3>
      <div class="streak-row">${dots}</div>
      <div style="margin-top:10px;font-size:13px;color:var(--text-dim);">
        ${streak.dates.length} days studied total
      </div>
    </div>
    <div class="stat-section">
      <h3>Topic Progress</h3>
      ${topicRows}
    </div>
    <div class="stat-section">
      <h3>Flashcard SM-2 Status</h3>
      <div class="due-list">${sm2Rows}</div>
    </div>
    <div class="stat-section">
      <h3>Reset Data</h3>
      <p style="font-size:13px;color:var(--text-dim);margin-bottom:12px;">Clear all progress and start fresh.</p>
      <button class="btn-secondary" id="btnReset" style="width:100%">Reset All Progress</button>
    </div>
  `;

  document.getElementById('btnReset').addEventListener('click', () => {
    if (confirm('Reset ALL progress? This cannot be undone.')) {
      SM2.resetAll();
      localStorage.removeItem(Store.KEY);
      localStorage.removeItem(Store.STREAK_KEY);
      renderStats();
      renderHome();
    }
  });
}

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.dataset.screen === 'topics') {
      State.activeTopic = null;
      renderTopicList();
    }
    showScreen(btn.dataset.screen);
  });
});

document.getElementById('btnBackHome').addEventListener('click', () => showScreen('home'));
document.getElementById('btnBackTopics').addEventListener('click', () => showScreen('topics'));
document.getElementById('btnBackStats').addEventListener('click', () => showScreen('home'));
document.getElementById('btnEndSession').addEventListener('click', () => showScreen('topics'));

document.getElementById('btnQuickStudy').addEventListener('click', () => {
  // Pick the topic with most due cards
  let bestTopic = MODULES[0].topics[0];
  let maxDue = 0;
  MODULES[0].topics.forEach(t => {
    const ids = (t.flashcards||[]).map(c=>c.id);
    const due = SM2.getDueCards(ids).length;
    if (due > maxDue) { maxDue = due; bestTopic = t; }
  });
  State.activeTopic = bestTopic;
  State.activeMode = maxDue > 0 ? 'flashcard' : 'guided';
  startStudySession();
});

// ── Utilities ────────────────────────────────────────────────────────────────
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function formatCardText(text) {
  if (!text) return '';
  return text
    .replace(/\n/g, '<br>')
    .replace(/`([^`]+)`/g, '<span style="font-family:monospace;background:rgba(59,130,246,0.15);padding:1px 5px;border-radius:4px;font-size:0.9em">$1</span>');
}
